\n  * Phòng thí nghiệm thực hiện phân tích các chỉ số hóa lý (độ đạm, độ sạch, vi sinh).\r\n  * Kết quả kiểm định kèm hồ sơ gốc được gắn chặt vào mã định danh của sản phẩm trên Blockchain.\r\n* **Giai đoạn 3: Vận chuyển & Phân phối (Logistics & Distribution)**\r\n  * Các thông số về nhiệt độ bảo quản, độ ẩm trong quá trình di chuyển được ghi nhận liên tục qua hệ thống cảm biến.\r\n  * Mỗi điểm dừng của sản phẩm đều được ghi lại dấu vết.\r\n* **Giai đoạn 4: Xác thực tại Showroom**\r\n  * Sản phẩm có mặt tại điểm bán với mã QR định danh duy nhất.\r\n  * Người tiêu dùng quét mã để thực hiện quy trình \"đối soát ngược\" về nguồn gốc.\r\n\r\n### 13.3. Trải nghiệm \"Niềm tin số\" cho Người tiêu dùng\r\n\r\nĐiểm nhấn của mô hình là biến các khái niệm kỹ thuật phức tạp thành trải nghiệm an tâm:\r\n\r\n1. **Hành trình xuyên suốt:** Hiển thị trực quan toàn bộ lịch sử sản phẩm qua các \"Nút\". Người dùng có thể thấy ai đã làm gì, ở đâu và vào lúc nào.\r\n2.\r\n\r\n**Đối soát tự động:** Khi quét mã, hệ thống mô phỏng việc kiểm tra chéo dữ liệu trên hàng trăm máy chủ để đảm bảo thông tin chưa từng bị can thiệp.\r\n   * *Xem mạng lưới xác thực:* [Global Node Network](https://agrichain.lephuchai.com/explorer/nodes) (Link: https://agrichain.lephuchai.com/explorer/nodes)\r\n3. **Hồ sơ định danh dữ liệu:** Sản phẩm được cấp một hồ sơ điện tử bao gồm điểm minh bạch, phân tích từ hệ thống và các bằng chứng thực tế (ảnh chụp, chứng từ).\r\n4. **Kiểm chứng sổ cái:** Mô phỏng lại trình khám phá Blockchain, cho phép những người am hiểu kiểm tra các mã giao dịch thô để đảm bảo tính khách quan.\r\n   * *Trình khám phá chuỗi khối:* [AgriChain Explorer](https://agrichain.lephuchai.com/explorer) (Link: https://agrichain.lephuchai.com/explorer)\r\n\r\n### 13.4. Các liên kết trải nghiệm thực tế\r\n\r\nBạn có thể trực tiếp trải nghiệm luồng xác thực này qua 2 dòng sản phẩm tiêu biểu:\r\n\r\n* 💎 **Sản phẩm Yến Sào:** https://agrichain.lephuchai.com/verify/YEN-001\r\n* 🍃 **Sản phẩm Trà Atisô:** https://agrichain.lephuchai.com/verify/TRA-003\r\n\r\n---\r\n\r\n*Mô hình AgriChain minh họa khả năng ứng dụng của Blockchain trong việc tăng cường minh bạch thông tin và hỗ trợ bảo vệ quyền lợi người tiêu dùng trong chuỗi giá trị nông sản.*\r\n\r\n---\r\n\r\n## 10. NGUỒN KINH PHÍ VÀ CÁC GIẢI THÍCH BỔ SUNG\r\n\r\n### 10.1. Nguồn kinh phí\r\nNghiên cứu sinh tự túc nguồn kinh phí, bao gồm:\r\n- Chi phí khảo sát thị trường và thu thập dữ liệu (n = 400 - 500).\r\n- Chi phí xây dựng hệ thống Mockup thực nghiệm.\r\n- Lệ phí công bố bài báo khoa học quốc tế (nếu có) và hội thảo trong nước.\r\n\r\n### 10.2. Các giải thích bổ sung (Nếu cần)\r\n- *Về việc lựa chọn G*Power:* Đề cương chủ động áp dụng phương pháp ước lượng G*Power (Hair et al., 2022) thay cho quy tắc cũ (như quy tắc 10 lần) nhằm đáp ứng yêu cầu khắt khe của các tạp chí chuẩn Q1/Q2 hiện hành, đảm bảo độ mạnh thống kê trong phân tích SEM.\r\n- *Về kiểm định thao túng:* Đề cương ưu tiên sử dụng phân nhóm ngẫu nhiên kết hợp kiểm định thao túng trên Qualtrics/Google Forms nhằm tối đa hóa giá trị nội tại của thiết kế thực nghiệm 2x2.\r\n\r\n---\r\n\r\n### 8.3. Thang đo & Bảng câu hỏi (Measurement Model & Questionnaire)\r\n#### 8.3.1. Nguyên tắc xây dựng thang đo\r\n*   Sử dụng thang đo Likert 7 điểm.\r\n*   Kế thừa từ các nghiên cứu đã kiểm định.\r\n*   Dịch thuật ngược (Back-translation: Anh ↔ Việt).\r\n*   Pilot test (n ≈ 30).\r\n\r\n#### 8.3.2. Cấu trúc bảng hỏi\r\n**PHẦN A – KỊCH BẢN**\r\nNgười tham gia xem 1 trong 4 mockup sản phẩm (phân bổ ngẫu nhiên).\r\n\r\n**PHẦN B – THANG ĐO CÁC BIẾN NGHIÊN CỨU**\r\n\r\n**1. Nhận thức về truy xuất nguồn gốc** **\r\n*   TR1: Tôi có thể dễ dàng truy xuất nguồn gốc của sản phẩm này.\r\n*   TR2: Thông tin về nguồn gốc sản phẩm được trình bày rõ ràng.\r\n*   TR3: Tôi tin rằng thông tin truy xuất là minh bạch.\r\n*   TR4: Tôi có thể kiểm tra được quy trình sản xuất của sản phẩm.\r\n*   TR5: Hệ thống truy xuất giúp tôi hiểu rõ sản phẩm hơn.\r\n\r\n**2. Perceived Information Quality** *(Adapted from Nelson et al., 2005)*\r\n*   PIQ1: Thông tin về sản phẩm là chính xác.\r\n*   PIQ2: Thông tin được cung cấp là đáng tin cậy.\r\n*   PIQ3: Thông tin là đầy đủ.\r\n*   PIQ4: Thông tin được trình bày rõ ràng và dễ hiểu.\r\n\r\n**3. Skepticism** *(Adapted from Skarmeas & Leonidou, 2013)*\r\n*   SK1: Tôi nghi ngờ các tuyên bố \"tự nhiên\" của sản phẩm này.\r\n*   SK2: Tôi cho rằng thông điệp \"nguyên chất\" thường bị phóng đại.\r\n*   SK3: Tôi không hoàn toàn tin các cam kết về thành phần.\r\n*   SK4: Tôi nghĩ rằng nhiều sản phẩm \"tự nhiên\" chỉ là marketing.\r\n*   SK5: Tôi hoài nghi về tính trung thực của các tuyên bố này.\r\n\r\n**4. Trust** *(Adapted from Chen, 2012)*\r\n*   TT1: Sản phẩm này đáng tin cậy.\r\n*   TT2: Tôi cảm thấy an toàn khi sử dụng sản phẩm này.\r\n*   TT3: Sản phẩm này có thể tin được.\r\n*   TT4: Tôi tin tưởng vào cam kết chất lượng của sản phẩm này.\r\n\r\n**5. Brand Authenticity** *(Adapted from Morhart et al., 2015)*\r\n*   BA1: Thương hiệu này mang lại cảm giác \"thật\".\r\n*   BA2: Thương hiệu này rất chân thành.\r\n*   BA3: Thương hiệu này không giả tạo.\r\n*   BA4: Thương hiệu này gợi lên những giá trị mà tôi coi trọng.\r\n\r\n**6. Purchase Intention** *(Adapted from Spears & Singh, 2004)*\r\n*   PI1: Tôi có khả năng sẽ mua sản phẩm này.\r\n*   PI2: Tôi sẽ cân nhắc mua sản phẩm này.\r\n*   PI3: Tôi có ý định thử sản phẩm này.\r\n*   PI4: Tôi sẵn sàng chọn sản phẩm này khi mua.\r\n\r\n**7. Willingness to Pay Premium** *(Gabor-Granger đã đơn giản hóa)*\r\nPhương pháp Gabor-Granger được chọn vì phù hợp với bối cảnh FMCG giá thấp (Homburg et al., 2005), nơi mức WTP tuyệt đối nhỏ và câu hỏi mở có nguy cơ tạo ra phương sai quá lớn hoặc giá trị phi thực tế.\r\n\r\n**Kiểm tra thao tác kích thích & Phân nhóm:**\r\nĐể đảm bảo tính giá trị nội tại của thiết kế thực nghiệm 2x2, một câu hỏi kiểm tra thao tác được sử dụng nhằm xác nhận đáp viên thực sự nhận thức được sự hiện diện của mã QR và loại thông điệp. Đồng thời, tính năng phân nhóm ngẫu nhiên của công cụ khảo sát được kích hoạt để loại trừ thiên kiến chọn mẫu, dù sử dụng phương pháp lấy mẫu thuận tiện.\r\n*   **Câu hỏi:** \"Nếu sản phẩm này có giá cao hơn sản phẩm thông thường, bạn sẵn sàng trả thêm tối đa bao nhiêu?\"\r\n    - [ ] Không trả thêm\r\n    - [ ] +2.000 VNĐ\r\n    - [ ] +5.000 VNĐ\r\n    - [ ] +8.000 VNĐ\r\n    - [ ] +10.000 VNĐ\r\n\r\n#### 8.3.3. Biến kiểm tra thao tác\r\n*   MC_TR1: Sản phẩm này có cung cấp thông tin truy xuất nguồn gốc.\r\n*   MC_TR2: Tôi có thể kiểm tra thông tin sản phẩm.\r\n*   MC_NC1: Sản phẩm này nhấn mạnh yếu tố \"tự nhiên\".\r\n*   MC_NC2: Nội dung marketing tập trung vào sức khỏe.\r\n\r\n#### 8.3.4. Biến kiểm soát\r\n*   Giới tính, Độ tuổi, Tần suất sử dụng nước giải khát.\r\n*   Mức độ quan tâm đến sức khỏe (1–7 điểm).\r\n*   Mức độ quan tâm đến môi trường (1–7 điểm).\r\n\r\n#### 8.3.5. Kiểm định thang đo\r\n*   Cronbach's Alpha ≥ 0.7; CR ≥ 0.7.\r\n*   AVE ≥ 0.5.\r\n*   HTMT \u003c 0.85."},{"title":"ĐỀ CƯƠNG NGHIÊN CỨU ĐỀ TÀI LUẬN ÁN TIẾN SĨ","file":"PhD_Proposal_NhaTrangUniversity.md","chars":6903,"pages":"3.8","content":"# ĐỀ CƯƠNG NGHIÊN CỨU ĐỀ TÀI LUẬN ÁN TIẾN SĨ\r\n\r\n**Tên đề tài:** \"Tác động cộng hưởng giữa Marketing xanh và Minh bạch dựa trên nền tảng Blockchain trong việc xóa bỏ hoài nghi, thúc đẩy ý định mua hàng: Nghiên cứu dòng đồ uống Yến sào đóng lon (RTD Bird's Nest) tại thị trường Thành phố Hồ Chí Minh\"\r\n\r\n**Chuyên ngành đăng ký:** Quản trị Kinh doanh\r\n**Mã ngành:** [Điền mã ngành]\r\n\r\n---\r\n\r\n### 1. Lý do chọn đề tài của luận án\r\nTrong bối cảnh kinh tế số và tiêu dùng bền vững, các đặc sản giá trị cao của Khánh Hòa, tiêu biểu là **Yến sào**, đang đứng trước thách thức nghiêm trọng về niềm tin. Yến sào thuộc nhóm **Hàng hóa tin tưởng** (Darby & Karni, 1973), nơi người tiêu dùng không thể tự kiểm chứng hàm lượng nguyên chất hay nguồn gốc thực tế. Hiện tượng **\"Tẩy xanh\"** — quảng bá yến đảo thiên nhiên nhưng thực chất là yến nhà hoặc yến độn — đã tạo ra sự **Hoài nghi xanh** (Skarmeas & Leonidou, 2013), làm suy giảm hiệu quả của các nỗ lực Marketing chân chính.\r\n\r\nViệc ứng dụng công nghệ **Blockchain** với tính bất biến cung cấp một \"Cơ chế xác thực số\" giúp hóa giải sự hoài nghi. Nghiên cứu tập trung vào dòng **Nước yến đóng lon** — một mặt hàng FMCG phổ biến với Gen Z — để chứng minh rằng việc kết hợp Marketing xanh với bằng chứng Blockchain sẽ tạo ra **Tác động cộng hưởng** mạnh mẽ. Đây là hướng đi cấp thiết để bảo vệ thương hiệu quốc gia \"Yến sào Khánh Hòa\" và đóng góp vào mục tiêu chuyển đổi số của địa phương.\r\n\r\n### 2. Tình hình nghiên cứu trong và ngoài nước\r\nLược khảo tài liệu có hệ thống theo chuẩn PRISMA từ các cơ sở dữ liệu Scopus/WoS cho thấy:\r\n- **Quốc tế:** Các nghiên cứu đã xác lập vai trò của Marketing xanh (Papadas et al., 2017) và minh bạch Blockchain (Garaus & Treiblmaier, 2021). Tuy nhiên, hầu hết tiếp cận chúng như hai công cụ độc lập.\r\n- **Trong nước:** Đã có các nghiên cứu về ý định mua xanh của Gen Z (Do et al., 2025) nhưng chưa tích hợp tham số công nghệ minh bạch vào mô hình cấu trúc tâm lý.\r\n- **Khoảng trống khoa học:** \r\n    1. Thiếu khung lý thuyết **Marketing thực chứng** tích hợp xác thực số vào điểm tiếp xúc khách hàng.\r\n    2. Vắng bóng các mô hình kiểm định kịch bản mô phỏng để đo lường phản ứng của Gen Z đối với Blockchain tại Việt Nam.\r\n    3. Chưa có nghiên cứu nào đánh giá hiệu ứng tương tác giữa nỗ lực Marketing và minh bạch Blockchain trong việc khuếch đại niềm tin.\r\n\r\n### 3. Mục tiêu nghiên cứu của luận án\r\n- **Mục tiêu tổng quát:** Xây dựng và kiểm định mô hình lý thuyết về sự cộng hưởng giữa Marketing xanh và Minh bạch Blockchain nhằm hóa giải hoài nghi và thúc đẩy ý định mua hàng đối với nước yến RTD.\r\n- **Mục tiêu cụ thể:**\r\n    1. Hiệu chỉnh thang đo Green Marketing và Blockchain Transparency phù hợp với đặc sản Khánh Hòa.\r\n    2. Kiểm định tác động trực tiếp của Marketing xanh và Blockchain Transparency đến Niềm tin xanh.\r\n    3. **Trọng tâm:** Chứng minh vai trò điều tiết của Blockchain trong việc khuếch đại niềm tin và hóa giải sự hoài nghi.\r\n    4. Đề xuất lộ trình ứng dụng Marketing thực chứng cho doanh nghiệp Yến sào.\r\n\r\n### 4. Nội dung nghiên cứu\r\nNội dung luận án bám sát 6 học kỳ đào tạo (3 năm):\r\n- **Giai đoạn 1:** Tổng hợp lý luận và xây dựng khung khái niệm Marketing thực chứng.\r\n- **Giai đoạn 2:** Thực hiện Tiểu luận tổng quan và xác lập mô hình nghiên cứu S-O-R.\r\n- **Giai đoạn 3:** Nghiên cứu định tính và thực hiện 02 Chuyên đề tiến sỹ.\r\n- **Giai đoạn 4:** Khảo sát thực nghiệm kịch bản tại thị trường TP.HCM.\r\n- **Giai đoạn 5:** Phân tích PLS-SEM bằng ngôn ngữ R và viết bài báo quốc tế Scopus.\r\n- **Giai đoạn 6:** Hoàn thiện bản thảo và bảo vệ luận án các cấp.\r\n\r\n### 5. Ý nghĩa khoa học và thực tiễn của đề tài\r\n- **Khoa học:** Đóng góp khung lý thuyết mới tích hợp giữa lý thuyết Tín hiệu và nền tảng công nghệ số.\r\n- **Thực tiễn:** Giúp doanh nghiệp Yến sào Khánh Hòa bảo vệ uy tín thương hiệu, gia tăng giá trị thặng dư và hỗ trợ lộ trình số hóa nông sản OCOP của tỉnh.\r\n\r\n### 6. Phạm vi nghiên cứu của đề tài\r\n- **Không gian:** Chuỗi giá trị tại Khánh Hòa; thị trường tiêu thụ tại Thành phố Hồ Chí Minh.\r\n- **Thời gian:** Giai đoạn nghiên cứu từ 2025 – 2028.\r\n- **Đối tượng (Mẫu):** Thế hệ Z (1997-2012) tại TP.HCM.\r\n- **Nội dung:** Tương tác giữa Marketing xanh và tính minh bạch bất biến của Blockchain.\r\n\r\n### 7. Đối tượng nghiên cứu của đề tài\r\nĐối tượng nghiên cứu là: **Tính cộng hưởng và cơ chế điều tiết** của Minh bạch Blockchain đối với mối quan hệ giữa Marketing xanh và hành vi khách hàng.\r\n\r\n### 8. Phương pháp nghiên cứu\r\n- **Định tính:** Phỏng vấn sâu 15 chuyên gia để hiệu chỉnh kịch bản và thang đo.\r\n- **Định lượng:** Khảo sát kịch bản với mẫu n=500 người tiêu dùng Gen Z.\r\n- **Xử lý số liệu:** Mô hình cấu trúc tuyến tính **PLS-SEM** bằng **ngôn ngữ R** (Bootstrap 5.000 mẫu, thuật toán Two-stage).\r\n\r\n### 9. Kết quả mong đợi\r\n- 01 Bài báo Scopus (Q1/Q2).\r\n- 02 Bài báo đăng trên các tạp chí uy tín trong nước thuộc danh mục HĐGS.\r\n- Mô hình giải pháp Marketing thực chứng cho đặc sản Khánh Hòa.\r\n\r\n### 10. Nguồn kinh phí\r\nKinh phí thực hiện luận án dự kiến từ nguồn tự túc của NCS và các học bổng nghiên cứu.\r\n\r\n### 11. Dự kiến kế hoạch học tập, nghiên cứu toàn khóa (Theo ĐHNT)\r\n\r\n| STT | Nội dung nhiệm vụ | Thời gian | Kết quả dự kiến | Nơi thực hiện |\r\n|---|---|---|---|---|\r\n| **1** | **Học kỳ 1: Học phần trình độ TS (8 TC)** | **Tháng 1-6** | **Chứng chỉ học tập** | **ĐH Nha Trang** |\r\n| | - Tổng quan về NCKH & Công cụ trong NCKH | | | |\r\n| **2** | **Học kỳ 2: Tiểu luận tổng quan (4 TC)** | **Tháng 7-12** | **TL tổng quan TS** | **ĐH Nha Trang** |\r\n| | - Lược khảo SLR & Hội đồng thông qua hướng đi | | | |\r\n| **3** | **Học kỳ 3: Chuyên đề TS & Luận án (68 TC)** | **Tháng 13-18** | **02 Chuyên đề TS** | **ĐH Nha Trang** |\r\n| | - Thực hiện Chuyên đề 1 & 2; Nghiên cứu định tính | | | |\r\n| **4** | **Học kỳ 4: Thu thập dữ liệu thực địa** | **Tháng 19-24** | **Data sạch / Scopus** | **HCM / Nha Trang** |\r\n| | - Khảo sát kịch bản n=500; Viết bài báo Scopus | | | |\r\n| **5** | **Học kỳ 5: Seminar & Hoàn thiện luận án** | **Tháng 25-30** | **Seminar 1, 2, 3** | **ĐH Nha Trang** |\r\n| | - Phân tích R; Viết báo trong nước; Viết luận án | | | |\r\n| **6** | **Học kỳ 6: Bảo vệ các cấp** | **Tháng 31-36** | **Bằng Tiến sĩ** | **ĐH Nha Trang** |\r\n| | - Nộp luận án Đơn vị cơ sở & Cấp trường | | | |\r\n\r\n### 12. Tài liệu tham khảo\r\n1. Ajzen, I. (1991). The theory of planned behavior. *OBHDP*, 50(2), 179-211.\r\n2. Chen, Y. S. (2010). The drivers of green brand equity. *Journal of Business Ethics*, 93(2), 307-319.\r\n3. Garaus, M., & Treiblmaier, H. (2021). Blockchain-based food traceability. *Food Control*, 124, 107871.\r\n4. Hair, J. F., et al. (2022). *A primer on PLS-SEM*. Sage publications.\r\n5. Papadas, K., et al. (2017). Green marketing orientation. *JBR*, 80, 236-246.\r\n6. Skarmeas, D., & Leonidou, C. N. (2013). Eco-skepticism in sustainability. *JBR*, 66(10), 1731-1738.\r\n\r\n---\r\n**Khánh Hòa, năm 2025**\r\n**Người lập kế hoạch**\r\n*(Ký và ghi rõ họ tên)*\r\n"}],"others":[{"title":"BÀI LUẬN VỀ DỰ ĐỊNH NGHIÊN CỨU: HÀNH TRÌNH ĐI TÌM \"NIỀM TIN THỰC CHỨNG\"","file":"bailuan.md","chars":3663,"pages":"2.0","content":"# BÀI LUẬN VỀ DỰ ĐỊNH NGHIÊN CỨU: HÀNH TRÌNH ĐI TÌM \"NIỀM TIN THỰC CHỨNG\"\r\n\r\n**Thí sinh:** Lê Phúc Hải  \r\n**Chuyên ngành:** Quản trị Kinh doanh  \r\n\r\n---\r\n\r\n### 1. Đề tài và Tâm thế nghiên cứu\r\n**Tên đề tài:** Ảnh hưởng của truy xuất nguồn gốc số đến ý định mua sản phẩm nước yến chế biến sẵn: Vai trò trung gian của tính xác thực thương hiệu.\r\n\r\nNghiên cứu của tôi tập trung vào ngành hàng đồ uống chức năng (**functional beverages**). Trong đó, sản phẩm yến sào đóng lọ là bối cảnh thực nghiệm chính. Tôi chọn hướng nghiên cứu về sự giao thoa giữa \"Xác thực số\" và \"Tâm lý khách hàng\" với mong muốn giải mã cơ chế đằng sau niềm tin tiêu dùng hiện đại.\r\n\r\n### 2. Sự trăn trở và Lý do lựa chọn hướng đi này (Vấn đề nghiên cứu)\r\nLý do tôi chọn đề tài này xuất phát từ thực trạng thị trường đầy hoài nghi. Nhiều báo cáo ngành chỉ ra rằng nước yến giả mạo chiếm tỷ trọng không nhỏ, gây tổn thất doanh thu và làm suy giảm lòng tin. **Hiện nay, dù các hệ thống truy xuất nguồn gốc số (như blockchain) đang dần phổ biến, chúng ta vẫn chưa rõ cách người tiêu dùng tiếp nhận các tín hiệu này. Liệu dữ liệu kỹ thuật có thực sự biến thành quyết định mua hàng hay không?** Đây là bài toán tôi muốn tìm lời giải.\r\n\r\n### 3. Tổng quan tài liệu và Khoảng trống nghiên cứu (Đánh giá phản biện)\r\nNghiên cứu dựa trên Lý thuyết Tín hiệu và Mô hình S-O-R. Qua lược khảo tài liệu, tôi nhận thấy một mâu thuẫn: **Mặc dù truy xuất nguồn gốc được cho là giúp tăng niềm tin, nhưng việc chuyển hóa niềm tin này thành hành vi mua thực tế vẫn còn \"chưa nhất quán\".** Điều này gợi mở về các cơ chế tâm lý tiềm ẩn. Luận án của tôi hướng tới việc lấp đầy khoảng trống này bằng cách đưa khái niệm **Tính xác thực thương hiệu** vào như một biến trung gian.\r\n\r\n### 4. Mục tiêu nghiên cứu (Độ sâu phân tích)\r\nMục tiêu chính của tôi là kiểm tra cách các tín hiệu số chuyển hóa thành tính xác thực thương hiệu cảm nhận. **Nghiên cứu đặc biệt có ý nghĩa với mô hình kinh tế yến sào Khánh Hòa. Tôi hy vọng cung cấp những bằng chứng thực chứng để góp phần bảo vệ \"Chỉ dẫn địa lý\" trước hàng giả.** Ngoài ra, tôi cũng muốn tìm hiểu các điều kiện biên nơi tín hiệu kỹ thuật có thể thất bại, từ đó gợi ý lộ trình thực tiễn cho doanh nghiệp Việt.\r\n\r\n### 5. Phương pháp nghiên cứu và Tính chuẩn xác\r\nTôi áp dụng phương pháp hỗn hợp. Đầu tiên là phỏng vấn sâu 15 chuyên gia để hiệu chỉnh thang đo. Tiếp đó là thực nghiệm kịch bản trên 500 người tiêu dùng Gen Z. **Các kiểm định thao túng sẽ được thực hiện nghiêm ngặt để đảm bảo giá trị khoa học. Tôi cũng kế thừa các thang đo uy tín và đánh giá sai lệch phương pháp phổ biến để đảm bảo độ tin cậy cao nhất.**\r\n\r\n### 6. Biến điều tiết và Đóng góp lý luận\r\nSự hoài nghi của người tiêu dùng được dự báo sẽ điều tiết hiệu quả của các tín hiệu số. Về lý luận, nghiên cứu mở rộng ứng dụng của Lý thuyết Tín hiệu vào hệ thống xác thực kỹ thuật số. **Việc xác định các điều kiện biên mà tại đó tín hiệu truy xuất không phát huy hiệu quả cũng là một phát hiện quan trọng mà tôi hướng tới.**\r\n\r\n### 7. Tâm nguyện và Lộ trình hành động\r\nTôi muốn trở thành một nhà nghiên cứu độc lập. Lộ trình 3 năm tới của tôi đã sẵn sàng: từ hoàn thiện lý thuyết, thu thập dữ liệu thực chứng, đến kết tinh kết quả thành luận án và các công công bố quốc tế.\r\n\r\n### 8. Tại sao tôi chọn Đại học Nha Trang?\r\nNghiên cứu về yến sào Khánh Hòa ngay tại ngôi trường trên vùng đất yến không chỉ mang tính biểu tượng mà còn cho phép tôi tiếp cận sát sao với thực tiễn. Tôi tin rằng sự đồng hành từ đội ngũ chuyên gia tại ĐH Nha Trang sẽ là bệ phóng vững chắc để tôi thực hiện thành công nghiên cứu này.\r\n\r\n---\r\n**Khánh Hòa, ngày …. tháng …. năm 20….**\r\n\r\n**Người dự tuyển**  \r\n\r\n**Lê Phúc Hải**\r\n"},{"title":"Yêu Cầu Riêng Của Đề Tài / Tạp Chí (Local Requirements)","file":"Local_Journal_Requirements.md","chars":1604,"pages":"0.9","content":"# Yêu Cầu Riêng Của Đề Tài / Tạp Chí (Local Requirements)\n\n\u003e **LƯU Ý:** Tài liệu này ghi đè và bổ sung cho các quy định tại `Global_Writing_Style_Guide.md` ở thư mục gốc. Khi có xung đột về format hoặc quy tắc, hệ thống sẽ ưu tiên áp dụng các chỉ dẫn tại file này cho riêng dự án hiện tại.\n\n## 1. Định Dạng & Độ Dài (Formatting & Length)\n- **Giới hạn số từ:** [Ví dụ: 8,000 - 10,000 từ / Hoặc Không giới hạn]\n- **Kiểu trích dẫn (Citation Style):** [Ví dụ: APA 7th Edition / Harvard / IEEE]\n- **Ngôn ngữ:** [Tiếng Việt / Tiếng Anh]\n\n## 2. Quy Định Về Khung Lý Thuyết (Theoretical Framework)\n- **Lĩnh vực lõi:** [Ví dụ: Quản trị Kinh doanh / Marketing / Hệ thống Thông tin]\n- **Mô hình phân tích:** [Ví dụ: PLS-SEM / CB-SEM / Thực nghiệm 2x2 / Định tính]\n- **Quy chuẩn Hình ảnh & Sơ đồ (Graphic Guidelines):** BẮT BUỘC sử dụng phong cách Trắng - Đen (B&W) tiêu chuẩn cho tất cả các mô hình học thuật (Conceptual Model, Flowchart). Nền trắng (`fill:#ffffff`), viền đen (`stroke:#000000`), tuyệt đối KHÔNG sử dụng màu pastel, gradient hay bo góc quá đà để tránh bị đánh giá là hình ảnh do AI tạo ra (AI-generated bias). Đảm bảo chuẩn mực xuất ra từ các phần mềm hàn lâm như SmartPLS, AMOS.\n\n## 3. Khác Biệt So Với Luật Chung (Overrides)\n- [Liệt kê các yêu cầu đặc thù của hội đồng hoặc tạp chí mục tiêu vào đây...]\n- *Ví dụ: \"Hội đồng ĐH Nha Trang yêu cầu bỏ qua phần diễn giải lý thuyết cơ sở quá dài, cần đi thẳng vào khoảng trống nghiên cứu.\"*\n- *Ví dụ: \"Tạp chí Journal of Business Research yêu cầu phần thảo luận (Discussion) phải tách biệt rõ rệt đóng góp lý thuyết và thực tiễn thành 2 sub-heading.\"*\n"},{"title":"NHATRANG_GUILDLINE.md","file":"NHATRANG_GUILDLINE.md","chars":3613,"pages":"2.0","content":"1. Lý do chọn đề tài của luận án (trình bày các vấn đề và các kết quả nghiên cứu đã có liên quan để thấy được sự cấp thiết từ đó giúp người đọc hiểu được tại sao chọn nghiên cứu này để làm luận án tiến sĩ)\r\n2. Tình hình nghiên cứu trong và ngoài nước (Tổng hợp, phân tích, đánh giá các công trình nghiên cứu đã công bố có liên quan đến đề tài. Làm rõ những vấn đề đã được nghiên cứu, mức độ đạt được, và những vấn đề còn bỏ ngỏ hoặc chưa thống nhất. Từ đó xác định khoảng trống khoa học và lý do cần thực hiện đề tài)\r\n3. Mục tiêu nghiên cứu của luận án (Mục tiêu: trình bày mục tiêu tổng quát/mục tiêu chung là kết quả luận án sau khi thực hiện sẽ đóng góp cho một mục tiêu lớn; và mục tiêu cụ thể là kết quả luận án sẽ đạt được sau khi hoàn thành nghiên cứu. Trong phần mục tiêu nghiên cứu có thể viết thêm câu hỏi nghiên cứu (nếu cần thiết).\r\n4. Nội dung nghiên cứu (liệt kê tên các nội dung nghiên cứu của luận án để nhìn thấy tính logic và dung lượng của luận án đáp ứng; nội dung nghiên cứu cần có sự liên hệ với mục tiêu đã đặt ra – số nội dung nghiên cứu phải bằng hoặc nhiều hơn mục tiêu cụ thể).\r\n5.\r\n\r\nÝ nghĩa khoa học và thực tiễn của đề tài (Phần này nhằm nêu rõ giá trị và đóng góp của đề tài về mặt học thuật, lý luận hoặc phương pháp nghiên cứu; thể hiện khả năng áp dụng kết quả nghiên cứu vào thực tế, phục vụ phát triển kinh tế - xã hội hoặc chuyên môn ngành)\r\n6. Phạm vi nghiên cứu của đề tài (xác định rõ giới hạn mà đề tài tập trung nghiên cứu, bao gồm: không gian (địa điểm, vùng, cơ sở nghiên cứu); thời gian (giai đoạn, niên độ, chu kỳ nghiên cứu); đối tượng (loại hình, nhóm mẫu, vấn đề cụ thể); nội dung (khía cạnh, biến số, phạm vi lý thuyết))\r\n7. Đối tượng nghiên cứu của đề tài (xác định chính xác cái mà đề tài sẽ khảo sát, phân tích hoặc tác động tới. Đây là trung tâm của nghiên cứu, là cái được nghiên cứu chứ không phải người hay công cụ nghiên cứu. Cần phân biệt và tránh nhầm lẫn giữa Đối tượng nghiên cứu với Khách thể nghiên cứu và Đối tượng khảo sát)\r\n8. Phương pháp nghiên cứu (trình bày phương pháp nghiên cứu tổng quát thực hiện từng nội dung nghiên cứu của luận án; những luận án có thu thập số liệu cần nêu nguồn số liệu; bố trí thí nghiệm nghiên cứu; phương pháp/kỹ thuật phân tích; phương pháp xử lý số liệu thực nghiệm;…)\r\n9. Kết quả mong đợi (liệt kê các kết quả mà luận án kỳ vọng sẽ đạt được sau khi thực hiện luận án)\r\n10. Nguồn kinh phí (nguồn kinh phí thực hiện luận án, nếu có tài trợ hay tham gia luận án của giảng viên hướng dẫn thì ghi tên luận án)\r\n11. Dự kiến kế hoạch học tập, nghiên cứu toàn khóa\r\n\r\nSTT\tNội dung\tThời gian\tKết quả dự kiến\tNơi thực hiện\r\n1\tNhiệm vụ 1 (ví dụ: học các học phần ở trình độ tiến sĩ)\t\t\t\r\n2\tNhiệm vụ 2 (ví dụ: viết Tiểu luận tổng quan)\t\t\t\r\n...\t……(xem cấu trúc CTĐT để biết chi tiết nội dung học tập và nghiên cứu)\t\t\t\r\n\tSeminar\t\t\t\r\n\tViết báo, đăng báo\t\t\t\r\n\tNộp luận án cấp cơ sở\t\t\t\r\n\t.....\t\t\t\r\n\tNộp luận án cấp trường\t\t\t\r\n\tBảo vệ luận án\t\t\t\r\n\t.....\t\t\t\r\n\r\nLưu ý: Phần in nghiêng là ví dụ về các nội dung trong kế hoạch học tập, nghiên cứu toàn khóa. Mỗi ứng viên dự tuyển sẽ thực hiện kế hoạch cụ thể của mình căn cứ vào quy định của Trường Đại học Nha Trang về chương trình đào tạo tiến sĩ đã công bố.\r\nKế hoạch học tập và nghiên cứu toàn khóa theo thiết kế tiêu chuẩn là 3 năm.\r\n\r\n12. Tài liệu tham khảo (Liệt kê đầy đủ tài liệu tham khảo sử dụng trong viết đề cương, chọn một trong hai cách trích dẫn kiểu numbered hay Harvard theo Quyết định số 1263/QĐ-ĐHNT ngày 30/9/2019 của Hiệu trưởng Trường Đại học Nha Trang về việc ban hành Quy định kiểu trích dẫn và lập danh mục tài liệu tham khảo tại Trường Đại học Nha Trang) \r\n"},{"title":"PHỤ LỤC: MÔ PHỎNG LUỒNG VẬN HÀNH AGRICHAIN","file":"phuluc_blockchain.md","chars":3132,"pages":"1.7","content":"# PHỤ LỤC: MÔ PHỎNG LUỒNG VẬN HÀNH AGRICHAIN\r\n\r\n## 1. Mục tiêu mô phỏng\r\n\r\nPhần phụ lục này trình bày chi tiết luồng vận hành của hệ thống AgriChain, mô phỏng lại cách thức hoạt động của một mạng lưới Blockchain thực thụ (như Ethereum). Mục tiêu là giúp người tiêu dùng và nhà quản lý hiểu được con đường đi của dữ liệu từ nông trại đến tay người dùng cuối một cách minh bạch nhất.\r\n\r\n* **Địa chỉ truy cập hệ thống:** [https://agrichain.lephuchai.com/](https://agrichain.lephuchai.com/)\r\n\r\n## 2. Luồng dữ liệu sản phẩm\r\n\r\nHệ thống mô phỏng trọn vẹn 4 giai đoạn cốt lõi của một sản phẩm nông sản sạch:\r\n\r\n* **Giai đoạn 1: Ghi nhận tại Nông trại**\r\n  * Mọi thông tin về giống, ngày thu hoạch, tọa độ GPS được \"ký số\" xác thực.\r\n  * Dữ liệu được đóng gói và gửi lên chuỗi khối dưới dạng một giao dịch không thể sửa đổi.\r\n  * *Công cụ hỗ trợ:* [Trình tạo mã QR &amp; Ghi nhận dữ liệu](https://agrichain.lephuchai.com/tools/qr) (Link: https://agrichain.lephuchai.com/tools/qr)\r\n* **Giai đoạn 2: Kiểm định Chất lượng**\r\n  * Phòng thí nghiệm thực hiện phân tích các chỉ số hóa lý (độ đạm, độ sạch, vi sinh).\r\n  * Kết quả kiểm định kèm hồ sơ gốc được gắn chặt vào mã định danh của sản phẩm trên Blockchain.\r\n* **Giai đoạn 3: Vận chuyển & Phân phối (Logistics & Distribution)**\r\n  * Các thông số về nhiệt độ bảo quản, độ ẩm trong quá trình di chuyển được ghi nhận liên tục qua hệ thống cảm biến.\r\n  * Mỗi điểm dừng của sản phẩm đều được ghi lại dấu vết.\r\n* **Giai đoạn 4: Xác thực tại Showroom**\r\n  * Sản phẩm có mặt tại điểm bán với mã QR định danh duy nhất.\r\n  * Người tiêu dùng quét mã để thực hiện quy trình \"đối soát ngược\" về nguồn gốc.\r\n\r\n## 3. Trải nghiệm \"Niềm tin số\" cho Người tiêu dùng\r\n\r\nĐiểm nhấn của mô hình là biến các khái niệm kỹ thuật phức tạp thành trải nghiệm an tâm:\r\n\r\n1. **Hành trình xuyên suốt:** Hiển thị trực quan toàn bộ lịch sử sản phẩm qua các \"Nút\". Người dùng có thể thấy ai đã làm gì, ở đâu và vào lúc nào.\r\n2.\r\n\r\n**Đối soát tự động:** Khi quét mã, hệ thống mô phỏng việc kiểm tra chéo dữ liệu trên hàng trăm máy chủ để đảm bảo thông tin chưa từng bị can thiệp.\r\n   * *Xem mạng lưới xác thực:* [Global Node Network](https://agrichain.lephuchai.com/explorer/nodes) (Link: https://agrichain.lephuchai.com/explorer/nodes)\r\n3. **Hộ chiếu số:** Sản phẩm được cấp một \"chứng minh thư\" điện tử bao gồm điểm minh bạch, lời khuyên từ AI và các bằng chứng thực tế (ảnh chụp, chứng từ).\r\n4. **Kiểm chứng sổ cái:** Mô phỏng lại trình khám phá Blockchain, cho phép những người am hiểu kiểm tra các mã giao dịch thô để đảm bảo tính khách quan.\r\n   * *Trình khám phá chuỗi khối:* [AgriChain Explorer](https://agrichain.lephuchai.com/explorer) (Link: https://agrichain.lephuchai.com/explorer)\r\n\r\n## 4. Các liên kết trải nghiệm thực tế\r\n\r\nBạn có thể trực tiếp trải nghiệm luồng xác thực này qua 2 dòng sản phẩm tiêu biểu:\r\n\r\n* 💎 **Sản phẩm Yến Sào:** https://agrichain.lephuchai.com/verify/YEN-001\r\n* 🍃 **Sản phẩm Trà Atisô:** https://agrichain.lephuchai.com/verify/TRA-003\r\n\r\n---\r\n\r\n*Mô hình AgriChain là minh chứng cho việc ứng dụng Blockchain để bảo vệ quyền lợi người tiêu dùng và nâng tầm giá trị cho nông sản Việt.*\r\n"},{"title":"📖 README: HƯỚNG DẪN QUẢN LÝ 2 PHIÊN BẢN ĐỀ CƯƠNG TIẾN SĨ","file":"README_VERSIONS.md","chars":4239,"pages":"2.4","content":"# 📖 README: HƯỚNG DẪN QUẢN LÝ 2 PHIÊN BẢN ĐỀ CƯƠNG TIẾN SĨ\r\n\r\nTài liệu này đóng vai trò là \"Cẩm nang gối đầu giường\" để tra cứu nhanh sự khác biệt về **Cấu trúc, Nội dung và Văn phong** giữa 2 phiên bản Đề cương Tiến sĩ (Nha Trang và Đà Lạt). Khi cần nâng cấp hoặc sửa đổi, chỉ cần đọc file này để nắm bắt được \"hồn cốt\" của từng bài.\r\n\r\n---\r\n\r\n## 1. NHỮNG ĐIỂM CHUNG BẤT BIẾN (KHÔNG ĐƯỢC THAY ĐỔI)\r\nDù nộp cho trường nào, hệ tư tưởng cốt lõi của đề tài vẫn giữ nguyên:\r\n*   **Phương pháp luận:** Hỗn hợp (Mixed-methods). Định tính (Phỏng vấn chuyên gia) + Định lượng (Thực nghiệm Scenario-based 2x2).\r\n*   **Công cụ phân tích:** PLS-SEM (Phần mềm SmartPLS 4).\r\n*   **Khung lý thuyết lõi:** S-O-R (Stimulus-Organism-Response) kết hợp với Signaling Theory (Lý thuyết tín hiệu).\r\n*   **Biến trung gian (Mediator):** Brand Authenticity (Tính xác thực thương hiệu) và Green Trust (Niềm tin xanh).\r\n*   **Mô hình thu thập dữ liệu:** Không khảo sát chuỗi cung ứng thực tế, mà khảo sát phản ứng của người tiêu dùng thông qua **Mockup / Bản sao số**.\r\n\r\n---\r\n\r\n## 2. QUY CHUẨN VĂN PHONG\r\nĐể bài viết đạt chuẩn Tiến sĩ và có thể hướng tới xuất bản Q1/Q2, cần tuyệt đối tuân thủ văn phong sau:\r\n*   **❌ TỪ NGỮ CẤM DÙNG (Marketing / Cường điệu):** \"Giải pháp vàng\", \"triệt để\", \"đáng kể\", \"hoàn hảo\", \"cứu cánh\", \"100%\", \"bùng nổ\", các dấu chấm than (!).\r\n*   **✅ TỪ NGỮ KHUYÊN DÙNG (Học thuật / Khách quan):** \"Cung cấp bằng chứng thực nghiệm\", \"đánh giá cơ chế tác động\", \"hỗ trợ giải thích\", \"kỳ vọng đóng góp\", \"có ý nghĩa thống kê\".\r\n*   **Tâm thế người viết:** Không phải là một chuyên gia bán giải pháp phần mềm Blockchain. Mà là một **nhà nghiên cứu hành vi học**, quan sát xem con người phản ứng thế nào khi nhìn thấy công nghệ Blockchain.\r\n\r\n---\r\n\r\n## 3. PHIÊN BẢN 1: ĐẠI HỌC NHA TRANG (`PhD_NhaTrang_HAILP.md`)\r\n\r\n### Đặc điểm nhận diện\r\n*   **Bối cảnh (Context):** Ngành hàng tiêu dùng nhanh (FMCG).\r\n*   **Sản phẩm:** **Yến sào Khánh Hòa** (Nước yến chế biến sẵn RTD).\r\n*   **Vấn đề địa phương:** Bảo vệ ngành yến sào – ngành kinh tế mũi nhọn của tỉnh Khánh Hòa khỏi nạn làm giả nguyên liệu.\r\n\r\n### Cấu trúc (12 Mục Bắt Buộc)\r\nĐặc trưng của ĐH Nha Trang là chẻ nhỏ chi tiết thành 12 mục rõ ràng:\r\n1. Lý do chọn đề tài.\r\n2. Tình hình nghiên cứu (Tổng quan).\r\n3. Mục tiêu (Tổng quát, Cụ thể, Câu hỏi).\r\n4. Nội dung nghiên cứu (1, 2, 3, 4).\r\n5. Ý nghĩa khoa học và thực tiễn.\r\n6. Phạm vi.\r\n7. Đối tượng.\r\n8. **Phương pháp nghiên cứu:** (Mục quan trọng nhất, tách biệt hoàn toàn với Tổng quan).\r\n9. Kết quả mong đợi.\r\n10. Nguồn kinh phí.\r\n11. Tiến độ thực hiện (3 năm / 36 tháng).\r\n12. Tài liệu tham khảo.\r\n\r\n---\r\n\r\n## 4. PHIÊN BẢN 2: ĐẠI HỌC ĐÀ LẠT (`PhD_DaLat_HAILP.md`)\r\n\r\n### Đặc điểm nhận diện\r\n*   **Bối cảnh (Context):** Nông sản đặc hữu chế biến sâu.\r\n*   **Sản phẩm:** **Cà phê đặc sản Arabica Cầu Đất & Trà Actiso Đà Lạt**.\r\n*   **Vấn đề địa phương:** Bảo vệ Chỉ dẫn địa lý và chương trình OCOP của tỉnh Lâm Đồng trước vấn nạn \"Hàng nhái Đà Lạt\", hiện tượng \"Thị trường quả chanh\".\r\n\r\n### Cấu trúc (7 Mục Gộp) & Chiến thuật \"Kéo dài số trang\"\r\nYêu cầu của ĐH Đà Lạt là **Tối thiểu 30 trang**. Do đó, cấu trúc 7 mục này có tính \"nhồi\" học thuật cực kỳ cao vào Chương 2:\r\n1. Đặt vấn đề (Đã bao gồm Lý do, Phạm vi, Đối tượng).\r\n2. **Tổng quan vấn đề nghiên cứu (Chương cốt lõi để làm dày bài):**\r\n   *   *2.1. Tổng quan & Ma trận tài liệu:* Sử dụng bảng biểu lớn để tóm tắt các nghiên cứu trước (Chen, Morhart...).\r\n   *   *2.2. Cơ sở lý thuyết:* Phân tích sâu lịch sử của Signaling Theory (từ Michael Spence 1973) và mổ xẻ S-O-R.\r\n   *   *2.3. Phương pháp nghiên cứu:* Toàn bộ mô hình, giả thuyết, thang đo, kịch bản Mockup được nhét chung vào mục Tổng quan này.\r\n3. Mục tiêu và Nội dung.\r\n4. Tiến độ thực hiện.\r\n5. Dự kiến kết quả.\r\n6. Tài liệu tham khảo.\r\n7. Cán bộ hướng dẫn dự kiến.\r\n\r\n---\r\n\r\n## 5. CÁCH NÂNG CẤP BÀI TRONG TƯƠNG LAI\r\n*   **Nếu muốn sửa Mô hình/Giả thuyết:** Sửa ở cả 2 file (ở Nha Trang là Mục 8.1, ở Đà Lạt là Mục 2.3).\r\n*   **Nếu muốn sửa Thang đo (Questionnaire):** Khuyến khích tạo thêm Phụ lục (Appendix) cho bản Đà Lạt để bài càng dày càng tốt.\r\n*   **Khi làm slide thuyết trình bảo vệ:** Tùy thuộc hội đồng nào mà chọn bối cảnh Yến hay Cà phê (Đà Lạt), nhưng mô hình cốt lõi (S-O-R) thì nói y hệt nhau.\r\n"},{"title":"Yeucau_DaLat.md","file":"Yeucau_DaLat.md","chars":0,"pages":"0.0","content":""}],"lastUpdated":"12:16:10 20/5/2026"};
        window.onerror = function(msg, url, line, col, error) { console.error(error); return false; };

        // Live-Reload SSE
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            const evtSource = new EventSource('/events');
            evtSource.onmessage = function(event) {
                if (event.data === 'reload') {
                    console.log('🔄 Đang làm mới giao diện...');
                    location.reload();
                }
            };
        }

        const nav = document.getElementById('nav');
        const content = document.getElementById('content');
        const title = document.getElementById('title');

        let currentSelected = null;

        function show(item, type) {
            currentSelected = { item, type };
            document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
            const id = type + '-' + (item.file || item.title).replace(/\s/g, '_');
            const navEl = document.getElementById(id);
            if (navEl) navEl.classList.add('active');
            
            title.innerText = item.title;
            
            let mdContent = item.content || '';
            let mermaidBlocks = [];
            let mathBlocks = [];
            
            mdContent = mdContent.replace(/```mermaid([\s\S]*?)```/g, function(match, code) {
                mermaidBlocks.push(code.trim());
                return `%%MERMAID_BLOCK_${mermaidBlocks.length - 1}%%`;
            });

            mdContent = mdContent.replace(/\$\$([\s\S]*?)\$\$/g, function(match) { mathBlocks.push(match); return `%%MATH_BLOCK_${mathBlocks.length - 1}%%`; });
            mdContent = mdContent.replace(/\$([^\$]+?)\$/g, function(match) { mathBlocks.push(match); return `%%MATH_BLOCK_${mathBlocks.length - 1}%%`; });
            
            let htmlContent = marked.parse(mdContent);
            
            mermaidBlocks.forEach((code, idx) => {
                htmlContent = htmlContent.replace(`%%MERMAID_BLOCK_${idx}%%`, '<div class="mermaid-box"><div class="mermaid">' + code + '</div></div>');
            });
            mathBlocks.forEach((code, idx) => { htmlContent = htmlContent.replace(`%%MATH_BLOCK_${idx}%%`, code); });
            
            content.innerHTML = htmlContent;
            document.querySelector('.main').scrollTop = 0;
            
            // Tính toán dung lượng
            setTimeout(() => {
                let textContent = content.innerText || content.textContent;
                let wordCount = textContent.trim().split(/\s+/).length;
                let pages = (wordCount / 350).toFixed(1);
                let images = content.querySelectorAll('img, .mermaid-box').length;
                document.getElementById('stat-words').innerText = wordCount;
                document.getElementById('stat-pages').innerText = pages;
                document.getElementById('stat-images').innerText = images;
            }, 100);

            setTimeout(async () => {
                try {
                    renderMathInElement(content, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false });
                    await mermaid.run({ querySelector: '.mermaid' });
                } catch(e) { 
                    console.error("Rendering error:", e);
                    // Báo lỗi Cú pháp thông minh
                    document.querySelectorAll('.mermaid').forEach(el => {
                        if(el.innerHTML.includes('Syntax error') || !el.querySelector('svg')) {
                            el.innerHTML = `<div class="error-box">
                                <strong>⚠️ Lỗi Cú pháp Sơ đồ (Mermaid)</strong><br>
                                Sơ đồ này có lỗi logic hoặc sai dấu ngoặc trong file Markdown.<br>
                                <i>Vui lòng nhấn F12 để xem chi tiết lỗi trong Console.</i>
                            </div>`;
                        }
                    });
                }
            }, 100);
        }

        function addHeader(text) {
            const h = document.createElement('div');
            h.style = "font-size: 11px; color: var(--secondary); font-weight: bold; margin: 20px 0 10px 5px; letter-spacing: 1px; opacity: 0.8";
            h.innerText = text;
            nav.appendChild(h);
        }

        function addItem(item, type) {
            const div = document.createElement('div');
            div.id = type + '-' + (item.file || item.title).replace(/\s/g, '_');
            div.className = 'nav-item';
            div.innerText = item.title + (item.file ? ` [${item.file}]` : '');
            div.onclick = () => show(item, type);
            nav.appendChild(div);
        }

        if (data.chapters) { addHeader("CÁC CHƯƠNG CHI TIẾT"); data.chapters.forEach(ch => addItem(ch, 'ch')); }
        if (data.standalones) { addHeader("CÁC BẢN ĐỀ CƯƠNG ĐẦY ĐỦ"); data.standalones.forEach(st => addItem(st, 'st')); }
        if (data.others) { addHeader("TÀI LIỆU HƯỚNG DẪN & KHÁC"); data.others.forEach(ot => addItem(ot, 'ot')); }
        if (data.lastUpdated) { document.getElementById('update-time').innerText = "Cập nhật: " + data.lastUpdated; }
        
        mermaid.initialize({startOnLoad: false, theme: 'neutral', htmlLabels: false});
        
        if (data.chapters && data.chapters.length > 0) show(data.chapters[0], 'ch');
        else if (data.standalones && data.standalones.length > 0) show(data.standalones[0], 'st');

        function getExportHTML(isFull) {
            let html = '';
            let targetItems = [];
            let mainTitle = "ĐỀ CƯƠNG TIẾN SĨ - LÊ PHÚC HẢI";

            if (!isFull && currentSelected) {
                targetItems = [currentSelected.item];
                mainTitle = currentSelected.item.title;
            } else {
                targetItems = data.chapters || [];
                if(targetItems.length === 0) targetItems = data.standalones || [];
            }

            html += `<h1 class="export-title">${mainTitle}</h1>`;
            
            targetItems.forEach(ch => {
                let mdContent = ch.content || '';
                let mermaidBlocks = [];
                let mathBlocks = [];
                
                mdContent = mdContent.replace(/```mermaid([\s\S]*?)```/g, function(match, code) {
                    mermaidBlocks.push(code.trim()); return `%%MERMAID_BLOCK_${mermaidBlocks.length - 1}%%`;
                });
                
                mdContent = mdContent.replace(/\$\$([\s\S]*?)\$\$/g, function(match) { mathBlocks.push(match); return `%%MATH_BLOCK_${mathBlocks.length - 1}%%`; });
                mdContent = mdContent.replace(/\$([^\$]+?)\$/g, function(match) { mathBlocks.push(match); return `%%MATH_BLOCK_${mathBlocks.length - 1}%%`; });
                
                let parsedContent = marked.parse(mdContent);
                
                mermaidBlocks.forEach((code, idx) => { parsedContent = parsedContent.replace(`%%MERMAID_BLOCK_${idx}%%`, '<div class="mermaid">' + code + '</div>'); });
                mathBlocks.forEach((code, idx) => { parsedContent = parsedContent.replace(`%%MATH_BLOCK_${idx}%%`, code); });

                html += `<div class="export-chapter">${parsedContent}</div>`;
                if(isFull) html += '<div class="page-break"></div>';
            });
            return html;
        }

        async function processExportContainer(container) {
            try {
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(container, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false, output: 'mathml' });
                }
            } catch (e) { console.warn(e); }
            
            try {
                await mermaid.run({ querySelector: '#' + container.id + ' .mermaid' });
            } catch (e) {
                console.error("Mermaid run in export container failed:", e);
            }
            
            await new Promise(r => setTimeout(r, 1200));

            // Convert SVG to high-quality Base64 PNG
            const svgs = container.querySelectorAll('svg');
            for (let svg of svgs) {
                try {
                    let w = svg.viewBox && svg.viewBox.baseVal ? svg.viewBox.baseVal.width : svg.getBoundingClientRect().width || 800;
                    let h = svg.viewBox && svg.viewBox.baseVal ? svg.viewBox.baseVal.height : svg.getBoundingClientRect().height || 400;
                    if(w===0) w=800; if(h===0) h=400;
                    
                    let targetWidth = Math.min(w, 600);
                    let targetHeight = h * (targetWidth / w);
                    
                    let svgClone = svg.cloneNode(true);
                    svgClone.setAttribute('width', w);
                    svgClone.setAttribute('height', h);
                    svgClone.querySelectorAll('style').forEach(styleTag => {
                        let css = styleTag.innerHTML;
                        css = css.replace(/@import\s+url\([^)]+\);/g, ''); // Strip imports
                        styleTag.innerHTML = css;
                    });
                    
                    const svgString = new XMLSerializer().serializeToString(svgClone);
                    const base64Data = btoa(unescape(encodeURIComponent(svgString)));
                    const imgSrc = 'data:image/svg+xml;base64,' + base64Data;
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = w * 2; 
                    canvas.height = h * 2;
                    const ctx = canvas.getContext('2d');
                    
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    await new Promise((resolve) => {
                        img.onload = () => {
                            try {
                                ctx.fillStyle = "white"; 
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                
                                const newImg = document.createElement('img');
                                newImg.setAttribute('src', canvas.toDataURL("image/png"));
                                newImg.setAttribute('width', targetWidth);
                                newImg.setAttribute('height', targetHeight);
                                newImg.style.width = targetWidth + "px";
                                newImg.style.height = targetHeight + "px";
                                newImg.style.display = "block";
                                newImg.style.margin = "0 auto";
                                
                                svg.parentNode.replaceChild(newImg, svg);
                            } catch (err) {
                                console.error("Canvas draw/dataURL failed, using Fallback:", err);
                                const fallbackImg = document.createElement('img');
                                fallbackImg.setAttribute('src', imgSrc);
                                fallbackImg.setAttribute('width', targetWidth);
                                fallbackImg.setAttribute('height', targetHeight);
                                fallbackImg.style.width = targetWidth + "px";
                                fallbackImg.style.height = targetHeight + "px";
                                fallbackImg.style.display = "block";
                                fallbackImg.style.margin = "0 auto";
                                svg.parentNode.replaceChild(fallbackImg, svg);
                            }
                            resolve();
                        };
                        img.onerror = (err) => {
                            console.error("Image load failed, using Fallback:", err);
                            const fallbackImg = document.createElement('img');
                            fallbackImg.setAttribute('src', imgSrc);
                            fallbackImg.setAttribute('width', targetWidth);
                            fallbackImg.setAttribute('height', targetHeight);
                            fallbackImg.style.width = targetWidth + "px";
                            fallbackImg.style.height = targetHeight + "px";
                            fallbackImg.style.display = "block";
                            fallbackImg.style.margin = "0 auto";
                            svg.parentNode.replaceChild(fallbackImg, svg);
                            resolve();
                        };
                        img.src = imgSrc;
                    });
                } catch (err) { console.warn("SVG error", err); }
            }

            container.querySelectorAll('table').forEach(tbl => {
                tbl.setAttribute('border', '1');
                tbl.setAttribute('cellspacing', '0');
                tbl.setAttribute('cellpadding', '8');
                tbl.style.borderCollapse = 'collapse';
                tbl.style.width = '100%';
                tbl.style.marginBottom = '20px';
                tbl.querySelectorAll('th, td').forEach(c => { c.style.border = '1px solid black'; c.style.padding = '8px'; });
            });
        }

        async function exportWord(isFull) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Đang xử lý...";

            const tempDiv = document.createElement('div');
            tempDiv.id = "word-export-container";
            tempDiv.innerHTML = getExportHTML(isFull);
            document.body.appendChild(tempDiv);
            
            tempDiv.style.position = 'fixed';
            tempDiv.style.left = '0';
            tempDiv.style.top = '0';
            tempDiv.style.width = '800px';
            tempDiv.style.height = '800px';
            tempDiv.style.zIndex = '-9999';
            tempDiv.style.opacity = '0.01';

            try {
                await processExportContainer(tempDiv);

                // ==========================================
                // TÍNH NĂNG XUẤT NATIVE DOCX BẰNG SERVER
                // ==========================================
                if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                    try {
                        const response = await fetch('/api/export-docx', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ html: tempDiv.innerHTML })
                        });
                        
                        if (response.ok) {
                            const blob = await response.blob();
                            const link = document.createElement('a');
                            link.href = URL.createObjectURL(blob);
                            let exportTitle = isFull ? "ToanVan" : (currentSelected ? currentSelected.item.title : "Doc");
                            let safeTitle = exportTitle.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
                            link.download = `DeCuong_${safeTitle}.docx`;
                            link.click();
                            return; // Thoát nếu thành công
                        }
                    } catch(err) {
                        console.warn("Lỗi API DOCX. Rớt về định dạng MHT dự phòng.", err);
                    }
                }

                // ==========================================
                // OFFLINE FALLBACK MHT EXPORT
                // ==========================================
                const wordStyles = `
                    <style>
                        @page WordSection1 { size: A4; margin: 2.5cm 2.0cm 2.5cm 3.5cm; mso-header-margin: 1.25cm; mso-footer-margin: 1.25cm; mso-paper-source: 0; }
                        div.WordSection1 { page: WordSection1; }
                        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
                        th, td { border: 1px solid black; padding: 8px; text-align: left; }
                        th { background-color: #f2f2f2; }
                         h1, h2, h3, h4 { font-family: 'Times New Roman', serif; color: black; margin-top: 12pt; margin-bottom: 6pt; text-align: left; }
                         p { font-family: 'Times New Roman', serif; font-size: 14pt; line-height: 1.5; text-align: justify; margin-top: 0pt; margin-bottom: 6pt; text-indent: 1.25cm; }
                         li { font-family: 'Times New Roman', serif; font-size: 14pt; line-height: 1.5; text-align: justify; margin-top: 0pt; margin-bottom: 4pt; }
                         img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
                        .export-title { text-align: center; font-size: 16pt; font-weight: bold; margin-bottom: 30px; text-transform: uppercase; }
                    </style>
                `;

                // Extract all base64 images and replace src with local references
                const images = tempDiv.querySelectorAll('img');
                const imageAttachments = [];
                let imgCounter = 0;

                images.forEach((img) => {
                    const src = img.getAttribute('src');
                    if (src && src.startsWith('data:image')) {
                        const parts = src.split(';base64,');
                        if (parts.length === 2) {
                            const mimeType = parts[0].replace('data:', '');
                            const base64Data = parts[1];
                            const extension = mimeType.split('/')[1] || 'png';
                            const loc = `image_${imgCounter}.${extension}`;
                            
                            img.setAttribute('src', loc);
                            
                            imageAttachments.push({
                                location: loc,
                                mime: mimeType,
                                data: base64Data
                            });
                            imgCounter++;
                        }
                    }
                });

                const htmlContent = `\ufeff<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Export Word</title>${wordStyles}</head>
                <body style="font-family:'Times New Roman'"><div class="WordSection1">${tempDiv.innerHTML}</div></body></html>`;

                // Build MHT format
                const boundary = "----=_NextPart_PhD_Export_" + Math.random().toString(36).substring(2);
                let mhtContent = "MIME-Version: 1.0\r\n";
                mhtContent += `Content-Type: multipart/related; boundary="${boundary}"\r\n\r\n`;
                
                // HTML Part
                mhtContent += `--${boundary}\r\n`;
                mhtContent += "Content-Type: text/html; charset=\"utf-8\"\r\n";
                mhtContent += "Content-Transfer-Encoding: 8bit\r\n\r\n";
                mhtContent += htmlContent + "\r\n\r\n";
                
                // Image Parts
                imageAttachments.forEach(att => {
                    mhtContent += `--${boundary}\r\n`;
                    mhtContent += `Content-Type: ${att.mime}\r\n`;
                    mhtContent += "Content-Transfer-Encoding: base64\r\n";
                    mhtContent += `Content-Location: ${att.location}\r\n\r\n`;
                    // Break base64 into 76-character lines as per MIME standard
                    const b64 = att.data;
                    for (let i = 0; i < b64.length; i += 76) {
                        mhtContent += b64.substring(i, i + 76) + "\r\n";
                    }
                    mhtContent += "\r\n";
                });
                
                mhtContent += `--${boundary}--\r\n`;

                const blob = new Blob([mhtContent], { type: 'message/rfc822' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                
                let exportTitle = isFull ? "ToanVan" : (currentSelected ? currentSelected.item.title : "Doc");
                let safeTitle = exportTitle.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
                link.download = `DeCuong_${safeTitle}.doc`;
                link.click();
            } catch (e) { 
                alert("Lỗi xuất Word: " + e.message); 
            } finally {
                document.body.removeChild(tempDiv);
                btn.innerText = originalText;
            }
        }

        async function exportPDF() {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Chuẩn bị PDF...";

            const tempDiv = document.createElement('div');
            tempDiv.id = "print-container";
            // Luôn in toàn văn khi xuất PDF cho an toàn, hoặc có thể làm Selective PDF sau.
            tempDiv.innerHTML = getExportHTML(true); 
            document.body.appendChild(tempDiv);
            
            tempDiv.style.width = '210mm'; 
            tempDiv.style.position = 'fixed';
            tempDiv.style.left = '0';
            tempDiv.style.top = '0';
            tempDiv.style.zIndex = '-9999';
            tempDiv.style.opacity = '0.01';

            try {
                // Xử lý tất cả Mermaid thành ảnh Base64 chống lỗi mất khúc/tràn viền khi in
                await processExportContainer(tempDiv);
                
                tempDiv.style.position = 'absolute';
                tempDiv.style.left = '0';
                tempDiv.style.top = '0';
                tempDiv.style.zIndex = '9999';
                tempDiv.style.opacity = '1';
                window.print();
                
            } catch (e) {
                console.error(e);
                alert("Lỗi xuất PDF: " + e.message);
            } finally {
                document.body.removeChild(tempDiv);
                btn.innerText = originalText;
            }
        }
    </script>

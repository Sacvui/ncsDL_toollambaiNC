CỨU LUẬN ÁN TIẾN SĨ\r\n\r\n**Tên đề tài:** Ảnh hưởng của truy xuất nguồn gốc số đến ý định mua sản phẩm nước yến chế biến sẵn: Vai trò trung gian của tính xác thực thương hiệu.\r\n**Chuyên ngành đào tạo:** Quản trị Kinh doanh  \r\n**Mã chuyên ngành:** 9340101  \r\n**Nghiên cứu sinh:** Lê Phúc Hải  \r\n**Cơ sở đào tạo:** Trường Đại học Nha Trang\r\n\r\n---\r\n\r\n**DANH MỤC CÁC CHỮ VIẾT TẮT**\r\n* **BA:** Tính xác thực thương hiệu\r\n* **FMCG:** Ngành hàng tiêu dùng nhanh\r\n* **NC:** Tuyên bố/Thông điệp tự nhiên\r\n* **PI:** Ý định mua hàng\r\n* **PIQ:** Chất lượng thông tin cảm nhận\r\n* **PLS-SEM:** Mô hình phương trình cấu trúc bình phương tối thiểu riêng phần\r\n* **RTD:** Sản phẩm chế biến sẵn/uống liền\r\n* **SK:** Hoài nghi\r\n* **TR:** Nhận thức về truy xuất nguồn gốc\r\n* **TT:** Niềm tin\r\n* **WTP:** Mức sẵn lòng chi trả thêm\r\n\r\n---\r\n\r\n## 1. LÝ DO CHỌN ĐỀ TÀI CỦA LUẬN ÁN\r\n### 1.1. Bất cân xứng thông tin và Khủng hoảng niềm tin trong ngành hàng thực phẩm chức năng\r\n1.  **Đặc tính hàng hóa và Bất cân xứng thông tin:** Các sản phẩm thực phẩm chức năng, đặc biệt là nhóm nước yến chế biến sẵn, được phân loại vào nhóm hàng hóa dựa trên niềm tin. Theo Akerlof (1970), đây là nhóm sản phẩm mà người tiêu dùng không thể đánh giá chính xác chất lượng thực tế ngay cả sau khi đã sử dụng. Điều này dẫn đến sự bất cân xứng thông tin sâu sắc giữa nhà sản xuất và người mua.\r\n2.  **Rủi ro cảm nhận và Khủng hoảng niềm tin:** Ngành hàng sản phẩm RTD đang đối mặt với thử thách nghiêm trọng về niềm tin (Nielsen, 2022). Theo Euromonitor (2023), thị trường nước yến và thức uống dinh dưỡng Việt Nam đạt quy mô khoảng 8.500 tỷ VNĐ, tăng trưởng trung bình 12%/năm. Tuy nhiên, báo cáo của Cục Quản lý Thị trường (2022) ghi nhận hơn 1.200 vụ vi phạm liên quan đến hàng giả, hàng nhái trong ngành thực phẩm chức năng chỉ riêng trong năm 2021, trong đó sản phẩm yến sào chiếm tỷ trọng đáng kể. Người tiêu dùng hiện đại, đặc biệt là thế hệ Gen Z, có sự quan tâm lớn đến sức khỏe (Kantar, 2023). Theo các báo cáo xu hướng tiêu dùng FMCG gần đây, nhóm nhân khẩu học này đang có sự dịch chuyển mạnh mẽ sang các thức uống dinh dưỡng tiện lợi (như nước yến chế biến sẵn - RTD) (McKinsey, 2022). Tuy nhiên, họ lại đối mặt với rủi ro cảm nhận cao đối với các sản phẩm công nghiệp này do tình trạng bất cân xứng thông tin. Sự mập mờ trong các thông điệp truyền thống khiến niềm tin đối với các cam kết \"tự nhiên\" có xu hướng giảm sút (Skarmeas & Leonidou, 2013).\r\n3.  **Sự cấp thiết của một cơ chế xác thực minh bạch:** Việc giải quyết khủng hoảng ni�4.  **Tính cấp thiết đối với nền kinh tế địa phương (Đặc thù Yến sào Khánh Hòa):** Ngành yến sào Khánh Hòa đóng vai trò trụ cột kinh tế biển của tỉnh. Các doanh nghiệp đầu ngành tại địa phương ghi nhận tổng doanh thu hệ thống giai đoạn 2020–2025 đạt gần 13.000 tỷ VNĐ (Thanh Niên, 2025), với mạng lưới phân phối rộng khắp hơn 1.000 đại lý trên toàn quốc (Lao Động, 2024). Đặc biệt, \"Yến sào Khánh Hòa\" đã được công nhận là Chỉ dẫn địa lý quốc gia theo quyết định của Cục Sở hữu trí tuệ Việt Nam. Cuối năm 2023, Việt Nam đã chính thức xuất khẩu lô tổ yến chính ngạch đầu tiên sang thị trường Trung Quốc (Dân Việt, 2024). Tuy nhiên, chính quy mô kinh tế lớn này đã biến các sản phẩm yến (nhất là dòng yến chế biến sẵn) thành mục tiêu bị làm giả, làm nhái nghiêm trọng. Các báo cáo tài chính từ thị trường cho thấy vấn nạn hàng giả đã trực tiếp gây sụt giảm doanh thu hàng trăm tỷ đồng tại các đơn vị sản xuất yến đóng lọ trong năm 2024 (DNSE, 2025). Do đó, việc nghiên cứu truy xuất nguồn gốc số nhằm giải quyết vấn đề suy giảm niềm tin không chỉ có giá trị học thuật mà còn mang ý nghĩa chiến lược trong việc bảo vệ Chỉ dẫn địa lý và duy trì sức cạnh tranh bền vững cho toàn ngành yến sào Khánh Hòa.\r\nđại lý trên cả nước (Lao Động, 2024). Đặc biệt, \"Yến sào Khánh Hòa\" đã được công nhận là Chỉ dẫn địa lý quốc gia theo quyết định của Cục Sở hữu trí tuệ Việt Nam. Cuối năm 2023, đây là đơn vị đầu tiên của Việt Nam xuất khẩu chính ngạch tổ yến sang thị trường Trung Quốc (Dân Việt, 2024). Tuy nhiên, chính quy mô kinh tế lớn này đã biến các sản phẩm yến (nhất là dòng yến chế biến sẵn) thành mục tiêu bị làm giả nghiêm trọng. Báo cáo tài chính cho thấy vấn nạn hàng giả, hàng nhái đã trực tiếp gây sụt giảm doanh thu hơn 600 tỷ VNĐ chỉ riêng tại đơn vị thành viên SKV trong năm 2024 so với năm 2023 (DNSE, 2025). Do đó, việc nghiên cứu truy xuất nguồn gốc số nhằm giải quyết vấn đề suy giảm niềm tin không chỉ có giá trị học thuật mà còn mang ý nghĩa chiến lược trong việc bảo vệ Chỉ dẫn địa lý và duy trì sức cạnh tranh của ngành yến sào Khánh Hòa.\r\n\r\n### 1.2. Giới hạn của marketing truyền thống và nhu cầu minh bạch số\r\nVấn đề nghiên cứu trọng tâm xuất phát từ sự thất bại của các phương thức truyền thông truyền thống trong việc thuyết phục người tiêu dùng về tính xác thực của sản phẩm:\r\n1.  **Bất cân xứng thông tin:** Áp dụng lý thuyết của Akerlof (1970), dòng sản phẩm nước yến chế biến sẵn được xếp vào nhóm hàng hóa dựa trên niềm tin. Người tiêu dùng gần như không thể phân biệt được tỷ lệ yến thật, nguồn gốc nguyên liệu hay chất lượng quy trình tiệt trùng chỉ bằng quan sát thông thường hay nếm thử.\r\n2.  **Hoài nghi đối với cam kết \"tự nhiên\":** Khi mọi doanh nghiệp đều tuyên bố sản phẩm của mình là \"tự nhiên 100%\" mà không có bằng chứng kiểm chứng độc lập, người tiêu dùng rơi vào trạng thái hoài nghi. Các nghiên cứu của Skarmeas & Leonidou (2013) chỉ ra rằng khi các thông điệp bị lạm dụng, mức độ hoài nghi tăng đáng kể, dẫn đến sự phản kháng của người tiêu dùng đối với cả những thương hiệu làm thật.\r\n3.  **Sự vô hiệu của các chứng nhận tĩnh:** Các tem nhãn hay giấy chứng nhận bằng giấy truyền thống dễ dàng bị làm giả hoặc sao chép, không còn đủ sức nặng để đóng vai trò là \"tín hiệu tin cậy\" trong kỷ nguyên số (Kshetri, 2024).\r\n\r\n### 1.3. Truy xuất nguồn gốc số như một tín hiệu niềm tin\r\nĐể giải quyết căn bản vấn đề niềm tin, nghiên cứu đề xuất cách tiếp cận: Chuyển dịch từ Marketing dựa trên lời hứa sang Marketing dựa trên tín hiệu minh bạch số:\r\n1.  **Truy xuất nguồn gốc số như hạ tầng tin cậy:** Hệ thống truy xuất nguồn gốc số cung cấp các đặc tính: *Bất biến, Minh bạch và Truy xuất thời gian thực*.\r\n2.  **Lý thuyết Tín hiệu:** Theo Spence (1973), một tín hiệu hiệu quả phải có chi phí cao hoặc khó giả mạo. Hệ thống truy xuất nguồn gốc đóng vai trò là một \"dấu hiệu nhận biết\". Chỉ những doanh nghiệp có quy trình minh bạch thật sự mới dám công khai dữ liệu, từ đó giúp người tiêu dùng tách biệt sản phẩm chất lượng và sản phẩm gian lận trên thị trường.\r\n3.  **Tính xác thực thương hiệu:** Trong tâm lý học hành vi, tính xác thực là nhân tố cốt lõi dẫn đến lòng trung thành và mức sẵn lòng chi trả cao. Tuy nhiên, làm thế nào để chuyển hóa một công cụ kỹ thuật thành một trải nghiệm xác thực trong tâm trí khách hàng vẫn là một câu hỏi cần được làm rõ bằng thực chứng.\r\n\r\n### 1.4. Vấn đề nghiên cứu\r\nMặc dù công nghệ truy xuất nguồn gốc số được kỳ vọng nâng cao tính minh bạch, mức độ ứng dụng thực tế tại Việt Nam, đặc biệt trong ngành yến sào, vẫn còn rất hạn chế và chưa hình thành các bằng chứng thực nghiệm rõ ràng. Vấn đề cốt lõi mà nghiên cứu này cần giải quyết là sự thiếu vắng nền tảng học thuật về cách thức người tiêu dùng diễn giải và phản ứng với các tín hiệu công nghệ này.\r\n\r\nĐiều này đặt ra một khoảng trống lớn về tri thức và thực tiễn, được cụ thể hóa qua các câu hỏi nghiên cứu sau:\r\n1.  Làm thế nào tín hiệu truy xuất nguồn gốc số có thể tác động đến các biến tâm lý như hoài nghi và niềm tin của người tiêu dùng?\r\n2.  Liệu việc người tiêu dùng nhận thức được tín hiệu này có thực sự giúp nâng cao Tính xác thực thương hiệu và từ đó thúc đẩy Ý định mua hàng cũng như Mức sẵn lòng chi trả thêm hay không?\r\n3.  Cơ chế tác động tương tác giữa nội dung thông điệp tiếp thị (thông điệp cảm xúc) và xác thực số (bằng chứng kỹ thuật) diễn ra như thế nào?\r\n\r\nNghiên cứu này được thực hiện nhằm giải quyết các câu hỏi trên, góp phần cung cấp các bằng chứng thực nghiệm giúp các doanh nghiệp (đặc biệt là ngành yến sào Khánh Hòa) có thêm cơ sở tham chiếu khi đầu tư vào hệ thống truy xuất số dựa trên bằng chứng về hành vi người tiêu dùng.\r\n\r\n## 2. TÌNH HÌNH NGHIÊN CỨU TRONG VÀ NGOÀI NƯỚC\r\n### 2.1. Bất cân xứng thông tin và hàng hóa dựa trên niềm tin\r\nTrong các thị trường nơi người tiêu dùng khó có thể đánh giá chất lượng sản phẩm ngay cả sau khi tiêu dùng, hiện tượng bất cân xứng thông tin trở nên đặc biệt nghiêm trọng. Theo George Akerlof (1970), trong bối cảnh này, người bán nắm giữ thông tin vượt trội so với người mua, dẫn đến rủi ro lựa chọn bất lợi.\r\n\r\nCác sản phẩm thực phẩm chức năng, đặc biệt là nhóm FMCG có thành phần khó kiểm chứng (ví dụ: nước yến chế biến sẵn), thường được xếp vào nhóm hàng hóa dựa trên niềm tin, nơi người tiêu dùng:\r\n* Không thể xác minh tỷ lệ thành phần thật.\r\n* Không thể đánh giá quy trình sản xuất.\r\n* Và phải phụ thuộc vào tín hiệu từ nhà sản xuất.\r\n\r\nTrong bối cảnh này, niềm tin trở thành yếu tố trung tâm quyết định hành vi tiêu dùng, nhưng đồng thời cũng dễ bị thao túng thông qua các thông điệp marketing thiếu kiểm chứng.\r\n\r\n### 2.2. Hoài nghi đối với cam kết “tự nhiên” và giới hạn của marketing truyền thống\r\nSự gia tăng của các thông điệp “tự nhiên”, “nguyên chất” và “sạch” trong marketing (Ottman, 2011; Olsen et al., 2014) đã dẫn đến hiện tượng lạm dụng cam kết, làm suy giảm niềm tin của người tiêu dùng. Các nghiên cứu trước đây (Chen, 2012; Skarmeas & Leonidou, 2013) đã cho thấy sự đồng thuận rằng:\r\n* Sự không nhất quán giữa thông điệp và bằng chứng thực tế là tác nhân chính làm gia tăng sự hoài nghi.\r\n* Mặc dù niềm tin đóng vai trò trung gian sống còn kết nối nhận thức “tự nhiên” với hành vi mua, trạng thái tâm lý này rất dễ bị đứt gãy nếu chỉ dựa vào các nỗ lực marketing truyền thống mà thiếu đi các cơ chế xác thực khách quan.\r\n\r\nTrong các diễn đàn học thuật gần đây, có sự tranh luận sâu sắc về hiệu quả của các nỗ lực marketing truyền thống. Mặc dù Chen (2012) cho rằng niềm tin có thể hình thành qua truyền thông, lập luận này bộc lộ điểm yếu khi áp dụng vào bối cảnh sự suy giảm niềm tin hiện tại. Khi rủi ro cảm nhận quá cao, các nỗ lực marketing truyền thống mất đi hiệu lực. Do đó, nghiên cứu này lập luận rằng cần có sự can thiệp của các cơ chế xác thực kỹ thuật để vượt qua rào cản hoài nghi này.\r\n\r\n### 2.3. Truy xuất nguồn gốc và vai trò của công nghệ số\r\nTrong những năm gần đây, các công nghệ truy xuất nguồn gốc được đề xuất như một giải pháp nhằm giảm bất cân xứng thông tin trong chuỗi cung ứng thực phẩm (Francisco & Swanson, 2018; Saberi et al., 2019; Tian, 2017). Napolitano et al. (2010) đã chứng minh rằng việc cung cấp thông tin minh bạch về quy trình sản xuất có tác động tích cực đến sự sẵn lòng chi trả của người tiêu dùng.\r\n\r\nMặc dù các nghiên cứu ban đầu chủ yếu tập trung vào tính hiệu quả của chuỗi cung ứng, các nghiên cứu cập nhật hơn đã bắt đầu xem xét góc độ hành vi người tiêu dùng. Nghiên cứu của Francisco & Swanson (2018) và Saberi et al. (2019) đã chỉ ra rằng:\r\n* Tín hiệu truy xuất nguồn gốc có thể nâng cao tính minh bạch và độ tin cậy của chuỗi cung ứng.\r\n* Từ đó góp phần cải thiện niềm tin của người tiêu dùng đối với các hàng hóa dựa trên niềm tin.\r\n\r\nTuy nhiên, trong ngành FMCG – nơi quyết định mua diễn ra nhanh, ít suy nghĩ – cơ chế chuyển hóa chi tiết từ nhận thức truy xuất sang niềm tin vẫn còn chưa được kiểm định đầy đủ, được tóm tắt tại Bảng 1.\r\n\r\n**Bảng 1: Tổng hợp các nghiên cứu tiêu biểu về Truy xuất nguồn gốc và Khoảng trống nghiên cứu**\r\n| Tác giả | Bối cảnh | Biến chính | Kết quả | Khoảng trống |\r\n|---|---|---|---|---|\r\n| Kendall et al. (2019) | Thực phẩm nhập khẩu, TQ | Food fraud → Integrity | Gian lận làm giảm niềm tin | Chưa có truy xuất số |\r\n| Kamble et al. (2020) | Nông sản, Ấn Độ | Blockchain → Supply chain | Mô hình hóa chuỗi cung ứng | Thiếu góc người tiêu dùng |\r\n| Luận án này | Nước yến RTD, VN | TR → PIQ → BA → TT → PI/WTP | Đang kiểm định | Giải quyết các khoảng trống đã nêu |\r\n\r\nNgoài ra, trong bối cảnh thực phẩm hữu cơ tại châu Âu, Naspetti và Zanoli (2009) đã chứng minh rằng nhận thức về chất lượng và nguồn gốc có tác động trực tiếp đến sự sẵn lòng trả giá cao hơn. Newman và Dhar (2014) cũng bổ sung rằng tính xác thực có tính \"lây lan\" – khi một yếu tố được xác thực, người tiêu dùng có xu hướng gán tính xác thực cho toàn bộ thương hiệu. Cả hai phát hiện này đều ủng hộ mạnh mẽ cho vai trò trung gian của Brand Authenticity trong mô hình đề xuất.\r\n\r\n### 2.4. Lý thuyết tín hiệu và khoảng cách giữa tín hiệu kỹ thuật – nhận thức người tiêu dùng\r\nTheo Michael Spence (1973), trong điều kiện bất cân xứng thông tin, các bên cung cấp sẽ gửi đi tín hiệu để truyền tải thông tin về chất lượng. Các nghiên cứu sau này (Connelly et al., 2011) phân biệt:\r\n* Cheap signals: dễ phát đi, dễ giả mạo (ví dụ: slogan marketing).\r\n* Costly signals: tốn kém, khó giả mạo (ví dụ: hệ thống truy xuất minh bạch).\r\n\r\nTruy xuất nguồn gốc số được xem là một dạng dấu hiệu nhận biết. Khoảng cách quan trọng chưa được giải quyết là: Làm thế nào một tín hiệu kỹ thuật được chuyển hóa thành nhận thức tâm lý của người tiêu dùng? Phần lớn nghiên cứu hiện tại giả định người tiêu dùng tự động tin vào công nghệ, bỏ qua việc kiểm định quá trình chuyển hóa phức tạp từ một \"Technical Signal\" khô khan thành \"Psychological Trust\".\r\n\r\n### 2.5. Tính xác thực thương hiệu như một cơ chế trung gian\r\nKhái niệm Brand Authenticity được phát triển mạnh trong nghiên cứu hành vi tiêu dùng gần đây. Trong thị trường hàng hóa dựa trên niềm tin, người tiêu dùng không còn tin vào các hình ảnh thương hiệu được xây dựng đơn thuần bằng quảng cáo. Thay vào đó, họ tìm kiếm sự chân thật. Tính xác thực là cấp độ cao hơn của niềm tin, nó gắn kết cả lý trí và cảm xúc, đóng vai trò là cơ chế trung gian then chốt (Morhart et al., 2015). Theo Morhart et al. (2015), tính xác thực bao gồm: Credibility (đáng tin cậy), Integrity (liêm chính), Continuity (nhất quán), Symbolism (ý nghĩa biểu tượng).\r\n\r\nCác nghiên cứu cho thấy Brand Authenticity có liên hệ mạnh với lòng trung thành và mức sẵn lòng chi trả (Newman & Dhar, 2014), nhưng thường được nghiên cứu trong bối cảnh thương hiệu cao cấp hoặc storytelling thương hiệu. Trong khi đó, vai trò của Brand Authenticity như một biến trung gian giữa tín hiệu kỹ thuật và hành vi tiêu dùng vẫn còn là một khoảng trống cần được làm rõ trong bối cảnh FMCG.\r\n\r\n#### Sơ đồ Mô hình Nghiên cứu\r\n```mermaid\r\ngraph LR\r\n    subgraph S [\"Stimulus (S)\"]\r\n        TR[\"Perceived Traceability\u003cbr/\u003e(TR)\"]\r\n        NC[\"Naturalness Claim\u003cbr/\u003e(NC)\"]\r\n    end\r\n    subgraph O [\"Organism (O)\"]\r\n        PIQ[\"Perceived Info Quality\u003cbr/\u003e(PIQ)\"]\r\n        SK[\"Skepticism\u003cbr/\u003e(SK)\"]\r\n        TT[\"Trust\u003cbr/\u003e(TT)\"]\r\n        BA[\"Brand Authenticity\u003cbr/\u003e(BA)\"]\r\n    end\r\n    subgraph R [\"Response (R)\"]\r\n        PI[\"Purchase Intention\u003cbr/\u003e(PI)\"]\r\n        WTP[\"Willingness to Pay\u003cbr/\u003e(WTP)\"]\r\n    end\r\n\r\n    TR -- \"H1 (+)\" --\u003e PIQ\r\n    TR -- \"H2 (-)\" --\u003e SK\r\n    NC -- \"H3 (+)\" --\u003e TT\r\n    TR -. \"H6 (+)\" .-\u003e TT\r\n    \r\n    PIQ -- \"H4 (+)\" --\u003e TT\r\n    SK -- \"H5 (-)\" --\u003e TT\r\n    TT -- \"H7 (+)\" --\u003e BA\r\n    \r\n    BA -- \"H8 (+)\" --\u003e PI\r\n    BA -- \"H9 (+)\" --\u003e WTP\r\n\r\n    style TR fill:#e0f2fe,stroke:#0284c7\r\n    style NC fill:#e0f2fe,stroke:#0284c7\r\n    style PIQ fill:#dcfce7,stroke:#16a34a\r\n    style SK fill:#dcfce7,stroke:#16a34a\r\n    style TT fill:#dcfce7,stroke:#16a34a\r\n    style BA fill:#dcfce7,stroke:#16a34a\r\n    style PI fill:#ffedd5,stroke:#ea580c\r\n    style WTP fill:#ffedd5,stroke:#ea580c\r\n```\r\n*Hình 1. Mô hình nghiên cứu tích hợp S-O-R và Lý thuyết Tín hiệu.*\r\n\r\n### 2.6. Khoảng trống nghiên cứu\r\nTừ tổng quan trên, nghiên cứu xác định ba khoảng trống chính:\r\n\r\n* **Gap 1 – Khoảng trống sơ khai về cơ chế trung gian:** Mặc dù Niềm tin đã được chứng minh là biến trung gian phổ biến (Chen, 2012), cơ chế nhận thức về vai trò của *Tính xác thực thương hiệu* như một biến trung gian cấp cao hơn kết nối tín hiệu kỹ thuật với hành vi tiêu dùng nhanh vẫn chưa được làm rõ.\r\n\r\n* **Gap 2 – Khoảng trống thiếu nhất quán về tích hợp lý thuyết:** Các dòng nghiên cứu hiện tại tồn tại sự đứt gãy giữa góc độ quản trị chuỗi cung ứng (hệ thống truy xuất) và tâm lý hành vi (niềm tin, hoài nghi). Thiếu các mô hình tích hợp giải quyết sự mâu thuẫn trong việc đánh giá liệu một \"tín hiệu kỹ thuật\" thuần túy có đủ sức thay thế hoàn toàn các \"tín hiệu marketing\" truyền thống hay không.\r\n\r\n* **Gap 3 – Khoảng trống bối cảnh:** Các nghiên cứu thực chứng chủ yếu ở các thị trường phát triển hoặc áp dụng cho nông sản thô. Việc áp dụng lý thuyết tín hiệu vào thị trường mới nổi (Việt Nam) đối với ngành FMCG chế biến công nghiệp có mức bất cân xứng thông tin cực cao (như nước yến RTD) vẫn là một khoảng trống nghiên cứu cần được làm rõ.\r\n\r\n**Kết luận định vị nghiên cứu:** Trên cơ sở các khoảng trống trên, nghiên cứu này được thực hiện nhằm kiểm định cơ chế tác động của truy xuất nguồn gốc số đến hành vi tiêu dùng, thông qua các biến tâm lý trung gian (PIQ, Trust, Brand Authenticity), trong bối cảnh cụ thể của thị trường nước yến RTD tại Việt Nam.\r\n\r\n---\r\n\r\n## 3. MỤC TIÊU NGHIÊN CỨU CỦA LUẬN ÁN\r\n### 3.1. Mục tiêu tổng quát\r\nKiểm định cơ chế tác động của tín hiệu truy xuất nguồn gốc số đối với nhận thức, tính xác thực thương hiệu và hành vi tiêu dùng của khách hàng đối với sản phẩm nước yến chế biến sẵn.\r\n\r\n### 3.2. Mục tiêu cụ thể\r\n1.  **Mục tiêu 1:** Hệ thống hóa cơ sở lý luận về bất cân xứng thông tin, lý thuyết tín hiệu và niềm tin trong bối cảnh truy xuất nguồn gốc số.\r\n2.  **Mục tiêu 2:** Xây dựng và kiểm định mô hình đánh giá tác động của nhận thức về truy xuất nguồn gốc đến hoài nghi, niềm tin và tính xác thực thương hiệu.\r\n3.  **Mục tiêu 3:** Đo lường tác động của Tính xác thực thương hiệu lên Ý định mua hàng và Mức sẵn lòng chi trả thêm.\r\n4.  **Mục tiêu 4:** Đề xuất các hàm ý quản trị giúp doanh nghiệp nước yến RTD tối ưu hóa chiến lược minh bạch nguồn gốc.\r\n\r\n### 3.3. Câu hỏi nghiên cứu\r\n1.  Tín hiệu truy xuất nguồn gốc số tác động như thế nào đến các biến tâm lý (hoài nghi, niềm tin)?\r\n2.  Tính xác thực thương hiệu đóng vai trò trung gian như thế nào trong cơ chế hình thành ý định tiêu dùng?\r\n3.  Cơ chế tác động tương tác giữa nội dung thông điệp tiếp thị và xác thực số diễn ra như thế nào?\r\n\r\n## 4. NỘI DUNG NGHIÊN CỨU\r\nĐể giải quyết các mục tiêu trên, luận án sẽ triển khai 4 nội dung nghiên cứu chính:\r\n1.  **Nội dung 1: Khung lý thuyết và mô hình.** Xây dựng mô hình nghiên cứu tích hợp dựa trên khung S-O-R và Lý thuyết Tín hiệu. Thiết lập hệ thống giả thuyết nghiên cứu.\r\n2.  **Nội dung 2: Nghiên cứu định tính.** Phỏng vấn chuyên gia để hiệu chỉnh thang đo và xác nhận tính hợp lý của kịch bản thực nghiệm (mockup sản phẩm).\r\n3.  **Nội dung 3: Nghiên cứu định lượng.** Thiết kế thực nghiệm 2x2, thu thập dữ liệu bằng bảng hỏi phân bổ ngẫu nhiên theo kịch bản, và phân tích dữ liệu bằng mô hình phương trình cấu trúc.\r\n4.  **Nội dung 4: Thảo luận và đề xuất.** Thảo luận kết quả phân tích, so sánh với các nghiên cứu trước đây và đề xuất hàm ý quản trị.\r\n\r\n*(Ghi chú: Mô hình nghiên cứu chi tiết và các giả thuyết được trình bày cụ thể ở phần Phương pháp nghiên cứu bên dưới)*\r\n\r\n## 5. Ý NGHĨA KHOA HỌC VÀ THỰC TIỄN CỦA ĐỀ TÀI\r\n### 5.1. Đóng góp học thuật\r\n*   **Cung cấp bằng chứng thực nghiệm cho Lý thuyết Tín hiệu:** Nghiên cứu cung cấp dữ liệu thực chứng để giải thích cách thức các đặc tính bất biến của dữ liệu được giải mã thành giá trị tự thân của thương hiệu trong bối cảnh sản phẩm credence goods.\r\n*   **Kiểm định điều kiện biên:** Luận án xác định các điều kiện giới hạn của lý thuyết truyền thông truyền thống, gợi mở rằng khi rủi ro cảm nhận cao, hiệu quả của các tín hiệu marketing truyền thống có thể bị suy giảm nếu thiếu sự hỗ trợ từ các tín hiệu xác thực kỹ thuật.\r\n*   **Xác lập vai trò trung gian quan trọng của Brand Authenticity:** Nghiên cứu kỳ vọng cung cấp bằng chứng thực nghiệm cho thấy tính xác thực thương hiệu đóng vai trò quan trọng trong việc kết nối lý trí và cảm xúc, từ đó thúc đẩy hành vi mua trong bối cảnh hàng hóa dựa trên niềm tin.\r\n*   **Bổ sung bằng chứng thực nghiệm tại thị trường mới nổi:** Cung cấp dữ liệu thực chứng từ Việt Nam, đặc biệt là nhóm Gen Z đối với ngành hàng nước yến RTD.\r\n\r\n### 5.2. Đóng góp thực tiễn\r\n*   Gợi ý cho doanh nghiệp nước yến RTD về vai trò của thông tin truy xuất nguồn gốc trong việc nâng cao nhận thức và niềm tin của người tiêu dùng.\r\n*   Cung cấp cơ sở tham khảo cho việc thiết kế giao diện truy xuất phù hợp với hành vi người tiêu dùng trẻ.\r\n\r\n---\r\n\r\n## 6. PHẠM VI NGHIÊN CỨU CỦA ĐỀ TÀI\r\n1.  Phạm vi không gian: Nghiên cứu và thu thập dữ liệu được thực hiện tại TP.HCM, thị trường đô thị lớn với độ tiếp cận công nghệ cao.\r\n2.  Phạm vi thời gian: Dữ liệu dự kiến được thu thập từ quý 3/2026 đến quý 1/2027.\r\n3.  Phạm vi bối cảnh/Nội dung: Đề tài giới hạn trong sản phẩm nước yến chế biến sẵn. Nghiên cứu chỉ tập trung vào phía cầu (hành vi người tiêu dùng), không đánh giá năng lực công nghệ phía cung.\r\n4.  Phạm vi lý thuyết và biến số: Mô hình nghiên cứu giới hạn trong khung S-O-R tích hợp Lý thuyết Tín hiệu với 8 biến (TR, NC, PIQ, SK, TT, BA, PI, WTP). Nghiên cứu không đo lường các biến: Rủi ro cảm nhận như biến riêng biệt, Lòng trung thành thương hiệu, hay Giá trị cảm nhận.\r\n\r\n## 7. ĐỐI TƯỢNG NGHIÊN CỨU CỦA ĐỀ TÀI\r\n*   *Đối tượng nghiên cứu:* Cơ chế tác động tâm lý và hành vi của người tiêu dùng trong việc phản ứng với các tín hiệu nhận thức về truy xuất nguồn gốc thông qua công nghệ số.\r\n*   *Khách thể nghiên cứu:* Người tiêu dùng thế hệ Gen Z (18-27 tuổi) đang sinh sống tại khu vực đô thị (TP.HCM).\r\n*   *Đối tượng khảo sát:* Người tiêu dùng Gen Z (18-27 tuổi) tại TP.HCM, có hành vi tiêu thụ nước giải khát dinh dưỡng, quan tâm đến sức khỏe, và được phân bổ ngẫu nhiên vào 1 trong 4 nhóm kịch bản thực nghiệm.\r\n\r\n## 8. PHƯƠNG PHÁP NGHIÊN CỨU\r\n### 8.1. Mô hình nghiên cứu và Giả thuyết\r\n#### 8.1.1. Logic xây dựng mô hình\r\nMô hình nghiên cứu được xây dựng dựa trên sự tích hợp giữa:\r\n* **Stimulus – Organism – Response framework**\r\n* **Signaling Theory**\r\n\r\nTrong đó:\r\n* **Stimulus (S):** Nhận thức về truy xuất nguồn gốc, Thông điệp tiếp thị\r\n* **Organism (O):** Perceived Information Quality, Skepticism, Trust, Brand Authenticity\r\n* **Response (R):** Purchase Intention, Willingness to Pay Premium\r\n\r\n**Tính tinh gọn của mô hình:** Mặc dù \"Rủi ro cảm nhận\" là tiền đề nội tại, nghiên cứu không vẽ nó thành một biến riêng biệt. Thay vào đó, sự suy giảm rủi ro cảm nhận được bao hàm thông qua sự suy giảm của Hoài nghi và sự gia tăng của Niềm tin.\r\n\r\n#### 8.1.2. Mô hình nghiên cứu đề xuất\r\n**Cấu trúc tuyến chính:**\r\n* TR → PIQ → BA → TT → PI / WTP\r\n* TR → SK → TT\r\n* NC → TT\r\n\r\n**Tương tác:**\r\n* TR × NC → TT\r\n\r\n#### 8.1.3. Giả thuyết nghiên cứu\r\nNghiên cứu đề xuất 9 giả thuyết (xem Hình 1):\r\n\r\n*   **Tuyến hình thành Nhận thức:**\r\n    *   **H1 (+):** Nhận thức về truy xuất nguồn gốc tác động tích cực đến Chất lượng thông tin cảm nhận.\r\n    *   **H2 (-):** Nhận thức về truy xuất nguồn gốc tác động tiêu cực (làm giảm) Hoài nghi.\r\n*   **Tuyến hình thành Niềm tin:**\r\n    *   **H3 (+):** Thông điệp tiếp thị tác động tích cực đến Niềm tin.\r\n    *   **H4 (+):** Chất lượng thông tin cảm nhận tác động tích cực đến Niềm tin.\r\n    *   **H5 (-):** Hoài nghi tác động tiêu cực đến Niềm tin.\r\n    *   **H6 (+):** Tín hiệu truy xuất đóng vai trò điều tiết, làm khuếch đại tác động tích cực của thông điệp tiếp thị lên Niềm tin.\r\n*   **Tuyến chuyển hóa Giá trị và Hành vi:**\r\n    *   **H7 (+):** Tính xác thực thương hiệu tác động tích cực đến Niềm tin.\r\n    *   **H8 (+):** Tính xác thực thương hiệu tác động tích cực đến Ý định mua hàng.\r\n    *   **H9 (+):** Tính xác thực thương hiệu tác động tích cực đến Mức sẵn lòng chi trả thêm.\r\n\r\n#### 8.1.4. Định vị khoa học\r\nĐịnh vị cốt lõi: *\"Nghiên cứu này không đánh giá công nghệ dưới góc độ kỹ thuật lõi, mà xem xét cách thức nhận thức về truy xuất nguồn gốc đóng vai trò như một tín hiệu niềm tin giúp định hình nhận thức, tính xác thực và ý định hành vi của người tiêu dùng.\"*\r\n\r\n---\r\n\r\n### 8.2. Thiết kế và quy trình nghiên cứu\r\n#### 8.2.1. Cách tiếp cận nghiên cứu\r\nNghiên cứu được thiết kế theo phương pháp hỗn hợp, thực hiện qua hai giai đoạn:\r\n\r\n* **Giai đoạn 1: Nghiên cứu định tính**\r\n    *   **Phương pháp:** Phỏng vấn sâu với hội đồng chuyên gia.\r\n    *   **Mẫu chuyên gia (n = 15):** Nhóm 1 (08 người) quản lý phân phối ngành FMCG; Nhóm 2 (07 người) chuyên gia CNTT về truy xuất nguồn gốc.\r\n    *   **Kết quả đầu ra:** Hiệu chỉnh thang đo và thẩm định tính thực tế của kịch bản thực nghiệm.\r\n\r\n* **Giai đoạn 2: Nghiên cứu thực nghiệm định lượng**\r\n    *   **Thực nghiệm:** Sử dụng thiết kế kịch bản để kiểm soát tác động của các tín hiệu.\r\n    *   **Khảo sát:** Đo lường các biến tâm lý và hành vi thông qua mô hình cấu trúc.\r\n\r\n```mermaid\r\ngraph TD\r\n    A[\"1. Tổng quan Tài liệu & Đề xuất Mô hình\"] --\u003e B[\"2. Nghiên cứu Định tính (Phỏng vấn n=15)\"]\r\n    B --\u003e C[\"3. Hiệu chỉnh Thang đo & Kịch bản\"]\r\n    C --\u003e D[\"4. Khảo sát Sơ bộ\"]\r\n    D --\u003e E[\"5. Nghiên cứu Định lượng (Thực nghiệm 2x2, n=400-500)\"]\r\n    E --\u003e F[\"6. Phân tích Dữ liệu\"]\r\n    F --\u003e G[\"7. Kết luận & Hàm ý Quản trị\"]\r\n    style A fill:#f8fafc,stroke:#334155\r\n    style B fill:#e0f2fe,stroke:#0284c7\r\n    style C fill:#e0f2fe,stroke:#0284c7\r\n    style D fill:#fef08a,stroke:#ca8a04\r\n    style E fill:#dcfce7,stroke:#16a34a\r\n    style F fill:#dcfce7,stroke:#16a34a\r\n    style G fill:#f8fafc,stroke:#334155\r\n```\r\n*Hình 2. Sơ đồ Quy trình Nghiên cứu.*\r\n\r\n#### 8.2.2. Thiết kế nghiên cứu\r\nNghiên cứu áp dụng thiết kế thực nghiệm 2 × 2 factorial design (như trình bày tại Bảng 2).\r\n\r\n**Bảng 2: Ma trận thiết kế thực nghiệm 2x2**\r\n| Yếu tố | Mức 1 | Mức 2 |\r\n|---|---|---|\r\n| **Traceability** | Có truy xuất | Không truy xuất |\r\n| **Thông điệp** | Thông điệp tự nhiên | Thông điệp chức năng |\r\n\r\nTổng cộng có 4 nhóm kịch bản thực nghiệm. Người tham gia sẽ được phân bổ ngẫu nhiên vào 1 trong 4 nhóm.\r\n\r\n```mermaid\r\ngraph TD\r\n    A[\"Tổng mẫu Khảo sát (n = 400 - 500)\"] -- \"Phân bổ Ngẫu nhiên\" --\u003e B{\"Thiết kế Thực nghiệm 2x2\"}\r\n    B --\u003e C[\"Nhóm 1: Có Truy xuất + T.điệp Tự nhiên\"]\r\n    B --\u003e D[\"Nhóm 2: Có Truy xuất + T.điệp Chức năng\"]\r\n    B --\u003e E[\"Nhóm 3: Không Truy xuất + T.điệp Tự nhiên\"]\r\n    B --\u003e F[\"Nhóm 4: Không Truy xuất + T.điệp Chức năng\"]\r\n    C --\u003e G[\"Khảo sát Đo lường (PIQ, Trust, BA, PI, WTP)\"]\r\n    D --\u003e G\r\n    E --\u003e G\r\n    F --\u003e G\r\n    style A fill:#f8fafc,stroke:#334155,stroke-width:2px\r\n    style B fill:#e0f2fe,stroke:#0284c7,stroke-width:2px\r\n    style C fill:#dcfce7,stroke:#16a34a\r\n    style D fill:#fef08a,stroke:#ca8a04\r\n    style E fill:#ffedd5,stroke:#ea580c\r\n    style F fill:#f1f5f9,stroke:#475569\r\n    style G fill:#f8fafc,stroke:#334155,stroke-width:2px,stroke-dasharray: 5 5\r\n```\r\n*Hình 3. Sơ đồ Thiết kế Thực nghiệm.*\r\n\r\n**Lưu ý về ranh giới nghiên cứu:** Nghiên cứu này không đánh giá hiệu năng của hệ thống công nghệ thực tế, mà tập trung đo lường \"nhận thức về truy xuất nguồn gốc\" của người tiêu dùng.\r\n\r\n#### 8.2.3. Vật liệu thực nghiệm\r\nVật liệu thực nghiệm được phát triển dưới dạng Mockup sản phẩm:\r\n*   Bao bì sản phẩm với một thương hiệu giả định nhằm loại bỏ nhiễu ngoại lai từ Lòng trung thành thương hiệu.\r\n*   QR code giả lập có khả năng tương tác.\r\n*   Giao diện truy xuất nguồn gốc hiển thị chi tiết vòng đời sản phẩm.\r\n\r\n#### 8.2.4. Đối tượng và Phương pháp thu thập dữ liệu\r\n*   *Đối tượng:* Người tiêu dùng Gen Z (18–27 tuổi) tại TP.HCM.\r\n*   *Phương pháp lấy mẫu:* Lấy mẫu phi xác suất có mục đích kết hợp Snowball sampling. Bộ lọc sàng lọc gắt gao: có hành vi tiêu thụ nước yến/FMCG dinh dưỡng và quan tâm đến sức khỏe.\r\n*   *Kích thước mẫu dự kiến:* n = 400 – 500. Kích thước mẫu tối thiểu được ước lượng thông qua phần mềm G*Power 3.1 (mức ý nghĩa 5%, power 80%, effect size trung bình) đảm bảo thỏa mãn và vượt yêu cầu thống kê của Hair et al. (2022).\r\n\r\n#### 8.2.5. Thang đo và Xây dựng bảng hỏi\r\nToàn bộ biến tiềm ẩn được đo lường bằng thang đo Likert 7 điểm. Thang đo 7 điểm cung cấp độ nhạy cao hơn cho mô hình PLS-SEM (Hair et al., 2022).\r\n*   *Quy trình chuẩn hóa:* Dịch xuôi - dịch ngược.\r\n*   *Pilot test:* n ≈ 30 trước khi khảo sát diện rộng.\r\n\r\n#### 8.2.6. Phân tích dữ liệu\r\nPhương pháp phân tích cốt lõi là PLS-SEM (SmartPLS 4). Quy trình 4 bước:\r\n1.  **Mô hình đo lường:** Cronbach's Alpha, ρ_A, Composite Reliability, AVE ≥ 0.5.\r\n2.  **Giá trị phân biệt:** Fornell-Larcker criterion và HTMT.\r\n3.  **Mô hình cấu trúc:** Path coefficients β, R², f², PLSpredict (Q² predict).\r\n4.  **Kiểm định trung gian nối tiếp và Phân tích đa nhóm:** Bootstrapping 5.000 mẫu lặp. Phân tích đa nhóm theo giới tính / kinh nghiệm mua yến.\r\n\r\n#### 8.2.7. Kiểm soát sai lệch\r\n1.  **Common Method Bias:** Hoán đổi thứ tự câu hỏi, biến đánh dấu, Full collinearity VIF \u003c 3.3.\r\n2.  **Manipulation Check:** Câu hỏi kiểm tra thao tác thực nghiệm.\r\n3.  **Data Cleaning:** Loại bỏ \"Speeders\" và \"Straight-liners\".\r\n\r\n#### 8.2.8. Đạo đức nghiên cứu\r\n*   Sự tham gia hoàn toàn tự nguyện.\r\n*   Dữ liệu ẩn danh hoàn toàn.\r\n*   Tuân thủ quy định của Hội đồng Đạo đức Đại học Nha Trang.\r\n\r\n---\r\n\r\n### 8.3. Thang đo & Bảng câu hỏi (Measurement Model & Questionnaire)\r\n#### 8.3.1. Nguyên tắc xây dựng thang đo\r\n*   Sử dụng thang đo Likert 7 điểm.\r\n*   Kế thừa từ các nghiên cứu đã kiểm định.\r\n*   Dịch thuật ngược (Back-translation: Anh ↔ Việt).\r\n*   Pilot test (n ≈ 30).\r\n\r\n#### 8.3.2. Cấu trúc bảng hỏi\r\n**PHẦN A – KỊCH BẢN**\r\nNgười tham gia xem 1 trong 4 mockup sản phẩm (phân bổ ngẫu nhiên).\r\n\r\n**PHẦN B – THANG ĐO CÁC BIẾN NGHIÊN CỨU**\r\n\r\n**1. Nhận thức về truy xuất nguồn gốc** **\r\n*   TR1: Tôi có thể dễ dàng truy xuất nguồn gốc của sản phẩm này.\r\n*   TR2: Thông tin về nguồn gốc sản phẩm được trình bày rõ ràng.\r\n*   TR3: Tôi tin rằng thông tin truy xuất là minh bạch.\r\n*   TR4: Tôi có thể kiểm tra được quy trình sản xuất của sản phẩm.\r\n*   TR5: Hệ thống truy xuất giúp tôi hiểu rõ sản phẩm hơn.\r\n\r\n**2. Perceived Information Quality** *(Adapted from Nelson et al., 2005)*\r\n*   PIQ1: Thông tin về sản phẩm là chính xác.\r\n*   PIQ2: Thông tin được cung cấp là đáng tin cậy.\r\n*   PIQ3: Thông tin là đầy đủ.\r\n*   PIQ4: Thông tin được trình bày rõ ràng và dễ hiểu.\r\n\r\n**3. Skepticism** *(Adapted from Skarmeas & Leonidou, 2013)*\r\n*   SK1: Tôi nghi ngờ các tuyên bố \"tự nhiên\" của sản phẩm này.\r\n*   SK2: Tôi cho rằng thông điệp \"nguyên chất\" thường bị phóng đại.\r\n*   SK3: Tôi không hoàn toàn tin các cam kết về thành phần.\r\n*   SK4: Tôi nghĩ rằng nhiều sản phẩm \"tự nhiên\" chỉ là marketing.\r\n*   SK5: Tôi hoài nghi về tính trung thực của các tuyên bố này.\r\n\r\n**4. Trust** *(Adapted from Chen, 2012)*\r\n*   TT1: Sản phẩm này đáng tin cậy.\r\n*   TT2: Tôi cảm thấy an toàn khi sử dụng sản phẩm này.\r\n*   TT3: Sản phẩm này có thể tin được.\r\n*   TT4: Tôi tin tưởng vào cam kết chất lượng của sản phẩm này.\r\n\r\n**5. Brand Authenticity** *(Adapted from Morhart et al., 2015)*\r\n*   BA1: Thương hiệu này mang lại cảm giác \"thật\".\r\n*   BA2: Thương hiệu này rất chân thành.\r\n*   BA3: Thương hiệu này không giả tạo.\r\n*   BA4: Thương hiệu này gợi lên những giá trị mà tôi coi trọng.\r\n\r\n**6. Purchase Intention** *(Adapted from Spears & Singh, 2004)*\r\n*   PI1: Tôi có khả năng sẽ mua sản phẩm này.\r\n*   PI2: Tôi sẽ cân nhắc mua sản phẩm này.\r\n*   PI3: Tôi có ý định thử sản phẩm này.\r\n*   PI4: Tôi sẵn sàng chọn sản phẩm này khi mua.\r\n\r\n**7. Willingness to Pay Premium** *(Gabor-Granger đã đơn giản hóa)*\r\nPhương pháp Gabor-Granger được chọn vì phù hợp với bối cảnh FMCG giá thấp (Homburg et al., 2005), nơi mức WTP tuyệt đối nhỏ và câu hỏi mở có nguy cơ tạo ra phương sai quá lớn hoặc giá trị phi thực tế.\r\n\r\n**Kiểm tra thao tác kích thích & Phân nhóm:**\r\nĐể đảm bảo tính giá trị nội tại của thiết kế thực nghiệm 2x2, một câu hỏi kiểm tra thao tác được sử dụng nhằm xác nhận đáp viên thực sự nhận thức được sự hiện diện của mã QR và loại thông điệp. Đồng thời, tính năng phân nhóm ngẫu nhiên của công cụ khảo sát được kích hoạt để loại trừ thiên kiến chọn mẫu, dù sử dụng phương pháp lấy mẫu thuận tiện.\r\n*   **Câu hỏi:** \"Nếu sản phẩm này có giá cao hơn sản phẩm thông thường, bạn sẵn sàng trả thêm tối đa bao nhiêu?\"\r\n    - [ ] Không trả thêm\r\n    - [ ] +2.000 VNĐ\r\n    - [ ] +5.000 VNĐ\r\n    - [ ] +8.000 VNĐ\r\n    - [ ] +10.000 VNĐ\r\n\r\n#### 8.3.3. Biến kiểm tra thao tác\r\n*   MC_TR1: Sản phẩm này có cung cấp thông tin truy xuất nguồn gốc.\r\n*   MC_TR2: Tôi có thể kiểm tra thông tin sản phẩm.\r\n*   MC_NC1: Sản phẩm này nhấn mạnh yếu tố \"tự nhiên\".\r\n*   MC_NC2: Nội dung marketing tập trung vào sức khỏe.\r\n\r\n#### 8.3.4. Biến kiểm soát\r\n*   Giới tính, Độ tuổi, Tần suất sử dụng nước giải khát.\r\n*   Mức độ quan tâm đến sức khỏe (1–7 điểm).\r\n*   Mức độ quan tâm đến môi trường (1–7 điểm).\r\n\r\n#### 8.3.5. Kiểm định thang đo\r\n*   Cronbach's Alpha ≥ 0.7; CR ≥ 0.7.\r\n*   AVE ≥ 0.5.\r\n*   HTMT \u003c 0.85.\r\n\r\n---\r\n\r\n### 8.4. Cấu trúc dự kiến của Luận án\r\nCấu trúc dự kiến của luận án bao gồm 5 chương, được phân bổ như trình bày tại Bảng 3.\r\n\r\n**Bảng 3: Cấu trúc dự kiến của luận án**\r\n| Chương | Nội dung | Ước lượng |\r\n|---|---|---|\r\n| Chương 1 | Giới thiệu: Bối cảnh, Mục tiêu, Câu hỏi nghiên cứu, Phạm vi | 15-20 trang |\r\n| Chương 2 | Tổng quan Lý thuyết và Mô hình nghiên cứu | 40-50 trang |\r\n| Chương 3 | Phương pháp Nghiên cứu (Thiết kế thực nghiệm, Thang đo, PLS-SEM) | 25-30 trang |\r\n| Chương 4 | Kết quả Nghiên cứu (Thống kê mô tả, Mô hình đo lường, Mô hình cấu trúc) | 30-40 trang |\r\n| Chương 5 | Thảo luận, Kết luận, Hàm ý quản trị và Hạn chế | 20-25 trang |\r\n\r\n---\r\n\r\n## 9. KẾT QUẢ MONG ĐỢI\r\n### 9.1. Kết quả khoa học kỳ vọng\r\n*   **Sức mạnh của tín hiệu kỹ thuật:** Dự đoán tín hiệu truy xuất có sức mạnh làm giảm hoài nghi. Nếu tác động yếu, nghiên cứu sẽ phân tích các rào cản nhận thức.\r\n*   **Vai trò trung gian của tính xác thực:** Kỳ vọng làm rõ vai trò của Tính xác thực thương hiệu như một cơ chế trung gian quan trọng chuyển hóa niềm tin thành mức sẵn lòng chi trả thêm.\r\n\r\n### 9.2. Lộ trình công bố\r\nLộ trình công bố khoa học dự kiến được trình bày tại Bảng 4.\r\n\r\n**Bảng 4: Lộ trình công bố khoa học dự kiến**\r\n| Giai đoạn | Hoạt động | Đầu ra |\r\n|---|---|---|\r\n| Tháng 6-7/2027 | Hội thảo khoa học quốc gia/quốc tế | Kỷ yếu hội thảo ISBN |\r\n| Tháng 10/2027 | Báo cáo trung gian ĐHQG Nha Trang | Báo cáo tiến độ |\r\n| Tháng 3/2028 | Nộp bài tạp chí HĐGS | 02-03 bài báo |\r\n| Tháng 12/2028 | Bảo vệ luận án Tiến sĩ | Luận án hoàn chỉnh |\r\n\r\n## 10. NGUỒN KINH PHÍ\r\nNghiên cứu sinh tự túc nguồn kinh phí (bao gồm chi phí khảo sát, xây dựng mockup, và công bố bài báo).\r\n\r\n## 11. DỰ KIẾN KẾ HOẠCH HỌC TẬP, NGHIÊN CỨU TOÀN KHÓA\r\nKế hoạch học tập và nghiên cứu toàn khóa được thiết kế trong thời gian chuẩn 3 năm (36 tháng) như trình bày tại Bảng 5:\r\n\r\n**Bảng 5: Dự kiến kế hoạch học tập và nghiên cứu toàn khóa**\r\n| STT | Nội dung / Nhiệm vụ | Thời gian | Kết quả dự kiến | Nơi thực hiện |\r\n|---|---|---|---|---|\r\n| 1 | Học các học phần trình độ Tiến sĩ | Tháng 1 - Tháng 6 | Hoàn thành 8 Tín chỉ | ĐH Nha Trang |\r\n| 2 | Viết và bảo vệ Tiểu luận tổng quan | Th

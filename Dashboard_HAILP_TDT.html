<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PhD Workspace - ĐỀ CƯƠNG NGHIÊN CỨU</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            securityLevel: 'loose',
            htmlLabels: false,
            theme: 'base',
            themeVariables: { primaryColor: '#ffffff', primaryTextColor: '#000000', primaryBorderColor: '#000000', lineColor: '#000000', secondaryColor: '#ffffff', tertiaryColor: '#ffffff', mainBkg: '#ffffff', nodeBorder: '#000000', clusterBkg: '#ffffff', clusterBorder: '#000000', titleColor: '#000000', edgeLabelBackground: '#ffffff' }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Custom Properties */
            --bg-body: #f1f5f9;
            --bg-sidebar: #0f172a;
            --bg-card: #ffffff;
            --bg-stat: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #334155;
            --text-heading: #0f172a;
            --text-sidebar-active: #ffffff;
            --text-sidebar-inactive: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #10b981;
            --accent: #6366f1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-card: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --doc-font: 'Times New Roman', Times, Baskerville, Georgia, serif;
        }

        [data-theme="dark"] {
            /* Dark Theme Custom Properties */
            --bg-body: #090d16;
            --bg-sidebar: #131b2e;
            --bg-card: #182236;
            --bg-stat: #1f2d47;
            --border-color: #27354d;
            --text-main: #cbd5e1;
            --text-heading: #f8fafc;
            --text-sidebar-active: #ffffff;
            --text-sidebar-inactive: #64748b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg-body);
            color: var(--text-main);
            transition: var(--transition);
            overflow: hidden;
        }

        /* Sidebar Container */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            color: #fff;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: 4px 0 25px rgba(0,0,0,0.15);
            z-index: 10;
            position: relative;
            transition: var(--transition);
        }

        .sidebar-header {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
        }

        .ncs-badge {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 10px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--text-sidebar-inactive);
        }

        .ncs-badge strong {
            color: #fff;
            font-size: 0.9rem;
        }

        .nav-container {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
        }

        /* Styling Scrollbars */
        .nav-container::-webkit-scrollbar,
        .main::-webkit-scrollbar {
            width: 6px;
        }
        .nav-container::-webkit-scrollbar-track,
        .main::-webkit-scrollbar-track {
            background: transparent;
        }
        .nav-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .main::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .nav-header {
            font-size: 0.7rem;
            color: var(--text-sidebar-inactive);
            font-weight: 700;
            margin: 25px 0 10px 5px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
        }

        .nav-item {
            padding: 12px 14px;
            margin: 6px 0;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-sidebar-inactive);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 25%;
            height: 50%;
            width: 3px;
            background: var(--secondary);
            border-radius: 0 4px 4px 0;
            opacity: 0;
            transition: var(--transition);
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text-sidebar-active);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            font-weight: 600;
        }

        .nav-item.active::before {
            opacity: 1;
            background: #3b82f6;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 1rem;
            margin-top: auto;
            font-size: 0.75rem;
            color: var(--text-sidebar-inactive);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Main Workspace */
        .main {
            flex-grow: 1;
            padding: 2.5rem;
            overflow-y: auto;
            transition: var(--transition);
            position: relative;
        }

        .card {
            background: var(--bg-card);
            padding: 3.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-card);
            position: relative;
            min-height: 85vh;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            box-sizing: border-box;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Buttons & Toolbar */
        .btn-group {
            position: absolute;
            top: 2.5rem;
            right: 3.5rem;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-theme {
            background: var(--bg-stat);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            box-shadow: none;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
        }

        /* Statistics Cards Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
            margin-top: 1.5rem;
        }

        .stat-card {
            background: var(--bg-stat);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-main);
            opacity: 0.8;
            font-weight: 600;
        }

        .stat-val {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-heading);
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .stat-val span {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Content Document Styling (APA Standard) */
        #title {
            color: var(--text-heading);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            margin-top: 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            transition: var(--transition);
        }

        #content {
            font-family: var(--doc-font);
            font-size: 14pt;
            line-height: 1.8;
            color: var(--text-main);
            text-align: justify;
            transition: var(--transition);
            margin-top: 1.5rem;
        }

        #content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            color: var(--text-heading);
            margin-top: 24pt;
            margin-bottom: 12pt;
            page-break-after: avoid;
            line-height: 1.3;
        }

        #content h1 { font-size: 20pt; text-transform: uppercase; text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        #content h2 { font-size: 16pt; border-left: 4px solid var(--primary); padding-left: 12px; }
        #content h3 { font-size: 14pt; }
        #content h4 { font-size: 14pt; font-style: italic; }
        #content h5 { font-size: 13pt; }

        #content p {
            margin-top: 0;
            margin-bottom: 16px;
            text-indent: 0; /* Standard modern spacing */
        }
        
        #content p + p {
            text-indent: 1.25cm; /* Standard indent for consecutive paragraphs */
        }

        #content blockquote {
            margin: 20px 0;
            padding: 15px 20px;
            background: var(--bg-stat);
            border-left: 4px solid var(--primary);
            font-style: italic;
            border-radius: 0 12px 12px 0;
        }

        /* Table Styling */
        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            box-shadow: var(--shadow);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        #content th, #content td {
            padding: 12px 16px;
            font-size: 13pt;
            border-bottom: 1px solid var(--border-color);
        }

        #content th {
            background-color: var(--bg-stat);
            color: var(--text-heading);
            font-weight: 700;
            text-align: left;
        }

        #content tr:last-child td {
            border-bottom: none;
        }

        #content tr:hover td {
            background-color: rgba(59, 130, 246, 0.02);
        }

        /* Mermaid Graph Boxes */
        .mermaid-box {
            margin: 35px auto;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 24px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            box-shadow: var(--shadow);
            max-width: 100%;
        }

        .mermaid-box svg {
            width: 100% !important;
            max-width: 850px !important;
            height: auto !important;
            min-width: 550px;
        }

        [data-theme="dark"] .mermaid-box {
            background: #ffffff; /* keep white bg for clear readability of black & white mermaid rules */
            border-color: var(--border-color);
        }

        /* Error Message Box */
        .error-box {
            color: #b91c1c;
            border: 1px solid #fca5a5;
            padding: 16px;
            background: #fef2f2;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Print Formatting & Page Breaks */
        .export-title { text-align: center; font-size: 22pt; font-weight: bold; margin-bottom: 40px; }
        .export-chapter { margin-bottom: 50px; }
        .page-break { page-break-after: always; }

        @media print {
            @page { size: A4; margin: 2.5cm 2cm 2.5cm 3cm; }
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible; }
            #print-container { position: absolute; left: 0; top: 0; width: 100%; background: white; padding: 0; }
            #print-container h1, #print-container h2 { text-transform: uppercase; }
            #print-container .mermaid-box, #print-container .mermaid { page-break-inside: avoid; border: none; text-align: center; }
            #print-container img { max-width: 100% !important; height: auto !important; page-break-inside: avoid; display: block; margin: 0 auto; }
            #print-container { font-family: 'Times New Roman', serif; font-size: 14pt; color: #000; line-height: 1.5; text-align: justify; }
            #print-container p { margin-top: 0pt; margin-bottom: 0pt; line-height: 1.5; }
            #print-container p + p { text-indent: 1.25cm; }
            #print-container table { page-break-inside: avoid; border-collapse: collapse; width: 100%; }
            #print-container th, #print-container td { border: 1px solid black; padding: 8px; }
        }
    </style>
</head>

    <script>
        const data = {"chapters":[{"title":"ĐỀ CƯƠNG NGHIÊN CỨU","file":"00_BiaThongTin.md","chars":812,"pages":"0.5","content":"# ĐỀ CƯƠNG NGHIÊN CỨU\r\n**(Dự tuyển Nghiên cứu sinh — Đại học Tôn Đức Thắng)**\r\n\r\n**Tên đề tài dự kiến:**\r\nTác động của Chỉ số Hài lòng Khách hàng đến Hiệu quả Hoạt động Doanh nghiệp: Vai trò Trung gian của Lòng trung thành Thương hiệu và Truyền miệng Điện tử trong Ngành Hàng Tiêu dùng Nhanh tại Việt Nam\r\n\r\n*(The Impact of Customer Satisfaction Index on Firm Performance: Mediating Roles of Brand Loyalty and Electronic Word-of-Mouth in Vietnam's Fast-Moving Consumer Goods Industry)*\r\n\r\n**Nghiên cứu sinh:** Lê Phúc Hải\r\n**Email:** phuchai.le@gmail.com | **Điện thoại:** +84 938 300 489\r\n**Địa chỉ:** Esto City, Cát Lát, Thành phố Thủ Đức, TP. Hồ Chí Minh\r\n\r\n**Lĩnh vực nghiên cứu:** Quản trị Kinh doanh\r\n**Chuyên ngành dự kiến:** Quản trị Kinh doanh\r\n**Cơ sở đào tạo:** Đại học Tôn Đức Thắng (TDTU)\r\n\r\n---\r\n\r\n"},{"title":"1. Tính cấp thiết, lý do chọn đề tài, lĩnh vực nghiên cứu","file":"01_TinhCapThiet.md","chars":4028,"pages":"2.2","content":"## 1. Tính cấp thiết, lý do chọn đề tài, lĩnh vực nghiên cứu\r\n\r\n### 1.1. Bối cảnh và tính cấp thiết\r\n\r\nTrong hai thập niên qua, nền kinh tế toàn cầu đã chứng kiến sự dịch chuyển căn bản trong tư duy quản trị doanh nghiệp: từ tập trung vào chỉ số tài chính thuần túy sang coi trọng trải nghiệm và sự hài lòng của khách hàng như một tài sản chiến lược có thể đo lường và định lượng được. Chỉ số Hài lòng Khách hàng (Customer Satisfaction Index, CSI) nổi lên như một công cụ đo lường toàn diện, tích hợp nhiều chiều kích của trải nghiệm tiêu dùng thành một chỉ số tổng hợp có giá trị dự báo cao đối với hiệu quả hoạt động doanh nghiệp (Fornell et al., 1996; Anderson et al., 1994).\r\n\r\nTổng hợp 40 năm nghiên cứu thực nghiệm của Fornell và cộng sự (2023) trên hơn 400 doanh nghiệp lớn tại Hoa Kỳ đã xác nhận mối liên hệ tích cực và nhất quán giữa CSI cao với các chỉ số hiệu quả tài chính bao gồm tỷ suất sinh lợi trên tài sản (ROA), tốc độ tăng trưởng doanh thu, và giá trị thị trường cổ phiếu (Tobin's Q). Bằng chứng này tạo ra một hướng nghiên cứu có giá trị thực tiễn cao, đặc biệt trong bối cảnh các doanh nghiệp đang phải đưa ra quyết định phân bổ ngân sách cho các hoạt động nâng cao trải nghiệm khách hàng.\r\n\r\nTại Việt Nam, ngành hàng tiêu dùng nhanh là một trong những ngành có quy mô lớn nhất, ước đạt trên 50 tỷ USD vào năm 2025, với sự hiện diện của cả tập đoàn đa quốc gia lẫn doanh nghiệp nội địa quy mô lớn. Đây là ngành có tần suất mua hàng cao, chu kỳ quyết định ngắn, và chi phí chuyển đổi thương hiệu thấp: ba đặc điểm khiến sự hài lòng tích lũy trở thành rào cản cạnh tranh thực chất duy nhất mà đối thủ không thể sao chép nhanh chóng.\r\n\r\nTuy nhiên, một khoảng cách đáng chú ý tồn tại giữa quy mô đầu tư và cơ sở bằng chứng: trong khi các doanh nghiệp FMCG Việt Nam chi hàng nghìn tỷ đồng hàng năm cho tiếp thị và xây dựng thương hiệu, đến nay vẫn chưa có nghiên cứu thực nghiệm được xây dựng trong bối cảnh Việt Nam để trả lời câu hỏi: **CSI cao có chuyển hóa thành hiệu quả hoạt động tốt hơn cho doanh nghiệp FMCG Việt Nam không, và thông qua cơ chế nào?**\r\n\r\nKhoảng trống này vừa có ý nghĩa lý luận, bổ sung bằng chứng từ thị trường mới nổi (emerging market) vào dòng lý thuyết quốc tế, vừa có giá trị thực tiễn trực tiếp đối với các nhà quản trị doanh nghiệp và hoạch định chính sách tại Việt Nam.\r\n\r\n### 1.2. Lý do chọn đề tài\r\n\r\nVề mặt lý luận, mô hình Chỉ số Hài lòng Khách hàng của Mỹ do Fornell et al. (1996) xây dựng và các biến thể châu Âu đã được kiểm định rộng rãi ở các nền kinh tế phát triển. Tuy nhiên, tính hiệu lực của mô hình này trong bối cảnh thị trường mới nổi như Việt Nam, nơi hành vi tiêu dùng chịu ảnh hưởng bởi văn hóa Á Đông, khoảng cách thu nhập lớn giữa đô thị và nông thôn, và hệ thống phân phối vừa truyền thống vừa hiện đại, chưa được kiểm định đầy đủ. Đây là ngoại suy có điều kiện và cần được xác nhận bằng bằng chứng thực địa, không thể mặc nhiên áp dụng kết quả từ thị trường phát triển.\r\n\r\nVề thực tiễn, ngành hàng tiêu dùng nhanh tại Việt Nam đang trong giai đoạn cấu trúc lại kênh phân phối: tỷ trọng thương mại điện tử tăng nhanh, người tiêu dùng đặt yêu cầu cao hơn về chất lượng và trải nghiệm, cạnh tranh từ hàng nhập khẩu ngày càng mở rộng. Trong bối cảnh đó, doanh nghiệp cần bằng chứng định lượng để xác định chiều kích nào của trải nghiệm khách hàng tạo ra tác động lớn nhất đến hiệu quả hoạt động, thay vì phân bổ ngân sách dựa trên kinh nghiệm hoặc chuẩn mực ngành.\r\n\r\nVề động lực cá nhân, với nền tảng thực tiễn trong quản trị kinh doanh và sự quan tâm đến chiến lược khách hàng, nghiên cứu sinh nhận thấy đây là khoảng trống học thuật có thể lấp đầy bằng một công trình có tính ứng dụng rõ ràng cho cả cộng đồng doanh nghiệp lẫn giới học thuật Việt Nam.\r\n\r\n### 1.3. Lĩnh vực nghiên cứu\r\n\r\nĐề tài thuộc lĩnh vực Quản trị Kinh doanh, giao thoa với Marketing chiến lược, Tài chính doanh nghiệp và Hành vi người tiêu dùng. Đây là giao điểm của hai dòng nghiên cứu: đo lường và quản lý trải nghiệm khách hàng, và đánh giá hiệu quả hoạt động doanh nghiệp.\r\n\r\n---\r\n\r\n"},{"title":"2. Tình hình nghiên cứu","file":"02_TinhHinhNghienCuu.md","chars":11040,"pages":"6.1","content":"## 2. Tình hình nghiên cứu\r\n\r\n### 2.1. Lý thuyết nền tảng\r\n\r\nBa lý thuyết sau đây tạo thành khung lý thuyết tích hợp cho đề tài, mỗi lý thuyết giải thích một mắt xích khác nhau trong chuỗi nhân quả từ sự hài lòng đến hiệu quả doanh nghiệp.\r\n\r\nLý thuyết xác nhận kỳ vọng do Oliver (1980) đề xuất giải thích cơ chế hình thành sự hài lòng ở cấp độ cá nhân: khách hàng so sánh cảm nhận thực tế sau tiêu dùng với kỳ vọng đã hình thành trước đó. Khi cảm nhận vượt kỳ vọng, sự hài lòng xuất hiện; khi thấp hơn, sự không hài lòng hình thành. Lý thuyết này là nền tảng trực tiếp cho tất cả các mô hình đo lường CSI hiện đại, bao gồm ACSI và các biến thể.\r\n\r\nLý thuyết các bên liên quan của Freeman (1984) cung cấp cơ sở lý luận cho mắt xích tiếp theo: vì sao sự hài lòng của khách hàng: một bên liên quan cốt lõi, lại tác động đến hiệu quả tổng thể của doanh nghiệp. Lý thuyết này lập luận rằng doanh nghiệp tạo ra hiệu quả bền vững khi đáp ứng được kỳ vọng của các bên liên quan, và mức độ đáp ứng kỳ vọng khách hàng (phản ánh qua CSI) là điều kiện cần để duy trì doanh thu và thị phần trong dài hạn.\r\n\r\nLý thuyết nguồn lực của Barney (1991) là trụ cột lý thuyết trọng tâm để giải thích tại sao CSI cao tạo ra lợi thế cạnh tranh bền vững, không phải chỉ là chỉ số đo lường nhất thời. Barney lập luận rằng lợi thế cạnh tranh bền vững chỉ xuất hiện khi doanh nghiệp sở hữu nguồn lực đồng thời có bốn đặc tính: có giá trị, hiếm, khó bắt chước, và không có sản phẩm thay thế tương đương. Năng lực tạo ra trải nghiệm khách hàng vượt trội — phản ánh qua CSI cao — đáp ứng đủ bốn tiêu chí này: nó có giá trị vì tạo ra dòng tiền ổn định từ lòng trung thành; nó hiếm vì chỉ một số ít doanh nghiệp trong ngành đạt được điểm CSI cao nhất quán; nó khó bắt chước vì được xây dựng qua nhiều năm tích lũy năng lực vận hành, văn hóa dịch vụ, và hệ thống quản lý trải nghiệm khách hàng — những yếu tố mà đối thủ không thể sao chép trong ngắn hạn bằng cách tăng chi phí marketing; và không có sản phẩm thay thế tương đương vì sự tin tưởng tích lũy của khách hàng không thể được thay thế bằng giá thấp đơn thuần. Chính đặc tính này phân biệt CSI như một tài sản vô hình chiến lược khỏi các chỉ số hiệu quả thuần túy tài chính, vốn dễ bị đối thủ quan sát và sao chép. Trong nghiên cứu này, RBV cung cấp cơ sở lý luận cho cả mối quan hệ CSI–Firm Performance lẫn giải thích tại sao hiệu ứng này được kỳ vọng có độ trễ và bền vững theo thời gian.\r\n\r\nBên cạnh lý thuyết xác nhận kỳ vọng và lý thuyết nguồn lực, lý thuyết truyền miệng điện tử và khuếch tán mạng xã hội bổ sung lớp lý luận phù hợp với bối cảnh thương mại điện tử và AI hiện tại. Hennig-Thurau et al. (2004) xác định eWOM là bất kỳ phát biểu tích cực hoặc tiêu cực nào của khách hàng hiện tại, tiềm năng hoặc cũ về sản phẩm hay doanh nghiệp, được phổ biến trên internet đến nhiều người và tổ chức. Trong bối cảnh FMCG tại Việt Nam, eWOM thông qua Shopee, TikTok Shop, Google Reviews và các nền tảng mạng xã hội đã trở thành kênh ảnh hưởng đến quyết định mua hàng có tốc độ khuếch tán và phạm vi tiếp cận vượt xa WOM truyền thống. Mối quan hệ CSI–eWOM–Firm Performance do đó có cơ chế truyền dẫn nhanh hơn, đo lường được và phù hợp với thực tiễn thị trường hơn cơ chế qua tài sản thương hiệu dài hạn.\r\n\r\n### 2.2. Mô hình ACSI, Cấu trúc đo lường CSI\r\n\r\nMô hình Chỉ số Hài lòng Khách hàng Mỹ do Fornell et al. (1996) xây dựng tại Đại học Michigan là khung đo lường CSI được chấp nhận rộng rãi nhất trong học thuật và thực tiễn. Cần lưu ý rằng việc áp dụng mô hình này sang bối cảnh Việt Nam là ngoại suy có điều kiện, cần kiểm định lại tính hiệu lực của cấu trúc đo lường trước khi sử dụng làm công cụ nghiên cứu chính thức.\r\n\r\nFornell et al. (1996, tr. 8) định nghĩa CSI là “biến tiềm ẩn được đo lường như một hàm số của ba tiền đề: kỳ vọng khách hàng, chất lượng cảm nhận, và giá trị cảm nhận.” Ba tiền đề này không độc lập với nhau: kỳ vọng tác động đến cả chất lượng cảm nhận lẫn giá trị cảm nhận, trong khi chất lượng cảm nhận tác động đến giá trị cảm nhận. Cấu trúc hệ thống phương trình đồng thời này là điểm phân biệt mô hình ACSI với các thang đo sự hài lòng đơn chiều trước đó. Johnson et al. (2001) tái kiểm định cấu trúc ba tiền đề này trong dữ liệu đa quốc gia (Na Uy, Đan Mạch, Thụy Điển, Đức), xác nhận tính ổn định cấu trúc qua các bối cảnh kinh tế phát triển song ghi nhận trọng số tương đối giữa ba nhân tố tiền đề thay đổi đáng kể theo ngành và quốc gia. Đây là cơ sở trực tiếp cho ba giả thuyết H1, H2, H3 trong mô hình nghiên cứu này.\r\n\r\nMô hình xác định CSI như một biến tiềm ẩn được hình thành từ ba nhóm tiền đề. Kỳ vọng khách hàng phản ánh mức độ kỳ vọng trước tiêu dùng về chất lượng tổng thể, bao gồm độ tin cậy và khả năng đáp ứng nhu cầu cá nhân hóa. Chất lượng cảm nhận là đánh giá sau tiêu dùng về cả chất lượng sản phẩm vật lý (tính năng, độ bền, an toàn) lẫn chất lượng dịch vụ đi kèm. Giá trị cảm nhận đo lường mối tương quan giữa chất lượng nhận được và giá phải trả, phản ánh phán đoán về sự tương xứng của giao dịch.\r\n\r\nTừ mức CSI hình thành, mô hình dự báo hai nhóm hệ quả: hành vi khiếu nại (tỷ lệ và mức độ phàn nàn khi không hài lòng) và lòng trung thành thương hiệu (ý định mua lại, khả năng giới thiệu cho người khác, và mức chịu đựng với thay đổi giá). Chính lòng trung thành này, không phải bản thân CSI, là cơ chế trực tiếp tác động đến các chỉ số tài chính như doanh thu và lợi nhuận. Điều này hàm ý rằng không nên mô hình hóa CSI như tác nhân trực tiếp của hiệu quả tài chính mà không có biến trung gian — một giới hạn mà các giả thuyết H4-H9 trong nghiên cứu này được thiết kế để giải quyết.\r\n\r\n### 2.3. Nghiên cứu về CSI và hiệu quả doanh nghiệp trên thế giới\r\n\r\nAnderson, Fornell & Lehmann (1994) là những người đầu tiên xây dựng bằng chứng định lượng về mối quan hệ giữa sự hài lòng khách hàng và lợi nhuận kinh tế doanh nghiệp trên dữ liệu bảng theo ngành tại Thụy Điển, ghi nhận tăng 1 điểm phần trăm CSI tương ứng với tăng 2,37% lợi nhuận kinh tế. Tuy nhiên, nghiên cứu này không làm rõ cơ chế trung gian: một giới hạn mà các nghiên cứu sau đó đã cố gắng bổ sung.\r\n\r\nGruca & Rego (2005) giải quyết một phần giới hạn trên bằng cách chứng minh CSI cao tác động đến hiệu quả tài chính thông qua hai kênh: tăng dòng tiền tương lai và giảm biến động dòng tiền. Cả hai kênh đều làm tăng giá trị hiện tại của doanh nghiệp theo lý thuyết định giá tài sản. Tuli & Bharadwaj (2009) mở rộng hướng này khi cho thấy doanh nghiệp với CSI cao có hệ số beta thị trường thấp hơn, tức là rủi ro hệ thống thấp hơn: một bằng chứng gián tiếp rằng nhà đầu tư định giá sự hài lòng khách hàng như một tài sản giảm rủi ro.\r\n\r\nMột điểm tranh luận quan trọng do Luo & Bhattacharya (2006) nêu ra cần được xét đến: mối quan hệ CSI, giá trị thị trường không phải tuyến tính đơn giản. Năng lực đổi mới của doanh nghiệp đóng vai trò điều tiết có ý nghĩa, ở doanh nghiệp có đầu tư R&D thấp, CSI cao thậm chí có thể không cải thiện giá trị thị trường. Hàm ý này đặt ra câu hỏi liệu kết quả trên có áp dụng cho các doanh nghiệp hàng tiêu dùng nhanh Việt Nam, vốn có mức độ đầu tư R&D đa dạng, hay không.\r\n\r\nKết quả tổng hợp 40 năm dữ liệu của Fornell et al. (2023) xác nhận mối quan hệ dương nhất quán giữa CSI và các chỉ số hiệu quả: hệ số tương quan cao nhất ở nhóm tỷ lệ giữ chân khách hàng (r = 0,54), truyền miệng (r = 0,48), doanh thu (r = 0,41), và lợi nhuận (r = 0,35). Tuy nhiên, phạm vi ứng dụng của nghiên cứu này chủ yếu là thị trường Hoa Kỳ, nơi cấu trúc thị trường và hành vi tiêu dùng khác biệt đáng kể so với Việt Nam.\r\n\r\nTrong ngành hàng tiêu dùng nhanh, Seiders et al. (2005) chỉ ra rằng sự hài lòng chỉ chuyển hóa thành hành vi mua lặp lại khi đồng thời có yếu tố thuận tiện về kênh phân phối và mức độ gắn kết của người tiêu dùng với danh mục sản phẩm. Dawes et al. (2023) củng cố điểm này khi xác định lòng trung thành trong hàng tiêu dùng nhanh bị điều tiết đáng kể bởi tần suất mua hàng, chương trình khuyến mãi giá, và độ tin tưởng thương hiệu tích lũy. Hai nghiên cứu này cùng gợi ý rằng CSI đơn thuần không đủ để dự báo hiệu quả doanh nghiệp nếu bỏ qua các yếu tố điều tiết theo đặc thù ngành.\r\n\r\n### 2.4. Nghiên cứu liên quan tại Việt Nam\r\n\r\nTại Việt Nam, đã có một số nghiên cứu đo lường sự hài lòng khách hàng theo hướng cấu trúc, tuy nhiên phần lớn tập trung vào lĩnh vực dịch vụ. Nguyen et al. (2018) ứng dụng mô hình tương tự ACSI trong ngành bảo hiểm nhân thọ, xác nhận vai trò của chất lượng dịch vụ, hình ảnh thương hiệu và giá cả cảm nhận trong hình thành sự hài lòng và lòng trung thành tại thị trường Việt Nam. Tran (2020) nghiên cứu chuỗi chất lượng dịch vụ, sự hài lòng, lòng trung thành trong ngành bán lẻ siêu thị với mẫu 400 người tiêu dùng tại Đà Nẵng, cho thấy PLS-SEM là phương pháp phù hợp với dữ liệu khảo sát Việt Nam.\r\n\r\nTuy nhiên, cả hai nghiên cứu trên đều không kết nối chỉ số hài lòng với dữ liệu hiệu quả tài chính thực tế của doanh nghiệp. Trong ngành hàng tiêu dùng nhanh tại Việt Nam, các nghiên cứu hiện tại chủ yếu khám phá lòng trung thành thương hiệu hoặc trải nghiệm thương hiệu ở cấp cá nhân người tiêu dùng, nhưng chưa xây dựng được mối liên kết định lượng từ dữ liệu khảo sát khách hàng đến kết quả kinh doanh của doanh nghiệp. Đây là khoảng trống phương pháp luận quan trọng, không chỉ về bối cảnh mà còn về thiết kế nghiên cứu tích hợp dữ liệu sơ cấp và thứ cấp.\r\n\r\n### 2.5. Khoảng trống nghiên cứu\r\n\r\nTổng quan tài liệu được thực hiện bằng cách tìm kiếm có hệ thống trên Scopus và Web of Science với các cụm từ khóa “Customer Satisfaction Index AND FMCG”, “CSI AND firm performance AND Vietnam”, “eWOM AND customer satisfaction AND fast-moving consumer goods”, “electronic word-of-mouth AND brand loyalty AND firm performance”, trong giai đoạn 2000–2025. Sau khi lọc theo tiêu chí ngành FMCG, thị trường Việt Nam và thiết kế nghiên cứu tích hợp dữ liệu sơ cấp–thứ cấp, không xác định được nghiên cứu nào đáp ứng đồng thời cả ba tiêu chí trên. Từ đó, ba khoảng trống được xác định:\r\n\r\n**Khoảng trống 1, Bối cảnh và thiết kế tích hợp:** Chưa có nghiên cứu đo lường CSI theo mô hình cấu trúc đầy đủ cho ngành FMCG Việt Nam và kết nối định lượng với dữ liệu hiệu quả tài chính thực tế của doanh nghiệp thông qua chiến lược tổng hợp dữ liệu đa cấp (individual-level CSI aggregated to brand level, linked to firm-level financial data).\r\n\r\n**Khoảng trống 2, Cơ chế truyền dẫn trong bối cảnh số:** Chưa kiểm định đồng thời vai trò trung gian của lòng trung thành thương hiệu và truyền miệng điện tử (eWOM) trong chuỗi CSI–Firm Performance trong ngành FMCG Việt Nam, đặc biệt trong bối cảnh thương mại điện tử và mạng xã hội đang thay đổi cách sự hài lòng được chuyển hóa thành hành vi mua và ảnh hưởng xã hội.\r\n\r\n**Khoảng trống 3, Yếu tố điều tiết theo kênh và biến kiểm soát:** Chưa kiểm định vai trò điều tiết của loại hình kênh phân phối (truyền thống, hiện đại, thương mại điện tử) đối với cả hai tuyến trung gian, đồng thời chưa có nghiên cứu nào kiểm soát đồng thời các biến nội sinh tiềm năng như tuổi doanh nghiệp, đòn bẩy tài chính và mức độ tập trung ngành trong mối quan hệ CSI–Firm Performance tại Việt Nam.\r\n\r\n---\r\n\r\n"},{"title":"3. Mục đích nghiên cứu","file":"03_MucDichNghienCuu.md","chars":2626,"pages":"1.5","content":"## 3. Mục đích nghiên cứu\r\n\r\n### 3.1. Mục đích tổng quát\r\n\r\nNghiên cứu nhằm xây dựng và kiểm định mô hình lý thuyết về tác động của Chỉ số Hài lòng Khách hàng (CSI) đến Hiệu quả Hoạt động Doanh nghiệp trong ngành FMCG tại Việt Nam, trong đó phân tích hai cơ chế truyền dẫn song song: thông qua lòng trung thành thương hiệu (Customer Loyalty) và thông qua truyền miệng điện tử (eWOM), đặc biệt trong bối cảnh thương mại điện tử và AI đang tái định hình hành vi tiêu dùng. Từ đó, nghiên cứu đề xuất hàm ý quản trị có tính ứng dụng cao cho doanh nghiệp FMCG và gợi ý chính sách cho cơ quan quản lý nhà nước.\r\n\r\n### 3.2. Mục tiêu cụ thể\r\n\r\nNghiên cứu hướng đến sáu mục tiêu cụ thể theo thứ tự logic từ đo lường đến phân tích đến ứng dụng. Trước tiên, xây dựng và kiểm định thang đo CSI và eWOM phù hợp với đặc thù ngành hàng tiêu dùng nhanh và môi trường mua sắm đa kênh tại Việt Nam, dựa trên nền tảng mô hình ACSI kết hợp thang đo eWOM của Hennig-Thurau et al. (2004). Tiếp theo, đánh giá thực trạng mức độ hài lòng người tiêu dùng FMCG theo các chiều kích kỳ vọng, chất lượng cảm nhận, giá trị cảm nhận và sự hài lòng tổng thể. Thứ ba, phân tích tác động của CSI đến hiệu quả tài chính (ROA, ROE, tốc độ tăng trưởng doanh thu) và phi tài chính (thị phần, online rating tổng hợp). Thứ tư, kiểm định vai trò trung gian đồng thời của lòng trung thành thương hiệu và eWOM trong chuỗi CSI–Firm Performance, làm rõ cơ chế nào chiếm ưu thế trong kênh online so với kênh offline. Thứ năm, kiểm định vai trò điều tiết của kênh mua sắm (truyền thống, hiện đại, thương mại điện tử) và quy mô doanh nghiệp. Cuối cùng, đề xuất hàm ý quản trị cho doanh nghiệp FMCG và gợi ý chính sách cho cơ quan quản lý.\r\n\r\n### 3.3. Câu hỏi nghiên cứu\r\n\r\n- **Q1:** Các cấu phần nào của CSI (chất lượng cảm nhận, giá trị cảm nhận, kỳ vọng) có trọng số tác động lớn nhất đến sự hài lòng tổng thể của người tiêu dùng FMCG tại Việt Nam trong bối cảnh mua sắm đa kênh?\r\n- **Q2:** CSI tác động như thế nào đến hiệu quả tài chính và phi tài chính của doanh nghiệp FMCG niêm yết tại Việt Nam?\r\n- **Q3:** Lòng trung thành thương hiệu và eWOM có đóng vai trò trung gian trong mối quan hệ CSI–Firm Performance không? Cơ chế nào chiếm ưu thế trong kênh thương mại điện tử so với kênh truyền thống?\r\n- **Q4:** Kênh mua sắm (offline vs. online) điều tiết hai tuyến trung gian này như thế nào — cụ thể là kênh online có làm mạnh tuyến CSI–eWOM — FP và làm yếu tuyến CSI–CL — FP không?\r\n- **Q5:** Hàm ý quản trị nào phù hợp cho doanh nghiệp FMCG Việt Nam khi phân bổ ngân sách giữa xây dựng lòng trung thành và kích hoạt eWOM nhằm tối đa hóa hiệu quả hoạt động?\r\n\r\n---\r\n\r\n"},{"title":"4. Đối tượng và phạm vi dự định nghiên cứu","file":"04_DoiTuongPhamVi.md","chars":1774,"pages":"1.0","content":"## 4. Đối tượng và phạm vi dự định nghiên cứu\r\n\r\n### 4.1. Đối tượng nghiên cứu\r\n\r\nMối quan hệ giữa Chỉ số Hài lòng Khách hàng (CSI) và Hiệu quả Hoạt động Doanh nghiệp, trong đó xem xét vai trò trung gian của Lòng trung thành thương hiệu (Customer Loyalty) và Truyền miệng điện tử (eWOM), cùng vai trò điều tiết của Kênh mua sắm và Quy mô doanh nghiệp.\r\n\r\n### 4.2. Khách thể nghiên cứu\r\n\r\n- *Phía cung (doanh nghiệp):* Các doanh nghiệp FMCG có dữ liệu tài chính có thể thu thập được tại Việt Nam, tập trung vào doanh nghiệp niêm yết trên HOSE và HNX để đảm bảo tính minh bạch và khả dụng của số liệu. Danh sách dự kiến: Vinamilk (VNM), Masan Consumer (MCH), Sabeco (SAB), Habeco (BHN), Nutifood, PAN Group (PAN), Kido Group (KDC), Vissan (VSN)...\r\n- *Phía cầu (người tiêu dùng):* Người tiêu dùng cuối cùng (B2C) từ 18 tuổi trở lên, hiện đang thường xuyên sử dụng ít nhất một danh mục sản phẩm FMCG tại Việt Nam.\r\n\r\n### 4.3. Phạm vi nghiên cứu\r\n\r\n**Phạm vi không gian:** Việt Nam, tập trung thu thập dữ liệu tại TP. Hồ Chí Minh, Hà Nội, và 2–3 tỉnh thành cấp 2 (Đà Nẵng, Cần Thơ, Bình Dương) nhằm đảm bảo tính đại diện cho cả thị trường đô thị lớn và đô thị nhỏ, trung bình.\r\n\r\n**Phạm vi ngành:** Ngành FMCG bao gồm ba nhóm sản phẩm: (1) Thực phẩm & Đồ uống; (2) Chăm sóc cá nhân (personal care); (3) Chăm sóc gia đình (home care). Không bao gồm dược phẩm và thuốc lá do có đặc thù điều tiết riêng.\r\n\r\n**Phạm vi thời gian:**\r\n- Dữ liệu sơ cấp (khảo sát người tiêu dùng): thu thập trong giai đoạn năm thứ hai của quá trình đào tạo (dự kiến 2027).\r\n- Dữ liệu thứ cấp (hiệu quả tài chính doanh nghiệp): giai đoạn 2019–2026 để bao gồm cả giai đoạn trước, trong và sau COVID-19, cho phép phân tích tác động của biến động thị trường đến mối quan hệ CSI, Firm Performance.\r\n\r\n---\r\n\r\n"},{"title":"5. Phương pháp nghiên cứu sẽ được sử dụng","file":"05_PhuongPhap.md","chars":28029,"pages":"15.6","content":"## 5. Phương pháp nghiên cứu sẽ được sử dụng\r\n\r\n### 5.1. Thiết kế nghiên cứu tổng thể\r\n\r\nNghiên cứu sử dụng **phương pháp hỗn hợp tuần tự (Sequential Mixed-Method Design)** theo tiến trình: Khám phá (Qualitative) → Xây dựng thang đo → Xác nhận (Quantitative). Cách tiếp cận này đảm bảo thang đo CSI được phát triển phù hợp với ngữ cảnh văn hóa và ngành trước khi kiểm định trên diện rộng.\r\n\r\n**Giai đoạn 1, Nghiên cứu định tính (Qualitative):**\r\nThực hiện phỏng vấn sâu bán cấu trúc (semi-structured in-depth interviews) với hai nhóm:\r\n- 10–15 nhà quản lý cấp trung và cấp cao tại các doanh nghiệp FMCG (Brand Manager, Customer Experience Manager, Sales Director).\r\n- 15–20 người tiêu dùng FMCG đại diện theo giới tính, độ tuổi, và khu vực địa lý.\r\n\r\nMục đích: khám phá các chiều kích đặc thù của sự hài lòng và lòng trung thành trong bối cảnh FMCG Việt Nam chưa được mô hình ACSI gốc phản ánh đầy đủ; điều chỉnh và bổ sung thang đo cho phù hợp.\r\n\r\n**Giai đoạn 2, Nghiên cứu định lượng (Quantitative):**\r\nKhảo sát diện rộng bằng bảng hỏi cấu trúc (structured questionnaire), kết hợp phân tích dữ liệu thứ cấp từ báo cáo tài chính doanh nghiệp.\r\n\r\n### 5.2. Mô hình nghiên cứu đề xuất\r\n\r\nMô hình nghiên cứu được xây dựng theo cấu trúc tích hợp gồm ba tầng, phản ánh hai kênh truyền dẫn song song từ CSI đến hiệu quả doanh nghiệp trong bối cảnh mua sắm đa kênh tại Việt Nam.\r\n\r\nTầng tiền đề gồm ba biến hình thành CSI: kỳ vọng khách hàng, chất lượng cảm nhận (bao gồm chất lượng sản phẩm và chất lượng dịch vụ kèm theo), và giá trị cảm nhận (tương quan chất lượng trên giá). Tầng trung gian gồm hai biến song song: lòng trung thành thương hiệu (Customer Loyalty — CL), phản ánh hành vi tái mua và gắn kết thương hiệu dài hạn, và truyền miệng điện tử (eWOM), phản ánh hành vi chia sẻ đánh giá tích cực trên các nền tảng số. Hai biến trung gian này đại diện cho hai cơ chế chuyển hóa khác nhau: CL tác động chủ yếu đến hiệu quả tài chính qua ổn định dòng tiền từ khách hàng trung thành, trong khi eWOM tác động chủ yếu đến hiệu quả phi tài chính qua mở rộng tập khách hàng mới và cải thiện chỉ số đánh giá trực tuyến. Tầng kết quả gồm hiệu quả tài chính (ROA, ROE, tốc độ tăng trưởng doanh thu) và hiệu quả phi tài chính (thị phần, online rating tổng hợp). Biến điều tiết là kênh mua sắm (offline vs. online) và quy mô doanh nghiệp.\r\n\r\n#### Sơ đồ mô hình nghiên cứu tích hợp\r\n\r\n\u003csvg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 920 480\" width=\"100%\" font-family=\"Arial,sans-serif\" font-size=\"12\"\u003e\r\n  \u003crect width=\"920\" height=\"480\" fill=\"#fff\"/\u003e\r\n  \u003ctext x=\"60\" y=\"20\" font-size=\"11\" font-weight=\"bold\" te  \u003cdefs\u003e\r\n    \u003cmarker id=\"a\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"\u003e\u003cpath d=\"M0,0 L0,6 L7,3 z\" fill=\"#000\"/\u003e\u003c/marker\u003e\r\n    \u003cmarker id=\"ag\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"\u003e\u003cpath d=\"M0,0 L0,6 L7,3 z\" fill=\"#777\"/\u003e\u003c/marker\u003e\r\n  \u003c/defs\u003e\r\n\u003c/svg\u003e\r\n\r\n*Hình 1. Mô hình nghiên cứu tích hợp CSI–CL–eWOM–Firm Performance, ngành FMCG Việt Nam.*\r\n*(Nguồn: Tác giả đề xuất, 2026)*\r\n\r\n**Chú giải:**\r\n- Mũi tên liền đen: tác động nhân quả trực tiếp (H1—H9)\r\n- Mũi tên đứt xám: tác động điều tiết (H10a, H10b, H11)\r\n- H10a: kênh trực tuyến điều tiết mối quan hệ CSI — truyền miệng điện tử\r\n- H10b: kênh trực tuyến điều tiết mối quan hệ CSI — lòng trung thành thương hiệu\r\n- H11: quy mô doanh nghiệp điều tiết mối quan hệ CSI — lòng trung thành thương hiệu\r\n- CV: biến kiểm soát cấp doanh nghiệp trong mô hình hồi quy dữ liệu bảng\r\n\r\n#### Bảng tổng hợp biến và thang đo\r\n\r\n| Ký hiệu | Tên biến | Vai trò | Biến quan sát | Nguồn thang đo |\r\n|---------|----------|---------|--------------|----------------|\r\n| CE | Kỳ vọng khách hàng | Tiền đề CSI | 3 nhân tố quan sát | Fornell et al. (1996); Johnson et al. (2001) |\r\n| PQ | Chất lượng cảm nhận | Tiền đề CSI | 4 nhân tố quan sát | Fornell et al. (1996); Zeithaml et al. (1996) |\r\n| PV | Giá trị cảm nhận | Tiền đề CSI | 3 nhân tố quan sát | Fornell et al. (1996) |\r\n| CSI | Chỉ số hài lòng tổng thể | Biến phụ thuộc (cấp 1) | 3 nhân tố quan sát | ACSI model; Oliver (1980) |\r\n| CL | Lòng trung thành thương hiệu | Biến trung gian (song song) | 4 nhân tố quan sát | Zeithaml et al. (1996); Dawes et al. (2023) |\r\n| eWOM | Truyền miệng điện tử | Biến trung gian (song song) | 4 nhân tố quan sát | Hennig-Thurau et al. (2004); Mithas et al. (2005) |\r\n| FP1 | Hiệu quả tài chính (ROA, ROE, Revenue Growth) | Biến kết quả | Dữ liệu thứ cấp | FiinPro; Vietstock |\r\n| FP2 | Hiệu quả phi tài chính (thị phần, online rating) | Biến kết quả | Thứ cấp + 2 nhân tố quan sát | Euromonitor; Nielsen; Google/Shopee ratings |\r\n| W1 | Kênh mua sắm | Biến điều tiết | Phân loại (offline/online) | Tự khai báo trong khảo sát |\r\n| W2 | Quy mô doanh nghiệp | Biến điều tiết | Phân loại (nhỏ/vừa/lớn) | Nghị định 80/2021/ND-CP |\r\n| CV | Biến kiểm soát | Kiểm soát nội sinh | Dữ liệu thứ cấp | FiinPro; Vietstock |\r\n\r\n**Tổng: 9 construct, 21 nhân tố quan sát**\r\n\r\n**Biến kiểm soát cấp doanh nghiệp (đưa vào mô hình hồi quy dữ liệu bảng):** tuổi doanh nghiệp (số năm hoạt động), đòn bẩy tài chính (tổng nợ/tổng tài sản), logarit tổng tài sản, tốc độ tăng trưởng doanh thu ngành, chỉ số tập trung thị trường Herfindahl-Hirschman.\r\n\r\n#### Bảng chi tiết nhân tố quan sát theo từng construct\r\n\r\n**CE — Kỳ vọng khách hàng** *(3 nhân tố quan sát, kế thừa Fornell et al., 1996; Johnson et al., 2001)*\r\n\r\n| Mã | Nội dung nhân tố quan sát |\r\n|---|---|\r\n| CE1 | Trước khi mua, tôi kỳ vọng sản phẩm [TH] có chất lượng tổng thể ở mức cao. |\r\n| CE2 | Tôi kỳ vọng sản phẩm [TH] đáp ứng tốt nhu cầu sử dụng cá nhân của tôi. |\r\n| CE3 | Tôi kỳ vọng sản phẩm [TH] ít gặp vấn đề sau khi mua và sử dụng. |\r\n\r\n**PQ — Chất lượng cảm nhận** *(4 nhân tố quan sát, kế thừa Fornell et al., 1996; Zeithaml et al., 1996)*\r\n\r\n| Mã | Nội dung nhân tố quan sát |\r\n|---|---|\r\n| PQ1 | Sản phẩm [TH] có chất lượng tổng thể đáp ứng được mong đợi của tôi. |\r\n| PQ2 | Sản phẩm [TH] có chất lượng ổn định qua các lần mua. |\r\n| PQ3 | Sản phẩm [TH] đáp ứng đúng với những gì được công bố hoặc quảng cáo. |\r\n| PQ4 | Dịch vụ hỗ trợ và sau mua của [TH] đáp ứng tốt nhu cầu của tôi. |\r\n\r\n**PV — Giá trị cảm nhận** *(3 nhân tố quan sát, kế thừa Fornell et al., 1996)*\r\n\r\n| Mã | Nội dung nhân tố quan sát |\r\n|---|---|\r\n| PV1 | Chất lượng sản phẩm [TH] tương xứng với giá tôi phải trả. |\r\n| PV2 | Với mức giá hiện tại, [TH] mang lại giá trị tốt hơn so với các thương hiệu khác. |\r\n| PV3 | Tôi cảm thấy chi phí bỏ ra để mua [TH] là hợp lý. |\r\n\r\n**CSI — Chỉ số hài lòng tổng thể** *(3 nhân tố quan sát, kế thừa ACSI; Oliver, 1980)*\r\n\r\n| Mã | Nội dung nhân tố quan sát |\r\n|---|---|\r\n| CSI1 | Nhìn chung, tôi hài lòng với sản phẩm [TH]. |\r\n| CSI2 | [TH] đáp ứng kỳ vọng của tôi tốt hơn so với mong đợi ban đầu. |\r\n| CSI3 | Nếu hình dung sản phẩm FMCG lý tưởng, [TH] gần với hình ảnh đó đến mức nào? |\r\n\r\n**CL — Lòng trung thành thương hiệu** *(4 nhân tố quan sát, kế thừa Zeithaml et al., 1996; Dawes et al., 2023)*\r\n\r\n| Mã | Nội dung nhân tố quan sát |\r\n|---|---|\r\n| CL1 | Tôi có ý định tiếp tục mua sản phẩm [TH] trong tương lai. |\r\n| CL2 | [TH] là lựa chọn đầu tiên của tôi khi mua sản phẩm trong danh mục này. |\r\n| CL3 | Tôi sẽ tiếp tục mua [TH] dù giá có tăng nhẹ. |\r\n| CL4 | Tôi giới thiệu [TH] cho người thân hoặc bạn bè khi họ hỏi ý kiến. |\r\n\r\n**eWOM — Truyền miệng điện tử** *(4 nhân tố quan sát, kế thừa Hennig-Thurau et al., 2004; Mithas et al., 2005)*\r\n\r\n| Mã | Nội dung nhân tố quan sát |\r\n|---|---|\r\n| eWOM1 | Tôi đã hoặc sẽ viết đánh giá tích cực về [TH] trên các nền tảng trực tuyến (Shopee, Google, TikTok...). |\r\n| eWOM2 | Tôi chia sẻ thông tin về [TH] với người khác qua mạng xã hội hoặc nhóm chat. |\r\n| eWOM3 | Khi ai đó hỏi về sản phẩm tương tự, tôi sẽ giới thiệu [TH] trên các diễn đàn hoặc nhóm trực tuyến. |\r\n| eWOM4 | Tôi cho rằng đánh giá tích cực của mình về [TH] có thể giúp ích cho quyết định mua của người khác. |\r\n\r\n**Phần G — Thông tin phân loại (Đặc điểm nhân khẩu học và phân loại mẫu)**\r\n\r\n| Mã | Nội dung câu hỏi | Phương án trả lời |\r\n|---|---|---|\r\n| G1 | Kênh mua sắm chủ yếu của bạn đối với [TH] là gì? | Offline / Online / Cả hai |\r\n| G2 | Tần suất mua [TH] trong 6 tháng qua | Ít hơn 1 lần/tháng / 1–3 lần/tháng / Hơn 3 lần/tháng |\r\n| G3 | Giới tính | Nam / Nữ / Khác |\r\n| G4 | Độ tuổi | 18–24 / 25–34 / 35–44 / 45–54 / 55+ |\r\n| G5 | Khu vực sinh sống | TP.HCM / Hà Nội / Đà Nẵng / Cần Thơ / Bình Dương / Khác |\r\n\r\n*Ghi chú: Toàn bộ nhân tố quan sát (từ phần A đến phần F) sử dụng thang đo Likert 5 điểm (1 = Hoàn toàn không đồng ý; 5 = Hoàn toàn đồng ý). Nội dung cụ thể sẽ được điều chỉnh lần cuối sau giai đoạn phỏng vấn sâu định tính và nghiên cứu thử nghiệm (pilot study, n = 50–80).*\r\n\r\n#### Hệ thống giả thuyết nghiên cứu\r\n\r\nMười một giả thuyết được phát triển theo ba tuyến nhân quả:\r\n\r\n* **Tuyến 1 — Hình thành CSI (H1–H3):** Kỳ vọng (H1), chất lượng cảm nhận (H2) và giá trị cảm nhận (H3) đều tác động dương đến CSI. Chất lượng cảm nhận được kỳ vọng có trọng số cao nhất do đặc thù FMCG tần suất mua cao, nơi trải nghiệm thực tế tích lũy vượt trội so với kỳ vọng ban đầu và phán đoán giá trị.\r\n* **Tuyến 2 — Hai kênh truyền dẫn song song (H4–H9):** CSI tác động dương đến lòng trung thành thương hiệu (H4) và eWOM (H5). CL tác động dương đến hiệu quả tài chính (H6) thông qua ổn định dòng tiền từ mua lặp lại, và đến hiệu quả phi tài chính (H7) thông qua duy trì thị phần. eWOM tác động dương đến hiệu quả tài chính (H8) thông qua thu hút khách hàng mới, và tác động mạnh hơn đến hiệu quả phi tài chính (H9) thông qua cải thiện online rating — chỉ số ngày càng ảnh hưởng đến quyết định mua trên nền tảng thương mại điện tử.\r\n* **Tuyến 3 — Điều tiết theo kênh và quy mô (H10a, H10b, H11):**\r\n  - **H10a:** Kênh online củng cố mối quan hệ CSI – eWOM theo chiều dương. Trong môi trường mua sắm trực tuyến, người tiêu dùng hài lòng có công cụ sẵn có (star rating, comment, share) và thói quen chia sẻ đánh giá ngay lập tức, làm tăng cường hành vi eWOM so với kênh offline nơi hành vi này đòi hỏi nỗ lực chủ động hơn.\r\n  - **H10b:** Kênh online làm yếu mối quan hệ CSI – CL theo chiều âm. Thuật toán gợi ý của Shopee, TikTok Shop và Lazada liên tục đề xuất sản phẩm thay thế với giá cạnh tranh, tạo ra platform loyalty thay thế brand loyalty. Điều này làm đứt gãy cơ chế chuyển hóa từ sự hài lòng thương hiệu thành hành vi mua lặp lại trung thành với thương hiệu (Seiders et al., 2005; Dawes et al., 2023).\r\n  - **H11:** Quy mô doanh nghiệp lớn điều tiết mối quan hệ CSI – CL theo chiều dương. Doanh nghiệp lớn có năng lực đầu tư vào hệ thống loyalty program, CRM và marketing automation cao hơn, cho phép chuyển hóa sự hài lòng thành hành vi tái mua có hệ thống và hiệu quả hơn so với doanh nghiệp nhỏ (Luo & Bhattacharya, 2006).\r\n\r\n**Nhóm 1 — Các nhân tố tác động đến CSI (H1–H3)**\r\n\r\nFornell et al. (1996, tr. 8) xác định CSI là “biến tiềm ẩn được hình thành từ ba tiền đề đo lường: kỳ vọng khách hàng, chất lượng cảm nhận, và giá trị cảm nhận.” Cấu trúc này sau đó được tái kiểm định bởi Johnson et al. (2001) trong dữ liệu đa quốc gia, xác nhận tính ổn định của ba nhân tố tiền đề qua các bối cảnh khác nhau. Tuy nhiên, trọng số tương đối giữa ba nhân tố này không nhất quán giữa các thị trường: Kristensen & Eskildsen (2012) ghi nhận kỳ vọng có trọng số thấp hơn đáng kể ở các thị trường Bắc Âu so với Hoa Kỳ, trong khi Kang et al. (2014) tại Hàn Quốc cho thấy kỳ vọng không có tác động có ý nghĩa thống kê đến CSI trong ngành hàng tiêu dùng nhanh, do người tiêu dùng đã quen thuộc với sản phẩm qua nhiều lần mua. Tại thị trường Việt Nam, Nguyen et al. (2018) gợi ý kỳ vọng có vai trò yếu hơn chất lượng cảm nhận trong ngành bảo hiểm nhân thọ, song chưa có kiểm định tương đương trong ngành hàng tiêu dùng nhanh. Sự không nhất quán này tạo cơ sở cho việc kiểm định lại cấu trúc tiền đề CSI trong bối cảnh FMCG Việt Nam.\r\n\r\n- **H1:** Kỳ vọng khách hàng có tác động tích cực đến CSI.\r\n- **H2:** Chất lượng cảm nhận có tác động tích cực đến CSI.\r\n- **H3:** Giá trị cảm nhận có tác động tích cực đến CSI.\r\n\r\n**Nhóm 2 — Ảnh hưởng của CSI đến các biến trung gian (H4–H5)**\r\n\r\nMô hình ACSI gốc (Fornell et al., 1996) đã xác lập mối quan hệ CSI đến lòng trung thành như một trong hai hệ quả được đo lường trực tiếp của chỉ số. Anderson & Sullivan (1993) kiểm định mối quan hệ này trong dữ liệu ngành tại Thụy Điển, ghi nhận tương quan dương nhất quán giữa sự hài lòng và ý định mua lại. Về phía eWOM, Hennig-Thurau et al. (2004) lập luận rằng sự hài lòng là động cơ chính thúc đẩy khách hàng chia sẻ đánh giá tích cực trực tuyến, qua cơ chế “mong muốn giúp đỡ người khác” và “khẳng định bản thân.” Mithas et al. (2005) bổ sung bằng chứng rằng mức độ hài lòng cao tương quan với tần suất và nội dung tích cực của đánh giá trực tuyến trong ngành bán lẻ. Chưa có nghiên cứu kiểm định đồng thời cả hai mối quan hệ này trong ngành FMCG Việt Nam.\r\n\r\n- **H4:** CSI có tác động tích cực đến lòng trung thành thương hiệu.\r\n- **H5:** CSI có tác động tích cực đến truyền miệng điện tử.\r\n\r\n**Nhóm 3 — Ảnh hưởng của các biến trung gian đến hiệu quả doanh nghiệp (H6–H9)**\r\n\r\nGruca & Rego (2005) xác định lòng trung thành là cơ chế trực tiếp ổn định dòng tiền từ việc mua lặp lại, từ đó tác động đến cả ROA lẫn tốc độ tăng trưởng doanh thu. Tuli & Bharadwaj (2009) mở rộng cơ chế này đến hiệu quả phi tài chính khi cho thấy doanh nghiệp với tỷ lệ giữ chân khách hàng cao (biểu hiện của lòng trung thành) duy trì thị phần ổn định hơn trong điều kiện cạnh tranh. Về eWOM, Fornell et al. (2023) ghi nhận hệ số tương quan giữa truyền miệng và doanh thu ở mức r = 0,48 trong dữ liệu 40 năm, song phần lớn bằng chứng này đến từ thị trường Hoa Kỳ nơi eWOM qua nền tảng công khai phổ biến hơn. Tại Việt Nam, cơ chế eWOM qua Shopee và TikTok Shop gợi ý tác động trực tiếp đến hiệu quả phi tài chính qua online rating, tuy chưa được kiểm định định lượng.\r\n\r\n- **H6:** Lòng trung thành thương hiệu có tác động tích cực đến hiệu quả tài chính doanh nghiệp.\r\n- **H7:** Lòng trung thành thương hiệu có tác động tích cực đến hiệu quả phi tài chính doanh nghiệp.\r\n- **H8:** Truyền miệng điện tử có tác động tích cực đến hiệu quả tài chính doanh nghiệp.\r\n- **H9:** Truyền miệng điện tử có tác động tích cực đến hiệu quả phi tài chính doanh nghiệp.\r\n\r\n**Nhóm 4 — Vai trò điều tiết của kênh mua sắm và quy mô doanh nghiệp (H10a, H10b, H11)**\r\n\r\nSeiders et al. (2005) chỉ ra rằng sự hài lòng chỉ chuyển hóa thành hành vi mua lặp lại trung thành khi đồng thời có yếu tố thuận tiện kênh. Trong môi trường trực tuyến, thuật toán gợi ý của các sàn thương mại điện tử liên tục đề xuất sản phẩm thay thế với giá cạnh tranh, tạo ra cơ chế trung thành với nền tảng thay thế cho trung thành thương hiệu — điều Dawes et al. (2023) xác nhận qua dữ liệu ngành FMCG tại Úc và Anh. Ngược lại, trong môi trường trực tuyến, công cụ đánh giá sẵn có làm giảm ngưỡng hành động của người tiêu dùng hài lòng, dẫn đến hành vi chia sẻ eWOM dày đặc hơn. Luo & Bhattacharya (2006) gợi ý rằng doanh nghiệp lớn có năng lực hệ thống hóa việc chuyển hóa sự hài lòng thành lòng trung thành qua các chương trình khách hàng thân thiết, trong khi doanh nghiệp nhỏ phụ thuộc nhiều hơn vào tính cá nhân hóa không có hệ thống.\r\n\r\n- **H10a:** Kênh mua sắm trực tuyến điều tiết tích cực mối quan hệ giữa CSI và truyền miệng điện tử.\r\n- **H10b:** Kênh mua sắm trực tuyến điều tiết tiêu cực mối quan hệ giữa CSI và lòng trung thành thương hiệu.\r\n- **H11:** Quy mô doanh nghiệp điều tiết tích cực mối quan hệ giữa CSI và lòng trung thành thương hiệu.\r\n\r\n#### Bảng tổng hợp bằng chứng thực nghiệm theo từng mối quan hệ\r\n\r\n| Mối quan hệ | Nghiên cứu | Bối cảnh | Kết quả |\r\n|---|---|---|---|\r\n| CE → CSI | Fornell et al. (1996) | Hoa Kỳ, đa ngành | Có ý nghĩa, β = 0,28 |\r\n| CE → CSI | Johnson et al. (2001) | Na Uy, đa ngành | Có ý nghĩa |\r\n| CE → CSI | Kang et al. (2014) | Hàn Quốc, FMCG | Không có ý nghĩa |\r\n| CE → CSI | Nguyen et al. (2018) | Việt Nam, bảo hiểm | Có ý nghĩa yếu |\r\n| PQ → CSI | Fornell et al. (1996) | Hoa Kỳ, đa ngành | Có ý nghĩa, trọng số cao nhất |\r\n| PQ → CSI | Tran (2020) | Việt Nam, bán lẻ | Có ý nghĩa |\r\n| PV → CSI | Fornell et al. (1996) | Hoa Kỳ, đa ngành | Có ý nghĩa |\r\n| PV → CSI | Johnson et al. (2001) | Na Uy, đa ngành | Có ý nghĩa, trọng số thấp hơn PQ |\r\n| CSI → CL | Anderson & Sullivan (1993) | Thụy Điển, đa ngành | Có ý nghĩa |\r\n| CSI → CL | Seiders et al. (2005) | Hoa Kỳ, bán lẻ | Có ý nghĩa, bị điều tiết bởi kênh |\r\n| CSI → eWOM | Hennig-Thurau et al. (2004) | Đức, đa ngành | Có ý nghĩa |\r\n| CSI → eWOM | Mithas et al. (2005) | Hoa Kỳ, bán lẻ | Có ý nghĩa |\r\n| CL → Hiệu quả TC | Gruca & Rego (2005) | Hoa Kỳ, đa ngành | Có ý nghĩa, qua dòng tiền |\r\n| CL → Hiệu quả TC | Anderson et al. (1994) | Thụy Điển | Có ý nghĩa |\r\n| eWOM → Hiệu quả | Fornell et al. (2023) | Hoa Kỳ, đa ngành | r = 0,48 với doanh thu |\r\n| CSI → Hiệu quả TC | Luo & Bhattacharya (2006) | Hoa Kỳ | Có điều kiện — phụ thuộc R&D |\r\n\r\n*Ghi chú: Chưa xác định được nghiên cứu nào kiểm định đồng thời toàn bộ chuỗi CE/PQ/PV → CSI → CL/eWOM → Hiệu quả doanh nghiệp trong bối cảnh FMCG Việt Nam.*\r\n\r\n### 5.3. Thu thập, tích hợp và phân tích dữ liệu\r\n\r\n**Dữ liệu sơ cấp:** Bảng khảo sát với cỡ mẫu dự kiến n = 900 người tiêu dùng, tập trung vào 15 thương hiệu FMCG lớn nhất thuộc nhóm Thực phẩm & Đồ uống niêm yết tại Việt Nam. Mức mẫu này đảm bảo trung bình 60 quan sát trên mỗi thương hiệu — vượt đáng kể ngưỡng tối thiểu 30 quan sát cần thiết cho độ tin cậy thống kê khi tổng hợp lên cấp thương hiệu (Fornell et al., 1996), đồng thời đáp ứng yêu cầu quyền năng thống kê (statistical power ≥ 0,80) cho thiết kế tích hợp đa cấp phức tạp theo khuyến nghị của Hair et al. (2014). Lý do nâng mẫu từ mức tối thiểu 500: với n = 500 và 15 thương hiệu, mỗi thương hiệu chỉ có khoảng 33 quan sát — đây là mức biên tối thiểu và nhạy cảm với các trường hợp thu thập không đều giữa thương hiệu. Mẫu 900 tạo bộ đệm đủ lớn để dữ liệu vẫn đạt yêu cầu tổng hợp cấp thương hiệu ngay cả khi phân phối không đồng đều. Thang đo Likert 5 điểm, điều chỉnh từ bộ thang đo ACSI đã được kiểm định. Mỗi người trả lời được yêu cầu đánh giá về một thương hiệu FMCG cụ thể mà họ thường xuyên sử dụng nhất trong 6 tháng qua.\r\n\r\n**Dữ liệu thứ cấp và lý do giới hạn phạm vi:** Nghiên cứu tập trung vào nhóm doanh nghiệp F&B (Thực phẩm & Đồ uống) niêm yết trên HOSE/HNX/UPCoM thay vì mở rộng sang toàn bộ FMCG (bao gồm hóa mỹ phẩm, chăm sóc gia đình). Lý do: dữ liệu ROA/ROE của nhóm F&B niêm yết là số liệu kiểm toán độc lập, minh bạch và có thể đối chiếu trực tiếp với điểm CSI khảo sát. Ngược lại, các tập đoàn đa quốc gia trong nhóm hóa mỹ phẩm (Unilever, P&G, Nestlé) hoạt động tại Việt Nam qua công ty con không niêm yết — dữ liệu tài chính của họ không công khai hoặc bị ảnh hưởng bởi chính sách chuyển giá nội bộ tập đoàn, không phản ánh hiệu quả thực tế tại thị trường Việt Nam. Danh sách doanh nghiệp đưa vào mẫu nghiên cứu: Vinamilk (VNM), Sabeco (SAB), Habeco (BHN), Kido Group (KDC), Đường Quảng Ngãi (QNS), Thành Thành Công - Biên Hòa (SBT), Bibica (BBC), Safoco (SAF), Thực phẩm Bích Chi (BCF), Cholimex Food (CMF - sàn UPCoM), và các doanh nghiệp F&B khác niêm yết trên HOSE/HNX/UPCoM. Dữ liệu tài chính thu thập từ FiinPro và Vietstock; dữ liệu thị phần từ Euromonitor, Nielsen Vietnam.\r\n\r\n**Chiến lược tích hợp dữ liệu đa cấp (Cross-level data linkage):** Đây là bước kỹ thuật trọng tâm nhằm giải quyết sự khác biệt đơn vị phân tích giữa dữ liệu sơ cấp (cấp cá nhân) và dữ liệu thứ cấp (cấp doanh nghiệp). Sau khi thu thập khảo sát, điểm CSI, CL và eWOM của từng người tiêu dùng sẽ được tổng hợp lên cấp thương hiệu bằng giá trị trung bình có trọng số (weighted brand-level aggregation), với điều kiện tối thiểu 30 quan sát trên mỗi thương hiệu để đảm bảo độ tin cậy thống kê của giá trị tổng hợp (Fornell et al., 1996). eWOM tổng hợp theo thương hiệu được bổ sung bằng dữ liệu đánh giá công khai (average star rating trên Shopee, Google) để tăng tính hội tụ và giảm common method bias. Cách tiếp cận này tương đồng với phương pháp vận hành của chỉ số ACSI gốc và cho phép kiểm định mối quan hệ CSI–Firm Performance trong khuôn khổ phân tích dữ liệu bảng (panel data) theo thương hiệu và năm. Để đảm bảo tính đồng thời và logic thời gian nhân quả (tránh nghịch lý lệch pha thời gian), dữ liệu khảo sát người tiêu dùng (CSI, eWOM) sẽ được thu thập song song và khớp trực tiếp với kết quả tài chính của chính các doanh nghiệp này trong cùng thời kỳ thực hiện nghiên cứu (giai đoạn 2027–2028), thay vì hồi quy ngược về giai đoạn tài chính quá khứ.\r\n\r\n**Biến kiểm soát và xử lý nội sinh:** Để kiểm soát các yếu tố ảnh hưởng đến ROA/ROE ngoài CSI, mô hình hồi quy dữ liệu bảng bao gồm: tuổi doanh nghiệp (số năm hoạt động), đòn bẩy tài chính (tổng nợ/tổng tài sản), logarit tổng tài sản, tốc độ tăng trưởng doanh thu ngành, và chỉ số tập trung thị trường Herfindahl-Hirschman.\r\n\r\nVấn đề nội sinh tiềm năng — CSI cao có thể vừa là nguyên nhân lẫn kết quả của hiệu quả cao — được xử lý bằng phương pháp Hồi quy Biến công cụ hai giai đoạn trên dữ liệu bảng (Panel 2SLS) hoặc sử dụng các biến trễ (lagged variables) trong mô hình tác động cố định (FEM) nhằm giải quyết hiện tượng đồng thời (simultaneity) và loại bỏ chệch do biến bị bỏ sót. Quyết định loại bỏ System-GMM do số lượng doanh nghiệp (N=15) giới hạn có thể dẫn đến hiện tượng quá nhiều biến công cụ (instrument proliferation) gây chệch kết quả hồi quy nghiêm trọng trong mẫu nhỏ. Biến công cụ trễ một kỳ của CSI và điểm CSI trung bình của các doanh nghiệp đối thủ cùng phân khúc trong cùng năm được sử dụng làm biến công cụ hợp lệ. Tính hợp lệ của biến công cụ sẽ được kiểm định bằng Hansen J-test để xác nhận tính ngoại sinh của các công cụ.\r\n\r\n**Phân tích:** PLS-SEM (SmartPLS 4) để kiểm định mô hình đo lường và mô hình cấu trúc ở cấp cá nhân; bootstrapping 5.000 lần lặp để kiểm định hiệu ứng trung gian. Phân tích đa nhóm (MGA) để kiểm định H10a và H10b. Panel Data analysis (FEM/REM kết hợp kiểm định Hausman và hồi quy biến công cụ 2SLS) với dữ liệu bảng cấp thương hiệu — năm cho phần kiểm định tác động CSI đến Firm Performance.\r\n\r\n---\r\n\r\n"},{"title":"6. Kế hoạch nghiên cứu (cụ thể mỗi 06 tháng)","file":"06_KeHoach.md","chars":2440,"pages":"1.4","content":"## 6. Kế hoạch nghiên cứu (cụ thể mỗi 06 tháng)\r\n\r\nThời gian đào tạo dự kiến: **3 năm (36 tháng)**\r\n\r\n**Giai đoạn 1 (Tháng 1–6): Xây dựng nền tảng lý thuyết**\r\nHoàn thành các học phần bắt buộc của chương trình tiến sĩ tại TDTU. Tổng quan tài liệu chuyên sâu: đọc và phân tích tối thiểu 80 tài liệu học thuật về CSI, Firm Performance, FMCG, và thị trường Việt Nam. Xây dựng khung lý thuyết và mô hình nghiên cứu sơ bộ. Viết và bảo vệ đề cương nghiên cứu chi tiết trước Hội đồng Cơ sở.\r\n\r\n**Giai đoạn 2 (Tháng 7–12): Nghiên cứu định tính và xây dựng thang đo**\r\nThực hiện phỏng vấn sâu với 25–35 đối tượng (nhà quản lý doanh nghiệp và người tiêu dùng). Phân tích nội dung (content analysis) bằng NVivo. Điều chỉnh và xây dựng bộ thang đo CSI phù hợp bối cảnh Việt Nam. Khảo sát thử nghiệm (pilot study, n = 50–80). Đánh giá độ tin cậy sơ bộ (Cronbach's Alpha, EFA). Viết và nộp bài báo số 1 cho hội thảo khoa học quốc gia hoặc tạp chí trong nước có uy tín.\r\n\r\n**Giai đoạn 3 (Tháng 13–18): Thu thập và phân tích dữ liệu chính**\r\nKhảo sát diện rộng chính thức (n ≥ 500 người tiêu dùng). Thu thập dữ liệu thứ cấp tài chính của 20–30 doanh nghiệp FMCG (giai đoạn 2019–2025). Phân tích PLS-SEM bằng SmartPLS 4: đánh giá mô hình đo lường (reliability, validity) và mô hình cấu trúc (path coefficients, R², f²). Báo cáo chuyên đề tiến sĩ số 1. Viết và nộp bài báo quốc tế Scopus/ISI số 1.\r\n\r\n**Giai đoạn 4 (Tháng 19–24): Phân tích nâng cao và công bố quốc tế**\r\nKiểm định hiệu ứng trung gian (mediation) và điều tiết (moderation) bằng bootstrapping và MGA. Phân tích dữ liệu bảng (panel data) kết hợp dữ liệu CSI sơ cấp và dữ liệu tài chính thứ cấp. Báo cáo chuyên đề tiến sĩ số 2. Viết và nộp bài báo quốc tế Scopus/ISI số 2. Trình bày kết quả tại hội thảo quốc tế (nếu có cơ hội).\r\n\r\n**Giai đoạn 5 (Tháng 25–30): Viết luận án và hoàn thiện công bố**\r\nPhản hồi và chỉnh sửa các bài báo đã nộp theo phản biện (reviewer comments). Bắt đầu viết bản thảo toàn văn luận án. Báo cáo chuyên đề tiến sĩ số 3. Nộp thêm bài báo quốc tế số 3 (nếu có thể). Hội thảo học thuật tại TDTU: trình bày kết quả nghiên cứu nhận phản hồi từ cộng đồng học thuật.\r\n\r\n**Giai đoạn 6 (Tháng 31–36): Hoàn thiện và bảo vệ luận án**\r\nHoàn thiện bản thảo luận án theo góp ý của người hướng dẫn. Bảo vệ luận án cấp Cơ sở (Hội đồng Khoa). Chỉnh sửa theo góp ý Hội đồng cấp Cơ sở. Nộp hồ sơ và bảo vệ luận án cấp Trường / Nhà nước. Hoàn tất thủ tục và nhận bằng tiến sĩ.\r\n\r\n---\r\n\r\n"},{"title":"7. Mục tiêu và mong muốn đạt được khi đăng ký tuyển sinh đào tạo trình độ tiến sĩ","file":"07_MucTieu.md","chars":1533,"pages":"0.9","content":"## 7. Mục tiêu và mong muốn đạt được khi đăng ký tuyển sinh đào tạo trình độ tiến sĩ\r\n\r\nQuyết định đăng ký dự tuyển chương trình đào tạo tiến sĩ tại Đại học Tôn Đức Thắng xuất phát từ bốn mục tiêu cụ thể và có liên kết với nhau.\r\n\r\nVề năng lực học thuật, nghiên cứu sinh mong muốn xây dựng năng lực nghiên cứu độc lập ở trình độ có thể công bố quốc tế, cụ thể là khả năng thiết kế và thực hiện nghiên cứu định lượng phức tạp ứng dụng PLS-SEM và phân tích dữ liệu bảng. Mục tiêu đầu ra là ít nhất 02 bài báo trong danh mục ISI/Scopus trong suốt thời gian đào tạo.\r\n\r\nVề đóng góp thực tiễn, kết quả nghiên cứu được kỳ vọng chuyển hóa thành bộ công cụ đo lường CSI có thể triển khai cho các doanh nghiệp hàng tiêu dùng nhanh Việt Nam, giúp nhà quản trị có cơ sở định lượng để phân bổ nguồn lực vào các hoạt động nâng cao trải nghiệm khách hàng thay vì dựa vào kinh nghiệm chủ quan.\r\n\r\nVề định hướng nghề nghiệp, bằng tiến sĩ là nền tảng để chuyển sang vai trò giảng dạy bậc đại học và sau đại học, đồng thời nâng cao năng lực tư vấn chiến lược về quản lý trải nghiệm khách hàng, lĩnh vực có nhu cầu ngày càng tăng nhưng thiếu chuyên gia có nền tảng học thuật vững tại Việt Nam.\r\n\r\nVề đóng góp phát triển ngành, giai đoạn hiện tại của nền kinh tế Việt Nam đang chứng kiến sự dịch chuyển từ cạnh tranh giá sang cạnh tranh giá trị và trải nghiệm. Bằng chứng thực nghiệm về mối quan hệ CSI, hiệu quả doanh nghiệp có thể đóng góp vào cơ sở bằng chứng cần thiết cho sự dịch chuyển này, thay vì chỉ dừng lại ở khuyến nghị định tính.\r\n\r\n---\r\n\r\n"},{"title":"8. Lý do lựa chọn cơ sở đào tạo (Đại học Tôn Đức Thắng)","file":"08_LyDo.md","chars":1798,"pages":"1.0","content":"## 8. Lý do lựa chọn cơ sở đào tạo (Đại học Tôn Đức Thắng)\r\n\r\nĐại học Tôn Đức Thắng (TDTU) là lựa chọn phù hợp nhất cho hướng nghiên cứu này vì một số lý do cụ thể và có cơ sở:\r\n\r\n**Uy tín và công nhận quốc tế:** TDTU liên tục có mặt trong các bảng xếp hạng đại học thế giới uy tín như Times Higher Education (THE) World University Rankings và QS Asia University Rankings. Đây là một trong số rất ít trường đại học Việt Nam có bằng cấp được công nhận rộng rãi trong cộng đồng học thuật và nghề nghiệp quốc tế, đảm bảo giá trị và tính nhận diện của bằng tiến sĩ sau khi tốt nghiệp.\r\n\r\n**Văn hóa nghiên cứu khoa học mạnh:** TDTU có chính sách thúc đẩy và hỗ trợ nghiên cứu sinh công bố quốc tế rõ ràng và thực chất, bao gồm hỗ trợ tài chính cho bài báo ISI/Scopus, cơ sở hạ tầng nghiên cứu tốt, và môi trường học thuật khuyến khích tranh luận và phản biện khoa học. Điều này phù hợp với mục tiêu công bố quốc tế của nghiên cứu sinh.\r\n\r\n**Nguồn học liệu phong phú:** Hệ thống thư viện TDTU cung cấp đầy đủ quyền truy cập vào các cơ sở dữ liệu học thuật quốc tế (Web of Science, Scopus, ScienceDirect, Emerald), không thể thiếu cho một đề tài yêu cầu tổng quan tài liệu quốc tế chuyên sâu.\r\n\r\n**Đội ngũ chuyên môn phù hợp:** Khoa Quản trị Kinh doanh tại TDTU có đội ngũ giảng viên với hồ sơ công bố quốc tế trong lĩnh vực Marketing, hành vi người tiêu dùng và quản trị chiến lược, là điều kiện tiên quyết để có người hướng dẫn đủ năng lực và kinh nghiệm cho đề tài này.\r\n\r\n**Vị trí địa lý thuận lợi:** TP. Hồ Chí Minh là trung tâm kinh tế, tiêu dùng và FMCG lớn nhất cả nước. Điều này tạo điều kiện tối đa cho việc tiếp cận doanh nghiệp FMCG để thu thập dữ liệu thứ cấp và phỏng vấn sâu nhà quản lý, cũng như thu thập dữ liệu khảo sát người tiêu dùng trên một thị trường đa dạng và đại diện.\r\n\r\n---\r\n\r\n"},{"title":"9. Kinh nghiệm về nghiên cứu, thực tế, hoạt động xã hội và ngoại khóa","file":"09_KinhNghiem.md","chars":2563,"pages":"1.4","content":"## 9. Kinh nghiệm về nghiên cứu, thực tế, hoạt động xã hội và ngoại khóa\n\n**Kinh nghiệm nghiên cứu:**\nĐã hoàn thành luận văn Thạc sĩ Quản trị Kinh doanh (tháng 8/2020) với đề tài: “Thúc đẩy thị phần tiêu thụ ngành hàng nước tăng lực tại công ty Coca-Cola Việt Nam”, thực hiện dưới sự hướng dẫn của TS. Phùng Minh Tuấn, Đại học Tôn Đức Thắng. Trong quá trình thực hiện, đã ứng dụng phương pháp nghiên cứu định lượng với phần mềm SPSS để phân tích hồi quy và kiểm định thang đo. Hiện đang theo học chương trình Tiến sĩ Quản trị Kinh doanh (DBA) từ tháng 9/2024, với đề tài định hướng: “Tác động của marketing xanh đến hành vi mua của người tiêu dùng”. Đang nâng cao kỹ năng phân tích PLS-SEM với SmartPLS để phục vụ nghiên cứu tiến sĩ.\n\n**Kinh nghiệm giảng dạy:**\nHiện đang tham gia giảng dạy tại hai cơ sở đào tạo:\n- Tại Đại học Tôn Đức Thắng — Khoa Marketing: giảng dạy các học phần Chiến lược Marketing B2B, Kỹ năng Bán hàng và Quản trị Bán lẻ; đã hướng dẫn thành công 13 sinh viên tốt nghiệp.\n- Tại Đại học FPT — Khoa Quản trị Kinh doanh: giảng dạy học phần Khởi nghiệp, hỗ trợ trực tiếp 30 nhóm sinh viên xây dựng dự án khởi nghiệp; đồng thời đảm nhận vai trò giám khảo Cuộc thi Khởi nghiệp 2023.\n\n**Kinh nghiệm thực tiễn:**\nHơn 13 năm kinh nghiệm quản lý trong ngành hàng tiêu dùng nhanh (FMCG), bao gồm thời gian làm việc tại Coca-Cola Việt Nam và vị trí gần nhất là Training & Capability Development Manager tại Mondelez Kinh Do. Ở vị trí này, đảm nhận thiết kế và triển khai các chương trình đào tạo nâng cao năng lực nhân viên; đánh giá hiệu suất và xác định khoảng cách kỹ năng; triển khai đào tạo qua hình thức workshop, e-learning và on-the-job training; hỗ trợ hoạch định kế thừa nhân tài thông qua việc xác định nhân sự tiềm năng cao và xây dựng lộ trình phát triển cá nhân hóa.\n\nKinh nghiệm thực địa trong quản lý kênh phân phối truyền thống và hiện đại, quản lý quan hệ nhà phân phối, và đo lường hiệu quả thương mại là nền tảng trực tiếp cho việc thiết kế nghiên cứu về CSI và hiệu quả doanh nghiệp FMCG, đặc biệt trong việc xác định các biến điều tiết theo kênh phân phối.\n\n**Chứng chỉ và phát triển chuyên môn:**\n- Harvard ManageMentor: Coaching; Innovation and Creative Thinking\n- Google: Foundations of Project Management\n\n**Hoạt động học thuật và cộng đồng:**\nTham gia mạng lưới chuyên gia trong lĩnh vực quản trị kinh doanh và marketing; duy trì hoạt động kết nối học thuật — thực tiễn thông qua website lehai.edu.vn nhằm chia sẻ kiến thức quản trị tài chính cá nhân và phát triển năng lực lãnh đạo cho cộng đồng doanh nghiệp Việt Nam.\n\n---\n"},{"title":"10. Dự kiến việc làm và các nghiên cứu tiếp theo sau khi tốt nghiệp","file":"10_DuKien.md","chars":2718,"pages":"1.5","content":"## 10. Dự kiến việc làm và các nghiên cứu tiếp theo sau khi tốt nghiệp\n\n**Dự kiến việc làm:**\nSau khi hoàn thành chương trình tiến sĩ, nghiên cứu sinh dự kiến tiếp tục đóng góp cho cộng đồng học thuật và thực tiễn theo hai hướng chính. Thứ nhất, tham gia giảng dạy các học phần Quản trị Marketing, Hành vi người tiêu dùng, và Phương pháp nghiên cứu định lượng tại bậc đại học và sau đại học. Thứ hai, phát triển hoạt động tư vấn chiến lược về Customer Experience Management (CXM) và xây dựng hệ thống đo lường CSI cho các tập đoàn và doanh nghiệp FMCG tại Việt Nam: một lĩnh vực đang có nhu cầu lớn nhưng thiếu chuyên gia có nền tảng học thuật vững chắc.\n\n**Các hướng nghiên cứu tiếp theo:**\n\n*Hướng 1, Mở rộng bối cảnh số:* Trong giai đoạn hậu tiến sĩ, nghiên cứu sinh sẽ mở rộng nghiên cứu sang bối cảnh thương mại điện tử và bán lẻ đa kênh trong ngành hàng tiêu dùng nhanh, nơi trải nghiệm số ngày càng đóng vai trò quan trọng trong hình thành CSI và lòng trung thành của người tiêu dùng. Xu hướng mua sắm trực tuyến đang tăng trưởng rõ rệt tại Việt Nam đặt ra câu hỏi liệu các yếu tố hình thành CSI trong môi trường số có cấu trúc khác biệt so với kênh truyền thống hay không.\n\n*Hướng 2, So sánh liên quốc gia (Cross-country comparison):* Mở rộng mô hình sang các thị trường ASEAN tương đồng về giai đoạn phát triển kinh tế (Thái Lan, Indonesia, Philippines) để kiểm định tính phổ quát của mô hình và xác định các yếu tố đặc thù quốc gia.\n\n*Hướng 3, Ứng dụng AI trong đo lường CSI và khuếch đại eWOM:* Trong giai đoạn hậu tiến sĩ, hướng nghiên cứu này tập trung vào hai cơ chế cụ thể mà AI đang tái định hình chuỗi CSI – eWOM – Firm Performance.\n- Thứ nhất, AI cá nhân hóa trải nghiệm khách hàng — thông qua các hệ thống gợi ý sản phẩm, chatbot hỗ trợ sau mua, và nội dung marketing được tùy chỉnh theo từng phân khúc — trực tiếp tác động đến chất lượng cảm nhận và giá trị cảm nhận, tức là các tiền đề hình thành CSI. Điều này đặt ra câu hỏi liệu mô hình ACSI gốc có cần bổ sung nhân tố “chất lượng trải nghiệm số do AI hỗ trợ” hay không.\n- Thứ hai, AI khuếch đại eWOM qua hai cơ chế: thuật toán của TikTok, Shopee, và Google ưu tiên phân phối nội dung đánh giá có độ tin cậy cao đến đúng đối tượng tiếp nhận, làm tăng phạm vi và tốc độ lan truyền của eWOM tích cực; đồng thời, các công cụ sentiment analysis tự động tổng hợp và hiển thị điểm đánh giá tổng hợp (aggregate rating) làm giảm chi phí tìm kiếm thông tin của người mua mới, từ đó tăng hệ số chuyển đổi từ eWOM sang hành vi mua.\n\nNghiên cứu tiếp theo có thể đo lường tác động điều tiết của mức độ AI-personalization của kênh phân phối lên mối quan hệ CSI – eWOM, sử dụng dữ liệu API từ các nền tảng thương mại điện tử kết hợp với dữ liệu khảo sát.\n\n---\n"},{"title":"11. Đề xuất người hướng dẫn","file":"11_NguoiHuongDan.md","chars":1221,"pages":"0.7","content":"## 11. Đề xuất người hướng dẫn\r\n\r\n**Người hướng dẫn đề xuất 1:**\r\nTS. Phùng Minh Tuấn — Khoa Quản trị Kinh doanh, Đại học Tôn Đức Thắng\r\n\r\nLý do đề xuất: TS. Phùng Minh Tuấn có chuyên môn sâu trong lĩnh vực Quản trị Kinh doanh và Marketing chiến lược, phù hợp với hướng nghiên cứu về CSI và hiệu quả doanh nghiệp trong ngành FMCG. Bên cạnh đó, nghiên cứu sinh đã có cơ hội được Thầy hướng dẫn trong quá trình thực hiện luận văn Thạc sĩ, do đó đã có nền tảng tin tưởng và hiểu biết về phương pháp nghiên cứu định lượng dưới sự định hướng của Thầy. Sự liên tục trong quá trình học thuật từ thạc sĩ lên tiến sĩ dưới sự hướng dẫn của cùng một giáo viên sẽ đảm bảo tính nhất quán trong khung lý thuyết và phương pháp luận của nghiên cứu.\r\n\r\n**Người hướng dẫn đề xuất 2 (nếu có):**\r\nPGS. TS. *(Họ tên — đề nghị bổ sung sau khi tham khảo ý kiến của Thầy Phùng Minh Tuấn)*\r\n\r\nChuyên môn mong muốn: Kinh tế lượng ứng dụng, phân tích dữ liệu bảng (panel data), GMM — nhằm hỗ trợ phần phân tích tích hợp dữ liệu đa cấp giữa khảo sát người tiêu dùng và dữ liệu tài chính doanh nghiệp niêm yết.\r\n\r\n\u003e Nghiên cứu sinh cam kết chủ động liên hệ và xác nhận sự đồng ý chính thức của người hướng dẫn trước khi nộp hồ sơ dự tuyển.\r\n\r\n---\r\n\r\n"},{"title":"TÀI LIỆU THAM KHẢO","file":"12_TaiLieuThamKhao.md","chars":4601,"pages":"2.6","content":"## TÀI LIỆU THAM KHẢO\r\n\r\n*(Trình bày theo chuẩn APA 7th edition. DOI được xác minh; các tài liệu không có DOI trực tuyến được truy xuất qua thư viện học thuật hoặc ResearchGate.)*\r\n\r\n1. Anderson, E. W., Fornell, C., & Lehmann, D. R. (1994). Customer satisfaction, market share, and profitability: Findings from Sweden. *Journal of Marketing*, *58*(3), 53–66. https://doi.org/10.2307/1252310\r\n\r\n2. Anderson, E. W., & Sullivan, M. W. (1993). The antecedents and consequences of customer satisfaction for firms. *Marketing Science*, *12*(2), 125–143. https://doi.org/10.1287/mksc.12.2.125\r\n\r\n3. Barney, J. (1991). Firm resources and sustained competitive advantage. *Journal of Management*, *17*(1), 99–120. https://doi.org/10.1177/01492063910170

<html lang="vi">

    <script>

            themeVariables: { primaryColor: '#ffffff', primaryTextColor: '#000000', primaryBorderColor: '#000000', lineColor: '#000000', secondaryColor: '#ffffff', tertiaryColor: '#ffffff', mainBkg: '#ffffff', nodeBorder: '#000000', clusterBkg: '#ffffff', clusterBorder: '#000000', titleColor: '#000000', edgeLabelBackground: '#ffffff' }

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Custom Properties */
            --bg-body: #f1f5f9;
            --bg-sidebar: #0f172a;
            --bg-card: #ffffff;
            --bg-stat: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #334155;
            --text-heading: #0f172a;
            --text-sidebar-active: #ffffff;
            --text-sidebar-inactive: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #10b981;
            --accent: #6366f1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-card: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --doc-font: 'Times New Roman', Times, Baskerville, Georgia, serif;
        }

        [data-theme="dark"] {
            /* Dark Theme Custom Properties */
            --bg-body: #090d16;
            --bg-sidebar: #131b2e;
            --bg-card: #182236;
            --bg-stat: #1f2d47;
            --border-color: #27354d;
            --text-main: #cbd5e1;
            --text-heading: #f8fafc;
            --text-sidebar-active: #ffffff;
            --text-sidebar-inactive: #64748b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg-body);
            color: var(--text-main);
            transition: var(--transition);
            overflow: hidden;
        }

        /* Sidebar Container */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            color: #fff;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: 4px 0 25px rgba(0,0,0,0.15);
            z-index: 10;
            position: relative;
            transition: var(--transition);
        }

        .sidebar-header {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
        }

        .ncs-badge {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 10px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--text-sidebar-inactive);
        }

        .ncs-badge strong {
            color: #fff;
            font-size: 0.9rem;
        }

        .nav-container {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
        }

        /* Styling Scrollbars */
        .nav-container::-webkit-scrollbar,
        .main::-webkit-scrollbar {
            width: 6px;
        }
        .nav-container::-webkit-scrollbar-track,
        .main::-webkit-scrollbar-track {
            background: transparent;
        }
        .nav-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .main::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .nav-header {
            font-size: 0.7rem;
            color: var(--text-sidebar-inactive);
            font-weight: 700;
            margin: 25px 0 10px 5px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
        }

        .nav-item {
            padding: 12px 14px;
            margin: 6px 0;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-sidebar-inactive);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 25%;
            height: 50%;
            width: 3px;
            background: var(--secondary);
            border-radius: 0 4px 4px 0;
            opacity: 0;
            transition: var(--transition);
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text-sidebar-active);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            font-weight: 600;
        }

        .nav-item.active::before {
            opacity: 1;
            background: #3b82f6;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 1rem;
            margin-top: auto;
            font-size: 0.75rem;
            color: var(--text-sidebar-inactive);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Main Workspace */
        .main {
            flex-grow: 1;
            padding: 2.5rem;
            overflow-y: auto;
            transition: var(--transition);
            position: relative;
        }

        .card {
            background: var(--bg-card);
            padding: 3.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-card);
            position: relative;
            min-height: 85vh;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            box-sizing: border-box;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Buttons & Toolbar */
        .btn-group {
            position: absolute;
            top: 2.5rem;
            right: 3.5rem;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-theme {
            background: var(--bg-stat);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            box-shadow: none;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
        }

        /* Statistics Cards Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
            margin-top: 1.5rem;
        }

        .stat-card {
            background: var(--bg-stat);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-main);
            opacity: 0.8;
            font-weight: 600;
        }

        .stat-val {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-heading);
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .stat-val span {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Content Document Styling (APA Standard) */
        #title {
            color: var(--text-heading);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            margin-top: 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            transition: var(--transition);
        }

        #content {
            font-family: var(--doc-font);
            font-size: 14pt;
            line-height: 1.8;
            color: var(--text-main);
            text-align: justify;
            transition: var(--transition);
            margin-top: 1.5rem;
        }

        #content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            color: var(--text-heading);
            margin-top: 24pt;
            margin-bottom: 12pt;
            page-break-after: avoid;
            line-height: 1.3;
        }

        #content h1 { font-size: 20pt; text-transform: uppercase; text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        #content h2 { font-size: 16pt; border-left: 4px solid var(--primary); padding-left: 12px; }
        #content h3 { font-size: 14pt; }
        #content h4 { font-size: 14pt; font-style: italic; }
        #content h5 { font-size: 13pt; }

        #content p {
            margin-top: 0;
            margin-bottom: 16px;
            text-indent: 0; /* Standard modern spacing */
        }
        
        #content p + p {
            text-indent: 1.25cm; /* Standard indent for consecutive paragraphs */
        }

        #content blockquote {
            margin: 20px 0;
            padding: 15px 20px;
            background: var(--bg-stat);
            border-left: 4px solid var(--primary);
            font-style: italic;
            border-radius: 0 12px 12px 0;
        }

        /* Table Styling */
        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            box-shadow: var(--shadow);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        #content th, #content td {
            padding: 12px 16px;
            font-size: 13pt;
            border-bottom: 1px solid var(--border-color);
        }

        #content th {
            background-color: var(--bg-stat);
            color: var(--text-heading);
            font-weight: 700;
            text-align: left;
        }

        #content tr:last-child td {
            border-bottom: none;
        }

        #content tr:hover td {
            background-color: rgba(59, 130, 246, 0.02);
        }

        /* Mermaid Graph Boxes */
        .mermaid-box {
            margin: 35px auto;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 24px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            box-shadow: var(--shadow);
            max-width: 100%;
        }

        .mermaid-box svg {
            width: 100% !important;
            max-width: 850px !important;
            height: auto !important;
            min-width: 550px;
        }

        [data-theme="dark"] .mermaid-box {
            background: #ffffff; /* keep white bg for clear readability of black & white mermaid rules */
            border-color: var(--border-color);
        }

        /* Error Message Box */
        .error-box {
            color: #b91c1c;
            border: 1px solid #fca5a5;
            padding: 16px;
            background: #fef2f2;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Print Formatting & Page Breaks */
        .export-title { text-align: center; font-size: 22pt; font-weight: bold; margin-bottom: 40px; }
        .export-chapter { margin-bottom: 50px; }
        .page-break { page-break-after: always; }

        @media print {
            @page { size: A4; margin: 2.5cm 2cm 2.5cm 3cm; }
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible; }
            #print-container { position: absolute; left: 0; top: 0; width: 100%; background: white; padding: 0; }
            #print-container h1, #print-container h2 { text-transform: uppercase; }
            #print-container .mermaid-box, #print-container .mermaid { page-break-inside: avoid; border: none; text-align: center; }
            #print-container img { max-width: 100% !important; height: auto !important; page-break-inside: avoid; display: block; margin: 0 auto; }
            #print-container { font-family: 'Times New Roman', serif; font-size: 14pt; color: #000; line-height: 1.5; text-align: justify; }
            #print-container p { margin-top: 0pt; margin-bottom: 0pt; line-height: 1.5; }
            #print-container p + p { text-indent: 1.25cm; }
            #print-container table { page-break-inside: avoid; border-collapse: collapse; width: 100%; }
            #print-container th, #print-container td { border: 1px solid black; padding: 8px; }
        }
    </style>
</head>

    <script>
        const data = {"chapters":[{"title":"ĐỀ CƯƠNG NGHIÊN CỨU","file":"00_BiaThongTin.md","chars":744,"pages":"0.4","content":"# ĐỀ CƯƠNG NGHIÊN CỨU\r\n**(Dự tuyển Nghiên cứu sinh - Đại học Tôn Đức Thắng)**\r\n\r\n**Tên đề tài dự kiến:**\r\nTác động của chỉ số hài lòng khách hàng đến Hiệu quả Hành vi Khách hàng: Vai trò Trung gian của lòng trung thành và eWOM trong Ngành Hàng Tiêu dùng Nhanh\r\n\r\n*(The Impact of Customer Satisfaction Index on Customer Behavioral Outcomes: Mediating Roles of Brand Loyalty and eWOM in the Fast-Moving Consumer Goods Industry)*\r\n\r\n**Nghiên cứu sinh:** Lê Phúc Hải\r\n**Email:** phuchai.le@gmail.com | **Điện thoại:** +84 938 300 489\r\n**Địa chỉ:** Esto City, Cát Lát, Thành phố Thủ Đức, TP. Hồ Chí Minh\r\n\r\n**Lĩnh vực nghiên cứu:** Quản trị Kinh doanh\r\n**Chuyên ngành dự kiến:** Quản trị Kinh doanh\r\n**Cơ sở đào tạo:** Đại học Tôn Đức Thắng (TDTU)\\n"},{"title":"DANH MỤC TỪ VIẾT TẮT VÀ THUẬT NGỮ","file":"00b_DanhMucTuKhoa.md","chars":1562,"pages":"0.9","content":"## DANH MỤC TỪ VIẾT TẮT VÀ THUẬT NGỮ\n\nTrong đề cương này, các thuật ngữ khoa học và biến số nghiên cứu được sử dụng nhất quán bằng tiếng Việt. Bảng dưới đây đối chiếu các thuật ngữ này với nguyên bản tiếng Anh nhằm đảm bảo tính chính xác về mặt học thuật.\n\n**1. Các biến số trong mô hình nghiên cứu**\n- **CSI (Customer Satisfaction Index):** Chỉ số Hài lòng Khách hàng\n- **CBO (Customer Behavioral Outcomes):** Hiệu quả Hành vi Khách hàng\n- **WTPP (Willingness to Pay Premium):** Ý định chi trả giá cao (Sự sẵn lòng trả phụ phí)\n- **eSOW (Expected Share of Wallet):** Tỷ trọng chi tiêu dự kiến\n- **CL (Customer Loyalty):** Lòng trung thành thương hiệu\n- **eWOM (Electronic Word-of-Mouth):** Truyền miệng điện tử\n- **ARD (Algorithmic Recommendation Dependence):** Sự phụ thuộc vào Thuật toán Đề xuất\n- **PS (Price Sensitivity):** Tính nhạy cảm về giá\n- **HB (Habit):** Thói quen tiêu dùng\n- **PQ (Perceived Quality):** Chất lượng cảm nhận\n- **PV (Perceived Value):** Giá trị cảm nhận\n\n**2. Các thuật ngữ phương pháp luận**\n- **Multi-study Design:** Thiết kế đa nghiên cứu\n- **Longitudinal Survey:** Khảo sát dọc\n- **Scenario-based Experiment:** Thực nghiệm kịch bản\n- **CMB (Common Method Bias):** Rủi ro phương pháp chung\n- **Non-response Bias:** Thiên lệch do không phản hồi\n- **Ecological Fallacy:** Ngụy biện sinh thái (Sai lầm khi dùng dữ liệu vĩ mô để suy luận hành vi vi mô)\n- **PLS-SEM (Partial Least Squares Structural Equation Modeling):** Mô hình cấu trúc tuyến tính bình phương tối thiểu riêng phần\n- **MGA (Multi-Group Analysis):** Phân tích đa nhóm\n"},{"title":"1. Tính cấp thiết, lý do chọn đề tài, lĩnh vực nghiên cứu","file":"01_TinhCapThiet.md","chars":3834,"pages":"2.1","content":"## 1. Tính cấp thiết, lý do chọn đề tài, lĩnh vực nghiên cứu\n\n### 1.1. Bối cảnh và tính cấp thiết\n\nTrong hai thập niên qua, nền kinh tế toàn cầu đã chứng kiến sự dịch chuyển cơ bản trong tư duy quản trị doanh nghiệp: từ tập trung vào chỉ số tài chính thuần túy sang coi trọng trải nghiệm và sự hài lòng của khách hàng như một tài sản chiến lược. chỉ số hài lòng khách hàng (Customer Satisfaction Index, CSI) nổi lên như một công cụ đo lường toàn diện, định hướng chiến lược cho các tập đoàn bán lẻ và tiêu dùng.\n\nTuy nhiên, trong bối cảnh thương mại điện tử và trí tuệ nhân tạo (thuật toán đề xuất) bùng nổ, một nghịch lý đáng chú ý đã xuất hiện: người tiêu dùng có thể rất hài lòng với một thương hiệu, nhưng lại nhanh chóng chuyển sang mua sản phẩm của đối thủ chỉ vì một cú nhấp chuột hoặc một đợt khuyến mãi chớp nhoáng được thuật toán gợi ý. Điều này làm suy yếu đáng kể chuỗi nhân quả truyền thống từ sự hài lòng đến lòng trung thành, khiến doanh nghiệp không thể chuyển hóa điểm CSI cao thành lợi thế cạnh tranh bền vững, cụ thể là ý định chi trả giá cao và tỷ trọng chi tiêu. \n\nTại Việt Nam, ngành hàng tiêu dùng nhanh (FMCG) là một trong những ngành có quy mô lớn nhất, được dự báo đạt trên 50 tỷ USD vào năm 2025 (Kantar, 2023). Đây là ngành có tần suất mua hàng cao, chu kỳ quyết định ngắn, và chi phí chuyển đổi thương hiệu thấp. Hàng nghìn tỷ đồng được chi ra mỗi năm cho marketing và chăm sóc khách hàng, nhưng đa số giới quản trị đều đặt ra câu hỏi: Liệu sự hài lòng của khách hàng có thực sự tạo ra sức mạnh định giá, hay họ chỉ trung thành khi có giá rẻ?\n\nHiện nay, giới học thuật Việt Nam vẫn còn thiếu các nghiên cứu định lượng đi sâu vào cơ chế tâm lý này, từ đó để lại một khoảng trống. Việc giới hạn của mô hình ACSI nguyên bản (vốn đề cao biến kỳ vọng) không còn phù hợp với đặc thù mua lặp lại theo thói quen của ngành FMCG. Do đó, một nghiên cứu cấu trúc lại tiền đề của sự hài lòng và liên kết nó với hiệu quả hành vi thực tế là rất cần thiết.\n\nViệc lấp đầy khoảng trống này không chỉ mang lại ý nghĩa lý luận sâu sắc, mà còn cung cấp giá trị thực tiễn trực tiếp đối với các nhà quản trị trong kỷ nguyên số.\n\n### 1.2. Lý do chọn đề tài\n\nVề mặt lý luận, mô hình chỉ số hài lòng khách hàng của Mỹ do Fornell et al. (1996) xây dựng đã bộc lộ một số hạn chế khi ứng dụng vào ngành hàng tiêu dùng nhanh. Biến Kỳ vọng đôi khi chưa thực sự phản ánh đúng hành vi của người tiêu dùng trong lĩnh vực này. Việc thay thế bằng biến thói quen tiêu dùng theo Lý thuyết Hành vi Lập trình là một hướng đi cần thiết để gắn kết mô hình vào thực tiễn ngành học. Bên cạnh đó, việc nối ghép dữ liệu khảo sát cá nhân vào dữ liệu lợi nhuận vĩ mô của tập đoàn trong nhiều nghiên cứu trước đây là một hạn chế về phương pháp luận cần được điều chỉnh bằng việc quy chuẩn toàn bộ mô hình về cấp độ khách hàng.\n\nVề thực tiễn, ngành hàng tiêu dùng nhanh tại Việt Nam đang trong giai đoạn cấu trúc lại kênh phân phối: tỷ trọng thương mại điện tử tăng nhanh, người tiêu dùng đặt yêu cầu cao hơn về chất lượng và trải nghiệm, cạnh tranh từ hàng nhập khẩu ngày càng mở rộng. Trong bối cảnh đó, doanh nghiệp cần bằng chứng định lượng để xác định xem việc đầu tư vào sự hài lòng có giúp họ tránh được cuộc chiến cạnh tranh về giá hay không.\n\nVề động lực cá nhân, với nền tảng thực tiễn trong quản trị kinh doanh và sự quan tâm sâu sắc đến chiến lược khách hàng, nghiên cứu sinh nhận thấy đây là khoảng trống học thuật có thể lấp đầy bằng một công trình có tính ứng dụng cao, mang lại giá trị thực học thực nghiệp cho cả cộng đồng doanh nghiệp lẫn giới học thuật Việt Nam.\n\n### 1.3. Lĩnh vực nghiên cứu\n\nĐề tài thuộc lĩnh vực Quản trị Kinh doanh, giao thoa với Marketing chiến lược và Hành vi người tiêu dùng. Đây là giao điểm của hai dòng nghiên cứu: đo lường và quản lý trải nghiệm khách hàng, và đánh giá hiệu suất marketing ở cấp độ cá nhân.\n"},{"title":"2. Tình hình nghiên cứu","file":"02_TinhHinhNghienCuu.md","chars":6920,"pages":"3.8","content":"## 2. Tình hình nghiên cứu\n\n### 2.1. Lý thuyết nền tảng\n\nBa lý thuyết sau đây tạo thành khung lý thuyết tích hợp cho đề tài, mỗi lý thuyết giải thích một mắt xích khác nhau trong chuỗi nhân quả từ thói quen tiêu dùng, sự hài lòng đến hiệu quả hành vi khách hàng.\n\n**Lý thuyết xác nhận kỳ vọng** do Oliver (1980) đề xuất giải thích cơ chế hình thành sự hài lòng cốt lõi: khách hàng so sánh cảm nhận thực tế sau tiêu dùng với kỳ vọng đã hình thành trước đó. Tuy nhiên, trong bối cảnh FMCG (hàng tiêu dùng nhanh) có tính lặp lại cao, lý thuyết này bộc lộ những hạn chế nhất định vì người tiêu dùng không phải lúc nào cũng mang theo những kỳ vọng lý trí rõ ràng trước mỗi lần mua hàng.\n\n**Lý thuyết Hành vi Lập trình** bổ khuyết cho hạn chế trên. Khare & Inman (2006) lập luận rằng đối với các sản phẩm FMCG có rủi ro thấp và mua thường xuyên, người tiêu dùng phát triển các kịch bản hành vi tự động để giảm thiểu nỗ lực nhận thức. Lúc này, thói quen và sự thân thuộc lấn át kỳ vọng trong việc định hình trải nghiệm. Khách hàng hài lòng vì sản phẩm mang lại sự an tâm tự động mà không đòi hỏi họ phải suy nghĩ. Việc kết hợp lý thuyết này cho phép nghiên cứu thay thế cấu trúc kỳ vọng khách hàng truyền thống bằng thói quen tiêu dùng - một bước tiến quan trọng về mặt lý thuyết để phản ánh đúng bản chất tâm lý học hành vi trong FMCG.\n\n**Lý thuyết Cam kết - Tin tưởng** của Morgan & Hunt (1994) và **Lý thuyết Truyền miệng Điện tử** cung cấp cơ sở cho mắt xích kết quả: tại sao khách hàng hài lòng lại sẵn sàng trả giá cao và dồn ngân sách cho thương hiệu. Trong kỷ nguyên số, eWOM không chỉ là kết quả mà còn là một cơ chế tự củng cố. Khi khách hàng công khai bảo vệ hoặc khen ngợi thương hiệu trực tuyến, họ gia tăng mức độ cam kết tâm lý của chính mình, từ đó kích hoạt hành vi chi trả giá cao để duy trì sự nhất quán nội tâm.\n\n### 2.2. Hạn chế của mô hình ACSI và vấn đề đo lường CSI trong FMCG\n\nMô hình chỉ số hài lòng khách hàng Mỹ (ACSI) do Fornell et al. (1996) xây dựng là khung đo lường CSI được chấp nhận rộng rãi nhất. ACSI định nghĩa CSI là một hàm của ba tiền đề: kỳ vọng khách hàng, chất lượng cảm nhận, và giá trị cảm nhận. Tuy nhiên, việc áp dụng nguyên xi mô hình ACSI vào ngành FMCG là chưa phản ánh đầy đủ đặc thù ngành và bộc lộ một số điểm chưa phù hợp về mặt lý thuyết.\n\nKang et al. (2014) chỉ ra rằng trong ngành FMCG, biến kỳ vọng (CE) hầu như không có tác động hoặc có tác động rất yếu đến sự hài lòng vì khách hàng đã quá quen thuộc với sản phẩm do mua lặp lại nhiều lần. Đã biết rõ đặc thù này, việc tiếp tục đo lường biến kỳ vọng có thể chưa phản ánh chính xác cơ chế tâm lý của người tiêu dùng. Do đó, nghiên cứu này đề xuất thay thế biến CE và thay thế bằng **thói quen tiêu dùng (HB)**, tạo ra một cấu trúc tiền đề mới: Thói quen - Chất lượng - Giá trị. Đây là đóng góp lý thuyết cốt lõi của luận án, giúp mô hình bám rễ sâu vào thực tiễn ngành tiêu dùng nhanh thay vì chỉ là một bản cập nhật bối cảnh.\n\nVề mặt kết quả, ACSI gốc liên kết sự hài lòng với lòng trung thành và sau đó là Tỷ suất lợi nhuận (ROA). Tuy nhiên, việc cố gắng nối trực tiếp dữ liệu sơ cấp (cảm nhận của một nhóm khách hàng) với dữ liệu tài chính thứ cấp (lợi nhuận của cả tập đoàn) có thể gặp rào cản về phương pháp luận và vấp phải nghịch lý ngụy biện sinh thái (mâu thuẫn cấp độ phân tích). Để góp phần khắc phục hạn chế này, nghiên cứu này điều hướng kết quả về các biến hiệu quả vi mô cấp độ khách hàng bao gồm ý định chi trả giá cao (WTPP) và tỷ trọng chi tiêu dự kiến (eSOW).\n\n### 2.3. Nghiên cứu về CSI và hiệu quả cấp độ khách hàng trên thế giới\n\nAnderson & Sullivan (1993) là những người tiên phong chỉ ra rằng sự hài lòng dẫn đến ý định mua lại. Tuy nhiên, mua lại không đồng nghĩa với trung thành bền vững. Zeithaml et al. (1996) đề xuất một thang đo toàn diện hơn về hiệu quả hành vi khách hàng, nhấn mạnh rằng khách hàng trung thành bền vững là những người sẵn sàng **chi trả giá cao** ngay cả khi đối thủ cạnh tranh tung ra các đợt khuyến mãi. \n\nTrong bối cảnh trực tuyến, Seiders et al. (2005) chỉ ra rằng sự hài lòng chỉ chuyển hóa thành hành vi mua lặp lại khi đồng thời có yếu tố thuận tiện về kênh phân phối. Gần đây, Dawes et al. (2023) xác định lòng trung thành trong ngành hàng tiêu dùng nhanh đang bị xói mòn nghiêm trọng bởi các thuật toán thương mại điện tử, vốn liên tục gợi ý sản phẩm thay thế giá rẻ. Điều này đặt ra giả thuyết quan trọng về việc Kênh mua sắm (trực tuyến và ngoại tuyến) sẽ điều tiết tiêu cực mối quan hệ giữa Sự hài lòng và lòng trung thành thương hiệu truyền thống.\n\nKeiningham et al. (2007) lập luận rằng việc chỉ dùng lòng trung thành để dự báo doanh thu là chưa đủ. Nhóm tác giả đề xuất biến **Tỷ trọng chi tiêu (SOW)** là thước đo thực tế nhất về mức độ chiếm lĩnh tâm trí và túi tiền của khách hàng. Khách hàng có thể rất hài lòng với Coca-Cola, nhưng nếu ngân sách giải khát của họ vẫn chia đều cho Pepsi, thì sự hài lòng đó chưa hẳn đã tạo ra lợi thế cạnh tranh bền vững.\n\n### 2.4. Nghiên cứu liên quan tại Việt Nam\n\nTại Việt Nam, phần lớn nghiên cứu CSI tập trung vào lĩnh vực dịch vụ (ngân hàng, bảo hiểm, viễn thông) hoặc bán lẻ. Nguyen et al. (2018) ứng dụng ACSI trong ngành bảo hiểm, xác nhận vai trò của chất lượng dịch vụ. Tran (2020) nghiên cứu chuỗi chất lượng - hài lòng - trung thành trong siêu thị.\n\nTrong ngành hàng tiêu dùng nhanh tại Việt Nam, các nghiên cứu hiện tại chủ yếu khám phá trải nghiệm thương hiệu hoặc dùng mô hình TAM để đo lường ý định mua sắm trực tuyến. Hầu như chưa có nghiên cứu nào dám hiệu chỉnh cấu trúc ACSI truyền thống để đưa yếu tố thói quen vào làm tiền đề cho sự hài lòng. Đồng thời, các nghiên cứu cũng thường dừng lại ở biến Ý định mua lại chung chung thay vì đo lường sức mạnh định giá của thương hiệu thông qua ý định chi trả giá cao (WTPP) hay tỷ trọng chi tiêu (SOW).\n\n### 2.5. Khoảng trống nghiên cứu\n\nTừ việc lược khảo tài liệu trên hệ thống Scopus và Web of Science, nghiên cứu xác định ba khoảng trống trọng tâm:\n\n**Khoảng trống 1, Sáng tạo cấu trúc đo lường:** Chưa có nghiên cứu nào tại Việt Nam bổ khuyết và mở rộng cấu trúc đo lường ACSI trong ngành FMCG bằng cách loại bỏ biến kỳ vọng và tích hợp Lý thuyết Hành vi Lập trình với biến thói quen tiêu dùng làm tiền đề cốt lõi tạo ra sự hài lòng.\n\n**Khoảng trống 2, Hiệu quả hành vi vi mô:** Các nghiên cứu hiện hành hoặc vướng lỗi Ecological Fallacy khi cố nối khảo sát vào ROA, hoặc chủ yếu dừng lại ở mức đo lường Ý định mua lại. Khoảng trống ở đây là chưa có nghiên cứu đo lường sức mạnh thương hiệu qua ý định chi trả giá cao (WTPP) và tỷ trọng chi tiêu dự kiến (eSOW) dựa trên chỉ số CSI trong ngành tiêu dùng nhanh.\n\n**Khoảng trống 3, Cơ chế eWOM và Điều tiết Kênh trong Kỷ nguyên số:** Chưa kiểm định đồng thời vai trò của Kênh mua sắm trực tuyến trong việc tạo ra tác động kép: vừa thúc đẩy truyền miệng điện tử (eWOM), nhưng lại vừa làm suy giảm lòng trung thành thương hiệu truyền thống do thuật toán đề xuất thay thế của các sàn thương mại điện tử.\n"},{"title":"3. Mục đích nghiên cứu","file":"03_MucDichNghienCuu.md","chars":2420,"pages":"1.3","content":"## 3. Mục đích nghiên cứu\n\n### 3.1. Mục đích tổng quát\n\nNghiên cứu nhằm xây dựng và kiểm định mô hình lý thuyết về tác động của chỉ số hài lòng khách hàng (CSI) đến Hiệu quả Hành vi Khách hàng (CBO) trong ngành FMCG tại Việt Nam, trong đó phân tích hai cơ chế truyền dẫn song song: thông qua lòng trung thành thương hiệu (CL) và thông qua truyền miệng điện tử (eWOM). Đặc biệt, nghiên cứu đánh giá cách thức sự phụ thuộc vào thuật toán số đang làm suy giảm lòng trung thành như thế nào. Từ đó, nghiên cứu đề xuất hàm ý quản trị có tính ứng dụng cao cho doanh nghiệp FMCG và gợi ý chính sách cho cơ quan quản lý nhà nước.\n\n### 3.2. Mục tiêu cụ thể\n\nNghiên cứu hướng đến sáu mục tiêu cụ thể theo thứ tự logic từ đo lường đến phân tích đến ứng dụng, thông qua một thiết kế đa nghiên cứu kết hợp khảo sát dọc và thực nghiệm kịch bản. Trước tiên, xây dựng và kiểm định thang đo CSI và eWOM phù hợp với đặc thù ngành hàng tiêu dùng nhanh. Tiếp theo, đánh giá thực trạng mức độ hài lòng người tiêu dùng FMCG theo các chiều kích thói quen tiêu dùng, chất lượng cảm nhận, giá trị cảm nhận. Thứ ba, phân tích tác động của CSI đến hiệu quả hành vi cấp độ vi mô, cụ thể là ý định chi trả giá cao (WTPP) và tỷ trọng chi tiêu dự kiến (eSOW). Thứ tư, kiểm định vai trò trung gian đồng thời của lòng trung thành thương hiệu và eWOM trong chuỗi CSI–CBO. Thứ năm, kiểm định vai trò điều tiết của sự phụ thuộc vào thuật toán đề xuất và tài sản thương hiệu. Cuối cùng, đề xuất hàm ý quản trị cho doanh nghiệp FMCG để chuyển hóa sự hài lòng thành giá trị vòng đời khách hàng trong kỷ nguyên AI.\n\n### 3.3. Câu hỏi nghiên cứu\n\n- **Q1:** Các cấu phần nào của CSI (thói quen tiêu dùng, chất lượng cảm nhận, giá trị cảm nhận) có trọng số tác động lớn nhất đến sự hài lòng tổng thể của người tiêu dùng FMCG tại Việt Nam?\n- **Q2:** CSI tác động như thế nào đến ý định chi trả giá cao (WTPP) và tỷ trọng chi tiêu dự kiến (eSOW) của khách hàng FMCG tại Việt Nam?\n- **Q3:** lòng trung thành thương hiệu và eWOM có đóng vai trò trung gian trong mối quan hệ CSI–CBO không?\n- **Q4:** Mức độ phụ thuộc vào thuật toán đề xuất (ARD) điều tiết hai tuyến trung gian này như thế nào - cụ thể là thuật toán có làm mạnh tuyến CSI–eWOM–CBO và làm suy yếu tuyến CSI–CL–CBO không?\n- **Q5:** Hàm ý quản trị nào phù hợp cho doanh nghiệp FMCG Việt Nam khi phân bổ ngân sách giữa xây dựng lòng trung thành và kích hoạt eWOM nhằm tối đa hóa giá trị vòng đời khách hàng?\n"},{"title":"4. Đối tượng và phạm vi dự định nghiên cứu","file":"04_DoiTuongPhamVi.md","chars":1482,"pages":"0.8","content":"## 4. Đối tượng và phạm vi dự định nghiên cứu\n\n### 4.1. Đối tượng nghiên cứu\n\nMối quan hệ giữa chỉ số hài lòng khách hàng (CSI) và Hiệu quả Hành vi Khách hàng (CBO), trong đó xem xét vai trò trung gian của lòng trung thành thương hiệu và Truyền miệng điện tử (eWOM), cùng vai trò điều tiết của sự phụ thuộc vào thuật toán đề xuất (ARD) và Tài sản thương hiệu.\n\n### 4.2. Khách thể nghiên cứu\n\nKhách thể nghiên cứu chính là người tiêu dùng cuối cùng (B2C) từ 18 tuổi trở lên, hiện đang thường xuyên sử dụng ít nhất một danh mục sản phẩm FMCG tại Việt Nam.\n\n(Nghiên cứu tập trung tiếp cận mô hình ở cấp độ cá nhân vi mô thông qua phương pháp Khảo sát và Thực nghiệm, do đó không sử dụng dữ liệu vĩ mô từ phía doanh nghiệp nhằm giảm thiểu rủi ro ngụy biện sinh thái - Ecological Fallacy).\n\n### 4.3. Phạm vi nghiên cứu\n\n**Phạm vi không gian:** Việt Nam, tập trung thu thập dữ liệu khảo sát và thực nghiệm tại TP. Hồ Chí Minh, Hà Nội, và 2-3 tỉnh thành cấp 2 (Đà Nẵng, Cần Thơ, Bình Dương) nhằm đảm bảo tính đại diện.\n\n**Phạm vi ngành:** Ngành FMCG bao gồm ba nhóm sản phẩm: (1) Thực phẩm & Đồ uống; (2) Chăm sóc cá nhân (personal care); (3) Chăm sóc gia đình (home care). Không bao gồm dược phẩm và thuốc lá do có đặc thù điều tiết riêng.\n\n**Phạm vi thời gian:**\n- Study 1 (Khảo sát dọc - Longitudinal Survey): Thu thập dữ liệu theo 2 đợt (cách nhau 3 tuần) trong giai đoạn nửa đầu năm 2027.\n- Study 2 (Thực nghiệm kịch bản - Scenario-based Experiment): Tiến hành vào nửa cuối năm 2027.\n"},{"title":"5. Phương pháp nghiên cứu sẽ được sử dụng","file":"05_PhuongPhap.md","chars":31045,"pages":"17.2","content":"## 5. Phương pháp nghiên cứu sẽ được sử dụng\n\n### 5.1. Thiết kế nghiên cứu tổng thể\n\nNghiên cứu sử dụng **thiết kế đa nghiên cứu (Multi-study Design)** nhằm tăng cường độ tin cậy và giá trị học thuật của nghiên cứu, bao gồm:\n\n**Study 1 - Khảo sát dọc:**\nThiết kế khảo sát 2 đợt trên mẫu N = 900 người tiêu dùng FMCG nhằm kiểm định toàn bộ mô hình cấu trúc CSI–CL–eWOM–CBO. Mục đích tách biệt thời điểm đo lường biến độc lập và biến phụ thuộc để kiểm soát chặt chẽ rủi ro phương pháp chung.\n\n- **Wave 1 (T1):** Đo lường thói quen tiêu dùng (HB), chất lượng cảm nhận (PQ), giá trị cảm nhận (PV), và Chỉ số Hài lòng tổng thể (CSI). Đồng thời thu thập Biến đánh dấu không liên quan về mặt lý thuyết.\n- **Wave 2 (T2, cách T1 ba tuần):** Đo lường lòng trung thành thương hiệu (CL), truyền miệng điện tử (eWOM), ý định chi trả giá cao (WTPP), tỷ trọng chi tiêu dự kiến (eSOW), và sự phụ thuộc vào thuật toán đề xuất (ARD).\n\nKhoảng cách 3 tuần giữa hai đợt đủ dài để phá vỡ hiệu ứng nhất quán cảm xúc nhưng đủ ngắn để giảm thiểu tỷ lệ hao hụt mẫu. Dựa trên tỷ lệ phản hồi thận trọng 30-40% trong nghiên cứu hành vi tiêu dùng thực tế, cần phát ra tối thiểu 2.500–3.000 bảng hỏi ở Wave 1 để thu về ít nhất 900 cặp dữ liệu hợp lệ. Nghiên cứu sẽ sử dụng hệ thống incentive (phiếu mua hàng/voucher trị giá 20.000–50.000 VND) và cơ chế nhắc nhở qua SMS/Zalo sau 1 tuần và 2 tuần để tối đa hóa tỷ lệ giữ chân mẫu.\n\n**Kiểm định sự khác biệt nhóm (Non-response Bias Test):** Sau khi thu thập xong Wave 2, thực hiện kiểm định Independent Samples t-test so sánh các đặc điểm nhân khẩu học và điểm trung bình các biến Wave 1 giữa hai nhóm: (1) những người phản hồi cả Wave 2, và (2) những người chỉ phản hồi Wave 1 rồi bỏ cuộc. Nếu không có sự khác biệt có ý nghĩa thống kê (p \u003e 0.05) trên các biến chính, kết luận việc hao hụt mẫu mang tính ngẫu nhiên và không tạo ra thiên lệch hệ thống.\n\n**Study 2 - Thực nghiệm kịch bản:**\nThiết kế thực nghiệm giữa các nhóm trên mẫu N = 200 người tiêu dùng, chia thành hai nhóm:\n\n- **Nhóm Kiểm soát:** Trải nghiệm kịch bản mua sắm trực tuyến truyền thống, không có gợi ý sản phẩm thay thế từ thuật toán.\n- **Nhóm Xử lý:** Trải nghiệm kịch bản mua sắm trực tuyến có thuật toán AI chủ động gợi ý sản phẩm đối thủ giá rẻ hơn, hiển thị flash sale, và so sánh giá tự động.\n\nSau khi tiếp xúc với kịch bản, cả hai nhóm được đo lường: (1) tính nhạy cảm về giá như biến trung gian tâm lý giải thích cơ chế tại sao thuật toán làm suy giảm lòng trung thành; (2) lòng trung thành (CL), ý định chi trả giá cao (WTPP), và tỷ trọng chi tiêu (eSOW) như biến kết quả. Study 2 nhằm chứng minh quan hệ nhân quả cho giả thuyết: thuật toán AI gợi ý sản phẩm thay thế làm tăng tính nhạy cảm về giá (PS), thông qua đó làm giảm lòng trung thành và WTPP. Thiết kế Mediation-within-Experiment này bổ khuyết cho Study 1 vốn chỉ xác lập quan hệ tương quan, đồng thời giải thích rõ cơ chế tâm lý trung gian.\n\n**Giai đoạn Định tính bổ trợ:**\nTrước cả hai Study, thực hiện phỏng vấn sâu bán cấu trúc với hai nhóm:\n- 10–15 nhà quản lý cấp trung và cấp cao tại các doanh nghiệp FMCG.\n- 15–20 người tiêu dùng FMCG đại diện theo giới tính, độ tuổi, và khu vực địa lý.\n\nMục đích: khám phá các chiều kích đặc thù của sự hài lòng và lòng trung thành trong bối cảnh FMCG Việt Nam chưa được mô hình ACSI gốc phản ánh đầy đủ; điều chỉnh và bổ sung thang đo cho phù hợp.\n\n### 5.2. Mô hình nghiên cứu đề xuất (Study 1)\n\nMô hình nghiên cứu được xây dựng theo cấu trúc tích hợp gồm ba tầng, phản ánh hai kênh truyền dẫn song song từ CSI đến hiệu quả hành vi khách hàng.\n\nTầng tiền đề gồm ba biến hình thành CSI: thói quen tiêu dùng (đại diện cho sự thân thuộc và hành vi mua lặp lại phi lý trí), chất lượng cảm nhận, và giá trị cảm nhận. Tầng trung gian gồm hai biến song song: lòng trung thành thương hiệu (CL) và truyền miệng điện tử (eWOM). Hai biến trung gian này đại diện cho hai cơ chế chuyển hóa: CL phản ánh sự gắn kết thái độ, trong khi eWOM phản ánh hành vi ủng hộ công khai. Tầng kết quả đo lường Hiệu quả Hành vi Khách hàng (CBO) bao gồm: ý định chi trả giá cao (WTPP) và tỷ trọng chi tiêu dự kiến (eSOW). Biến điều tiết gồm: sự phụ thuộc vào thuật toán đề xuất (ARD) và Tài sản thương hiệu (cảm nhận).\n\n#### Sơ đồ mô hình nghiên cứu tích hợp (Hình 1 - Study 1)\n\n\u003csvg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 920 480\" width=\"100%\" font-family=\"Arial,sans-serif\" font-size=\"12\"\u003e\n  \u003crect width=\"920\" height=\"480\" fill=\"#fff\"/\u003e\n  \u003ctext x=\"60\" y=\"20\" font-size=\"11\" font-weight=\"bold\" text-anchor=\"middle\"\u003eTIỀN ĐỀ\u003c/text\u003e\n  \u003ctext x=\"300\" y=\"20\" font-size=\"11\" font-weight=\"bold\" text-anchor=\"middle\"\u003eNÚT TRUNG TÂM\u003c/text\u003e\n  \u003ctext x=\"530\" y=\"20\" font-size=\"11\" font-weight=\"bold\" text-anchor=\"middle\"\u003eTRUNG GIAN\u003c/text\u003e\n  \u003ctext x=\"770\" y=\"20\" font-size=\"11\" font-weight=\"bold\" text-anchor=\"middle\"\u003eKẾT QUẢ CẤP KHÁCH HÀNG\u003c/text\u003e\n  \u003c!-- Latent constructs = ELLIPSES (SEM convention) --\u003e\n  \u003cellipse cx=\"60\" cy=\"55\" rx=\"55\" ry=\"22\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"60\" y=\"51\" text-anchor=\"middle\" font-weight=\"bold\"\u003eHB\u003c/text\u003e\n  \u003ctext x=\"60\" y=\"65\" text-anchor=\"middle\" font-size=\"9\"\u003eThói quen TD\u003c/text\u003e\n  \u003cellipse cx=\"60\" cy=\"222\" rx=\"55\" ry=\"22\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"60\" y=\"218\" text-anchor=\"middle\" font-weight=\"bold\"\u003ePQ\u003c/text\u003e\n  \u003ctext x=\"60\" y=\"232\" text-anchor=\"middle\" font-size=\"9\"\u003eChất lượng CN\u003c/text\u003e\n  \u003cellipse cx=\"60\" cy=\"394\" rx=\"55\" ry=\"22\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"60\" y=\"390\" text-anchor=\"middle\" font-weight=\"bold\"\u003ePV\u003c/text\u003e\n  \u003ctext x=\"60\" y=\"404\" text-anchor=\"middle\" font-size=\"9\"\u003eGiá trị CN\u003c/text\u003e\n  \u003cellipse cx=\"300\" cy=\"222\" rx=\"65\" ry=\"30\" fill=\"#f2f2f2\" stroke=\"#000\" stroke-width=\"2\"/\u003e\n  \u003ctext x=\"300\" y=\"218\" text-anchor=\"middle\" font-weight=\"bold\" font-size=\"14\"\u003eCSI\u003c/text\u003e\n  \u003ctext x=\"300\" y=\"236\" text-anchor=\"middle\" font-size=\"9\"\u003eChỉ số Hài lòng KH\u003c/text\u003e\n  \u003cellipse cx=\"530\" cy=\"135\" rx=\"60\" ry=\"26\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"530\" y=\"131\" text-anchor=\"middle\" font-weight=\"bold\"\u003eCL\u003c/text\u003e\n  \u003ctext x=\"530\" y=\"147\" text-anchor=\"middle\" font-size=\"9\"\u003eLòng trung thành TH\u003c/text\u003e\n  \u003cellipse cx=\"530\" cy=\"325\" rx=\"60\" ry=\"26\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"530\" y=\"321\" text-anchor=\"middle\" font-weight=\"bold\"\u003eeWOM\u003c/text\u003e\n  \u003ctext x=\"530\" y=\"337\" text-anchor=\"middle\" font-size=\"9\"\u003eTruyền miệng ĐT\u003c/text\u003e\n  \u003cellipse cx=\"770\" cy=\"135\" rx=\"72\" ry=\"26\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"770\" y=\"128\" text-anchor=\"middle\" font-weight=\"bold\" font-size=\"11\"\u003eCBO1\u003c/text\u003e\n  \u003ctext x=\"770\" y=\"145\" text-anchor=\"middle\" font-size=\"9\"\u003eWTPP\u003c/text\u003e\n  \u003cellipse cx=\"770\" cy=\"325\" rx=\"72\" ry=\"26\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"770\" y=\"318\" text-anchor=\"middle\" font-weight=\"bold\" font-size=\"11\"\u003eCBO2\u003c/text\u003e\n  \u003ctext x=\"770\" y=\"335\" text-anchor=\"middle\" font-size=\"9\"\u003eeSOW (Freq. Alloc.)\u003c/text\u003e\n  \u003c!-- H1-H3: Antecedents to CSI --\u003e\n  \u003cline x1=\"115\" y1=\"55\" x2=\"235\" y2=\"210\" stroke=\"#000\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/\u003e\n  \u003ctext x=\"145\" y=\"105\" font-size=\"10\" font-weight=\"bold\"\u003eH1\u003c/text\u003e\n  \u003cline x1=\"115\" y1=\"222\" x2=\"235\" y2=\"222\" stroke=\"#000\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/\u003e\n  \u003ctext x=\"155\" y=\"200\" font-size=\"10\" font-weight=\"bold\"\u003eH2\u003c/text\u003e\n  \u003cline x1=\"115\" y1=\"394\" x2=\"235\" y2=\"238\" stroke=\"#000\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/\u003e\n  \u003ctext x=\"145\" y=\"325\" font-size=\"10\" font-weight=\"bold\"\u003eH3\u003c/text\u003e\n  \u003c!-- H4-H5: CSI to Mediators --\u003e\n  \u003cline x1=\"365\" y1=\"208\" x2=\"470\" y2=\"140\" stroke=\"#000\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/\u003e\n  \u003ctext x=\"390\" y=\"155\" font-size=\"10\" font-weight=\"bold\"\u003eH4\u003c/text\u003e\n  \u003cline x1=\"365\" y1=\"236\" x2=\"470\" y2=\"320\" stroke=\"#000\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/\u003e\n  \u003ctext x=\"390\" y=\"280\" font-size=\"10\" font-weight=\"bold\"\u003eH5\u003c/text\u003e\n  \u003c!-- H6-H9: Mediators to CBOs --\u003e\n  \u003cline x1=\"590\" y1=\"130\" x2=\"698\" y2=\"130\" stroke=\"#000\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/\u003e\n  \u003ctext x=\"630\" y=\"115\" font-size=\"10\" font-weight=\"bold\"\u003eH6\u003c/text\u003e\n  \u003cline x1=\"590\" y1=\"145\" x2=\"698\" y2=\"315\" stroke=\"#000\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/\u003e\n  \u003ctext x=\"575\" y=\"185\" font-size=\"10\" font-weight=\"bold\"\u003eH7\u003c/text\u003e\n  \u003cline x1=\"590\" y1=\"315\" x2=\"698\" y2=\"145\" stroke=\"#000\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/\u003e\n  \u003ctext x=\"575\" y=\"240\" font-size=\"10\" font-weight=\"bold\"\u003eH8\u003c/text\u003e\n  \u003cline x1=\"590\" y1=\"325\" x2=\"698\" y2=\"325\" stroke=\"#000\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/\u003e\n  \u003ctext x=\"630\" y=\"310\" font-size=\"10\" font-weight=\"bold\"\u003eH9\u003c/text\u003e\n  \u003c!-- Moderator boxes (observed/categorical = rectangles with dashed) --\u003e\n  \u003crect x=\"250\" y=\"420\" width=\"160\" height=\"38\" rx=\"3\" fill=\"#fafafa\" stroke=\"#777\" stroke-width=\"1\" stroke-dasharray=\"4,3\"/\u003e\n  \u003ctext x=\"330\" y=\"436\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\"\u003eW1: ARD\u003c/text\u003e\n  \u003ctext x=\"330\" y=\"451\" text-anchor=\"middle\" font-size=\"9\" fill=\"#555\"\u003ePhụ thuộc Thuật toán\u003c/text\u003e\n  \u003c!-- Moderator 2 (Brand Size) moved to the TOP for clean straight lines (adjusted down to clear headers) --\u003e\n  \u003crect x=\"340\" y=\"45\" width=\"160\" height=\"38\" rx=\"3\" fill=\"#fafafa\" stroke=\"#777\" stroke-width=\"1\" stroke-dasharray=\"4,3\"/\u003e\n  \u003ctext x=\"420\" y=\"61\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\"\u003eBE: Tài sản TH\u003c/text\u003e\n  \u003ctext x=\"420\" y=\"76\" text-anchor=\"middle\" font-size=\"9\" fill=\"#555\"\u003eThấp / Vừa / Cao\u003c/text\u003e\n  \n  \u003c!-- Moderation arrows pointing to PATHS (perpendicular to path midpoints) --\u003e\n  \u003c!-- H10a: ARD moderates CSI-\u003eeWOM path. Midpoint of CSI-\u003eeWOM path is ~(415, 278) --\u003e\n  \u003cline x1=\"330\" y1=\"420\" x2=\"415\" y2=\"290\" stroke=\"#777\" stroke-width=\"1.2\" stroke-dasharray=\"5,3\" marker-end=\"url(#ag)\"/\u003e\n  \u003ctext x=\"355\" y=\"355\" font-size=\"9\" fill=\"#555\"\u003eH10a\u003c/text\u003e\n  \u003c!-- H10b: ARD moderates CSI-\u003eCL path. Midpoint of CSI-\u003eCL path is ~(415, 174) --\u003e\n  \u003cline x1=\"330\" y1=\"420\" x2=\"415\" y2=\"185\" stroke=\"#777\" stroke-width=\"1.2\" stroke-dasharray=\"5,3\" marker-end=\"url(#ag)\"/\u003e\n  \u003ctext x=\"355\" y=\"305\" font-size=\"9\" fill=\"#555\"\u003eH10b\u003c/text\u003e\n  \n  \u003c!-- H11: Brand Size moderates CSI-\u003eCL path. Points straight down from top --\u003e\n  \u003cline x1=\"420\" y1=\"83\" x2=\"415\" y2=\"174\" stroke=\"#777\" stroke-width=\"1.2\" stroke-dasharray=\"5,3\" marker-end=\"url(#ag)\"/\u003e\n  \u003ctext x=\"428\" y=\"105\" font-size=\"9\" fill=\"#555\"\u003eH11\u003c/text\u003e\n  \n  \u003c!-- Small circle on path midpoints to indicate moderation interaction point --\u003e\n  \u003ccircle cx=\"415\" cy=\"174\" r=\"4\" fill=\"#777\" opacity=\"0.6\"/\u003e\n  \u003ccircle cx=\"415\" cy=\"185\" r=\"4\" fill=\"#777\" opacity=\"0.6\"/\u003e\n  \u003ccircle cx=\"415\" cy=\"290\" r=\"4\" fill=\"#777\" opacity=\"0.6\"/\u003e\n  \u003cdefs\u003e\n    \u003cmarker id=\"a\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"\u003e\u003cpath d=\"M0,0 L0,6 L7,3 z\" fill=\"#000\"/\u003e\u003c/marker\u003e\n    \u003cmarker id=\"ag\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"\u003e\u003cpath d=\"M0,0 L0,6 L7,3 z\" fill=\"#777\"/\u003e\u003c/marker\u003e\n  \u003c/defs\u003e\n\u003c/svg\u003e\n\n*Hình 1. Mô hình cấu trúc tuyến tính CSI–CL–eWOM và Hiệu quả Hành vi Khách hàng (Study 1).*\n*(Nguồn: Tác giả đề xuất, 2026)*\n\n**Chú giải:**\n- Hình Elip: biến tiềm ẩn đo lường bằng nhiều items\n- Hình chữ nhật đứt nét: biến điều tiết (quan sát trực tiếp hoặc phân loại)\n- Mũi tên liền đen: tác động nhân quả trực tiếp (H1-H9)\n- Mũi tên đứt xám trỏ vuông góc vào đường dẫn (có chấm tròn): tác động điều tiết (H10a, H10b, H11) - biến điều tiết tác động lên **mối quan hệ** giữa hai biến, không phải lên chính biến đó\n- H10a: ARD điều tiết đường dẫn CSI -\u003e eWOM\n- H10b: ARD điều tiết đường dẫn CSI -\u003e CL\n- H11: Tài sản thương hiệu điều tiết đường dẫn CSI -\u003e CL\n\n#### Sơ đồ mô hình thực nghiệm (Hình 2 - Study 2)\n\n\u003csvg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 780 360\" width=\"100%\" font-family=\"Arial,sans-serif\" font-size=\"12\"\u003e\n  \u003crect width=\"780\" height=\"360\" fill=\"#fff\"/\u003e\n  \u003ctext x=\"390\" y=\"20\" font-size=\"13\" font-weight=\"bold\" text-anchor=\"middle\"\u003eMÔ HÌNH THỰC NGHIỆM KỊCH BẢN (Study 2)\u003c/text\u003e\n  \u003c!-- Manipulation variable (rectangle = observed) --\u003e\n  \u003crect x=\"30\" y=\"120\" width=\"170\" height=\"55\" rx=\"5\" fill=\"#e8f4fd\" stroke=\"#2196F3\" stroke-width=\"2\"/\u003e\n  \u003ctext x=\"115\" y=\"142\" text-anchor=\"middle\" font-weight=\"bold\" font-size=\"11\" fill=\"#1565C0\"\u003eBIẾN THAO TÁC\u003c/text\u003e\n  \u003ctext x=\"115\" y=\"158\" text-anchor=\"middle\" font-size=\"10\"\u003eGiao diện có AI gợi ý\u003c/text\u003e\n  \u003ctext x=\"115\" y=\"172\" text-anchor=\"middle\" font-size=\"9\" fill=\"#555\"\u003evs. Không có AI\u003c/text\u003e\n  \u003c!-- Mediator (ellipse = latent) --\u003e\n  \u003cellipse cx=\"370\" cy=\"148\" rx=\"85\" ry=\"30\" fill=\"#fff3e0\" stroke=\"#FF9800\" stroke-width=\"1.8\"/\u003e\n  \u003ctext x=\"370\" y=\"142\" text-anchor=\"middle\" font-weight=\"bold\" font-size=\"11\" fill=\"#E65100\"\u003ePS\u003c/text\u003e\n  \u003ctext x=\"370\" y=\"158\" text-anchor=\"middle\" font-size=\"9\"\u003eTính nhạy cảm về Giá\u003c/text\u003e\n  \u003ctext x=\"370\" y=\"170\" text-anchor=\"middle\" font-size=\"8\" fill=\"#888\"\u003e(Price Sensitivity)\u003c/text\u003e\n  \u003c!-- DVs (ellipses = latent) --\u003e\n  \u003cellipse cx=\"640\" cy=\"80\" rx=\"65\" ry=\"22\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"640\" y=\"76\" text-anchor=\"middle\" font-weight=\"bold\"\u003eCL\u003c/text\u003e\n  \u003ctext x=\"640\" y=\"92\" text-anchor=\"middle\" font-size=\"9\"\u003eLòng trung thành\u003c/text\u003e\n  \u003cellipse cx=\"640\" cy=\"150\" rx=\"65\" ry=\"22\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"640\" y=\"146\" text-anchor=\"middle\" font-weight=\"bold\"\u003eWTPP\u003c/text\u003e\n  \u003ctext x=\"640\" y=\"162\" text-anchor=\"middle\" font-size=\"9\"\u003eÝ định trả giá cao\u003c/text\u003e\n  \u003cellipse cx=\"640\" cy=\"220\" rx=\"65\" ry=\"22\" fill=\"#fff\" stroke=\"#000\" stroke-width=\"1.5\"/\u003e\n  \u003ctext x=\"640\" y=\"216\" text-anchor=\"middle\" font-weight=\"bold\"\u003eeSOW\u003c/text\u003e\n  \u003ctext x=\"640\" y=\"232\" text-anchor=\"middle\" font-size=\"9\"\u003eTỷ trọng chi tiêu\u003c/text\u003e\n  \u003c!-- Arrows: Manipulation -\u003e Mediator --\u003e\n  \u003cline x1=\"200\" y1=\"148\" x2=\"285\" y2=\"148\" stroke=\"#2196F3\" stroke-width=\"2\" marker-end=\"url(#ab)\"/\u003e\n  \u003ctext x=\"240\" y=\"140\" font-size=\"10\" fill=\"#1565C0\" font-weight=\"bold\"\u003ea\u003c/text\u003e\n  \u003c!-- Arrows: Mediator -\u003e DVs --\u003e\n  \u003cline x1=\"455\" y1=\"132\" x2=\"575\" y2=\"85\" stroke=\"#FF9800\" stroke-width=\"1.5\" marker-end=\"url(#ao)\"/\u003e\n  \u003ctext x=\"510\" y=\"100\" font-size=\"10\" fill=\"#E65100\" font-weight=\"bold\"\u003eb1\u003c/text\u003e\n  \u003cline x1=\"455\" y1=\"148\" x2=\"575\" y2=\"148\" stroke=\"#FF9800\" stroke-width=\"1.5\" marker-end=\"url(#ao)\"/\u003e\n  \u003ctext x=\"510\" y=\"140\" font-size=\"10\" fill=\"#E65100\" font-weight=\"bold\"\u003eb2\u003c/text\u003e\n  \u003cline x1=\"455\" y1=\"163\" x2=\"575\" y2=\"215\" stroke=\"#FF9800\" stroke-width=\"1.5\" marker-end=\"url(#ao)\"/\u003e\n  \u003ctext x=\"510\" y=\"200\" font-size=\"10\" fill=\"#E65100\" font-weight=\"bold\"\u003eb3\u003c/text\u003e\n  \u003c!-- Direct effect (Manipulation -\u003e DVs, dashed = controlled for mediator) --\u003e\n  \u003cline x1=\"200\" y1=\"130\" x2=\"575\" y2=\"80\" stroke=\"#999\" stroke-width=\"1\" stroke-dasharray=\"5,3\" marker-end=\"url(#ag2)\"/\u003e\n  \u003ctext x=\"380\" y=\"90\" font-size=\"9\" fill=\"#999\"\u003ec' (trực tiếp)\u003c/text\u003e\n  \u003c!-- Control variables --\u003e\n  \u003crect x=\"30\" y=\"280\" width=\"140\" height=\"55\" rx=\"3\" fill=\"#fafafa\" stroke=\"#aaa\" stroke-width=\"1\" stroke-dasharray=\"4,3\"/\u003e\n  \u003ctext x=\"100\" y=\"298\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" fill=\"#666\"\u003eBIẾN KIỂM SOÁT\u003c/text\u003e\n  \u003ctext x=\"100\" y=\"312\" text-anchor=\"middle\" font-size=\"9\" fill=\"#888\"\u003eGiới tính\u003c/text\u003e\n  \u003ctext x=\"100\" y=\"324\" text-anchor=\"middle\" font-size=\"9\" fill=\"#888\"\u003eĐộ tuổi | Tần suất online\u003c/text\u003e\n  \u003cline x1=\"170\" y1=\"300\" x2=\"575\" y2=\"88\" stroke=\"#ccc\" stroke-width=\"0.8\" stroke-dasharray=\"3,3\" marker-end=\"url(#ag2)\"/\u003e\n  \u003cline x1=\"170\" y1=\"310\" x2=\"575\" y2=\"155\" stroke=\"#ccc\" stroke-width=\"0.8\" stroke-dasharray=\"3,3\" marker-end=\"url(#ag2)\"/\u003e\n  \u003cline x1=\"170\" y1=\"320\" x2=\"575\" y2=\"222\" stroke=\"#ccc\" stroke-width=\"0.8\" stroke-dasharray=\"3,3\" marker-end=\"url(#ag2)\"/\u003e\n  \u003cdefs\u003e\n    \u003cmarker id=\"ab\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"\u003e\u003cpath d=\"M0,0 L0,6 L7,3 z\" fill=\"#2196F3\"/\u003e\u003c/marker\u003e\n    \u003cmarker id=\"ao\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"\u003e\u003cpath d=\"M0,0 L0,6 L7,3 z\" fill=\"#FF9800\"/\u003e\u003c/marker\u003e\n    \u003cmarker id=\"ag2\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"\u003e\u003cpath d=\"M0,0 L0,6 L7,3 z\" fill=\"#ccc\"/\u003e\u003c/marker\u003e\n  \u003c/defs\u003e\n\u003c/svg\u003e\n\n*Hình 2. Mô hình thực nghiệm kịch bản với biến trung gian tâm lý (Study 2).*\n*(Nguồn: Tác giả đề xuất, 2026)*\n\n**Chú giải Hình 2:**\n- Đường a: Tác động của thuật toán AI lên tính nhạy cảm về giá (PS)\n- Đường b1, b2, b3: Tác động trung gian của Price Sensitivity lên CL, WTPP, eSOW\n- Đường c' (đứt nét): Tác động trực tiếp còn lại sau khi kiểm soát trung gian\n- Đường mờ nhạt: Tác động kiểm soát của biến nhân khẩu học\n\n#### Bảng tổng hợp biến và thang đo (Study 1)\n\n| Ký hiệu | Tên biến | Vai trò | Biến quan sát | Nguồn thang đo | Đợt |\n|---------|----------|---------|--------------|----------------|-----|\n| HB | thói quen tiêu dùng | Tiền đề CSI | 3 items (Likert 5) | Verplanken & Orbell (2003); Khare & Inman (2006) | Wave 1 |\n| PQ | chất lượng cảm nhận | Tiền đề CSI | 4 items (Likert 5) | Fornell et al. (1996); Zeithaml et al. (1996) | Wave 1 |\n| PV | giá trị cảm nhận | Tiền đề CSI | 3 items (Likert 5) | Fornell et al. (1996) | Wave 1 |\n| CSI | Chỉ số hài lòng tổng thể | Biến phụ thuộc (cấp 1) | 3 items (Likert 5) | ACSI model; Oliver (1980) | Wave 1 |\n| MV | Biến đánh dấu | Kiểm soát CMB | 2 items (Likert 5) | Lindell & Whitney (2001) | Wave 1 |\n| CL | lòng trung thành thương hiệu | Biến trung gian | 4 items (Likert 5) | Zeithaml et al. (1996); Dawes et al. (2015) | Wave 2 |\n| eWOM | Truyền miệng điện tử | Biến trung gian | 4 items (Likert 5) | Hennig-Thurau et al. (2004) | Wave 2 |\n| CBO1 | ý định chi trả giá cao (WTPP) | Biến kết quả | 3 items (Likert 5) | Homburg et al. (2005) | Wave 2 |\n| CBO2 | tỷ trọng chi tiêu dự kiến (eSOW) | Biến kết quả | Frequency Allocation (/10) | Keiningham et al. (2007), điều chỉnh | Wave 2 |\n| ARD | sự phụ thuộc vào thuật toán đề xuất | Biến điều tiết | 4 items (Likert 5) | Tự phát triển (dựa trên định tính) | Wave 2 |\n| BE | Tài sản thương hiệu | Biến điều tiết | Phân loại (thấp/vừa/cao) | Tự khai báo (cảm nhận tài sản) | Wave 2 |\n\n**Tổng Study 1: 10 construct, 30+ items (chưa kể câu hỏi nhân khẩu học)**\n\n#### Bảng chi tiết nhân tố quan sát theo từng construct\n\n**HB: Thói quen tiêu dùng** *(3 items, kế thừa Verplanken & Orbell, 2003)* — Wave 1\n\n| Mã | Nội dung nhân tố quan sát |\n|---|---|\n| HB1 | Tôi mua sản phẩm [TH] một cách tự động mà không cần suy nghĩ nhiều. |\n| HB2 | Việc chọn mua [TH] là một phần tự nhiên trong thói quen mua sắm của tôi. |\n| HB3 | Tôi cảm thấy quen thuộc và an tâm khi chọn [TH] thay vì tìm hiểu sản phẩm mới. |\n\n**PQ: Chất lượng cảm nhận** *(4 items, kế thừa Fornell et al., 1996; Zeithaml et al., 1996)* — Wave 1\n\n| Mã | Nội dung nhân tố quan sát |\n|---|---|\n| PQ1 | Sản phẩm [TH] có chất lượng tổng thể đáp ứng được mong đợi của tôi. |\n| PQ2 | Sản phẩm [TH] có chất lượng ổn định qua các lần mua. |\n| PQ3 | Sản phẩm [TH] đáp ứng đúng với những gì được công bố hoặc quảng cáo. |\n| PQ4 | Dịch vụ hỗ trợ và sau mua của [TH] đáp ứng tốt nhu cầu của tôi. |\n\n**PV: Giá trị cảm nhận** *(3 items, kế thừa Fornell et al., 1996)* — Wave 1\n\n| Mã | Nội dung nhân tố quan sát |\n|---|---|\n| PV1 | Chất lượng sản phẩm [TH] tương xứng với giá tôi phải trả. |\n| PV2 | Với mức giá hiện tại, [TH] mang lại giá trị tốt hơn so với các thương hiệu khác. |\n| PV3 | Tôi cảm thấy chi phí bỏ ra để mua [TH] là hợp lý. |\n\n**CSI: Chỉ số hài lòng tổng thể** *(3 items, kế thừa ACSI; Oliver, 1980)* — Wave 1\n\n| Mã | Nội dung nhân tố quan sát |\n|---|---|\n| CSI1 | Nhìn chung, tôi hài lòng với sản phẩm [TH]. |\n| CSI2 | [TH] mang lại trải nghiệm tích cực trong quá trình sử dụng. |\n| CSI3 | Nếu hình dung sản phẩm FMCG lý tưởng, [TH] gần với hình ảnh đó đến mức nào? |\n\n**MV: Biến đánh dấu** *(2 items, không liên quan lý thuyết)* — Wave 1\n\n| Mã | Nội dung nhân tố quan sát |\n|---|---|\n| MV1 | Tôi thích đọc tin tức về thời tiết mỗi ngày. |\n| MV2 | Tôi thường xuyên theo dõi các giải thể thao trực tiếp. |\n\n*Ghi chú: Hai câu hỏi trên không có tương quan lý thuyết đến hành vi mua sắm FMCG, được đặt xen giữa các thang đo để phục vụ kỹ thuật kiểm soát CMB theo phương pháp Lindell & Whitney (2001).*\n\n**CL: Lòng trung thành thương hiệu** *(4 items, kế thừa Zeithaml et al., 1996; Dawes et al., 2015)* — Wave 2\n\n| Mã | Nội dung nhân tố quan sát |\n|---|---|\n| CL1 | Tôi có ý định tiếp tục mua sản phẩm [TH] trong tương lai. |\n| CL2 | [TH] là lựa chọn đầu tiên của tôi khi mua sản phẩm trong danh mục này. |\n| CL3 | Tôi cảm thấy gắn kết thực sự với [TH]. |\n| CL4 | Tôi ưu tiên [TH] ngay cả khi có sản phẩm khuyến mãi từ thương hiệu khác. |\n\n**eWOM: Truyền miệng điện tử** *(4 items, kế thừa Hennig-Thurau et al., 2004)* — Wave 2\n\n| Mã | Nội dung nhân tố quan sát |\n|---|---|\n| eWOM1 | Tôi đã hoặc sẽ viết đánh giá tích cực về [TH] trên các nền tảng trực tuyến. |\n| eWOM2 | Tôi chia sẻ thông tin về [TH] với người khác qua mạng xã hội hoặc nhóm chat. |\n| eWOM3 | Khi ai đó hỏi về sản phẩm tương tự, tôi sẽ giới thiệu [TH] trên không gian mạng. |\n| eWOM4 | Tôi chủ động bảo vệ [TH] khi đọc được những bình luận tiêu cực trực tuyến. |\n\n**CBO1: Ý định chi trả giá cao (WTPP)** *(3 items, kế thừa Homburg et al., 2005)* — Wave 2\n\n| Mã | Nội dung nhân tố quan sát |\n|---|---|\n| WTPP1 | Tôi sẵn sàng trả giá cao hơn một chút cho [TH] so với các sản phẩm cạnh tranh. |\n| WTPP2 | Tôi vẫn tiếp tục mua [TH] ngay cả khi giá của nó tăng nhẹ (ví dụ: tăng 5-10%). |\n| WTPP3 | Việc mua [TH] xứng đáng với một mức giá premium (phụ phí) vì sự an tâm nó mang lại. |\n\n**CBO2: Tỷ trọng chi tiêu dự kiến (eSOW)** *(Thang đo phân bổ tần suất - Frequency Allocation Scale, điều chỉnh từ Keiningham et al., 2007)* — Wave 2\n\n| Mã | Nội dung câu hỏi |\n|---|---|\n| eSOW1 | Giả sử trong **10 lần mua** sản phẩm [danh mục] tiếp theo, bạn dự kiến sẽ mua [TH] bao nhiêu lần? *(Ghi số từ 0-10)* |\n| eSOW2 | Ước tính trong 6 tháng tới, phần trăm tổng chi tiêu của bạn dành cho [TH] (share of category spending) so với toàn bộ ngành hàng sẽ rơi vào khoảng nào? *(1: Dưới 20%, 2: 20-40%, 3: 40-60%, 4: 60-80%, 5: Trên 80%)* |\n\n*Ghi chú: eSOW được đo lường kết hợp 2 phương pháp để tăng độ tin cậy: eSOW1 dùng Phân bổ tần suất (dễ mường tượng cho hàng FMCG mua lặp lại), và eSOW2 dùng Tự báo cáo % chi tiêu theo khoảng (Share of category spending) để làm biến phụ trợ đối chiếu chéo.*\n\n**ARD: Sự phụ thuộc vào thuật toán đề xuất** *(4 items, tự phát triển dựa trên nghiên cứu định tính)* — Wave 2\n\n| Mã | Nội dung nhân tố quan sát |\n|---|---|\n| ARD1 | Khi mua sắm online, tôi thường xuyên nhấp vào các sản phẩm do thuật toán gợi ý (\"Bạn có thể thích\", \"Sản phẩm tương tự\"). |\n| ARD2 | Tôi dễ bị thu hút bởi các chương trình flash sale hoặc mã giảm giá xuất hiện đột ngột trên sàn thương mại điện tử. |\n| ARD3 | Khi thấy một sản phẩm thay thế được gợi ý với giá rẻ hơn, tôi thường cân nhắc chuyển đổi thương hiệu. |\n| ARD4 | Các đề xuất cá nhân hóa của ứng dụng mua sắm (Shopee, TikTok Shop, Lazada) ảnh hưởng đáng kể đến quyết định mua hàng của tôi. |\n\n*Ghi chú: Thang đo ARD được phát triển mới theo quy trình chuẩn (DeVellis & Thorpe, 2022): (1) Tạo item pool từ phỏng vấn định tính, (2) Đánh giá nội dung bởi panel chuyên gia, (3) Kiểm định sơ bộ qua Pilot Study (n=80), (4) Tinh chỉnh và xác nhận trong Study 1. Để đảm bảo giá trị mạng lưới khái niệm, kiểm tra rằng ARD có tương quan dương có ý nghĩa thống kê với thời gian sử dụng smartphone hàng ngày (r \u003e 0.3, p \u003c 0.01) và tương quan âm với độ tuổi (người trẻ phụ thuộc thuật toán nhiều hơn). Nếu các tương quan này không đạt, thang đo sẽ được điều chỉnh lại trước khi đưa vào khảo sát chính thức.*\n\n**Phần G - Thông tin phân loại** — Wave 1\n\n| Mã | Nội dung câu hỏi | Phương án trả lời |\n|---|---|---|\n| G1 | Tần suất mua [TH] trong 6 tháng qua | Ít hơn 1 lần/tháng / 1–3 lần/tháng / Hơn 3 lần/tháng |\n| G2 | Giới tính | Nam / Nữ / Khác |\n| G3 | Độ tuổi | 18–24 / 25–34 / 35–44 / 45–54 / 55+ |\n| G4 | Khu vực sinh sống | TP.HCM / Hà Nội / Đà Nẵng / Cần Thơ / Bình Dương / Khác |\n| G5 | Thời gian sử dụng smartphone trung bình hàng ngày | Dưới 2 giờ / 2-4 giờ / 4-6 giờ / Trên 6 giờ |\n\n#### Hệ thống giả thuyết nghiên cứu\n\nMười một giả thuyết được phát triển theo ba tuyến nhân quả, loại bỏ các liên kết vĩ mô để đảm bảo tính nhất quán của cấp độ phân tích:\n\n* **Tuyến 1 - Hình thành CSI (H1-H3):** thói quen (H1), chất lượng cảm nhận (H2) và giá trị cảm nhận (H3) đều tác động dương đến CSI.\n* **Tuyến 2 - Hai kênh truyền dẫn song song (H4-H9):** CSI tác động dương đến lòng trung thành thương hiệu (H4) và eWOM (H5). CL và eWOM tiếp tục thúc đẩy người tiêu dùng sẵn sàng trả giá cao (WTPP) và gia tăng tỷ trọng chi tiêu (eSOW).\n* **Tuyến 3 - Điều tiết theo thuật toán và tài sản thương hiệu (H10a, H10b, H11):**\n\n**Nhóm 1 - Các nhân tố tác động đến CSI (H1-H3)**\n\nViệc ứng dụng nguyên bản mô hình ACSI (với biến kỳ vọng khách hàng - CE) vào ngành FMCG bộc lộ một số hạn chế do đặc thù mua lặp lại và sự thân thuộc. Theo Lý thuyết Hành vi Lập trình, khách hàng FMCG hiếm khi hình thành một \"kỳ vọng\" lý trí trước mỗi lần mua; thay vào đó, thói quen và sự thân thuộc lấn át nhận thức (Khare & Inman, 2006). Vì vậy, nghiên cứu loại bỏ biến CE và thay thế bằng biến **thói quen tiêu dùng (HB)**. Sự thân thuộc và thói quen giảm thiểu nỗ lực nhận thức, tạo ra sự thoải mái tâm lý, từ đó gia tăng chỉ số hài lòng.\n\n- **H1:** thói quen tiêu dùng có tác động tích cực đến CSI.\n- **H2:** chất lượng cảm nhận có tác động tích cực đến CSI.\n- **H3:** giá trị cảm nhận có tác động tích cực đến CSI.\n\n**Nhóm 2 - Ảnh hưởng của CSI đến các biến trung gian (H4-H5)**\n\n- **H4:** CSI có tác động tích cực đến lòng trung thành thương hiệu.\n- **H5:** CSI có tác động tích cực đến truyền miệng điện tử.\n\n**Nhóm 3 - Ảnh hưởng của các biến trung gian đến Hiệu quả Hành vi (H6-H9)**\n\nĐể khắc phục nghịch lý Ecological Fallacy khi nối dữ liệu cá nhân vào dữ liệu doanh nghiệp vĩ mô, nghiên cứu chuyển hướng sử dụng biến đầu ra cấp độ khách hàng. lòng trung thành thái độ (CL) là động lực cốt lõi khiến khách hàng chấp nhận rủi ro giá cả và giới hạn lựa chọn, từ đó sẵn sàng trả giá cao (WTPP) và dồn ngân sách (eSOW) cho thương hiệu (Zeithaml et al., 1996). Tương tự, hành vi eWOM, thông qua việc bảo vệ thương hiệu công khai, tạo ra cam kết tâm lý vững chắc hơn, củng cố ý định chi tiêu thực tế.\n\n- **H6:** lòng trung thành thương hiệu có tác động tích cực đến ý định chi trả giá cao (WTPP).\n- **H7:** lòng trung thành thương hiệu có tác động tích cực đến tỷ trọng chi tiêu dự kiến (eSOW).\n- **H8:** truyền miệng điện tử có tác động tích cực đến ý định chi trả giá cao (WTPP).\n- **H9:** truyền miệng điện tử có tác động tích cực đến tỷ trọng chi tiêu dự kiến (eSOW).\n\n**Nhóm 4 - Vai trò điều tiết (H10a, H10b, H11)**\n\nThay vì sử dụng biến phân loại thô sơ \"Kênh mua sắm (Offline/Online)\", nghiên cứu nâng cấp lên cấu trúc định lượng đo lường **Sự phụ thuộc vào Thuật toán Đề xuất (ARD)**. Lập luận: trong kỷ nguyên số, thuật toán AI của các sàn thương mại điện tử (Shopee, TikTok Shop, Lazada) liên tục gợi ý sản phẩm thay thế, flash sale, và so sánh giá. Khách hàng có độ nhạy cảm cao với các tác nhân này sẽ dễ bị suy giảm lòng trung thành thương hiệu, nhưng ngược lại, sự tiếp xúc thường xuyên với nền tảng số cũng khuyến khích hành vi eWOM chủ động hơn.\n\n- **H10a:** Sự phụ thuộc vào thuật toán đề xuất (ARD) điều tiết tích cực mối quan hệ giữa CSI và truyền miệng điện tử (những người phụ thuộc thuật toán nhiều hơn có xu hướng eWOM mạnh hơn khi hài lòng).\n- **H10b:** Sự phụ thuộc vào thuật toán đề xuất (ARD) điều tiết tiêu cực mối quan hệ giữa CSI và lòng trung thành thương hiệu (thuật toán làm suy giảm lòng trung thành ngay cả khi khách hàng hài lòng).\n- **H11:** Tài sản thương hiệu (cảm nhận) điều tiết tích cực mối quan hệ giữa CSI và lòng trung thành thương hiệu (thương hiệu lớn có lợi thế bảo vệ lòng trung thành trước sự làm suy giảm của thuật toán).\n\n### 5.3. Thu thập và Phân tích dữ liệu\n\n#### Study 1: Khảo sát dọc\n\n**Dữ liệu sơ cấp:** Bảng khảo sát với cỡ mẫu dự kiến n = 900 cặp dữ liệu hợp lệ (từ 2 đợt), tập trung vào các thương hiệu FMCG lớn thuộc nhóm Thực phẩm & Đồ uống tại Việt Nam. Mỗi người trả lời được yêu cầu đánh giá về một thương hiệu FMCG cụ thể mà họ thường xuyên sử dụng nhất trong 6 tháng qua. Thang đo Likert 5 điểm (trừ eSOW dùng Frequency Allocation). Biến eSOW sử dụng thang đo phân bổ tần suất yêu cầu người trả lời phân bổ 10 lần mua tiếp theo cho các thương hiệu cạnh tranh, tạo ra biến liên tục tỷ lệ có tính trực quan và dễ hiểu hơn đáng kể so với thang % ngân sách.\n\n**Kiểm soát Common Method Bias (CMB):**\n\nNghiên cứu áp dụng ba tầng kiểm soát CMB theo khuyến nghị của Podsakoff et al. (2003):\n\n1. **Tách biệt thời điểm đo lường:** Biến nguyên nhân (HB, PQ, PV, CSI) được đo ở Wave 1 (T1), biến kết quả (CL, eWOM, WTPP, eSOW) được đo ở Wave 2 (T2, cách 3 tuần). Thiết kế này phá vỡ hiệu ứng nhất quán cảm xúc, giảm thiểu xu hướng trả lời theo quán tính.\n2. **Biến đánh dấu:** Hai câu hỏi về chủ đề không liên quan (thời tiết, thể thao) được chèn vào Wave 1. Tương quan giữa biến đánh dấu và các biến chính sẽ được sử dụng làm ước lượng thận trọng cho mức độ CMB theo phương pháp Lindell & Whitney (2001).\n3. **Kiểm định Harman's Single Factor:** Thực hiện Phân tích Nhân tố Khám phá (EFA) trên tất cả items. Nếu một nhân tố duy nhất giải thích dưới 50% tổng phương sai, kết luận CMB không phải là mối đe dọa nghiêm trọng.\n\n**Phân tích:**\n- Đánh giá mô hình đo lường: Kiểm định độ tin cậy nhất quán nội bộ (Cronbach's Alpha, Composite Reliability), giá trị hội tụ (AVE), và giá trị phân biệt (HTMT ratio) sử dụng SmartPLS 4.\n- Đánh giá mô hình cấu trúc: Sử dụng thuật toán PLS-SEM và Bootstrapping (5.000 lần lặp) để kiểm định các giả thuyết nhân quả (H1-H9) và đánh giá sức mạnh giải thích (R-square, f-square).\n- Phân tích điều tiết: Sử dụng kỹ thuật Biến tương tác trong PLS-SEM để kiểm định H10a, H10b (ARD điều tiết) và H11 (Tài sản thương hiệu điều tiết). Bổ sung Phân tích Đa nhóm dựa trên điểm cắt trung vị của ARD.\n- Phân tích trung gian: Sử dụng phương pháp Specific Indirect Effects (Bootstrapping) để đánh giá sức mạnh của từng tuyến trung gian (CSI -\u003e CL -\u003e CBO vs. CSI -\u003e eWOM -\u003e CBO).\n\n#### Study 2: Thực nghiệm kịch bản\n\n**Thiết kế:** Thực nghiệm giữa các nhóm, 2 điều kiện (Có thuật toán gợi ý vs. Không có thuật toán gợi ý), N = 200.\n**Biến thao tác:** Tạo hai kịch bản mua sắm trực tuyến giả lập. Nhóm Treatment xem giao diện có AI chủ động hiển thị sản phẩm đối thủ giá rẻ, flash sale, và so sánh giá. Nhóm Control xem giao diện mua sắm thông thường không có gợi ý.\n**Biến trung gian tâm lý:** tính nhạy cảm về giá, đo lường bằng 3 items (Likert 5): (1) Sau khi xem kịch bản, tôi quan tâm nhiều hơn đến việc tìm mức giá thấp nhất; (2) Tôi cảm thấy mình đang trả quá nhiều cho thương hiệu quen thuộc; (3) Sự khác biệt giá giữa các thương hiệu trở nên quan trọng hơn với tôi. Kế thừa và điều chỉnh từ Lichtenstein et al. (1993).\n**Biến đo lường kết quả (sau kịch bản):** CL, WTPP, eSOW.\n**Kiểm tra thao tác:** Sử dụng 2 items kiểm tra xem người tham gia có nhận thức được sự hiện diện của thuật toán gợi ý không.\n**Phân tích:** (1) So sánh trung bình giữa hai nhóm bằng Independent Samples t-test cho tất cả biến kết quả. (2) Kiểm định trung gian trong thực nghiệm: sử dụng PROCESS macro Model 4 (Hayes, 2022) để kiểm tra chuỗi nhân quả Thuật toán AI -\u003e Price Sensitivity -\u003e CL/WTPP/eSOW. (3) Phân tích ANCOVA với các biến kiểm soát (giới tính, độ tuổi, tần suất mua sắm online).\n"},{"title":"6. Kế hoạch nghiên cứu (cụ thể mỗi 06 tháng)","file":"06_KeHoach.md","chars":2974,"pages":"1.7","content":"## 6. Kế hoạch nghiên cứu (cụ thể mỗi 06 tháng)\r\n\r\nThời gian đào tạo dự kiến: **3 năm (36 tháng)**\r\n\r\n**Giai đoạn 1 (Tháng 1-6): Xây dựng nền tảng lý thuyết**\r\nHoàn thành các học phần bắt buộc của chương trình tiến sĩ tại TDTU. Tổng quan tài liệu chuyên sâu: đọc và phân tích tối thiểu 80 tài liệu học thuật về CSI, Customer Behavioral Outcomes, FMCG, và hành vi tiêu dùng số. Xây dựng khung lý thuyết và mô hình nghiên cứu sơ bộ. Viết và bảo vệ đề cương nghiên cứu chi tiết trước Hội đồng Cơ sở.\r\n\r\n**Giai đoạn 2 (Tháng 7-12): Nghiên cứu định tính, xây dựng thang đo và Pilot**\r\nThực hiện phỏng vấn sâu với 25-35 đối tượng (nhà quản lý doanh nghiệp và người tiêu dùng). Phân tích nội dung bằng NVivo. Phát triển thang đo mới cho biến sự phụ thuộc vào thuật toán đề xuất (ARD) theo quy trình chuẩn DeVellis & Thorpe (2022). Điều chỉnh và xây dựng bộ thang đo CSI phù hợp bối cảnh Việt Nam. Khảo sát thử nghiệm (n = 80) để đánh giá độ tin cậy sơ bộ (Cronbach's Alpha, EFA) cho toàn bộ thang đo bao gồm ARD và eSOW. Viết và nộp bài báo số 1 cho hội thảo khoa học quốc gia hoặc tạp chí trong nước có uy tín.\r\n\r\n**Giai đoạn 3 (Tháng 13-18): Study 1 - Khảo sát dọc**\r\nPhát ra 1.200–1.300 bảng hỏi Wave 1 (T1): đo lường HB, PQ, PV, CSI và Marker Variable. Sau 3 tuần, tiến hành Wave 2 (T2) trên cùng tập mẫu: đo lường CL, eWOM, WTPP, eSOW, và ARD. Mục tiêu thu về ít nhất 900 cặp dữ liệu hợp lệ. Làm sạch dữ liệu và mã hóa. Phân tích PLS-SEM bằng SmartPLS 4: đánh giá mô hình đo lường và mô hình cấu trúc (path coefficients, R-square, f-square). Kiểm soát CMB bằng Marker Variable (Lindell & Whitney, 2001) và Harman's Single Factor Test. Báo cáo chuyên đề tiến sĩ số 1. Viết và nộp bài báo quốc tế Scopus/ISI số 1.\r\n\r\n**Giai đoạn 4 (Tháng 19–24): Study 2 - Thực nghiệm kịch bản và Phân tích nâng cao**\r\nThiết kế kịch bản mua sắm trực tuyến giả lập (có/không có thuật toán AI gợi ý sản phẩm thay thế). Tiến hành thực nghiệm giữa các nhóm trên mẫu N = 200 người tiêu dùng. So sánh CL, WTPP, eSOW giữa nhóm Control và Treatment bằng t-test và ANCOVA. Đồng thời, kiểm định hiệu ứng trung gian và điều tiết trong Study 1 bằng Bootstrapping, Interaction Term và Phân tích Đa nhóm (MGA). Báo cáo chuyên đề tiến sĩ số 2. Viết và nộp bài báo quốc tế Scopus/ISI số 2. Trình bày kết quả tại hội thảo quốc tế (nếu có cơ hội).\r\n\r\n**Giai đoạn 5 (Tháng 25–30): Viết luận án và hoàn thiện công bố**\r\nPhản hồi và chỉnh sửa các bài báo đã nộp theo phản biện. Bắt đầu viết bản thảo toàn văn luận án tích hợp Study 1 và Study 2. Báo cáo chuyên đề tiến sĩ số 3. Nộp thêm bài báo quốc tế số 3 (nếu có thể). Hội thảo học thuật tại TDTU: trình bày kết quả nghiên cứu nhận phản hồi từ cộng đồng học thuật.\r\n\r\n**Giai đoạn 6 (Tháng 31–36): Hoàn thiện và bảo vệ luận án**\r\nHoàn thiện bản thảo luận án theo góp ý của người hướng dẫn. Bảo vệ luận án cấp Cơ sở (Hội đồng Khoa). Chỉnh sửa theo góp ý Hội đồng cấp Cơ sở. Nộp hồ sơ và bảo vệ luận án cấp Trường / Nhà nước. Hoàn tất thủ tục và nhận bằng tiến sĩ.\\n"},{"title":"7. Mục tiêu và mong muốn đạt được khi đăng ký tuyển sinh đào tạo trình độ tiến sĩ","file":"07_MucTieu.md","chars":1755,"pages":"1.0","content":"## 7. Mục tiêu và mong muốn đạt được khi đăng ký tuyển sinh đào tạo trình độ tiến sĩ\n\nQuyết định đăng ký dự tuyển chương trình đào tạo tiến sĩ tại Đại học Tôn Đức Thắng xuất phát từ bốn mục tiêu cụ thể và có liên kết với nhau.\n\nVề năng lực học thuật, nghiên cứu sinh mong muốn xây dựng năng lực nghiên cứu độc lập ở trình độ có thể công bố quốc tế, cụ thể là khả năng thiết kế và thực hiện nghiên cứu đa phương pháp kết hợp Khảo sát Dọc và Thực nghiệm kịch bản, ứng dụng Mô hình cấu trúc tuyến tính (PLS-SEM) và Phân tích Đa nhóm (MGA) trên phần mềm SmartPLS. Nghiên cứu sinh đặt mục tiêu phấn đấu công bố các kết quả nghiên cứu trên các tạp chí khoa học quốc tế uy tín nhằm đáp ứng chuẩn đầu ra của chương trình.\n\nVề đóng góp thực tiễn, kết quả nghiên cứu được kỳ vọng chuyển hóa thành bộ công cụ đo lường CSI có thể triển khai cho các doanh nghiệp hàng tiêu dùng nhanh Việt Nam, giúp nhà quản trị có cơ sở định lượng để phân bổ nguồn lực vào các hoạt động nâng cao trải nghiệm khách hàng thay vì dựa vào kinh nghiệm chủ quan.\n\nVề định hướng nghề nghiệp, bằng tiến sĩ là nền tảng để chuyển sang vai trò giảng dạy bậc đại học và sau đại học, đồng thời nâng cao năng lực tư vấn chiến lược về quản lý trải nghiệm khách hàng, lĩnh vực có nhu cầu ngày càng tăng nhưng thiếu chuyên gia có nền tảng học thuật vững tại Việt Nam.\n\nVề đóng góp phát triển ngành, giai đoạn hiện tại của nền kinh tế Việt Nam đang chứng kiến sự dịch chuyển từ cạnh tranh giá sang cạnh tranh giá trị và trải nghiệm. Bằng chứng thực nghiệm về tác động làm suy giảm của thuật toán AI lên lòng trung thành và mối quan hệ giữa CSI và hiệu quả hành vi khách hàng (WTPP, eSOW) có thể đóng góp vào cơ sở bằng chứng cần thiết cho sự dịch chuyển chiến lược Marketing của các doanh nghiệp FMCG.\n"},{"title":"8. Lý do lựa chọn cơ sở đào tạo (Đại học Tôn Đức Thắng)","file":"08_LyDo.md","chars":1777,"pages":"1.0","content":"## 8. Lý do lựa chọn cơ sở đào tạo (Đại học Tôn Đức Thắng)\r\n\r\nĐại học Tôn Đức Thắng (TDTU) là lựa chọn phù hợp nhất cho hướng nghiên cứu này vì một số lý do cụ thể và có cơ sở:\r\n\r\n**Uy tín và công nhận quốc tế:** TDTU liên tục có mặt trong các bảng xếp hạng đại học thế giới uy tín như Times Higher Education (THE) World University Rankings và QS Asia University Rankings. Đây là một trong số rất ít trường đại học Việt Nam có bằng cấp được công nhận rộng rãi trong cộng đồng học thuật và nghề nghiệp quốc tế, đảm bảo giá trị và tính nhận diện của bằng tiến sĩ sau khi tốt nghiệp.\r\n\r\n**Văn hóa nghiên cứu khoa học mạnh:** TDTU có chính sách thúc đẩy và hỗ trợ nghiên cứu sinh công bố quốc tế rõ ràng và thiết thực, bao gồm hỗ trợ tài chính cho bài báo ISI/Scopus, cơ sở hạ tầng nghiên cứu tốt, và môi trường học thuật khuyến khích tranh luận và phản biện khoa học. Điều này phù hợp với mục tiêu công bố quốc tế của nghiên cứu sinh.\r\n\r\n**Nguồn học liệu phong phú:** Hệ thống thư viện TDTU cung cấp đầy đủ quyền truy cập vào các cơ sở dữ liệu học thuật quốc tế (Web of Science, Scopus, ScienceDirect, Emerald), không thể thiếu cho một đề tài yêu cầu tổng quan tài liệu quốc tế chuyên sâu.\r\n\r\n**Đội ngũ chuyên môn phù hợp:** Khoa Quản trị Kinh doanh tại TDTU có đội ngũ giảng viên với hồ sơ công bố quốc tế trong lĩnh vực Marketing, hành vi người tiêu dùng và quản trị chiến lược, là điều kiện tiên quyết để có người hướng dẫn đủ năng lực và kinh nghiệm cho đề tài này.\r\n\r\n**Vị trí địa lý thuận lợi:** TP. Hồ Chí Minh là trung tâm kinh tế, tiêu dùng và FMCG lớn nhất cả nước. Điều này tạo điều kiện tối đa cho việc tiếp cận doanh nghiệp FMCG để phỏng vấn sâu nhà quản lý, cũng như thu thập dữ liệu khảo sát người tiêu dùng với quy mô lớn trên một thị trường đa dạng và đại diện.\\n"},{"title":"9. Kinh nghiệm về nghiên cứu, thực tế, hoạt động xã hội và ngoại khóa","file":"09_KinhNghiem.md","chars":2578,"pages":"1.4","content":"## 9. Kinh nghiệm về nghiên cứu, thực tế, hoạt động xã hội và ngoại khóa\n\n**Kinh nghiệm nghiên cứu:**\nĐã hoàn thành luận văn Thạc sĩ Quản trị Kinh doanh (tháng 8/2020) với đề tài: “Thúc đẩy thị phần tiêu thụ ngành hàng nước tăng lực tại công ty Coca-Cola Việt Nam”, thực hiện dưới sự hướng dẫn của TS. Phùng Minh Tuấn, Đại học Tôn Đức Thắng. Trong quá trình thực hiện, đã ứng dụng phương pháp nghiên cứu định lượng với phần mềm SPSS để phân tích hồi quy và kiểm định thang đo. Hiện đang theo học chương trình Tiến sĩ Quản trị Kinh doanh (DBA) từ tháng 9/2024, với đề tài định hướng: “Tác động của marketing xanh đến hành vi mua của người tiêu dùng”. Đang nâng cao kỹ năng phân tích PLS-SEM với SmartPLS để phục vụ nghiên cứu tiến sĩ.\n\n**Kinh nghiệm giảng dạy:**\nHiện đang tham gia giảng dạy tại hai cơ sở đào tạo:\n- Tại Đại học Tôn Đức Thắng - Khoa Marketing: giảng dạy các học phần Chiến lược Marketing B2B, Kỹ năng Bán hàng và Quản trị Bán lẻ; đã hướng dẫn thành công 13 sinh viên tốt nghiệp.\n- Tại Đại học FPT - Khoa Quản trị Kinh doanh: giảng dạy học phần Khởi nghiệp, hỗ trợ trực tiếp 30 nhóm sinh viên xây dựng dự án khởi nghiệp; đồng thời đảm nhận vai trò giám khảo Cuộc thi Khởi nghiệp 2023.\n\n**Kinh nghiệm thực tiễn:**\nHơn 13 năm kinh nghiệm quản lý trong ngành hàng tiêu dùng nhanh (FMCG), bao gồm thời gian làm việc tại Coca-Cola Việt Nam và vị trí gần nhất là Training & Capability Development Manager tại Mondelez Kinh Do. Ở vị trí này, đảm nhận thiết kế và triển khai các chương trình đào tạo nâng cao năng lực nhân viên; đánh giá hiệu suất và xác định khoảng cách kỹ năng; triển khai đào tạo qua hình thức workshop, e-learning và on-the-job training; hỗ trợ hoạch định kế thừa nhân tài thông qua việc xác định nhân sự tiềm năng cao và xây dựng lộ trình phát triển cá nhân hóa.\n\nKinh nghiệm thực địa trong quản lý kênh phân phối truyền thống và hiện đại, quản lý quan hệ nhà phân phối, và đo lường hiệu quả thương mại là nền tảng trực tiếp cho việc thiết kế nghiên cứu về CSI và hiệu quả hành vi khách hàng FMCG, đặc biệt trong việc xác định các biến điều tiết liên quan đến thuật toán đề xuất.\n\n**Chứng chỉ và phát triển chuyên môn:**\n- Harvard ManageMentor: Coaching; Innovation and Creative Thinking\n- Google: Foundations of Project Management\n\n**Hoạt động học thuật và cộng đồng:**\nTham gia mạng lưới chuyên gia trong lĩnh vực quản trị kinh doanh và marketing; duy trì hoạt động kết nối học thuật - thực tiễn thông qua website lehai.edu.vn nhằm chia sẻ kiến thức quản trị tài chính cá nhân và phát triển năng lực lãnh đạo cho cộng đồng doanh nghiệp Việt Nam.\\n"},{"title":"10. Dự kiến việc làm và các nghiên cứu tiếp theo sau khi tốt nghiệp","file":"10_DuKien.md","chars":2645,"pages":"1.5","content":"## 10. Dự kiến việc làm và các nghiên cứu tiếp theo sau khi tốt nghiệp\n\n**Dự kiến việc làm:**\nSau khi hoàn thành chương trình tiến sĩ, nghiên cứu sinh dự kiến tiếp tục đóng góp cho cộng đồng học thuật và thực tiễn theo hai hướng chính. Thứ nhất, tham gia giảng dạy các học phần Quản trị Marketing, Hành vi người tiêu dùng, và Phương pháp nghiên cứu định lượng tại bậc đại học và sau đại học. Thứ hai, phát triển hoạt động tư vấn chiến lược về Customer Experience Management và xây dựng hệ thống đo lường CSI cho các tập đoàn và doanh nghiệp FMCG tại Việt Nam: một lĩnh vực đang có nhu cầu lớn nhưng thiếu chuyên gia có nền tảng học thuật vững chắc.\n\n**Các hướng nghiên cứu tiếp theo:**\n\n*Hướng 1, Mở rộng bối cảnh số:* Trong giai đoạn hậu tiến sĩ, nghiên cứu sinh sẽ mở rộng nghiên cứu sang bối cảnh thương mại điện tử và bán lẻ đa kênh trong ngành hàng tiêu dùng nhanh, nơi trải nghiệm số ngày càng đóng vai trò quan trọng trong hình thành CSI và lòng trung thành của người tiêu dùng. Xu hướng mua sắm trực tuyến đang tăng trưởng rõ rệt tại Việt Nam đặt ra câu hỏi liệu các yếu tố hình thành CSI trong môi trường số có cấu trúc khác biệt so với kênh truyền thống hay không.\n\n*Hướng 2, So sánh liên quốc gia:* Mở rộng mô hình sang các thị trường ASEAN tương đồng về giai đoạn phát triển kinh tế (Thái Lan, Indonesia, Philippines) để kiểm định tính phổ quát của mô hình và xác định các yếu tố đặc thù quốc gia.\n\n*Hướng 3, Ứng dụng AI trong đo lường CSI và khuếch đại eW

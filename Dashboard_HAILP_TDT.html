y, D. J. (2001). Accounting for common method variance in cross-sectional research designs. *Journal of Applied Psychology*, *86*(1), 114–121. https://doi.org/10.1037/0021-9010.86.1.114\n29. Podsakoff, P. M., MacKenzie, S. B., Lee, J.-Y., & Podsakoff, N. P. (2003). Common method biases in behavioral research: A critical review of the literature and recommended remedies. *Journal of Applied Psychology*, *88*(5), 879–903. https://doi.org/10.1037/0021-9010.88.5.879\n"},{"title":"ĐỀ CƯƠNG NGHIÊN CỨU LUẬN ÁN TIẾN SĨ","file":"PhD_TDT_Marketing_BigData_Final.md","chars":26420,"pages":"14.7","content":"# ĐỀ CƯƠNG NGHIÊN CỨU LUẬN ÁN TIẾN SĨ\r\n\r\n**Tên đề tài dự kiến:** Tác động của Sự hài lòng khách hàng đến Hiệu quả Kinh doanh: Tiếp cận Trách nhiệm giải trình Marketing (Marketing Accountability) và Big Data trong ngành Hàng tiêu dùng nhanh (FMCG) tại Việt Nam.\r\n\r\n**Chuyên ngành đào tạo:** Quản trị Kinh doanh\r\n**Mã chuyên ngành:** 9340101\r\n**Nghiên cứu sinh:** Lê Phúc Hải\r\n**Cơ sở đào tạo:** Trường Đại học Tôn Đức Thắng\r\n\r\n---\r\n\r\n## 1. TÍNH CẤP THIẾT, LÝ DO CHỌN ĐỀ TÀI, LĨNH VỰC NGHIÊN CỨU\r\n\r\n### 1.1. Bối cảnh ngành FMCG: Rào cản chuyển đổi thấp và Quyền lực của Truyền miệng điện tử\r\nNgành Hàng tiêu dùng nhanh (FMCG) tại Việt Nam đang chứng kiến sự cạnh tranh khốc liệt nhất trong lịch sử dưới tác động của quá trình chuyển đổi số. Đặc thù cốt lõi của ngành FMCG là rào cản chuyển đổi thương hiệu cực thấp (low switching cost) và tần suất mua lặp lại cao (high frequency). Trong một thị trường mà người tiêu dùng có thể dễ dàng chuyển từ một lốc sữa Vinamilk sang TH True Milk chỉ trong tích tắc, quyết định mua hàng không còn phụ thuộc hoàn toàn vào lòng trung thành truyền thống. Thay vào đó, nó bị chi phối mạnh mẽ bởi “Truyền miệng điện tử” (Electronic Word-of-Mouth - eWOM).\r\n\r\nSự bùng nổ của mạng xã hội (Facebook, TikTok) và các nền tảng thương mại điện tử (Shopee, Lazada) đã trao cho người tiêu dùng một quyền lực vô tiền khoáng hậu. Một làn sóng eWOM tiêu cực có thể ngay lập tức làm suy giảm doanh số hàng chục tỷ đồng của một tập đoàn (như các cuộc khủng hoảng vệ sinh an toàn thực phẩm gần đây), trong khi một chiến dịch lan truyền eWOM tích cực có thể tạo ra cú hích thị phần đột phá. Do đó, việc đo lường và quản trị eWOM cũng như Sự hài lòng của khách hàng (Customer Satisfaction - CS) đã vượt ra khỏi giới hạn của một chiến thuật Marketing thông thường để trở thành bài toán sống còn về Hiệu quả Kinh doanh (Firm Performance).\r\n\r\n### 1.2. Áp lực Trách nhiệm giải trình Marketing (Marketing Accountability)\r\nDù nhận thức rõ tầm quan trọng của trải nghiệm khách hàng, các Giám đốc Marketing (CMO) hiện đại đang phải đối mặt với áp lực khổng lồ từ Ban Giám đốc và các Cổ đông về “Trách nhiệm giải trình Marketing” (Marketing Accountability) (Rust et al., 2004). Khi phòng Marketing đề xuất các ngân sách khổng lồ để cải thiện dịch vụ khách hàng hoặc xử lý khủng hoảng truyền thông, câu hỏi thường trực từ các Giám đốc Tài chính (CFO) là: *“Liệu những khoản chi này là một tài sản sinh lời mang lại tỷ suất hoàn vốn (ROMI) hay chỉ là chi phí chìm làm xói mòn lợi nhuận ngắn hạn?”*\r\n\r\nSự giằng xé này đã được ghi nhận trong y văn thế giới. Trong khi Fornell và cộng sự (2006) lập luận rằng làm khách hàng hài lòng sẽ làm tăng dòng tiền tương lai, thì Tuli và Bharadwaj (2009) lại cảnh báo rằng việc đáp ứng thái quá mọi nhu cầu của khách hàng có thể đẩy chi phí phục vụ (cost-to-serve) lên cao, làm giảm Tỷ suất lợi nhuận trên tài sản (ROA) của doanh nghiệp. Để giải quyết tranh cãi này, các CMO cần những bằng chứng thực nghiệm bằng các con số kinh tế lượng vững chắc.\r\n\r\n### 1.3. Khoảng trống dữ liệu vĩ mô và Mâu thuẫn đơn vị phân tích (Ecological Fallacy)\r\nĐể lượng hóa Tỷ suất hoàn vốn Marketing (ROMI), các nhà nghiên cứu cần đối chiếu Chỉ số Hài lòng Khách hàng (CSI) với dữ liệu tài chính của công ty qua nhiều năm. Tại các thị trường phát triển như Hoa Kỳ, hệ thống ACSI (American Customer Satisfaction Index) cung cấp điểm số CSI hàng năm cho hàng trăm tập đoàn, tạo nền tảng cho hàng loạt công bố trên các tạp chí Top 1 thế giới (Journal of Marketing, Marketing Science).\r\n\r\nNgược lại, tại Việt Nam và các thị trường mới nổi, sự thiếu vắng hoàn toàn của một cơ sở dữ liệu quốc gia về CSI đã đẩy các nhà nghiên cứu vào một rủi ro phương pháp luận nghiêm trọng. Phần lớn các nghiên cứu hiện tại phải sử dụng bảng hỏi (survey-based) với quy mô vài trăm đến một ngàn cá nhân (Micro-level) để đo lường mức độ hài lòng, sau đó lại dùng chính dữ liệu vi mô đó để hồi quy với tổng doanh thu hay ROA của cả một tập đoàn (Macro-level). Cách tiếp cận này vi phạm lỗi “Mâu thuẫn đơn vị phân tích” (Ecological Fallacy) trong kinh tế lượng, làm mất đi tính hợp lệ thống kê (Statistical Validity) của toàn bộ mô hình. Hơn nữa, khảo sát cắt ngang không thể tái tạo lại được mức độ hài lòng của khách hàng trong quá khứ (ví dụ năm 2018), khiến việc thiết lập mô hình dữ liệu bảng (Panel Data) trở nên bất khả thi.\r\n\r\n### 1.4. Khoa học Dữ liệu Lớn (Big Data) như một giải pháp đột phá\r\nSự ra đời của các công nghệ Xử lý ngôn ngữ tự nhiên (NLP) và Khai phá văn bản (Text Mining) cung cấp một chiếc “chìa khóa vàng” để vượt qua rào cản dữ liệu trên. Hàng vạn bình luận, đánh giá của người tiêu dùng trong suốt 10 năm qua vẫn đang được lưu trữ trên Internet. Việc ứng dụng Trí tuệ nhân tạo (AI) để “đọc”, phân tách chủ đề và chấm điểm cảm xúc cho tập dữ liệu khổng lồ này cho phép các nhà nghiên cứu tự tay kiến tạo nên một “Chỉ số Hài lòng Khách hàng” (CSI Proxy) vĩ mô, đại diện chính xác cho cấp độ doanh nghiệp theo từng năm tài chính.\r\n\r\n### 1.5. Lĩnh vực nghiên cứu\r\nĐề tài thuộc chuyên ngành Quản trị Kinh doanh, định hướng chuyên sâu vào **Marketing Accountability** (Trách nhiệm giải trình Marketing) và **Hành vi người tiêu dùng**, kết hợp với phương pháp luận liên ngành: Khoa học Dữ liệu (Data Science) và Kinh tế lượng (Econometrics).\r\n\r\n\r\n## 2. TÌNH HÌNH NGHIÊN CỨU (TỔNG QUAN TÀI LIỆU)\r\n\r\n### 2.1. Nền tảng Lý thuyết (Theoretical Foundations)\r\nLuận án được thiết lập trên hai trụ cột lý thuyết vững chắc:\r\n\r\n**1. Trách nhiệm giải trình Marketing và ROMI (Marketing Accountability):**\r\nKhởi nguồn từ công trình kinh điển của Rust và cộng sự (2004), lý thuyết này phản bác quan điểm truyền thống coi Marketing là một chức năng tiêu tiền (cost center). Thay vào đó, Marketing tạo ra các tài sản vô hình như Lòng trung thành, Giá trị thương hiệu và Sự hài lòng khách hàng (Customer Equity). Theo lý thuyết này, mọi biến số marketing hành vi phải được lượng hóa và kết nối trực tiếp với các thước đo kết quả tài chính (Shareholder Value, ROA, Market Share). Nghiên cứu của luận án trực tiếp ứng dụng khung lý thuyết này để chứng minh sự chuyển hóa từ eWOM sang giá trị kế toán của doanh nghiệp.\r\n\r\n**2. Lý thuyết Tín hiệu (Signaling Theory):**\r\nPhát triển bởi Spence (1973), lý thuyết Tín hiệu giải thích cách các bên xử lý bất cân xứng thông tin. Trong thị trường FMCG, người tiêu dùng đứng trước rủi ro cảm nhận cao về chất lượng sản phẩm. Các bình luận eWOM trên không gian mạng hoạt động như một cơ chế phát tín hiệu (Signaling mechanism) phi tập trung. Theo Tirunillai và Tellis (2012), sự hài lòng chân thực (organic satisfaction) và khối lượng eWOM khổng lồ là một loại “tín hiệu tốn kém” (costly signal) cực kỳ khó để doanh nghiệp làm giả hoàn toàn. Tín hiệu này không chỉ định hướng hành vi mua của khách hàng mới mà còn phát đi thông điệp cho các nhà đầu tư về sức khỏe nội tại của doanh nghiệp.\r\n\r\n### 2.2. Tranh luận về Hài lòng khách hàng và Hiệu quả kinh doanh\r\nSự tác động của CSI lên hiệu quả tài chính không phải là một đường thẳng hoàn hảo. \r\n- **Phe ủng hộ:** Nhóm của Fornell (2006, 2016) sử dụng dữ liệu ACSI và chứng minh rằng các công ty có điểm hài lòng cao vượt trội sẽ tạo ra dòng tiền bất thường (abnormal stock returns) và rủi ro sụt giảm doanh thu thấp hơn. Sự hài lòng làm giảm độ nhạy cảm về giá của khách hàng, tạo ra biên lợi nhuận cao hơn (ROE, ROA).\r\n- **Phe thận trọng:** Tuli và Bharadwaj (2009) lại chỉ ra rằng CSI cao cũng đi kèm với rủi ro tài chính đặc thù. Việc duy trì sự hài lòng đòi hỏi đầu tư khổng lồ vào R&D, hệ thống CRM và xử lý khiếu nại, có thể làm giảm lợi nhuận kế toán ngắn hạn. Hơn nữa, Edeling và Fischer (2016) cho rằng trong ngành tiêu dùng nhanh, sự hài lòng dễ bay hơi; khách hàng có thể rất hài lòng với sản phẩm A nhưng sẵn sàng mua sản phẩm B chỉ vì nó đang được khuyến mãi mạnh hơn.\r\n\r\n### 2.3. Cường độ Marketing (Marketing Intensity) như một biến điều tiết\r\nTừ góc nhìn của Edeling và Fischer (2016), sự hài lòng của khách hàng giống như một “tiềm năng”, và nó cần một “chất xúc tác” để chuyển hóa thành dòng tiền. Chất xúc tác đó chính là Cường độ Marketing (Marketing Intensity - đo bằng chi phí Bán hàng & Quảng cáo / Tổng doanh thu). Một doanh nghiệp FMCG có khách hàng hài lòng nhưng ngừng quảng cáo sẽ nhanh chóng bị đối thủ lấn át tiếng nói (Share of Voice) trên thị trường. Do đó, luận án lập luận rằng Cường độ Marketing đóng vai trò điều tiết thuận chiều, khuếch đại (amplification effect) sức mạnh của CSI lên Thị phần.\r\n\r\n### 2.4. Ứng dụng Khai phá dữ liệu phi cấu trúc (Unstructured Data) trong Marketing\r\nViệc ứng dụng AI để đo lường Marketing đã trải qua hai giai đoạn:\r\n- **Thế hệ 1 (Sentiment Analysis thuần túy):** Các nghiên cứu ban đầu (Liu, 2006; Tirunillai & Tellis, 2012) tập trung đếm số lượng bình luận và phân loại cảm xúc (Tích cực/Tiêu cực). Mặc dù hữu ích, phương pháp này chứa một lỗi lý luận nghiêm trọng: *Cảm xúc (Sentiment) không đồng nghĩa với Sự hài lòng (Satisfaction)*. Một người dùng có thể bình luận “Quảng cáo buồn cười quá” (Cảm xúc tích cực) nhưng hoàn toàn không hài lòng về chất lượng sản phẩm.\r\n- **Thế hệ 2 (Tích hợp Topic Modeling):** Büschken và Allenby (2016) chỉ ra rằng Sự hài lòng là một khái niệm đa chiều (Multi-dimensional). Để AI chấm điểm đúng, trước tiên AI phải phân cụm bình luận về đúng các chủ đề cốt lõi (ví dụ: Giá cả, Bao bì, Chất lượng, Dịch vụ). Việc kết hợp Mô hình hóa chủ đề (như LDA hoặc BERTopic) với Phân tích cảm xúc mới thực sự tái tạo được thang đo CSI chuẩn mực từ dữ liệu chữ.\r\n\r\n### 2.5. Các khoảng trống nghiên cứu (Research Gaps)\r\nDựa trên tổng quan y văn, luận án xác định 3 khoảng trống cốt lõi được tóm tắt tại Bảng 1.\r\n\r\n**Bảng 1: Ma trận Khoảng trống Nghiên cứu**\r\n| Tiêu chí | Các nghiên cứu trước (Quốc tế & VN) | Hướng đi của Luận án (Lấp đầy khoảng trống) |\r\n|---|---|---|\r\n| **Gap 1: Bối cảnh & Dữ liệu** | Dùng dữ liệu ACSI tại Mỹ, hoặc khảo sát cắt ngang n=500 tại VN (vi phạm Ecological Fallacy). | Dùng Big Data tạo dữ liệu Panel 9 năm tại thị trường mới nổi (Việt Nam). Xóa bỏ lỗi cấp độ phân tích. |\r\n| **Gap 2: Phương pháp NLP** | Đa phần chỉ đếm cảm xúc (Sentiment) đơn chiều bằng bộ từ vựng (Dictionary-based). | Tích hợp **Topic Modeling (BERTopic)** và Deep Learning (**PhoBERT**) để kiến tạo CSI đa chiều. |\r\n| **Gap 3: Biến điều tiết & Xử lý Nội sinh** | Ít xem xét sự cộng hưởng của Quảng cáo. Chạy OLS/FE dễ bị chệch do nội sinh. | Bổ sung biến **Cường độ Marketing**; Sử dụng **System-GMM** xử lý dứt điểm vấn đề nhân quả ngược. |\r\n\r\n### 2.6. Mô hình nghiên cứu đề xuất và Hệ thống Giả thuyết\r\n\r\n```mermaid\r\ngraph TD\r\n    subgraph Giai đoạn 1: Lượng hóa Big Data (AI/NLP)\r\n        eWOM[\"Dữ liệu eWOM phi cấu trúc (100.000+ bình luận)\"]\r\n        Topic[\"Topic Modeling (BERTopic)\"]\r\n        Sent[\"Sentiment Analysis (PhoBERT)\"]\r\n        \r\n        eWOM --\u003e Topic\r\n        Topic --\u003e Dim1[\"Chủ đề: Chất lượng\"]\r\n        Topic --\u003e Dim2[\"Chủ đề: Giá trị/Giá cả\"]\r\n        Topic --\u003e Dim3[\"Chủ đề: Dịch vụ\"]\r\n        \r\n        Dim1 --\u003e Sent\r\n        Dim2 --\u003e Sent\r\n        Dim3 --\u003e Sent\r\n        \r\n        Sent --\u003e CSI_Proxy((\"Chỉ số Hài lòng (CSI Proxy Đa chiều)\"))\r\n        eWOM --\u003e eWOM_Vol((\"Khối lượng (eWOM Volume)\"))\r\n    end\r\n\r\n    subgraph Giai đoạn 2: Phân tích Kinh tế lượng (System-GMM)\r\n        CSI_Proxy -.-\u003e|H1 +| MS[\"Thị phần (Market Share)\"]\r\n        CSI_Proxy -.-\u003e|H2 +| FP[\"Lợi nhuận (ROA/ROE)\"]\r\n        \r\n        eWOM_Vol -.-\u003e|H3 +| MS\r\n        \r\n        MI[\"Cường độ Marketing (SGA/Sales)\"]\r\n        MI -.-\u003e|H4 + (Điều tiết)| Link1[\"Tương tác CSI x MI\"]\r\n        MI -.-\u003e|H5 + (Điều tiết)| Link2[\"Tương tác CSI x MI\"]\r\n        \r\n        Link1 --\u003e MS\r\n        Link2 --\u003e FP\r\n        \r\n        Controls[\"Biến kiểm soát: Firm Size, Leverage, Age\"] --\u003e MS\r\n        Controls --\u003e FP\r\n    end\r\n    \r\n    style CSI_Proxy fill:#e1f5fe,stroke:#01579b,stroke-width:2px\r\n    style eWOM_Vol fill:#e1f5fe,stroke:#01579b,stroke-width:2px\r\n    style MS fill:#fce4ec,stroke:#880e4f,stroke-width:2px\r\n    style FP fill:#fce4ec,stroke:#880e4f,stroke-width:2px\r\n    style MI fill:#fff3e0,stroke:#e65100,stroke-width:2px\r\n```\r\n*Hình 1: Khung khái niệm và Mô hình nghiên cứu đề xuất*\r\n\r\nTừ lập luận lý thuyết trên, hệ thống giả thuyết được đề xuất:\r\n- **Giả thuyết H1 (+):** Chỉ số Hài lòng khách hàng (CSI) kiến tạo từ eWOM có độ trễ 1 năm tác động tích cực đến Thị phần của doanh nghiệp FMCG.\r\n- **Giả thuyết H2 (+):** Chỉ số Hài lòng khách hàng (CSI) kiến tạo từ eWOM có độ trễ 1 năm tác động tích cực đến Lợi nhuận kế toán (ROA, ROE) của doanh nghiệp FMCG.\r\n- **Giả thuyết H3 (+):** Khối lượng thảo luận trực tuyến (eWOM Volume) có tác động tích cực đến Thị phần của doanh nghiệp.\r\n- **Giả thuyết H4 (+):** Cường độ Marketing đóng vai trò điều tiết thuận chiều, khuếch đại tác động tích cực của CSI lên Thị phần.\r\n- **Giả thuyết H5 (+):** Cường độ Marketing đóng vai trò điều tiết thuận chiều, khuếch đại tác động tích cực của CSI lên Lợi nhuận.\r\n\r\n\r\n## 3. MỤC ĐÍCH NGHIÊN CỨU\r\n\r\n### 3.1. Mục tiêu tổng quát\r\nỨng dụng các thuật toán Trí tuệ nhân tạo (NLP) để lượng hóa dữ liệu văn bản phi cấu trúc eWOM thành Chỉ số Hài lòng Khách hàng (CSI Proxy) cấp doanh nghiệp; qua đó kiểm định thực chứng tác động nhân quả của Sự hài lòng khách hàng đến hiệu quả kinh doanh của doanh nghiệp FMCG dưới sự điều tiết của Cường độ Marketing.\r\n\r\n### 3.2. Mục tiêu cụ thể\r\n1. Xây dựng một quy trình học máy (Machine Learning pipeline) kết hợp BERTopic và PhoBERT nhằm bóc tách và chấm điểm chính xác các chiều kích của sự hài lòng từ hàng trăm ngàn bình luận tiếng Việt.\r\n2. Kiểm định chiều hướng và mức độ tác động của CSI (Big Data) và Khối lượng eWOM đến sức mạnh thị trường (Thị phần) và hiệu suất tài chính (ROA, ROE) bằng dữ liệu Panel Data.\r\n3. Đo lường vai trò xúc tác (điều tiết) của biến Cường độ Marketing trong việc chuyển hóa trải nghiệm khách hàng thành dòng tiền thực tế.\r\n\r\n### 3.3. Câu hỏi nghiên cứu\r\n1. Làm thế nào để giải quyết vấn đề đa nghĩa, nhiễu loạn của eWOM tiếng Việt và kiến tạo một Chỉ số Hài lòng đa chiều, đại diện chuẩn xác cho cấp độ doanh nghiệp (Firm-level) thay thế cho thang đo ACSI truyền thống?\r\n2. Sự hài lòng khách hàng có thực sự giúp doanh nghiệp FMCG gia tăng Thị phần và Lợi nhuận trong bối cảnh chi phí chuyển đổi thấp, hay nó chỉ làm tăng gánh nặng chi phí vận hành?\r\n3. Các khoản đầu tư vào quảng cáo và bán hàng (Marketing Intensity) tương tác như thế nào với mức độ hài lòng sẵn có của khách hàng trên mạng xã hội?\r\n\r\n\r\n## 4. ĐỐI TƯỢNG VÀ PHẠM VI DỰ ĐỊNH NGHIÊN CỨU\r\n\r\n- **Đối tượng nghiên cứu chính:** Cơ chế tác động của mức độ hài lòng khách hàng và eWOM (đo lường bằng NLP) đến kết quả kinh doanh thực tế, và sự điều tiết của hoạt động quảng bá.\r\n- **Khách thể nghiên cứu:** Nhóm 20 đến 30 tập đoàn/công ty Hàng tiêu dùng nhanh (FMCG) và Bán lẻ tiêu dùng lớn nhất đang niêm yết trên ba sàn chứng khoán (HOSE, HNX, UPCoM) tại Việt Nam (Ví dụ: Vinamilk, Masan Consumer, Sabeco, Habeco, Kido, Đường Quảng Ngãi, PAN Group...).\r\n- **Phạm vi dữ liệu:** \r\n  - *Dữ liệu vi mô (Micro):* Toàn bộ bình luận, đánh giá (reviews) công khai trên Fanpage Facebook chính thức của doanh nghiệp, và các shop phân phối chính hãng (Mall) trên Shopee, Tiki, Lazada.\r\n  - *Dữ liệu vĩ mô (Macro):* Số liệu từ Báo cáo tài chính đã kiểm toán, trích xuất từ nền tảng FiinPro.\r\n- **Phạm vi thời gian:** Thiết lập bộ dữ liệu bảng (Panel Data) bao phủ 9 năm tài chính, từ **2016 đến 2024**. Đây là khoảng thời gian chứng kiến sự trưởng thành của hành vi tiêu dùng số tại Việt Nam.\r\n- **Giới hạn nghiên cứu:** Nghiên cứu chỉ đánh giá eWOM trên các nền tảng văn bản công khai (Text-based), không tính đến dữ liệu hình ảnh hoặc video (Video/Image processing) do giới hạn về chi phí điện toán.\r\n\r\n\r\n## 5. PHƯƠNG PHÁP NGHIÊN CỨU SẼ ĐƯỢC SỬ DỤNG\r\n\r\nNghiên cứu áp dụng thiết kế đa phương pháp (Mixed-method Design) mang tính thực chứng cao (Empirical Quantitative), chia làm hai giai đoạn với các thuật toán và phương trình toán học chặt chẽ.\r\n\r\n### 5.1. Giai đoạn 1: Kỹ thuật Dữ liệu (Data Engineering) & Xử lý Ngôn ngữ Tự nhiên\r\n**Bước 1: Web Scraping và Tiền xử lý (Preprocessing)**\r\n- Lập trình Python (Selenium, Scrapy) để cào tự động ~100.000 đến 500.000 bình luận.\r\n- Làm sạch (Data Cleaning): Loại bỏ emoji không chuẩn, chuyển đổi ngôn ngữ mạng (teencode), chuẩn hóa Unicode. Sử dụng các bộ lọc Heuristic để xóa bình luận seeding, spam, bot.\r\n\r\n**Bước 2: Mô hình hóa Chủ đề với BERTopic**\r\nĐể tránh lỗi gom chung mọi cảm xúc, BERTopic được huấn luyện để phân cụm nội dung. Dựa trên lý thuyết ACSI, thuật toán sẽ ép các cụm về 3 nhóm chiều kích $k$: Chất lượng (Quality), Giá trị cảm nhận (Value), Dịch vụ đóng gói (Service). Các bình luận chệch khỏi 3 cụm này (chủ đề rác) bị gán nhãn Outlier và loại bỏ.\r\n\r\n**Bước 3: Phân tích Cảm xúc bằng PhoBERT và Tính CSI Proxy**\r\nVới các bình luận đã nằm đúng chủ đề, mô hình PhoBERT (Deep Learning Transformer) sẽ chấm điểm xác suất: Tích cực ($P_{pos}$) hoặc Tiêu cực ($P_{neg}$).\r\nCông thức kiến tạo CSI Proxy của doanh nghiệp $i$ vào năm $t$:\r\n$$CSI\\_Proxy_{i,t} = \\sum_{k=1}^{3} W_k \\left( \\frac{N_{pos, k, i, t} - N_{neg, k, i, t}}{N_{total, k, i, t}} \\right)$$\r\n*Trong đó: $W_k$ là trọng số mức độ quan trọng của chủ đề $k$ (tính bằng entropy phân phối).* Điểm số sẽ được chuẩn hóa về thang [0, 100]. Khối lượng eWOM ($Vol_{i,t}$) được tính bằng hàm Logarit tự nhiên của tổng số bình luận hợp lệ.\r\n\r\n### 5.2. Giai đoạn 2: Phân tích Kinh tế lượng (Econometrics)\r\nGhép nối file dữ liệu CSI Proxy và eWOM Volume vào dữ liệu tài chính (FiinPro) để tạo thành bộ Panel Data.\r\n\r\n**Đo lường các biến số:**\r\n- **Thị phần ($MS_{i,t}$):** Doanh thu của công ty $i$ / Tổng doanh thu ngành FMCG niêm yết trong năm $t$.\r\n- **ROA/ROE ($FP_{i,t}$):** Tỷ suất lợi nhuận ròng trên tổng tài sản / Vốn chủ sở hữu.\r\n- **Cường độ Marketing ($MI_{i,t}$):** Chi phí Bán hàng + Chi phí Quảng cáo khuyến mãi / Tổng doanh thu thuần.\r\n\r\n**Phương trình Mô hình Cấu trúc Động (Dynamic Panel Data Equation):**\r\nSử dụng phương trình tự hồi quy để kiểm soát quán tính thị phần và lợi nhuận:\r\n$$Y_{i,t} = \\alpha + \\gamma Y_{i,t-1} + \\beta_1 CSI_{i,t-1} + \\beta_2 Vol_{i,t-1} + \\beta_3 MI_{i,t} + \\beta_4 (CSI_{i,t-1} \\times MI_{i,t}) + \\sum_{j} \\theta_j X_{j,i,t} + \\mu_i + \\epsilon_{i,t}$$\r\n*Lưu ý: CSI và eWOM được lấy độ trễ 1 năm (t-1) để giải quyết vấn đề nhân quả (sự hài lòng của năm nay sẽ tạo ra doanh số của năm sau).*\r\n\r\n**Xử lý Nội sinh và Khắc phục Mẫu nhỏ (Small N Problem):**\r\n- Chạy OLS hay Fixed Effects sẽ bị chệch nghiêm trọng (Nickell Bias) do sự xuất hiện của biến phụ thuộc trễ $Y_{i,t-1}$. Do đó, nghiên cứu sử dụng **System-GMM (Blundell & Bond, 1998)**. Mô hình này tự động dùng các độ trễ sâu (lag 2, lag 3) của các biến nội sinh làm biến công cụ (Instrumental Variables).\r\n- Tuy nhiên, vì cỡ mẫu N khá nhỏ (20–30 công ty), việc chạy GMM tiêu chuẩn sẽ gây ra hiện tượng *Tăng sinh biến công cụ (Instrument Proliferation)*, khiến kiểm định Hansen J-test mất sức mạnh. Luận án khắc phục bằng lệnh `collapse` trong Stata để gộp biến công cụ. Cuối cùng, chạy thêm mô hình **LSDVC (Kiviet Bias-corrected FE)** để kiểm chứng độ vững (Robustness Check).\r\n\r\n\r\n## 6. KẾ HOẠCH NGHIÊN CỨU (CỤ THỂ MỖI 06 THÁNG)\r\nToàn bộ tiến trình được thiết kế trong 36 tháng, lồng ghép chặt chẽ giữa học tập lý thuyết, xử lý Big Data và công bố khoa học.\r\n\r\n**Bảng 2: Dự kiến kế hoạch học tập và nghiên cứu toàn khóa**\r\n| STT | Nội dung công việc và Nhiệm vụ | Thời gian thực hiện | Kết quả dự kiến |\r\n|---|---|---|---|\r\n| 1 | Học các học phần Tiến sĩ; Hoàn thiện Tổng quan tài liệu ROMI; Xây dựng script Web Scraping. | Tháng 1 - Tháng 6 | Hoàn thành tín chỉ bắt buộc; Đề cương chi tiết được duyệt. |\r\n| 2 | Cào dữ liệu eWOM; Huấn luyện mô hình BERTopic & PhoBERT; Chạy thử nghiệm trích xuất điểm CSI Proxy. | Tháng 7 - Tháng 12 | Tập dữ liệu ~200.000 text. Viết 01 bài báo Hội thảo Khoa học Quốc tế/Quốc gia. |\r\n| 3 | Thu thập dữ liệu tài chính từ FiinPro; Hoàn thiện bộ Panel Data; Chạy mô hình System-GMM trên Stata. | Tháng 13 - Tháng 18 | Bảng kết quả hồi quy hoàn chỉnh. Nộp 01 bài báo quốc tế hạng Q1/Q2. |\r\n| 4 | Báo cáo Chuyên đề Tiến sĩ 1 & 2; Seminar Khoa; Xử lý phản biện (Revision) của tạp chí quốc tế. | Tháng 19 - Tháng 24 | Đạt 2 Chuyên đề. Có thư chấp nhận đăng bài (Acceptance Letter). |\r\n| 5 | Gửi bài báo số 2 (Tạp chí HĐGS hoặc quốc tế); Báo cáo Chuyên đề Tiến sĩ 3; Chắp bút 80% bản thảo Luận án. | Tháng 25 - Tháng 30 | Hoàn thiện Chuyên đề 3. Bản thảo luận án thành hình. |\r\n| 6 | Trình bày trước hội đồng góp ý; Hoàn thiện các thủ tục; Bảo vệ luận án cấp Cơ sở và cấp ĐHQG/Trường. | Tháng 31 - Tháng 36 | Đạt học vị Tiến sĩ. |\r\n\r\n\r\n## 7. MỤC TIÊU VÀ MONG MUỐN ĐẠT ĐƯỢC KHI ĐĂNG KÝ TUYỂN SINH\r\n- **Nâng tầm năng lực nghiên cứu liên ngành:** Vượt qua ranh giới của một nhà nghiên cứu Marketing truyền thống để trở thành một chuyên gia phân tích dữ liệu ứng dụng (Applied Data Analyst).\r\n- **Giải quyết bài toán thực tiễn:** Cung cấp cho các doanh nghiệp FMCG Việt Nam một bộ tiêu chuẩn (Benchmark) khoa học về cách thức eWOM định giá doanh nghiệp, giúp các nhà quản trị Marketing tự tin giải trình ngân sách trước cổ đông.\r\n- **Đóng góp y văn toàn cầu:** Đưa dữ liệu thị trường Việt Nam (Emerging Market) và đặc tính ngôn ngữ tiếng Việt vào bản đồ các nghiên cứu Text Mining & Marketing Accountability trên các tạp chí quốc tế ISI/Scopus.\r\n\r\n\r\n## 8. LÝ DO LỰA CHỌN CƠ SỞ ĐÀO TẠO (ĐẠI HỌC TÔN ĐỨC THẮNG)\r\n- **Hệ sinh thái liên ngành xuất sắc:** TDTU là đại học tiên phong tại Việt Nam cổ vũ sự giao thoa giữa Kinh tế học và Khoa học Dữ liệu. Sự hỗ trợ từ cơ sở hạ tầng điện toán và các chuyên gia CNTT tại trường là bệ phóng hoàn hảo cho việc xử lý hàng trăm ngàn dòng dữ liệu Text của đề án.\r\n- **Tiêu chuẩn học thuật quốc tế minh bạch:** Môi trường nghiên cứu liêm chính, khắt khe và hệ thống tài nguyên thư viện chuẩn mực quốc tế của TDTU cung cấp nguồn cảm hứng và động lực lớn lao để hoàn thành luận án với chất lượng cao nhất, đủ sức cạnh tranh công bố ở các tạp chí Q1/Q2.\r\n\r\n\r\n## 9. KINH NGHIỆM VỀ NGHIÊN CỨU, THỰC TẾ, HOẠT ĐỘNG XÃ HỘI VÀ NGOẠI KHÓA\r\n*[Nghiên cứu sinh điền chi tiết vào đây: Số lượng bài báo đã công bố, kinh nghiệm làm việc trong ngành FMCG hoặc Data Analytics (nếu có), các dự án nghiên cứu đã tham gia, giải thưởng học thuật...]*\r\n\r\n\r\n## 10. DỰ KIẾN VIỆC LÀM VÀ CÁC NGHIÊN CỨU TIẾP THEO SAU KHI TỐT NGHIỆP\r\n- **Định hướng nghề nghiệp:** Tiếp tục con đường giảng dạy và nghiên cứu tại các trường Đại học trọng điểm; đồng thời tham gia thị trường công nghiệp với vai trò Cố vấn Cấp cao về Trách nhiệm giải trình Marketing (ROMI) và Trải nghiệm khách hàng cho các tập đoàn FMCG/Bán lẻ.\r\n- **Nghiên cứu tiếp theo:** \r\n  1. Khai thác sức mạnh của Text Mining ở mức độ thời gian thực (Real-time). Phân tích sự biến động của giá cổ phiếu (Stock Return Volatility) theo từng giờ dưới tác động của một cuộc khủng hoảng truyền thông (PR Crisis) trên mạng xã hội.\r\n  2. Mở rộng mô hình nghiên cứu chéo (Cross-industry) sang các ngành có chi phí chuyển đổi cao hơn như Ngân hàng thương mại và Bảo hiểm nhân thọ để so sánh sự khác biệt của cơ chế eWOM.\r\n\r\n\r\n## 11. ĐỀ XUẤT NGƯỜI HƯỚNG DẪN\r\nNghiên cứu mang tính liên ngành cao, do đó NCS đề xuất mô hình 02 giáo viên hướng dẫn:\r\n1. **Người hướng dẫn khoa học 1 (Chuyên môn Marketing / Phân tích Tài chính định lượng):** PGS. TS. [Tên Thầy/Cô tại TDTU] (Phụ trách thiết lập mô hình System-GMM và bảo chứng lý thuyết Marketing).\r\n2. **Người hướng dẫn khoa học 2 (Chuyên môn Data Science / Trí tuệ nhân tạo):** TS. [Tên Thầy/Cô chuyên ngành Khoa học máy tính hoặc Hệ thống thông tin quản lý] (Hỗ trợ định hướng và thẩm định thuật toán BERTopic, PhoBERT).\r\n\r\n\r\n---\r\n\r\n## 12. TÀI LIỆU THAM KHẢO DỰ KIẾN\r\n*(Trình bày theo chuẩn APA 7th Edition)*\r\n\r\n1. Arellano, M., & Bond, S. (1991). Some tests of specification for panel data: Monte Carlo evidence and an application to employment equations. *The Review of Economic Studies*, 58(2), 277–297.\r\n2. Blundell, R., & Bond, S. (1998). Initial conditions and moment restrictions in dynamic panel data models. *Journal of Econometrics*, 87(1), 115–143.\r\n3. Büschken, J., & Allenby, G. M. (2016). Sentence-based text analysis for customer reviews. *Marketing Science*, 35(6), 953–975.\r\n4. Culotta, A., & Cutler, J. (2016). Mining brand perceptions from Twitter social networks. *Marketing Science*, 35(3), 343–362.\r\n5. Edeling, A., & Fischer, M. (2016). Marketing’s impact on firm value: Generalizations from a meta-analysis. *Journal of Marketing Research*, 53(4), 515–534.\r\n6. Fornell, C., Mithas, S., Morgeson III, F. V., & Krishnan, M. S. (2006). Customer satisfaction and stock prices: High returns, low risk. *Journal of Marketing*, 70(1), 3–14.\r\n7. Fornell, C., Morgeson III, F. V., & Hult, G. T. M. (2016). Stock returns on customer satisfaction do beat the market: Gauging the effect of a marketing intangible. *Journal of Marketing*, 80(5), 92–107.\r\n8. Kiviet, J. F. (1995). On bias, inconsistency, and efficiency of various estimators in dynamic panel data models. *Journal of Econometrics*, 68(1), 53–78.\r\n9. Liu, Y. (2006). Word of mouth for movies: Its dynamics and impact on box office revenue. *Journal of Marketing*, 70(3), 74–89.\r\n10. Nguyen, D. Q., Vu, T. N., & Nguyen, A. T. (2020). PhoBERT: Pre-trained language models for Vietnamese. *Findings of the Association for Computational Linguistics: EMNLP 2020*, 1037–1042.\r\n11. Pauwels, K., Aksehirli, Z., & Lackman, A. (2016). Like the chatter: Metrics for everyday e-word-of-mouth and their impact on firm performance. *Journal of Interactive Marketing*, 36, 42–52.\r\n12. Roodman, D. (2009). A note on the theme of too many instruments. *Oxford Bulletin of Economics and Statistics*, 71(1), 135–158.\r\n13. Roodman, D. (2009). How to do xtabond2: An introduction to difference and system GMM in Stata. *The Stata Journal*, 9(1), 86–136.\r\n14. Rust, R. T., Ambler, T., Carpenter, G. S., Kumar, V., & Srivastava, R. K. (2004). Measuring marketing productivity: Current knowledge and future directions. *Journal of Marketing*, 68(4), 76–89.\r\n15. Spence, M. (1973). Job market signaling. *The Quarterly Journal of Economics*, 87(3), 355–374.\r\n16. Tirunillai, S., & Tellis, G. J. (2012). Does chatter really matter? Dynamics of user-generated content and stock performance. *Marketing Science*, 31(2), 198–215.\r\n17. Tuli, K. R., & Bharadwaj, S. G. (2009). Customer satisfaction and stock returns risk. *Journal of Marketing*, 73(6), 184–197.\r\n18. Wang, X., Feng, F., Chen, H., & Fan, W. (2020). Predicting stock market movements using sentiment analysis of microblogging data. *Information Systems Frontiers*, 22(4), 863–875.\r\n"}],"others":[{"title":"ĐỀ CƯƠNG NGHIÊN CỨU LĨNH VỰC TÀI CHÍNH - MARKETING","file":"proposal_TDT_HAILP_TaiChinhMKT.md","chars":9661,"pages":"5.4","content":"# ĐỀ CƯƠNG NGHIÊN CỨU LĨNH VỰC TÀI CHÍNH - MARKETING\r\n**(Dự tuyển Nghiên cứu sinh Đại học Tôn Đức Thắng)**\r\n\r\n**Tên đề tài dự kiến:** Tác động của Truyền miệng điện tử (eWOM) và Sự hài lòng khách hàng đến Hiệu quả Tài chính Doanh nghiệp: Phương pháp tiếp cận Big Data trong ngành FMCG tại Việt Nam.\r\n*(The Impact of eWOM and Customer Satisfaction on Firm Performance: A Big Data Approach in the Vietnamese FMCG Industry)*\r\n\r\n**Họ và tên thí sinh:** Lê Phúc Hải\r\n**Lĩnh vực/Ngành nghiên cứu:** Quản trị Kinh doanh / Tài chính Doanh nghiệp\r\n**Định hướng nghiên cứu:** Marketing-Finance Interface (Giao thoa Marketing và Tài chính)\r\n\r\n---\r\n\r\n## MỤC LỤC\r\n1. Tính cấp thiết, lý do chọn đề tài, lĩnh vực nghiên cứu\r\n2. Tình hình nghiên cứu (Tổng quan tài liệu)\r\n3. Mục đích và Câu hỏi nghiên cứu\r\n4. Đối tượng và phạm vi dự định nghiên cứu\r\n5. Phương pháp nghiên cứu sẽ được sử dụng (Tiếp cận Big Data)\r\n6. Ý nghĩa khoa học và thực tiễn (Đóng góp mới)\r\n7. Kế hoạch nghiên cứu (cụ thể mỗi 06 tháng)\r\n8. Lý do lựa chọn cơ sở đào tạo (Đại học Tôn Đức Thắng)\r\n9. Dự kiến việc làm và nghiên cứu tiếp theo\r\n10. Đề xuất người hướng dẫn\r\n\r\n---\r\n\r\n## 1. Tính cấp thiết, lý do chọn đề tài, lĩnh vực nghiên cứu\r\n**1.1. Tính cấp thiết của đề tài**\r\n- Trong kỷ nguyên số hóa, Truyền miệng điện tử (eWOM) trên mạng xã hội và các nền tảng thương mại điện tử đã trở thành tài sản vô hình quan trọng bậc nhất của các doanh nghiệp Hàng tiêu dùng nhanh (FMCG). Một cuộc khủng hoảng eWOM có thể thổi bay hàng tỷ đồng vốn hóa thị trường chỉ trong vài ngày.\r\n- Tuy nhiên, việc đo lường tác động của sự hài lòng khách hàng (Customer Satisfaction - CS) lên hiệu quả tài chính ở cấp độ vĩ mô tại các thị trường mới nổi như Việt Nam gặp rào cản lớn do thiếu vắng một bộ cơ sở dữ liệu quốc gia về chỉ số hài lòng (như ACSI của Mỹ).\r\n- Việc sử dụng khảo sát truyền thống bị giới hạn bởi không gian, thời gian và chi phí, đồng thời không thể cung cấp dữ liệu chuỗi thời gian (time-series) lịch sử để đối chiếu với báo cáo tài chính kế toán.\r\n\r\n**1.2. Lý do chọn đề tài**\r\n- Đề tài ứng dụng kỹ thuật Khoa học dữ liệu (Data Science) - cụ thể là Khai phá dữ liệu văn bản (Text Mining) và Phân tích cảm xúc (Sentiment Analysis) - để lượng hóa các bình luận trên mạng thành **Chỉ số Hài lòng Khách hàng (CSI Proxy)** cho từng năm. \r\n- Nghiên cứu lấp đầy khoảng trống bằng cách kết nối trực tiếp dữ liệu phi cấu trúc từ người tiêu dùng (Micro-level) với dữ liệu sổ sách tài chính của doanh nghiệp (Macro-level), giải quyết triệt để lỗi mâu thuẫn đơn vị phân tích (Ecological Fallacy).\r\n\r\n**1.3. Lĩnh vực nghiên cứu**\r\n- Giao thoa giữa Marketing (Hành vi người tiêu dùng), Tài chính doanh nghiệp và Công nghệ phân tích dữ liệu (Business Analytics).\r\n\r\n## 2. Tình hình nghiên cứu (Tổng quan tài liệu)\r\n- **Lý thuyết nền tảng:** Lý thuyết Tín hiệu (Signaling Theory) và Lý thuyết Nguồn lực (Resource-Based View - RBV). Sự hài lòng của khách hàng được xem là một nguồn lực chiến lược vô hình giúp doanh nghiệp tạo lợi thế cạnh tranh và giảm chi phí vốn.\r\n- **Sự hài lòng và Hiệu quả tài chính:** Các nghiên cứu kinh điển (Fornell et al., 2006, 2016) sử dụng dữ liệu ACSI tại Mỹ đã chứng minh sự hài lòng cao của khách hàng mang lại tỷ suất sinh lời vượt trội trên thị trường chứng khoán (Tobin's Q, ROA).\r\n- **Khoảng trống nghiên cứu (Research Gap):**\r\n  - **Gap 1 (Dữ liệu):** Rất ít nghiên cứu tại Việt Nam kiểm định mối quan hệ này bằng dữ liệu Panel Data do thiếu hệ thống chấm điểm CSI hàng năm.\r\n  - **Gap 2 (Phương pháp):** Đa phần các nghiên cứu chỉ dừng ở mức khảo sát ý định mua hàng (Purchase Intention) thay vì đo lường dòng tiền và biên lợi nhuận thực tế (Firm Performance). Việc ứng dụng Trí tuệ nhân tạo (NLP) để kiến tạo dữ liệu lịch sử về Customer Satisfaction tại thị trường Việt Nam vẫn còn rất hạn chế.\r\n\r\n## 3. Mục đích và Câu hỏi nghiên cứu\r\n**3.1. Mục đích nghiên cứu**\r\n- Ứng dụng kỹ thuật Phân tích cảm xúc bằng AI (Sentiment Analysis) để xây dựng bộ dữ liệu thứ cấp về Chỉ số Hài lòng Khách hàng đối với các doanh nghiệp FMCG từ dữ liệu eWOM trên Internet.\r\n- Phân tích tác động của Chỉ số Hài lòng và Khối lượng eWOM đến hiệu quả tài chính (ROA, ROE) và giá trị thị trường (Tobin's Q).\r\n\r\n**3.2. Câu hỏi nghiên cứu**\r\n- Làm thế nào để lượng hóa dữ liệu eWOM phi cấu trúc thành Chỉ số Hài lòng Khách hàng đại diện cho cấp độ doanh nghiệp (Firm-level CSI)?\r\n- Tác động của Sự hài lòng khách hàng (đo bằng Big Data) đến hiệu quả tài chính (ROA, ROE) của doanh nghiệp FMCG có ý nghĩa thống kê hay không?\r\n- Tác động này có độ trễ (Temporal Lag) như thế nào trong ngành tiêu dùng nhanh?\r\n\r\n## 4. Đối tượng và phạm vi dự định nghiên cứu\r\n- **Đối tượng nghiên cứu:** Tác động của eWOM và Hài lòng khách hàng lên Hiệu quả tài chính.\r\n- **Khách thể nghiên cứu:** Khoảng 20–30 doanh nghiệp (bao gồm cả niêm yết trên HOSE/HNX và các công ty đại chúng trên UPCoM) thuộc ngành FMCG và Bán lẻ thực phẩm tại Việt Nam. Việc mở rộng sang UPCoM giúp tăng tính đại diện của mẫu (Generalizability).\r\n- **Phạm vi thời gian:** Dữ liệu Panel Data từ năm 2016 đến 2024.\r\n\r\n## 5. Phương pháp nghiên cứu sẽ được sử dụng (Điểm nhấn của Đề cương)\r\nNghiên cứu sử dụng phương pháp hỗn hợp (Kết hợp Data Science và Econometrics), chia làm 2 giai đoạn:\r\n\r\n**Giai đoạn 1: Khai phá dữ liệu và Xây dựng Biến (Data Engineering)**\r\n- **Kỹ thuật Web Scraping:** Sử dụng Python/Selenium để thu thập hàng trăm ngàn bình luận, bài đăng và đánh giá của người tiêu dùng liên quan đến các thương hiệu mục tiêu trên Fanpage Facebook chính thức và các trang thương mại điện tử (2016–2024).\r\n- **Phân tích cảm xúc bằng AI (Sentiment Analysis):** Áp dụng mô hình học sâu chuyên biệt cho tiếng Việt (như PhoBERT) để phân loại các bình luận thành ba sắc thái: Tích cực, Tiêu cực và Trung tính.\r\n- **Cấu trúc lại biến số:** Chỉ số Hài lòng Khách hàng ước lượng (CSI Proxy) được tính toán dựa trên tỷ lệ bình luận tích cực ròng (Net Sentiment Rate) và khối lượng eWOM hàng năm của mỗi công ty.\r\n\r\n**Giai đoạn 2: Phân tích Kinh tế lượng (Econometric Modeling)**\r\n- **Mô hình nghiên cứu:**\r\n  `Firm Performance (i,t) = α + β1*CSI_Proxy (i, t-1) + β2*eWOM_Volume (i, t-1) + β3*Controls (i, t) + ε`\r\n  *(Sử dụng biến trễ `t-1` để giải quyết vấn đề nhân quả ngược - Reverse Causality).*\r\n- **Biến kiểm soát (Controls):** Quy mô doanh nghiệp (Firm Size), Đòn bẩy (Leverage), Tuổi doanh nghiệp (Age), Tốc độ tăng trưởng doanh thu (Sales Growth). Dữ liệu này trích xuất từ nền tảng FiinPro.\r\n- **Phương pháp ước lượng:** Sử dụng mô hình System-GMM (Arellano-Bond) để xử lý nội sinh. Đặc biệt, để giải quyết vấn đề tăng sinh biến công cụ (Instrument Proliferation) ở mẫu nhỏ, nghiên cứu sẽ áp dụng kỹ thuật gộp biến công cụ (Collapse Instruments) hoặc kiểm chứng chéo bằng mô hình LSDVC (Kiviet bias-corrected FE).\r\n\r\n## 6. Ý nghĩa khoa học và thực tiễn (Đóng góp mới)\r\n- **Về mặt Lý thuyết:** Nghiên cứu cung cấp một cơ chế giải quyết triệt để lỗi “Mâu thuẫn đơn vị phân tích” (Ecological Fallacy) trong các nghiên cứu hành vi lai tài chính. Dữ liệu từ hàng vạn cá nhân được tổng hợp (aggregate) logic để hồi quy với dữ liệu cấp doanh nghiệp.\r\n- **Về mặt Phương pháp:** Lần đầu tiên đưa một công cụ mạnh mẽ của Big Data (PhoBERT Sentiment Analysis) vào việc kiến tạo biến số cho mô hình kinh tế lượng tài chính tại Việt Nam, mở ra hướng đi mới thay thế cho phương pháp khảo sát truyền thống đầy giới hạn.\r\n- **Về mặt Thực tiễn:** Chứng minh cho các CEO ngành FMCG thấy rằng, các khoản đầu tư vào việc chăm sóc và cải thiện trải nghiệm khách hàng trên không gian mạng không phải là “chi phí chìm”, mà là các tài sản sinh lời có tác động trực tiếp đến ROE và định giá công ty trên thị trường chứng khoán.\r\n\r\n## 7. Kế hoạch nghiên cứu (cụ thể mỗi 06 tháng)\r\n- **Tháng 1 - Tháng 6:** Học các học phần Tiến sĩ; Tổng quan tài liệu về Marketing-Finance interface; Xây dựng thuật toán Web Scraping.\r\n- **Tháng 7 - Tháng 12:** Thu thập dữ liệu chữ (Text Data); Huấn luyện và chạy mô hình NLP phân tích cảm xúc; Thu thập dữ liệu tài chính từ FiinPro; Viết bài báo hội thảo đầu tiên.\r\n- **Tháng 13 - Thán         async function processExportContainer(container) {
            try {
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(container, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false, output: 'mathml' });
                }
            } catch (e) { console.warn(e); }
            
            try {
                await mermaid.run({ querySelector: '#' + container.id + ' .mermaid' });
            } catch (e) {
                console.error("Mermaid run in export container failed:", e);
            }
            
            await new Promise(r => setTimeout(r, 1200));

            const svgs = container.querySelectorAll('svg');
            for (let svg of svgs) {
                try {
                    let w = svg.viewBox && svg.viewBox.baseVal ? svg.viewBox.baseVal.width : svg.getBoundingClientRect().width || 800;
                    let h = svg.viewBox && svg.viewBox.baseVal ? svg.viewBox.baseVal.height : svg.getBoundingClientRect().height || 400;
                    if(w===0) w=800; if(h===0) h=400;
                    
                    let targetWidth = Math.min(w, 600);
                    let targetHeight = h * (targetWidth / w);
                    
                    let svgClone = svg.cloneNode(true);
                    svgClone.setAttribute('width', w);
                    svgClone.setAttribute('height', h);
                    svgClone.querySelectorAll('style').forEach(styleTag => {
                        let css = styleTag.innerHTML;
                        css = css.replace(/@import\s+url\([^)]+\);/g, ''); 
                        styleTag.innerHTML = css;
                    });
                    
                    const svgString = new XMLSerializer().serializeToString(svgClone);
                    const base64Data = btoa(unescape(encodeURIComponent(svgString)));
                    const imgSrc = 'data:image/svg+xml;base64,' + base64Data;
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = w * 2; 
                    canvas.height = h * 2;
                    const ctx = canvas.getContext('2d');
                    
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    await new Promise((resolve) => {
                        img.onload = () => {
                            try {
                                ctx.fillStyle = "white"; 
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                
                                const newImg = document.createElement('img');
                                newImg.setAttribute('src', canvas.toDataURL("image/png"));
                                newImg.setAttribute('width', targetWidth);
                                newImg.setAttribute('height', targetHeight);
                                newImg.style.width = targetWidth + "px";
                                newImg.style.height = targetHeight + "px";
                                newImg.style.display = "block";
                                newImg.style.margin = "0 auto";
                                
                                svg.parentNode.replaceChild(newImg, svg);
                            } catch (err) {
                                console.error("Canvas draw failed, using Fallback:", err);
                                const fallbackImg = document.createElement('img');
                                fallbackImg.setAttribute('src', imgSrc);
                                fallbackImg.setAttribute('width', targetWidth);
                                fallbackImg.setAttribute('height', targetHeight);
                                fallbackImg.style.width = targetWidth + "px";
                                fallbackImg.style.height = targetHeight + "px";
                                fallbackImg.style.display = "block";
                                fallbackImg.style.margin = "0 auto";
                                svg.parentNode.replaceChild(fallbackImg, svg);
                            }
                            resolve();
                        };
                        img.onerror = (err) => {
                            const fallbackImg = document.createElement('img');
                            fallbackImg.setAttribute('src', imgSrc);
                            fallbackImg.setAttribute('width', targetWidth);
                            fallbackImg.setAttribute('height', targetHeight);
                            fallbackImg.style.width = targetWidth + "px";
                            fallbackImg.style.height = targetHeight + "px";
                            fallbackImg.style.display = "block";
                            fallbackImg.style.margin = "0 auto";
                            svg.parentNode.replaceChild(fallbackImg, svg);
                            resolve();
                        };
                        img.src = imgSrc;
                    });
                } catch (err) { console.warn("SVG error", err); }
            }

            container.querySelectorAll('table').forEach(tbl => {
                tbl.setAttribute('border', '1');
                tbl.setAttribute('cellspacing', '0');
                tbl.setAttribute('cellpadding', '8');
                tbl.style.borderCollapse = 'collapse';
                tbl.style.width = '100%';
                tbl.style.marginBottom = '20px';
                tbl.querySelectorAll('th, td').forEach(c => { c.style.border = '1px solid black'; c.style.padding = '8px'; });
            });
        }

                        });
                        
                        if (response.ok) {
                            const blob = await response.blob();
                            const link = document.createElement('a');
                            link.href = URL.createObjectURL(blob);
                            let exportTitle = isFull ? "ToanVan" : (currentSelected ? currentSelected.item.title : "Doc");
                            let safeTitle = exportTitle.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
                            link.download = `DeCuong_${safeTitle}.docx`;
                            link.click();
                            return; 
                        }
                    } catch(err) {
                        console.warn("Lỗi API DOCX. Rớt về định dạng MHT dự phòng.", err);
                    }
                }

                const wordStyles = `
                    <style>
                        @page WordSection1 { size: A4; margin: 2.5cm 2.0cm 2.5cm 3.5cm; mso-header-margin: 1.25cm; mso-footer-margin: 1.25cm; mso-paper-source: 0; }
                        div.WordSection1 { page: WordSection1; }
                        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
                        th, td { border: 1px solid black; padding: 8px; text-align: left; }
                        th { background-color: #f2f2f2; }
                        h1, h2, h3, h4 { font-family: 'Times New Roman', serif; color: black; margin-top: 12pt; margin-bottom: 6pt; text-align: left; }
                        p { font-family: 'Times New Roman', serif; font-size: 14pt; line-height: 1.5; text-align: justify; margin-top: 0pt; margin-bottom: 6pt; text-indent: 1.25cm; }
                        li { font-family: 'Times New Roman', serif; font-size: 14pt; line-height: 1.5; text-align: justify; margin-top: 0pt; margin-bottom: 4pt; }
                        img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
                        .export-title { text-align: center; font-size: 16pt; font-weight: bold; margin-bottom: 30px; text-transform: uppercase; }
                    </style>
                `;

                const images = tempDiv.querySelectorAll('img');
                const imageAttachments = [];
                let imgCounter = 0;

                images.forEach((img) => {
                    const src = img.getAttribute('src');
                    if (src && src.startsWith('data:image')) {
                        const parts = src.split(';base64,');
                        if (parts.length === 2) {
                            const mimeType = parts[0].replace('data:', '');
                            const base64Data = parts[1];
                            const extension = mimeType.split('/')[1] || 'png';
                            const loc = `image_${imgCounter}.${extension}`;
                            img.setAttribute('src', loc);
                            imageAttachments.push({ location: loc, mime: mimeType, data: base64Data });
                            imgCounter++;
                        }
                    }
                });

                const htmlContent = `\ufeff<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Export Word</title>${wordStyles}</head>
                <body style="font-family:'Times New Roman'"><div class="WordSection1">${tempDiv.innerHTML}</div></body></html>`;

                const boundary = "----=_NextPart_PhD_Export_" + Math.random().toString(36).substring(2);
                let mhtContent = "MIME-Version: 1.0\r\n";
                mhtContent += `Content-Type: multipart/related; boundary="${boundary}"\r\n\r\n`;
                
                mhtContent += `--${boundary}\r\n`;
                mhtContent += "Content-Type: text/html; charset=\"utf-8\"\r\n";
                mhtContent += "Content-Transfer-Encoding: 8bit\r\n\r\n";
                mhtContent += htmlContent + "\r\n\r\n";
                
                imageAttachments.forEach(att => {
                    mhtContent += `--${boundary}\r\n`;
                    mhtContent += `Content-Type: ${att.mime}\r\n`;
                    mhtContent += "Content-Transfer-Encoding: base64\r\n";
                    mhtContent += `Content-Location: ${att.location}\r\n\r\n`;
                    const b64 = att.data;
                    for (let i = 0; i < b64.length; i += 76) {
                        mhtContent += b64.substring(i, i + 76) + "\r\n";
                    }
                    mhtContent += "\r\n";
                });
                
                mhtContent += `--${boundary}--\r\n`;

                const blob = new Blob([mhtContent], { type: 'message/rfc822' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                
                let exportTitle = isFull ? "ToanVan" : (currentSelected ? currentSelected.item.title : "Doc");
                let safeTitle = exportTitle.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
                link.download = `DeCuong_${safeTitle}.doc`;
                link.click();
            } catch (e) { 
                alert("Lỗi xuất Word: " + e.message); 
            } finally {
                document.body.removeChild(tempDiv);
                btn.innerHTML = originalText;
            }
        }

        async function exportPDF() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "Chuẩn bị PDF...";

            const tempDiv = document.createElement('div');
            tempDiv.id = "print-container";
            tempDiv.innerHTML = getExportHTML(true); 
            document.body.appendChild(tempDiv);
            
            tempDiv.style.width = '210mm'; 
            tempDiv.style.position = 'fixed';
            tempDiv.style.left = '0';
            tempDiv.style.top = '0';
            tempDiv.style.zIndex = '-9999';
            tempDiv.style.opacity = '0.01';

            try {
                await processExportContainer(tempDiv);
                
                tempDiv.style.position = 'absolute';
                tempDiv.style.left = '0';
                tempDiv.style.top = '0';
                tempDiv.style.zIndex = '9999';
                tempDiv.style.opacity = '1';
                window.print();
                
            } catch (e) {
                console.error(e);
                alert("Lỗi xuất PDF: " + e.message);
            } finally {
                document.body.removeChild(tempDiv);
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>

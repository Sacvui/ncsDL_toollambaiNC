<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PhD Workspace - ĐỀ CƯƠNG NGHIÊN CỨU</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            securityLevel: 'loose',
            htmlLabels: false,
            theme: 'base',
            themeVariables: { primaryColor: '#ffffff', primaryTextColor: '#000000', primaryBorderColor: '#000000', lineColor: '#000000', secondaryColor: '#ffffff', tertiaryColor: '#ffffff', mainBkg: '#ffffff', nodeBorder: '#000000', clusterBkg: '#ffffff', clusterBorder: '#000000', titleColor: '#000000', edgeLabelBackground: '#ffffff' }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Custom Properties */
            --bg-body: #f1f5f9;
            --bg-sidebar: #0f172a;
            --bg-card: #ffffff;
            --bg-stat: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #334155;
            --text-heading: #0f172a;
            --text-sidebar-active: #ffffff;
            --text-sidebar-inactive: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #10b981;
            --accent: #6366f1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-card: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --doc-font: 'Times New Roman', Times, Baskerville, Georgia, serif;
        }

        [data-theme="dark"] {
            /* Dark Theme Custom Properties */
            --bg-body: #090d16;
            --bg-sidebar: #131b2e;
            --bg-card: #182236;
            --bg-stat: #1f2d47;
            --border-color: #27354d;
            --text-main: #cbd5e1;
            --text-heading: #f8fafc;
            --text-sidebar-active: #ffffff;
            --text-sidebar-inactive: #64748b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg-body);
            color: var(--text-main);
            transition: var(--transition);
            overflow: hidden;
        }

        /* Sidebar Container */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            color: #fff;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: 4px 0 25px rgba(0,0,0,0.15);
            z-index: 10;
            position: relative;
            transition: var(--transition);
        }

        .sidebar-header {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
        }

        .ncs-badge {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 10px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--text-sidebar-inactive);
        }

        .ncs-badge strong {
            color: #fff;
            font-size: 0.9rem;
        }

        .nav-container {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
        }

        /* Styling Scrollbars */
        .nav-container::-webkit-scrollbar,
        .main::-webkit-scrollbar {
            width: 6px;
        }
        .nav-container::-webkit-scrollbar-track,
        .main::-webkit-scrollbar-track {
            background: transparent;
        }
        .nav-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .main::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .nav-header {
            font-size: 0.7rem;
            color: var(--text-sidebar-inactive);
            font-weight: 700;
            margin: 25px 0 10px 5px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
        }

        .nav-item {
            padding: 12px 14px;
            margin: 6px 0;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-sidebar-inactive);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 25%;
            height: 50%;
            width: 3px;
            background: var(--secondary);
            border-radius: 0 4px 4px 0;
            opacity: 0;
            transition: var(--transition);
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text-sidebar-active);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            font-weight: 600;
        }

        .nav-item.active::before {
            opacity: 1;
            background: #3b82f6;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 1rem;
            margin-top: auto;
            font-size: 0.75rem;
            color: var(--text-sidebar-inactive);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Main Workspace */
        .main {
            flex-grow: 1;
            padding: 2.5rem;
            overflow-y: auto;
            transition: var(--transition);
            position: relative;
        }

        .card {
            background: var(--bg-card);
            padding: 3.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-card);
            position: relative;
            min-height: 85vh;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            box-sizing: border-box;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Buttons & Toolbar */
        .btn-group {
            position: absolute;
            top: 2.5rem;
            right: 3.5rem;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-theme {
            background: var(--bg-stat);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            box-shadow: none;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
        }

        /* Statistics Cards Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
            margin-top: 1.5rem;
        }

        .stat-card {
            background: var(--bg-stat);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-main);
            opacity: 0.8;
            font-weight: 600;
        }

        .stat-val {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-heading);
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .stat-val span {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Content Document Styling (APA Standard) */
        #title {
            color: var(--text-heading);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            margin-top: 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            transition: var(--transition);
        }

        #content {
            font-family: var(--doc-font);
            font-size: 14pt;
            line-height: 1.8;
            color: var(--text-main);
            text-align: justify;
            transition: var(--transition);
            margin-top: 1.5rem;
        }

        #content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            color: var(--text-heading);
            margin-top: 24pt;
            margin-bottom: 12pt;
            page-break-after: avoid;
            line-height: 1.3;
        }

        #content h1 { font-size: 20pt; text-transform: uppercase; text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        #content h2 { font-size: 16pt; border-left: 4px solid var(--primary); padding-left: 12px; }
        #content h3 { font-size: 14pt; }
        #content h4 { font-size: 14pt; font-style: italic; }
        #content h5 { font-size: 13pt; }

        #content p {
            margin-top: 0;
            margin-bottom: 16px;
            text-indent: 0; /* Standard modern spacing */
        }
        
        #content p + p {
            text-indent: 1.25cm; /* Standard indent for consecutive paragraphs */
        }

        #content blockquote {
            margin: 20px 0;
            padding: 15px 20px;
            background: var(--bg-stat);
            border-left: 4px solid var(--primary);
            font-style: italic;
            border-radius: 0 12px 12px 0;
        }

        /* Table Styling */
        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            box-shadow: var(--shadow);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        #content th, #content td {
            padding: 12px 16px;
            font-size: 13pt;
            border-bottom: 1px solid var(--border-color);
        }

        #content th {
            background-color: var(--bg-stat);
            color: var(--text-heading);
            font-weight: 700;
            text-align: left;
        }

        #content tr:last-child td {
            border-bottom: none;
        }

        #content tr:hover td {
            background-color: rgba(59, 130, 246, 0.02);
        }

        /* Mermaid Graph Boxes */
        .mermaid-box {
            margin: 35px auto;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 24px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            box-shadow: var(--shadow);
            max-width: 100%;
        }

        .mermaid-box svg {
            width: 100% !important;
            max-width: 850px !important;
            height: auto !important;
            min-width: 550px;
        }

        [data-theme="dark"] .mermaid-box {
            background: #ffffff; /* keep white bg for clear readability of black & white mermaid rules */
            border-color: var(--border-color);
        }

        /* Error Message Box */
        .error-box {
            color: #b91c1c;
            border: 1px solid #fca5a5;
            padding: 16px;
            background: #fef2f2;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Print Formatting & Page Breaks */
        .export-title { text-align: center; font-size: 22pt; font-weight: bold; margin-bottom: 40px; }
        .export-chapter { margin-bottom: 50px; }
        .page-break { page-break-after: always; }

        @media print {
            @page { size: A4; margin: 2.5cm 2cm 2.5cm 3cm; }
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible; }
            #print-container { position: absolute; left: 0; top: 0; width: 100%; background: white; padding: 0; }
            #print-container h1, #print-container h2 { text-transform: uppercase; }
            #print-container .mermaid-box, #print-container .mermaid { page-break-inside: avoid; border: none; text-align: center; }
            #print-container img { max-width: 100% !important; height: auto !important; page-break-inside: avoid; display: block; margin: 0 auto; }
            #print-container { font-family: 'Times New Roman', serif; font-size: 14pt; color: #000; line-height: 1.5; text-align: justify; }
            #print-container p { margin-top: 0pt; margin-bottom: 0pt; line-height: 1.5; }
            #print-container p + p { text-indent: 1.25cm; }
            #print-container table { page-break-inside: avoid; border-collapse: collapse; width: 100%; }
            #print-container th, #print-container td { border: 1px solid black; padding: 8px; }
        }
    </style>
</head>

    <script>
        const data = {"chapters":[{"title":"ĐỀ CƯƠNG NGHIÊN CỨU","file":"00_Bia.md","chars":658,"pages":"0.4","content":"# ĐỀ CƯƠNG NGHIÊN CỨU\r\n**(Dự tuyển Nghiên cứu sinh, Đại học Tôn Đức Thắng)**\r\n\r\n---\r\n\r\n**Tên đề tài dự kiến:**\r\nChỉ số Hài lòng Khách hàng (CSI) và Hiệu quả Hoạt động Doanh nghiệp: Bằng chứng từ Ngành Điện tử Tiêu dùng tại Việt Nam\r\n\r\n*(Customer Satisfaction Index and Firm Performance: Evidence from the Consumer Electronics Industry in Vietnam)*\r\n\r\n---\r\n\r\n**Họ và tên thí sinh:** Nguyễn Cường Thịnh\r\n**Ngày sinh:** *(bổ sung)*\r\n**Email:** *(bổ sung)* | **Điện thoại:** *(bổ sung)*\r\n**Địa chỉ:** TP. Hồ Chí Minh\r\n\r\n**Lĩnh vực nghiên cứu:** Quản trị Kinh doanh\r\n**Chuyên ngành dự kiến:** Quản trị Kinh doanh\r\n**Cơ sở đào tạo:** Đại học Tôn Đức Thắng (TDTU)\r\n"},{"title":"1. Tính cấp thiết, lý do chọn đề tài, lĩnh vực nghiên cứu","file":"01_TinhCapThiet.md","chars":4313,"pages":"2.4","content":"## 1. Tính cấp thiết, lý do chọn đề tài, lĩnh vực nghiên cứu\r\n\r\n### 1.1. Bối cảnh và tính cấp thiết\r\n\r\nNgành điện tử tiêu dùng toàn cầu đang trải qua giai đoạn cạnh tranh cấu trúc lại sâu sắc: chu kỳ đổi mới sản phẩm rút ngắn, ranh giới giữa phần cứng và dịch vụ ngày càng mờ nhạt, và người tiêu dùng chuyển từ việc mua một thiết bị sang tham gia vào một hệ sinh thái số. Trong bối cảnh đó, sự hài lòng khách hàng không còn là chỉ số hậu kỳ mà trở thành yếu tố tiên đoán trung tâm cho tỷ lệ giữ chân, hành vi tái mua, và giá trị vòng đời khách hàng -- ba cấu phần trực tiếp của hiệu quả tài chính dài hạn.\r\n\r\nTại Việt Nam, thị trường điện tử tiêu dùng đạt quy mô khoảng 11,44 tỷ USD năm 2025 và được dự báo tăng trưởng với tốc độ CAGR 8,2% giai đoạn 2026-2035 (Expert Market Research, 2025). Thị trường điện thoại thông minh riêng lẻ đạt 6,71 tỷ USD năm 2024 với CAGR 9,4% đến 2030 (TechSci Research, 2024). Các thương hiệu quốc tế lớn như Dell, Samsung, Apple, Lenovo, HP đang cạnh tranh gay gắt không chỉ về thông số kỹ thuật mà còn về chất lượng dịch vụ hậu mãi, trải nghiệm mua sắm và mức độ tích hợp hệ sinh thái.\r\n\r\nĐiểm khác biệt căn bản của ngành điện tử so với hàng tiêu dùng nhanh nằm ở ba đặc điểm: thứ nhất, đây là nhóm sản phẩm mua có mức độ tham gia cao (high-involvement purchase) với chu kỳ thay thế trung bình 2-4 năm, khiến mỗi quyết định mua mang nặng rủi ro tài chính và tâm lý; thứ hai, chi phí chuyển đổi thương hiệu là thực chất và đa chiều, bao gồm chi phí học tập, mất dữ liệu và phụ kiện tích lũy, cùng sự gắn kết với hệ sinh thái phần mềm; thứ ba, dịch vụ kỹ thuật hậu mãi (after-sales technical service) đóng vai trò tiền đề CSI quan trọng không kém chất lượng sản phẩm, đặc biệt đối với khách hàng doanh nghiệp và chuyên gia.\r\n\r\nTuy nhiên, phần lớn nghiên cứu về CSI hiện tại được thực hiện trong bối cảnh dịch vụ hoặc hàng tiêu dùng nhanh, với mô hình ACSI gốc được thiết kế chủ yếu cho thị trường Hoa Kỳ. Việc áp dụng trực tiếp mô hình này cho ngành điện tử tiêu dùng tại thị trường mới nổi như Việt Nam, nơi người tiêu dùng có hành vi mua sắm khác biệt và cơ sở hạ tầng dịch vụ hậu mãi phân tán, là ngoại suy có điều kiện và cần được kiểm định bằng dữ liệu thực địa.\r\n\r\nKhoảng cách giữa quy mô đầu tư vào trải nghiệm khách hàng của các hãng điện tử và cơ sở bằng chứng thực nghiệm về tác động của CSI đến hiệu quả doanh nghiệp trong bối cảnh Việt Nam là động lực trực tiếp cho nghiên cứu này.\r\n\r\n### 1.2. Lý do chọn đề tài\r\n\r\nVề lý luận, ngành điện tử tiêu dùng tạo ra một bối cảnh kiểm định đặc thù cho lý thuyết CSI vì ba lý do. Một là, mức độ tham gia cao của người mua làm cho cơ chế hình thành kỳ vọng và đánh giá chất lượng cảm nhận phức tạp hơn đáng kể so với hàng tiêu dùng nhanh -- người mua laptop hay smartphone tích lũy thông tin kỹ lưỡng trước khi mua và tiếp tục cập nhật đánh giá trong suốt vòng đời sử dụng. Hai là, hiệu ứng hệ sinh thái (ecosystem lock-in) tạo ra một cơ chế điều tiết mới chưa được tích hợp đầy đủ vào các mô hình CSI hiện có. Ba là, dịch vụ hậu mãi là một chiều kích của chất lượng cảm nhận có trọng số đặc biệt trong ngành này, và sự khác biệt về chất lượng dịch vụ hậu mãi giữa các thương hiệu tại Việt Nam là đáng kể.\r\n\r\nVề thực tiễn, với vai trò Giám đốc Thương hiệu trong ngành điện tử tiêu dùng tại Việt Nam, nghiên cứu sinh có điều kiện tiếp cận dữ liệu thực tiễn về hành vi khách hàng, chỉ số hài lòng theo điểm bán và sau bán, cùng kết quả kinh doanh của doanh nghiệp. Bằng chứng thực nghiệm từ nghiên cứu này có thể được ứng dụng trực tiếp để tối ưu hóa chiến lược trải nghiệm khách hàng trong một thị trường đang tăng trưởng nhanh và cạnh tranh cao.\r\n\r\nVề định vị học thuật, đề tài bổ sung vào dòng nghiên cứu CSI một trường hợp ngành hàng chưa được nghiên cứu đầy đủ tại thị trường Việt Nam, đồng thời kiểm định vai trò của hai biến mới: chi phí chuyển đổi cảm nhận và mức độ gắn kết hệ sinh thái trong chuỗi CSI -- hiệu quả doanh nghiệp.\r\n\r\n### 1.3. Lĩnh vực nghiên cứu\r\n\r\nĐề tài thuộc lĩnh vực Quản trị Kinh doanh, giao thoa với Marketing chiến lược, Quản trị Thương hiệu và Hành vi người tiêu dùng công nghệ. Đây là giao điểm của ba dòng nghiên cứu: đo lường và quản lý trải nghiệm khách hàng trong ngành công nghệ, phân tích hiệu quả hoạt động doanh nghiệp, và nghiên cứu hành vi chuyển đổi thương hiệu trong thị trường điện tử.\r\n"},{"title":"2. Tình hình nghiên cứu","file":"02_TinhHinhNghienCuu.md","chars":6428,"pages":"3.6","content":"## 2. Tình hình nghiên cứu\r\n\r\n### 2.1. Lý thuyết nền tảng\r\n\r\nBốn lý thuyết tạo thành khung lý thuyết tích hợp, trong đó hai lý thuyết đầu là nền tảng chung với dòng nghiên cứu CSI, còn hai lý thuyết sau đặc thù cho bối cảnh điện tử tiêu dùng.\r\n\r\nLý thuyết xác nhận kỳ vọng của Oliver (1980) giải thích cơ chế hình thành sự hài lòng qua so sánh giữa cảm nhận thực tế và kỳ vọng trước mua. Trong ngành điện tử, cơ chế này phức tạp hơn do kỳ vọng được hình thành qua quá trình tìm kiếm thông tin kỹ lưỡng và tiếp tục cập nhật trong suốt vòng đời sử dụng thiết bị -- không chỉ tại thời điểm mua như trong FMCG.\r\n\r\nLý thuyết nguồn lực của Barney (1991) cung cấp cơ sở lý luận cho việc coi năng lực tạo ra trải nghiệm khách hàng vượt trội là nguồn lực chiến lược khó sao chép. Trong ngành điện tử, năng lực này thể hiện cụ thể qua chất lượng hệ sinh thái phần mềm, mạng lưới dịch vụ hậu mãi và khả năng cập nhật sản phẩm liên tục -- những yếu tố mà đối thủ không thể bắt chước nhanh chóng.\r\n\r\nLý thuyết chi phí chuyển đổi của Klemperer (1987) và Burnham et al. (2003) lý giải tại sao lòng trung thành trong ngành điện tử có tính bền vững khác biệt so với FMCG. Chi phí chuyển đổi bao gồm ba thành phần: chi phí thủ tục (mất dữ liệu, học thao tác mới), chi phí tài chính (mất giá trị phụ kiện, chi phí mua mới) và chi phí tâm lý (rủi ro không chắc chắn với sản phẩm mới). Khi CSI cao, người dùng không chỉ hài lòng mà còn không có lý do đủ mạnh để chịu đựng các chi phí chuyển đổi này -- tạo ra barrier-to-exit thực chất.\r\n\r\nLý thuyết hệ sinh thái kỹ thuật số của Parker, Van Alstyne & Choudary (2016) bổ sung chiều kích mới: trong thị trường điện tử hiện đại, giá trị không đến từ sản phẩm đơn lẻ mà từ toàn bộ hệ sinh thái mà thiết bị là cổng vào. Mức độ gắn kết hệ sinh thái (ecosystem engagement) -- đo bằng số lượng dịch vụ và thiết bị đồng bộ mà người dùng sử dụng trong một hệ sinh thái thương hiệu -- là biến trung gian tiềm năng quan trọng chưa được tích hợp vào mô hình CSI truyền thống.\r\n\r\n### 2.2. Mô hình CSI trong ngành điện tử: đặc thù và mở rộng\r\n\r\nMô hình ACSI gốc (Fornell et al., 1996) xác định ba tiền đề của CSI là kỳ vọng khách hàng, chất lượng cảm nhận và giá trị cảm nhận. Trong bối cảnh điện tử tiêu dùng, cấu trúc này cần được mở rộng theo hai hướng.\r\n\r\nHướng thứ nhất là phân tách chất lượng cảm nhận thành hai thành phần phân biệt: chất lượng kỹ thuật sản phẩm (hiệu năng phần cứng, độ bền, tính năng) và chất lượng dịch vụ hậu mãi (tốc độ xử lý bảo hành, năng lực kỹ thuật viên, tính sẵn có của linh kiện). Nghiên cứu của Eshghi, Roy & Ganguli (2008) trên thị trường điện tử di động xác nhận rằng chất lượng dịch vụ hậu mãi có trọng số tác động đến CSI cao hơn đáng kể so với chất lượng sản phẩm thuần túy trong bối cảnh thị trường mới nổi -- ngược lại với kết quả từ thị trường phát triển.\r\n\r\nHướng thứ hai là bổ sung hai biến trung gian mới giữa CSI và hiệu quả doanh nghiệp: chi phí chuyển đổi cảm nhận (perceived switching cost) và mức độ gắn kết hệ sinh thái. Lập luận cơ chế là: CSI cao làm giảm động lực chuyển đổi của người dùng và tăng mức độ đầu tư vào hệ sinh thái thương hiệu; hai yếu tố này cùng tạo ra dòng doanh thu bền vững và ổn định hơn, từ đó cải thiện hiệu quả tài chính theo cơ chế mà Gruca & Rego (2005) mô tả là \"giảm biến động dòng tiền.\"\r\n\r\nViệc phân biệt thao tác hóa giữa chi phí chuyển đổi cảm nhận và lòng trung thành thương hiệu là cần thiết: lòng trung thành phản ánh thái độ tích cực chủ động (muốn ở lại), trong khi chi phí chuyển đổi cảm nhận phản ánh rào cản thoát thụ động (khó rời đi). Cả hai đều tác động đến hành vi giữ chân nhưng thông qua cơ chế tâm lý và hàm ý quản trị khác nhau.\r\n\r\n### 2.3. Bằng chứng thực nghiệm từ ngành điện tử\r\n\r\nDữ liệu ACSI 2026 ghi nhận Samsung đạt điểm hài lòng 81 và Apple đạt 80 trong danh mục điện thoại di động, cho thấy sự hội tụ của hai thương hiệu dẫn đầu ở mức cao và cạnh tranh ngày càng chuyển sang chiều kích dịch vụ và hệ sinh thái thay vì thông số kỹ thuật thuần túy. Đây là xu hướng có liên quan trực tiếp đến thị trường Việt Nam khi người tiêu dùng đô thị ngày càng tinh tế hơn trong đánh giá trải nghiệm.\r\n\r\nAnderson & Mittal (2000) phát hiện mối quan hệ phi tuyến giữa cải thiện chất lượng và tăng mức độ hài lòng trong ngành sản phẩm kỹ thuật cao: ở ngưỡng chất lượng thấp, cải thiện kỹ thuật tạo ra tăng trưởng CSI mạnh; nhưng khi đã đạt ngưỡng chất lượng cao, người tiêu dùng chuyển sự chú ý sang chất lượng dịch vụ và trải nghiệm hậu mãi. Phát hiện này hàm ý rằng đối với thị trường Việt Nam, khoảng cách giữa các thương hiệu trong nhận thức chất lượng kỹ thuật đang thu hẹp, trong khi khoảng cách về dịch vụ hậu mãi vẫn còn rộng và là yếu tố phân biệt CSI quan trọng hơn.\r\n\r\nTrong lĩnh vực thiết bị thông minh và IoT, nghiên cứu về CSI cho smart services của Chae & Kim (2014) xác nhận rằng giá trị cảm nhận và mức độ hài lòng đóng vai trò trung gian then chốt giữa chất lượng dịch vụ số và lòng trung thành -- cơ chế này ngày càng quan trọng khi ranh giới giữa phần cứng và dịch vụ số trong ngành điện tử tiêu dùng ngày càng mờ nhạt.\r\n\r\nTại Việt Nam, phần lớn nghiên cứu về hành vi người tiêu dùng điện tử tập trung vào ý định mua và các yếu tố ảnh hưởng đến lựa chọn thương hiệu, nhưng chưa xây dựng được mô hình CSI có cấu trúc đầy đủ kết nối với dữ liệu hiệu quả tài chính thực tế của doanh nghiệp. Đây là khoảng trống phương pháp luận và bối cảnh cần được lấp đầy.\r\n\r\n### 2.4. Khoảng trống nghiên cứu\r\n\r\nBa khoảng trống được xác định rõ và tạo cơ sở định vị cho đề tài này.\r\n\r\nKhoảng trống 1 về cấu trúc đo lường: Mô hình CSI hiện tại chưa phân tách chất lượng cảm nhận thành chất lượng kỹ thuật sản phẩm và chất lượng dịch vụ hậu mãi trong bối cảnh ngành điện tử. Sự phân tách này có ý nghĩa thực tiễn quan trọng vì chiến lược cải thiện CSI qua hai kênh này đòi hỏi nguồn lực và năng lực tổ chức hoàn toàn khác nhau.\r\n\r\nKhoảng trống 2 về cơ chế truyền dẫn: Vai trò trung gian của chi phí chuyển đổi cảm nhận và mức độ gắn kết hệ sinh thái trong chuỗi CSI -- hiệu quả doanh nghiệp chưa được kiểm định trong bối cảnh điện tử tiêu dùng tại thị trường mới nổi. Hai biến này là đặc thù của ngành và không có trong mô hình CSI cho FMCG.\r\n\r\nKhoảng trống 3 về bối cảnh: Chưa có nghiên cứu kết nối dữ liệu CSI khảo sát người tiêu dùng với dữ liệu tài chính thực tế của doanh nghiệp điện tử tại Việt Nam, đặc biệt trong bối cảnh thị trường đang chuyển dịch mạnh sang thương mại điện tử và dịch vụ số đi kèm phần cứng.\r\n"},{"title":"3. Mục đích nghiên cứu","file":"03_MucDich.md","chars":2445,"pages":"1.4","content":"## 3. Mục đích nghiên cứu\r\n\r\n### 3.1. Mục đích tổng quát\r\n\r\nNghiên cứu nhằm xây dựng và kiểm định mô hình CSI mở rộng phù hợp với đặc thù ngành điện tử tiêu dùng, phân tích tác động của CSI đến hiệu quả hoạt động doanh nghiệp thông qua các biến trung gian đặc thù ngành, và kiểm định vai trò điều tiết của loại sản phẩm cùng kênh mua sắm trong bối cảnh thị trường điện tử Việt Nam.\r\n\r\n### 3.2. Mục tiêu cụ thể\r\n\r\nMục tiêu 1 là xây dựng và kiểm định cấu trúc đo lường CSI mở rộng cho ngành điện tử tiêu dùng, trong đó phân tách chất lượng cảm nhận thành hai thành phần phân biệt: chất lượng kỹ thuật sản phẩm và chất lượng dịch vụ hậu mãi.\r\n\r\nMục tiêu 2 là đánh giá mức độ và cấu trúc hài lòng của người tiêu dùng điện tử tại Việt Nam theo từng nhóm sản phẩm (laptop, smartphone, thiết bị thông minh) và theo từng thương hiệu đại diện.\r\n\r\nMục tiêu 3 là phân tích tác động trực tiếp và gián tiếp của CSI đến hiệu quả tài chính (ROA, ROE, tốc độ tăng trưởng doanh thu) và phi tài chính (thị phần, Net Promoter Score) của doanh nghiệp điện tử.\r\n\r\nMục tiêu 4 là kiểm định vai trò trung gian của chi phí chuyển đổi cảm nhận, lòng trung thành thương hiệu và mức độ gắn kết hệ sinh thái trong chuỗi nhân quả CSI -- hiệu quả doanh nghiệp.\r\n\r\nMục tiêu 5 là kiểm định vai trò điều tiết của loại sản phẩm và kênh mua sắm (truyền thống, thương mại điện tử, kênh doanh nghiệp B2B) trong mối quan hệ trên.\r\n\r\nMục tiêu 6 là đề xuất hàm ý quản trị thương hiệu và chiến lược trải nghiệm khách hàng cho các doanh nghiệp điện tử hoạt động tại Việt Nam.\r\n\r\n### 3.3. Câu hỏi nghiên cứu\r\n\r\nQ1: Cấu trúc đo lường CSI trong ngành điện tử tiêu dùng tại Việt Nam có khác biệt so với mô hình ACSI gốc như thế nào, cụ thể là vai trò tương đối của chất lượng kỹ thuật sản phẩm và chất lượng dịch vụ hậu mãi?\r\n\r\nQ2: CSI tác động như thế nào đến hiệu quả tài chính và phi tài chính của doanh nghiệp điện tử niêm yết tại Việt Nam?\r\n\r\nQ3: Chi phí chuyển đổi cảm nhận, lòng trung thành thương hiệu và mức độ gắn kết hệ sinh thái có vai trò trung gian như thế nào trong chuỗi CSI -- hiệu quả doanh nghiệp?\r\n\r\nQ4: Loại sản phẩm (laptop vs. smartphone vs. thiết bị thông minh) và kênh mua sắm có điều tiết mối quan hệ CSI -- hiệu quả doanh nghiệp như thế nào?\r\n\r\nQ5: Hàm ý quản trị nào phù hợp cho các doanh nghiệp điện tử nhằm tối ưu hóa CSI trong điều kiện nguồn lực có giới hạn, khi phải lựa chọn ưu tiên giữa đầu tư vào chất lượng sản phẩm và nâng cấp hệ thống dịch vụ hậu mãi?\r\n"},{"title":"4. Đối tượng và phạm vi dự định nghiên cứu","file":"04_DoiTuongPhamVi.md","chars":2270,"pages":"1.3","content":"## 4. Đối tượng và phạm vi dự định nghiên cứu\r\n\r\n### 4.1. Đối tượng nghiên cứu\r\n\r\nMối quan hệ giữa Chỉ số Hài lòng Khách hàng (CSI) và Hiệu quả Hoạt động Doanh nghiệp trong ngành điện tử tiêu dùng, với sự tham gia của ba biến trung gian -- chi phí chuyển đổi cảm nhận, lòng trung thành thương hiệu, mức độ gắn kết hệ sinh thái -- và hai biến điều tiết: loại sản phẩm và kênh mua sắm.\r\n\r\n### 4.2. Khách thể nghiên cứu\r\n\r\nPhía cầu: Người tiêu dùng cá nhân từ 18 tuổi trở lên đang sở hữu và sử dụng ít nhất một sản phẩm điện tử thuộc danh mục laptop, smartphone hoặc thiết bị thông minh (smart TV, tablet, smartwatch) tại Việt Nam; và khách hàng doanh nghiệp (B2B) -- bộ phận IT/mua sắm tại các doanh nghiệp vừa và lớn có sử dụng thiết bị điện tử số lượng từ 20 máy trở lên.\r\n\r\nPhía cung: Các doanh nghiệp điện tử tiêu dùng có thị phần đáng kể tại Việt Nam, bao gồm doanh nghiệp niêm yết (để có thể thu thập dữ liệu tài chính) và đại diện thương hiệu quốc tế có báo cáo tài chính riêng cho thị trường Việt Nam hoặc khu vực. Danh sách dự kiến: FPT Retail (FRT), Mobile World Group (MWG), Digiworld (DGW), cùng các công ty đại lý chính thức của Dell, HP, Lenovo, Apple, Samsung tại Việt Nam.\r\n\r\n### 4.3. Phạm vi nghiên cứu\r\n\r\nPhạm vi không gian: Việt Nam, tập trung tại TP. Hồ Chí Minh, Hà Nội và Đà Nẵng cho dữ liệu khảo sát người tiêu dùng; phạm vi toàn quốc cho dữ liệu tài chính doanh nghiệp.\r\n\r\nPhạm vi sản phẩm: Ba nhóm sản phẩm cốt lõi của ngành điện tử tiêu dùng -- laptop và máy tính xách tay, điện thoại thông minh, và thiết bị thông minh gia đình (smart TV, tablet, smartwatch). Không bao gồm thiết bị điện gia dụng truyền thống (tủ lạnh, máy giặt) và linh kiện điện tử do đặc điểm mua sắm và cơ chế hài lòng khác biệt.\r\n\r\nPhạm vi thời gian: Dữ liệu sơ cấp khảo sát người tiêu dùng thu thập trong năm thứ hai của chương trình đào tạo (dự kiến 2027). Dữ liệu thứ cấp tài chính doanh nghiệp trong giai đoạn 2020-2026, bao gồm giai đoạn dịch chuyển mạnh sang thương mại điện tử và làm việc từ xa hậu COVID-19.\r\n\r\nPhạm vi phân tích: Nghiên cứu tiếp cận cả hai phân khúc B2C và B2B, nhằm so sánh cơ chế hình thành CSI và tác động đến hiệu quả doanh nghiệp giữa hai phân khúc -- một điểm phân biệt quan trọng trong ngành điện tử mà phần lớn nghiên cứu hiện tại bỏ qua.\r\n"},{"title":"5. Phương pháp nghiên cứu sẽ được sử dụng","file":"05_PhuongPhap.md","chars":7378,"pages":"4.1","content":"## 5. Phương pháp nghiên cứu sẽ được sử dụng\r\n\r\n### 5.1. Thiết kế nghiên cứu tổng thể\r\n\r\nNghiên cứu sử dụng phương pháp hỗn hợp tuần tự theo tiến trình: Khám phá định tính -- Xây dựng thang đo -- Xác nhận định lượng. Giai đoạn định tính nhằm điều chỉnh thang đo ACSI cho phù hợp với đặc thù ngành điện tử và thị trường Việt Nam, đặc biệt là xây dựng thang đo cho hai biến mới: chi phí chuyển đổi cảm nhận và mức độ gắn kết hệ sinh thái.\r\n\r\nGiai đoạn định tính tiến hành phỏng vấn sâu bán cấu trúc với ba nhóm: 8-10 chuyên gia thương hiệu và quản lý kênh tại các doanh nghiệp điện tử (Brand Manager, Channel Manager, After-sales Director); 8-10 khách hàng doanh nghiệp B2B (IT Manager, Procurement Officer); và 10-15 người tiêu dùng cá nhân B2C đại diện theo nhóm sản phẩm và độ tuổi. Mục đích là xác định các chiều kích đặc thù của trải nghiệm khách hàng điện tử tại Việt Nam chưa được phản ánh trong thang đo ACSI gốc.\r\n\r\nGiai đoạn định lượng sử dụng khảo sát diện rộng kết hợp phân tích dữ liệu tài chính thứ cấp từ báo cáo doanh nghiệp.\r\n\r\n### 5.2. Mô hình nghiên cứu đề xuất\r\n\r\nMô hình được xây dựng theo cấu trúc bốn tầng, phản ánh đặc thù của ngành điện tử so với FMCG.\r\n\r\nTầng tiền đề bao gồm bốn cấu trúc: kỳ vọng khách hàng (CE), chất lượng kỹ thuật sản phẩm cảm nhận (PQ-Tech), chất lượng dịch vụ hậu mãi cảm nhận (PQ-Service), và giá trị cảm nhận (PV). Việc phân tách PQ thành hai thành phần là đóng góp cấu trúc chính của đề tài so với mô hình ACSI gốc.\r\n\r\nTầng trung tâm là Chỉ số Hài lòng Khách hàng tổng thể (CSI), được tổng hợp từ bốn biến tiền đề thông qua PLS-SEM.\r\n\r\nTầng trung gian gồm ba biến: lòng trung thành thương hiệu (BL), chi phí chuyển đổi cảm nhận (PSC) và mức độ gắn kết hệ sinh thái (EE). Ba biến này tạo thành ba kênh truyền dẫn tác động từ CSI sang hiệu quả doanh nghiệp với cơ chế tâm lý và hành vi khác nhau.\r\n\r\nTầng kết quả gồm hiệu quả tài chính (FP-Financial: ROA, ROE, tăng trưởng doanh thu) và hiệu quả phi tài chính (FP-NonFinancial: thị phần, Net Promoter Score). Xuyên suốt mô hình là hai biến điều tiết: loại sản phẩm (W1: laptop/smartphone/smart device) và kênh mua sắm (W2: cửa hàng vật lý/thương mại điện tử/kênh B2B doanh nghiệp).\r\n\r\n#### Sơ đồ mô hình nghiên cứu\r\n\r\n```mermaid\r\ngraph LR\r\n    subgraph A[\"TIỀN ĐỀ (Antecedents)\"]\r\n        CE[\"Kỳ vọng khách hàng\\n(CE)\"]\r\n        PQT[\"Chất lượng kỹ thuật\\nsản phẩm (PQ-Tech)\"]\r\n        PQS[\"Chất lượng dịch vụ\\nhậu mãi (PQ-Service)\"]\r\n        PV[\"Giá trị cảm nhận\\n(PV)\"]\r\n    end\r\n\r\n    subgraph B[\"TRUNG TÂM\"]\r\n        CSI[\"Chỉ số Hài lòng\\nKhách hàng (CSI)\"]\r\n    end\r\n\r\n    subgraph C[\"TRUNG GIAN (Mediators)\"]\r\n        BL[\"Lòng trung thành\\nthương hiệu (BL)\"]\r\n        PSC[\"Chi phí chuyển đổi\\ncảm nhận (PSC)\"]\r\n        EE[\"Gắn kết hệ sinh thái\\n(EE)\"]\r\n    end\r\n\r\n    subgraph D[\"KẾT QUẢ (Firm Performance)\"]\r\n        FPF[\"Hiệu quả tài chính\\n(ROA, ROE, Revenue Growth)\"]\r\n        FPNF[\"Hiệu quả phi tài chính\\n(Thị phần, NPS)\"]\r\n    end\r\n\r\n    subgraph W[\"ĐIỀU TIẾT (Moderators)\"]\r\n        W1[\"Loại sản phẩm\\n(Laptop/Smartphone/Smart Device)\"]\r\n        W2[\"Kênh mua sắm\\n(Vật lý/TMDT/B2B)\"]\r\n    end\r\n\r\n    CE   --\u003e|\"H1 (+)\"| CSI\r\n    PQT  --\u003e|\"H2 (+)\"| CSI\r\n    PQS  --\u003e|\"H3 (+)\"| CSI\r\n    PV   --\u003e|\"H4 (+)\"| CSI\r\n    CSI  --\u003e|\"H5 (+)\"| BL\r\n    CSI  --\u003e|\"H6 (+)\"| PSC\r\n    CSI  --\u003e|\"H7 (+)\"| EE\r\n    BL   --\u003e|\"H8 (+)\"| FPF\r\n    PSC  --\u003e|\"H9 (+)\"| FPF\r\n    EE   --\u003e|\"H10 (+)\"| FPF\r\n    BL   --\u003e|\"H11 (+)\"| FPNF\r\n    EE   --\u003e|\"H12 (+)\"| FPNF\r\n    W1  -. \"H13 (mod)\" .-\u003e CSI\r\n    W2  -. \"H14 (mod)\" .-\u003e BL\r\n```\r\n\r\n*Hình 1. Mô hình nghiên cứu CSI mở rộng cho ngành điện tử tiêu dùng Việt Nam (tác giả đề xuất, 2026).*\r\n\r\n#### Bảng tổng hợp biến và thang đo\r\n\r\n| Ký hiệu | Tên biến | Vai trò | Biến quan sát | Nguồn thang đo |\r\n|---------|----------|---------|--------------|----------------|\r\n| CE | Kỳ vọng khách hàng | Tiền đề | 3 biến | Fornell et al. (1996) |\r\n| PQ-Tech | Chất lượng kỹ thuật sản phẩm | Tiền đề | 4 biến | Eshghi et al. (2008); ACSI |\r\n| PQ-Service | Chất lượng dịch vụ hậu mãi | Tiền đề (MỚI) | 4 biến | Zeithaml et al. (1996); Brady & Cronin (2001) |\r\n| PV | Giá trị cảm nhận | Tiền đề | 3 biến | Fornell et al. (1996) |\r\n| CSI | Chỉ số hài lòng tổng thể | Biến trung tâm | 3 biến | Oliver (1980); ACSI |\r\n| BL | Lòng trung thành thương hiệu | Trung gian | 4 biến | Zeithaml et al. (1996) |\r\n| PSC | Chi phí chuyển đổi cảm nhận | Trung gian (MỚI) | 4 biến | Burnham et al. (2003); Klemperer (1987) |\r\n| EE | Mức độ gắn kết hệ sinh thái | Trung gian (MỚI) | 3 biến | Parker et al. (2016); Chae & Kim (2014) |\r\n| FP-Financial | Hiệu quả tài chính | Kết quả | Thứ cấp | FiinPro; Vietstock |\r\n| FP-NonFinancial | Hiệu quả phi tài chính | Kết quả | Thứ cấp + 2 biến khảo sát | Euromonitor; NPS survey |\r\n| W1 | Loại sản phẩm | Điều tiết | Phân loại (3 nhóm) | Phân loại ngành |\r\n| W2 | Kênh mua sắm | Điều tiết | Phân loại (3 nhóm) | GfK Vietnam (2024) |\r\n\r\n#### Hệ thống giả thuyết nghiên cứu\r\n\r\nMười bốn giả thuyết được phát triển theo bốn tuyến nhân quả.\r\n\r\nTuyến 1, Hình thành CSI (H1-H4): Bốn biến tiền đề đều có tác động dương đến CSI. Trong bối cảnh điện tử tiêu dùng, chất lượng dịch vụ hậu mãi (H3) được kỳ vọng có trọng số tác động cao hơn chất lượng kỹ thuật sản phẩm (H2) do đặc tính của thị trường mới nổi nơi khoảng cách kỹ thuật giữa các thương hiệu đang thu hẹp nhanh nhưng khoảng cách dịch vụ vẫn còn lớn (Anderson & Mittal, 2000; Eshghi et al., 2008).\r\n\r\nTuyến 2, CSI đến ba biến trung gian (H5-H7): CSI tác động dương đến lòng trung thành thương hiệu (H5), tăng chi phí chuyển đổi cảm nhận (H6) và thúc đẩy đầu tư sâu hơn vào hệ sinh thái thương hiệu (H7). Ba tuyến này không loại trừ nhau mà bổ sung cho nhau: người dùng hài lòng vừa muốn ở lại (H5), vừa khó rời đi (H6), vừa chủ động đầu tư thêm vào hệ sinh thái (H7).\r\n\r\nTuyến 3, Trung gian đến Firm Performance (H8-H12): Lòng trung thành (H8, H11), chi phí chuyển đổi (H9) và gắn kết hệ sinh thái (H10, H12) đều tác động dương đến hiệu quả doanh nghiệp. Chi phí chuyển đổi tác động chủ yếu đến hiệu quả tài chính thông qua cơ chế giảm tỷ lệ rời bỏ và ổn định dòng doanh thu, trong khi gắn kết hệ sinh thái tạo thêm doanh thu từ sản phẩm và dịch vụ bổ sung trong cùng hệ sinh thái.\r\n\r\nTuyến 4, Điều tiết (H13-H14): Loại sản phẩm điều tiết mối quan hệ tiền đề -- CSI (H13), cụ thể là trọng số tương đối của PQ-Tech và PQ-Service thay đổi theo danh mục sản phẩm. Kênh mua sắm điều tiết mối quan hệ CSI -- lòng trung thành (H14), vì hành vi sau mua và cơ hội tiếp xúc dịch vụ khác nhau đáng kể giữa kênh vật lý, thương mại điện tử và B2B.\r\n\r\n### 5.3. Thu thập và phân tích dữ liệu\r\n\r\nDữ liệu sơ cấp: bảng khảo sát với cỡ mẫu tối thiểu n = 550 người tiêu dùng B2C và 100 đại diện doanh nghiệp B2B (tổng n \u003e= 650, đủ điều kiện phân tích đa nhóm). Thang đo Likert 7 điểm để tăng độ nhạy phân biệt, phù hợp với đặc tính người dùng điện tử có hiểu biết kỹ thuật cao.\r\n\r\nDữ liệu thứ cấp: báo cáo tài chính kiểm toán từ FiinPro và Vietstock cho FRT, MWG, DGW; dữ liệu thị phần từ GfK Vietnam và IDC; báo cáo NPS từ khảo sát thường niên của các hãng (nếu có thể tiếp cận qua quan hệ ngành).\r\n\r\nPhân tích: PLS-SEM (SmartPLS 4) cho mô hình đo lường và cấu trúc; bootstrapping 5.000 lần lặp để kiểm định hiệu ứng trung gian bậc cao (sequential mediation); phân tích đa nhóm (MGA) theo loại sản phẩm và kênh mua sắm; phân tích dữ liệu bảng (FEM/GMM) cho phần dữ liệu tài chính thứ cấp theo thời gian.\r\n"},{"title":"6. Kế hoạch nghiên cứu (cụ thể mỗi 06 tháng)","file":"06_KeHoach.md","chars":2395,"pages":"1.3","content":"## 6. Kế hoạch nghiên cứu (cụ thể mỗi 06 tháng)\r\n\r\nThời gian đào tạo dự kiến: 3 năm (36 tháng)\r\n\r\n**Giai đoạn 1 (Tháng 1-6): Xây dựng nền tảng lý thuyết và đề cương chi tiết**\r\nHoàn thành các học phần bắt buộc của chương trình tiến sĩ tại TDTU. Tổng quan tài liệu chuyên sâu về CSI, ngành điện tử tiêu dùng, chi phí chuyển đổi và lý thuyết hệ sinh thái số (tối thiểu 80 tài liệu). Xây dựng khung lý thuyết mở rộng và hệ thống giả thuyết H1-H14. Viết và bảo vệ đề cương nghiên cứu chi tiết trước Hội đồng Cơ sở tại TDTU.\r\n\r\n**Giai đoạn 2 (Tháng 7-12): Nghiên cứu định tính và phát triển thang đo**\r\nPhỏng vấn sâu với 26-35 đối tượng (chuyên gia ngành, khách hàng B2B và B2C). Phân tích nội dung bằng NVivo để xác định chiều kích đặc thù của PQ-Service, PSC và EE trong ngành điện tử Việt Nam. Xây dựng và kiểm định sơ bộ thang đo 7 điểm (pilot study n = 60-80). Đánh giá Cronbach's Alpha và EFA. Nộp bài báo số 1 cho hội thảo khoa học quốc gia hoặc tạp chí trong nước.\r\n\r\n**Giai đoạn 3 (Tháng 13-18): Thu thập và phân tích dữ liệu chính**\r\nKhảo sát diện rộng (n \u003e= 650 bao gồm B2C và B2B). Thu thập dữ liệu tài chính thứ cấp của FRT, MWG, DGW và các đại lý lớn (2020-2025). Phân tích PLS-SEM đánh giá mô hình đo lường (reliability, validity, AVE, HTMT) và mô hình cấu trúc (path coefficients, R², f², PLSpredict). Báo cáo chuyên đề tiến sĩ số 1. Nộp bài báo quốc tế Scopus/ISI số 1 về cấu trúc đo lường CSI ngành điện tử.\r\n\r\n**Giai đoạn 4 (Tháng 19-24): Phân tích nâng cao và công bố quốc tế**\r\nKiểm định trung gian bậc cao (sequential mediation: CSI -- PSC/EE -- Firm Performance) bằng bootstrapping. Phân tích đa nhóm (MGA) theo loại sản phẩm và kênh mua sắm. Phân tích dữ liệu bảng kết hợp CSI khảo sát và tài chính thứ cấp. Báo cáo chuyên đề tiến sĩ số 2. Nộp bài báo quốc tế Scopus/ISI số 2 về cơ chế truyền dẫn và vai trò điều tiết.\r\n\r\n**Giai đoạn 5 (Tháng 25-30): Hoàn thiện công bố và bắt đầu viết luận án**\r\nPhản hồi bài báo theo phản biện. Viết bản thảo luận án các chương 1-3. Báo cáo chuyên đề tiến sĩ số 3. Trình bày kết quả tại hội thảo quốc tế (ưu tiên ICSB, AMS hoặc hội thảo chuyên ngành tiêu dùng Đông Nam Á). Nộp thêm bài báo số 3 nếu có điều kiện.\r\n\r\n**Giai đoạn 6 (Tháng 31-36): Hoàn thiện và bảo vệ luận án**\r\nHoàn thiện toàn bộ bản thảo luận án theo góp ý người hướng dẫn. Bảo vệ cấp Cơ sở. Chỉnh sửa theo Hội đồng. Bảo vệ cấp Trường và hoàn tất thủ tục cấp bằng tiến sĩ.\r\n"},{"title":"7. Mục tiêu và mong muốn đạt được khi đăng ký tuyển sinh đào tạo trình độ tiến sĩ","file":"07_MucTieu.md","chars":1961,"pages":"1.1","content":"## 7. Mục tiêu và mong muốn đạt được khi đăng ký tuyển sinh đào tạo trình độ tiến sĩ\r\n\r\nQuyết định đăng ký chương trình tiến sĩ tại Đại học Tôn Đức Thắng xuất phát từ bốn mục tiêu có liên kết chặt chẽ với nhau.\r\n\r\nVề năng lực học thuật, nghiên cứu sinh mong muốn xây dựng năng lực nghiên cứu định lượng ở trình độ quốc tế, cụ thể là khả năng thiết kế và kiểm định các mô hình cấu trúc phức tạp (PLS-SEM, phân tích đa nhóm, trung gian bậc cao) đủ tiêu chuẩn công bố trong các tạp chí ISI/Scopus chuyên ngành quản trị và marketing. Mục tiêu cụ thể là ít nhất 02 bài báo quốc tế trong thời gian đào tạo.\r\n\r\nVề đóng góp thực tiễn, nghiên cứu sinh có vị trí thực tiễn trực tiếp trong ngành điện tử tiêu dùng và nhận thấy khoảng cách rõ ràng giữa những quyết định đầu tư vào trải nghiệm khách hàng đang được đưa ra hằng ngày và cơ sở bằng chứng thực nghiệm hỗ trợ các quyết định đó. Kết quả nghiên cứu dự kiến chuyển hóa thành bộ công cụ đo lường và theo dõi CSI có thể ứng dụng thực tế trong doanh nghiệp, giúp các nhà quản lý thương hiệu có cơ sở định lượng để ưu tiên đầu tư giữa nâng cấp sản phẩm và cải thiện dịch vụ hậu mãi.\r\n\r\nVề định hướng nghề nghiệp, bằng tiến sĩ là nền tảng để kết hợp đồng thời giữa hoạt động quản lý ngành và giảng dạy tại bậc sau đại học trong lĩnh vực quản trị thương hiệu và marketing kỹ thuật số. Đây là mô hình practitioner-researcher có giá trị cao trong bối cảnh đào tạo MBA và thạc sĩ quản trị tại Việt Nam đang cần đội ngũ giảng viên có kinh nghiệm thực tiễn sâu kết hợp với nền tảng nghiên cứu vững.\r\n\r\nVề đóng góp phát triển ngành, thị trường điện tử tiêu dùng Việt Nam đang ở giai đoạn chuyển đổi quan trọng: từ cạnh tranh về giá và thông số kỹ thuật sang cạnh tranh về trải nghiệm và hệ sinh thái. Bằng chứng thực nghiệm từ nghiên cứu này sẽ cung cấp dữ liệu định lượng để hỗ trợ quá trình chuyển đổi này, thay vì chỉ dựa trên quan sát kinh nghiệm và chuẩn mực ngành quốc tế không được kiểm định trong bối cảnh địa phương.\r\n"},{"title":"8. Lý do lựa chọn cơ sở đào tạo (Đại học Tôn Đức Thắng)","file":"08_LyDo.md","chars":1747,"pages":"1.0","content":"## 8. Lý do lựa chọn cơ sở đào tạo (Đại học Tôn Đức Thắng)\r\n\r\nĐại học Tôn Đức Thắng là lựa chọn phù hợp nhất cho hướng nghiên cứu này vì năm lý do cụ thể.\r\n\r\nUy tín quốc tế được xác nhận: TDTU liên tục có mặt trong Times Higher Education World University Rankings và QS Asia Rankings, là một trong số ít trường đại học Việt Nam có bằng tiến sĩ được công nhận rộng rãi trong cộng đồng học thuật khu vực và quốc tế. Đây là yếu tố quan trọng cho một nghiên cứu sinh có định hướng kết hợp học thuật với thực tiễn nghề nghiệp.\r\n\r\nVăn hóa xuất bản mạnh: TDTU có chính sách hỗ trợ tài chính rõ ràng cho nghiên cứu sinh công bố bài báo ISI/Scopus, cùng hạ tầng thư viện truy cập đầy đủ Web of Science, Scopus, ScienceDirect và Emerald. Điều này thiết yếu cho một đề tài yêu cầu tổng quan tài liệu quốc tế chuyên sâu về CSI, hành vi tiêu dùng điện tử và mô hình phương trình cấu trúc.\r\n\r\nChuyên môn phù hợp: Khoa Quản trị Kinh doanh TDTU có đội ngũ giảng viên với công bố quốc tế trong lĩnh vực marketing, hành vi người tiêu dùng và phương pháp nghiên cứu định lượng, đáp ứng yêu cầu hướng dẫn cho đề tài này.\r\n\r\nVị trí địa lý và kết nối ngành: TP. Hồ Chí Minh là trung tâm thương mại và công nghệ lớn nhất Việt Nam, nơi tập trung văn phòng đại diện và đại lý chính thức của hầu hết các hãng điện tử lớn. Điều này tạo điều kiện thuận lợi để tiếp cận dữ liệu doanh nghiệp, phỏng vấn chuyên gia ngành và thu thập dữ liệu khảo sát người tiêu dùng trên thị trường đại diện nhất cả nước.\r\n\r\nTính linh hoạt với nghiên cứu sinh đang đi làm: TDTU có kinh nghiệm đào tạo nghiên cứu sinh kết hợp công tác thực tiễn với nghiên cứu, là lợi thế quan trọng với một Giám đốc Thương hiệu cần duy trì song song vai trò chuyên môn trong ngành trong suốt quá trình đào tạo.\r\n"},{"title":"9. Kinh nghiệm về nghiên cứu, thực tế, hoạt động xã hội và ngoại khóa","file":"09_KinhNghiem.md","chars":1421,"pages":"0.8","content":"## 9. Kinh nghiệm về nghiên cứu, thực tế, hoạt động xã hội và ngoại khóa\r\n\r\n**Kinh nghiệm nghiên cứu:**\r\nĐã hoàn thành luận văn Thạc sĩ Quản trị Kinh doanh với đề tài liên quan đến *(tên đề tài -- đề nghị bổ sung)*. Quá trình thực hiện luận văn đã tạo nền tảng về phương pháp nghiên cứu định lượng và sử dụng SPSS để phân tích dữ liệu khảo sát. Có kinh nghiệm đọc và phân tích tài liệu học thuật quốc tế trong lĩnh vực marketing và quản trị thương hiệu. Hiện đang nâng cao kỹ năng phân tích PLS-SEM với SmartPLS để chuẩn bị cho nghiên cứu tiến sĩ.\r\n\r\n**Kinh nghiệm thực tiễn:**\r\nVới vai trò Giám đốc Thương hiệu trong ngành điện tử tiêu dùng tại Việt Nam, nghiên cứu sinh tích lũy được kinh nghiệm trực tiếp trong quản lý thương hiệu B2B và B2C, xây dựng và triển khai chiến lược trải nghiệm khách hàng, phối hợp với hệ thống kênh phân phối đa cấp và giám sát các chỉ số hiệu quả thương hiệu theo thời gian thực. Kinh nghiệm làm việc trực tiếp với dữ liệu hài lòng khách hàng, báo cáo NPS và các chỉ số kênh phân phối tạo ra lợi thế đặc biệt trong việc thiết kế và thực hiện nghiên cứu này, đặc biệt là trong việc tiếp cận nguồn dữ liệu thực tiễn.\r\n\r\n**Hoạt động xã hội và ngoại khóa:**\r\nTham gia các diễn đàn chuyên môn về marketing và thương hiệu trong ngành công nghệ thông tin và điện tử tại Việt Nam *(đề nghị bổ sung chi tiết)*. Thành viên các mạng lưới chuyên gia ngành công nghệ và quản trị *(đề nghị bổ sung)*.\r\n"},{"title":"10. Dự kiến việc làm và các nghiên cứu tiếp theo sau khi tốt nghiệp","file":"10_DuKien.md","chars":1591,"pages":"0.9","content":"## 10. Dự kiến việc làm và các nghiên cứu tiếp theo sau khi tốt nghiệp\r\n\r\n**Dự kiến việc làm:**\r\nSau khi hoàn thành chương trình tiến sĩ, nghiên cứu sinh dự kiến phát triển theo hai hướng song song. Hướng thứ nhất là tiếp tục đóng vai trò lãnh đạo chiến lược thương hiệu trong ngành điện tử tiêu dùng, với nền tảng nghiên cứu giúp đưa ra các quyết định dựa trên bằng chứng định lượng thay vì kinh nghiệm đơn thuần. Hướng thứ hai là tham gia giảng dạy các học phần Quản trị Thương hiệu, Marketing Chiến lược và Hành vi Người tiêu dùng tại các chương trình MBA và thạc sĩ quản trị, đóng vai trò practitioner-researcher có giá trị đặc thù.\r\n\r\n**Các hướng nghiên cứu tiếp theo:**\r\n\r\nHướng 1 -- CSI trong bối cảnh AI và cá nhân hóa: Khi các hãng điện tử tích hợp ngày càng nhiều dịch vụ AI vào thiết bị (AI assistant, predictive maintenance, personalized UX), cơ chế hình thành sự hài lòng sẽ thay đổi căn bản. Nghiên cứu tiếp theo có thể khám phá vai trò của trải nghiệm AI trong cấu trúc CSI và tác động đến hành vi giữ chân khách hàng trong giai đoạn AI-native devices.\r\n\r\nHướng 2 -- So sánh liên thị trường ASEAN: Mở rộng nghiên cứu sang Thái Lan, Indonesia và Philippines để so sánh cấu trúc CSI và cơ chế truyền dẫn sang hiệu quả doanh nghiệp giữa các thị trường có mức độ phát triển và đặc điểm văn hóa tiêu dùng công nghệ khác nhau.\r\n\r\nHướng 3 -- Tác động của hệ sinh thái số đến doanh thu dài hạn: Nghiên cứu định lượng sâu hơn về mối quan hệ giữa mức độ gắn kết hệ sinh thái và Customer Lifetime Value, tập trung vào cơ chế upsell và cross-sell trong hệ sinh thái thương hiệu điện tử.\r\n"},{"title":"11. Đề xuất người hướng dẫn","file":"11_NguoiHuongDan.md","chars":547,"pages":"0.3","content":"## 11. Đề xuất người hướng dẫn\r\n\r\n**Người hướng dẫn đề xuất 1:**\r\nPGS. TS. *(Họ tên, Khoa Quản trị Kinh doanh, TDTU)*\r\nChuyên môn phù hợp: Marketing chiến lược, quản trị thương hiệu, hành vi người tiêu dùng số, có công bố quốc tế ISI/Scopus trong lĩnh vực này.\r\n\r\n**Người hướng dẫn đề xuất 2:**\r\nTS. *(Họ tên)*\r\nChuyên môn phù hợp: Phương pháp nghiên cứu định lượng, PLS-SEM, kinh tế lượng ứng dụng trong nghiên cứu quản trị.\r\n\r\n\u003e Nghiên cứu sinh cam kết chủ động liên hệ và xác nhận sự đồng ý của người hướng dẫn trước khi nộp hồ sơ chính thức.\r\n"},{"title":"TÀI LIỆU THAM KHẢO","file":"12_TaiLieu.md","chars":3204,"pages":"1.8","content":"## TÀI LIỆU THAM KHẢO\r\n\r\n*(Trình bày theo chuẩn APA 7th edition)*\r\n\r\n1. Anderson, E. W., & Mittal, V. (2000). Strengthening the satisfaction-profit chain. *Journal of Service Research*, *3*(2), 107-120. https://doi.org/10.1177/109467050032001\r\n\r\n2. Anderson, E. W., Fornell, C., & Lehmann, D. R. (1994). Customer satisfaction, market share, and profitability: Findings from Sweden. *Journal of Marketing*, *58*(3),

      "content": "# ĐỀ CƯƠNG NGHIÊN CỨU LUẬN ÁN TIẾN SĨ\n\n**Tên đề tài:** Ảnh hưởng của truy xuất nguồn gốc số đến ý định mua sản phẩm nước yến chế biến sẵn: Vai trò trung gian của tính xác thực thương hiệu.\n**Chuyên ngành đào tạo:** Quản trị Kinh doanh  \n**Mã chuyên ngành:** 9340101  \n**Nghiên cứu sinh:** Lê Phúc Hải  \n**Cơ sở đào tạo:** Trường Đại học Nha Trang\n\n---\n\n## 1. LÝ DO CHỌN ĐỀ TÀI CỦA LUẬN ÁN\n### 1.1. Bất cân xứng thông tin trong hàng hóa khó kiểm chứng (Nước yến RTD)\nCác sản phẩm nước yến chế biến sẵn (RTD) được phân loại là hàng hóa dựa trên niềm tin (credence goods), nơi người tiêu dùng gần như không thể tự kiểm chứng được chất lượng thực tế (như tỷ lệ yến, nguồn gốc nguyên liệu) ngay cả sau khi sử dụng (Akerlof, 1970). Sự bất cân xứng thông tin này tạo ra rủi ro cảm nhận cao, dẫn đến tình trạng người tiêu dùng có xu hướng e ngại trước các sản phẩm mang mác \"nguyên chất\". Vì vậy, niềm tin và sự xác thực trở thành biến số quyết định sự sống còn của thương hiệu trong ngành hàng này.\n\n### 1.2. Giới hạn của marketing truyền thống và nhu cầu minh bạch số\nTrong bối cảnh người tiêu dùng ngày càng nghi ngờ các lời cam kết truyền thông truyền thống hay các loại giấy chứng nhận tĩnh dễ bị làm giả, truy xuất nguồn gốc số (Digital Traceability) được kỳ vọng đóng vai trò là một \"tín hiệu minh bạch\" khách quan. Tuy nhiên, vấn đề cốt lõi không nằm ở việc kiến trúc công nghệ có ưu việt hay không, mà nằm ở việc người tiêu dùng tiếp nhận và diễn giải tín hiệu công nghệ này như thế nào trong tâm trí của họ.\n\n### 1.3. Khoảng trống nghiên cứu\nHiện nay, phần lớn các nghiên cứu về truy xuất nguồn gốc số tập trung vào khía cạnh chuỗi cung ứng (supply chain) thay vì khía cạnh nhận thức hành vi (consumer behavior). Đề tài này được thực hiện nhằm trả lời câu hỏi: Khi tiếp xúc với giao diện truy xuất nguồn gốc số, liệu người tiêu dùng có nâng cao được nhận thức về chất lượng thông tin, từ đó hình thành cảm nhận về \"tính xác thực thương hiệu\" và thúc đẩy ý định mua hay không?\n\n## 2. TÌNH HÌNH NGHIÊN CỨU TRONG VÀ NGOÀI NƯỚC\n### 2.1. Nước yến RTD là hàng hóa dựa trên niềm tin (Credence Goods)\nNghiên cứu của Akerlof (1970) và các ứng dụng hành vi tiêu dùng gần đây chỉ ra rằng hàng hóa khó kiểm chứng tạo ra sự bất cân xứng thông tin sâu sắc. Nhu cầu xác thực thông tin trong ngành thực phẩm chức năng / yến sào là cực kỳ lớn, vì người mua phải hoàn toàn phụ thuộc vào các tín hiệu bên ngoài để định giá chất lượng sản phẩm.\n\n### 2.2. Truy xuất nguồn gốc số như một tín hiệu nhận thức\nCác nghiên cứu trước đây (Wang & Li, 2023) đã bắt đầu xem xét truy xuất nguồn gốc số như một công cụ xây dựng niềm tin. Tuy nhiên, khoảng trống lớn là các nghiên cứu thường mô tả blockchain ở cấp độ kỹ thuật chuỗi cung ứng, thay vì đo lường nó như một \"tín hiệu nhận thức\" (cognitive signal) mà người tiêu dùng bình thường có thể đọc và diễn giải. Việc cô lập tác động của tín hiệu này trong bối cảnh FMCG là vô cùng cần thiết.\n\n### 2.3. Tính xác thực thương hiệu (Brand Authenticity) như cơ chế trung gian\nTính xác thực (Authenticity) là yếu tố quyết định lòng trung thành và ý định mua (Morhart et al., 2015). Trong thị trường đầy rẫy sự sao chép và các cam kết phóng đại, tính xác thực đóng vai trò cầu nối. Nghiên cứu này thiết lập lập luận rằng: Tín hiệu minh bạch từ công nghệ không trực tiếp tạo ra hành vi mua, mà nó phải được chuyển hóa thành \"tính xác thực thương hiệu\" trong tâm trí khách hàng.\n\n#### Sơ đồ Mô hình Nghiên cứu\n```mermaid\ngraph LR\n    subgraph S [\"Stimulus (S)\"]\n        TR[\"Perceived Traceability\u003cbr/\u003e(PT)\"]\n    end\n    subgraph O [\"Organism (O)\"]\n        PIQ[\"Perceived Info Quality\u003cbr/\u003e(PIQ)\"]\n        BA[\"Brand Authenticity\u003cbr/\u003e(BA)\"]\n    end\n    subgraph R [\"Response (R)\"]\n        PI[\"Purchase Intention\u003cbr/\u003e(PI)\"]\n        WTP[\"Willingness to Pay\u003cbr/\u003e(WTP - Phụ trợ)\"]\n    end\n\n    TR -- \"H1 (+)\" --\u003e PIQ\n    TR -- \"H2 (+)\" --\u003e BA\n    PIQ -- \"H3 (+)\" --\u003e BA\n    \n    BA -- \"H4 (+)\" --\u003e PI\n    BA -- \"H5 (+)\" --\u003e WTP\n\n    style TR fill:#e0f2fe,stroke:#0284c7\n    style PIQ fill:#dcfce7,stroke:#16a34a\n    style BA fill:#dcfce7,stroke:#16a34a\n    style PI fill:#ffedd5,stroke:#ea580c\n    style WTP fill:#f1f5f9,stroke:#475569\n```\n*Hình 1. Mô hình nghiên cứu đề xuất theo khung S-O-R (Stimulus – Organism – Response).*\n\n## 3. MỤC TIÊU NGHIÊN CỨU CỦA LUẬN ÁN\n### 3.1. Mục tiêu tổng quát\nKiểm định cơ chế tác động của nhận thức về truy xuất nguồn gốc số đến ý định mua sản phẩm nước yến chế biến sẵn, thông qua vai trò trung gian của tính xác thực thương hiệu.\n\n### 3.2. Mục tiêu cụ thể\n1.  **Xác định tác động của truy xuất nguồn gốc số:** Đánh giá ảnh hưởng của tín hiệu truy xuất nguồn gốc đến chất lượng thông tin cảm nhận và tính xác thực thương hiệu.\n2.  **Làm rõ vai trò trung gian:** Kiểm định vai trò trung gian của tính xác thực thương hiệu trong việc kết nối nhận thức về tín hiệu số với ý định hành vi.\n3.  **Kiểm định tác động kết quả:** Đánh giá sự ảnh hưởng của tính xác thực thương hiệu đến ý định mua hàng (purchase intention) và định giá sản phẩm (WTP).\n\n### 3.3. Câu hỏi nghiên cứu\n1.  Tín hiệu truy xuất nguồn gốc số tác động như thế nào đến chất lượng thông tin cảm nhận và tính xác thực thương hiệu?\n2.  Tính xác thực thương hiệu đóng vai trò trung gian như thế nào trong cơ chế hình thành ý định tiêu dùng?\n3.  Sự thay đổi về tính xác thực thương hiệu ảnh hưởng ra sao đến ý định mua hàng và mức sẵn lòng chi trả thêm (WTP) của khách hàng?\n\n## 4. NỘI DUNG NGHIÊN CỨU\n1.  **Xây dựng khung lý thuyết:** Hệ thống hóa cơ sở lý luận về Lý thuyết Tín hiệu (Signaling Theory), hàng hóa khó kiểm chứng (credence goods), và cơ chế hình thành tính xác thực.\n2.  **Hoàn thiện thang đo và mô thức thực nghiệm:** Thiết lập các kịch bản thực nghiệm (có/không có tín hiệu truy xuất) và hiệu chỉnh thang đo thông qua đánh giá định tính.\n3.  **Kiểm định bằng dữ liệu thực:** Thu thập dữ liệu khảo sát và xử lý thống kê để đánh giá độ tin cậy của thang đo cũng như kiểm định các giả thuyết trong mô hình cấu trúc.\n\n## 5. Ý NGHĨA KHOA HỌC VÀ THỰC TIỄN CỦA ĐỀ TÀI\n### 5.1. Đóng góp cấp lý thuyết\n*   **Kiểm định lại vai trò của tín hiệu minh bạch số:** Cung cấp bằng chứng thực nghiệm về việc truy xuất nguồn gốc số không chỉ là công cụ kỹ thuật mà còn hoạt động như một \"tín hiệu nhận thức\" mạnh mẽ đối với hàng hóa khó kiểm chứng.\n*   **Làm rõ cơ chế Authenticity:** Bổ sung góc nhìn lý thuyết về cách một công cụ kỹ thuật khô khan có thể được người tiêu dùng chuyển hóa thành sự gắn kết tâm lý sâu sắc (Tính xác thực thương hiệu).\n*   **Bổ sung bằng chứng từ bối cảnh Việt Nam:** Cung cấp dữ liệu thực chứng đáng tin cậy về hành vi của nhóm người tiêu dùng trẻ đối với sản phẩm chế biến sâu mang tính đặc thù cao.\n\n### 5.2. Đóng góp cấp thực tiễn\n*   Hỗ trợ trực tiếp cho các **doanh nghiệp nước yến RTD** trong việc hoạch định chiến lược minh bạch nguồn gốc.\n*   Gợi ý phương thức **truyền thông dựa trên tín hiệu số** thay vì chỉ dựa vào các cam kết quảng cáo truyền thống.\n*   Giúp các nhãn hàng **tối ưu ý định mua của Gen Z tại đô thị**, từ đó xây dựng lợi thế cạnh tranh bền vững nhờ sự chân thật của thương hiệu.\n\n## 6. PHẠM VI NGHIÊN CỨU CỦA ĐỀ TÀI\n1.  **Không gian:** Nghiên cứu được thực hiện tại **TP.HCM**.\n2.  **Thời gian:** Dữ liệu dự kiến được thu thập từ quý 3/2026 đến quý 1/2027.\n3.  **Bối cảnh và đối tượng hành vi:** Chỉ tập trung vào duy nhất sản phẩm **nước yến chế biến sẵn (RTD)**. Đề tài đánh giá khía cạnh nhận thức phía cầu (hành vi người tiêu dùng phản ứng với tín hiệu), hoàn toàn không đánh giá kiến trúc kỹ thuật hay độ an toàn dữ liệu của hệ thống công nghệ thông tin.\n\n## 7. ĐỐI TƯỢNG NGHIÊN CỨU CỦA ĐỀ TÀI\n*   **Đối tượng nghiên cứu:** Cơ chế tác động của tín hiệu truy xuất nguồn gốc số đến tính xác thực thương hiệu và ý định mua.\n*   **Khách thể nghiên cứu:** Người tiêu dùng Gen Z (18–27 tuổi) sinh sống tại TP.HCM, có kinh nghiệm mua và sử dụng nước yến RTD hoặc các sản phẩm dinh dưỡng tương đương.\n\n## 8. PHƯƠNG PHÁP NGHIÊN CỨU\n### 8.1. Mô hình nghiên cứu và Giả thuyết\n#### 8.1.1. Logic xây dựng mô hình (Model Logic)\nMô hình nghiên cứu được xây dựng dựa trên sự tối giản và tập trung cao độ vào chuỗi nhân quả: **Tín hiệu truy xuất (TR) $\\rightarrow$ Nhận thức chất lượng (PIQ) $\\rightarrow$ Tính xác thực (BA) $\\rightarrow$ Hành vi mua (PI/WTP)**.\nLý do siết chặt mô hình: Loại bỏ các biến số gần nghĩa nhằm tránh hiện tượng trùng lắp khái niệm, làm nổi bật vai trò duy nhất của Brand Authenticity như một chiếc cầu nối giữa \"bằng chứng kỹ thuật\" và \"quyết định mua sắm\".\n\n#### 8.1.2. Giả thuyết nghiên cứu (Hypotheses Development)\n*   **H1 (+):** Nhận thức về khả năng truy xuất (TR) tác động tích cực đến Chất lượng thông tin cảm nhận (PIQ).\n*   **H2 (+):** Nhận thức về khả năng truy xuất (TR) tác động tích cực đến Tính xác thực thương hiệu (BA).\n*   **H3 (+):** Chất lượng thông tin cảm nhận (PIQ) tác động tích cực đến Tính xác thực thương hiệu (BA).\n*   **H4 (+):** Tính xác thực thương hiệu (BA) tác động tích cực đến Ý định mua hàng (PI - Kết quả chính).\n*   **H5 (+):** Tính xác thực thương hiệu (BA) tác động tích cực đến Mức sẵn lòng chi trả thêm (WTP - Kết quả phụ trợ).\n\n### 8.2. Thiết kế và quy trình nghiên cứu\n\n#### Sơ đồ Quy trình Nghiên cứu\n```mermaid\ngraph TD\n    A[\"1. Tổng quan Tài liệu & Xây dựng Mô hình\"] --\u003e B[\"2. Nghiên cứu Định tính (Đánh giá chuyên gia)\"]\n    B --\u003e C[\"3. Hiệu chỉnh Thang đo & Thiết kế Mockup\"]\n    C --\u003e D[\"4. Khảo sát Sơ bộ (Pilot Test, n=30)\"]\n    D --\u003e E[\"5. Khảo sát Chính thức (Between-subjects, n=300-400)\"]\n    E --\u003e F[\"6. Phân tích Dữ liệu (PLS-SEM)\"]\n    F --\u003e G[\"7. Kết luận & Hàm ý Quản trị\"]\n\n    style A fill:#f8fafc,stroke:#334155\n    style B fill:#e0f2fe,stroke:#0284c7\n    style C fill:#e0f2fe,stroke:#0284c7\n    style D fill:#fef08a,stroke:#ca8a04\n    style E fill:#dcfce7,stroke:#16a34a\n    style F fill:#dcfce7,stroke:#16a34a\n    style G fill:#f8fafc,stroke:#334155\n```\n*Hình 2. Sơ đồ Quy trình Nghiên cứu (Research Methodology Flowchart).*\n\n#### 8.2.1. Cơ sở chọn thiết kế thực nghiệm \nNghiên cứu áp dụng thiết kế thực nghiệm giữa các nhóm (between-subjects design) với thao tác cốt lõi:\n*   **Traceability Stimulus (TR_STIM):** Nhóm Thực nghiệm (Có giao diện truy xuất vòng đời sản phẩm) vs. Nhóm Đối chứng (Không có giao diện truy xuất).\nViệc đo lường Perceived Traceability (PT) bằng thang Likert được đưa vào mô hình PLS-SEM để đóng vai trò vừa là biến khởi nguồn (Stimulus perception) vừa là công cụ kiểm tra thao tác (Manipulation check).\n\n```mermaid\ngraph TD\n    A[\"Tổng mẫu Khảo sát (n = 300 - 400)\"] -- \"Phân bổ Ngẫu nhiên\" --\u003e B{\"Thiết kế Between-Subjects\"}\n    \n    B --\u003e C[\"Nhóm Thực nghiệm: CÓ giao diện Truy xuất nguồn gốc\"]\n    B --\u003e D[\"Nhóm Đối chứng: KHÔNG có giao diện Truy xuất\"]\n    \n    C --\u003e E[\"Khảo sát Đo lường (PT, PIQ, BA, PI, WTP)\"]\n    D --\u003e E\n\n    style A fill:#f8fafc,stroke:#334155,stroke-width:2px\n    style B fill:#e0f2fe,stroke:#0284c7,stroke-width:2px\n    style C fill:#dcfce7,stroke:#16a34a\n    style D fill:#ffedd5,stroke:#ea580c\n    style E fill:#f8fafc,stroke:#334155,stroke-width:2px,stroke-dasharray: 5 5\n```\n*Hình 3. Sơ đồ Thiết kế Thực nghiệm (Experimental Design Flowchart).*\n\n#### 8.2.2. Quy trình xây dựng và tiền kiểm định mockup\nSản phẩm là bản mockup nước yến RTD với thương hiệu giả định để loại trừ yếu tố thiên lệch do \"lòng trung thành thương hiệu\" có sẵn.\n*   **Tiền kiểm định (Manipulation Check):** Pilot test (n=30) sẽ chạy T-test để xác nhận nhóm xem mockup có truy xuất thực sự ghi nhận mức điểm PT cao hơn nhóm đối chứng một cách có ý nghĩa thống kê.\n\n#### 8.2.3. Chiến lược lấy mẫu và sàng lọc\n*   **Chiến lược lấy mẫu:** Lấy mẫu phi xác suất có mục đích (Purposive Sampling). Kích thước mẫu dự kiến n = 300 - 400.\n*   **Tiêu chí sàng lọc (Screening):** Người tham gia phải nằm trong độ tuổi Gen Z (18-27), sống tại TP.HCM, và từng sử dụng nước yến/FMCG dinh dưỡng trong vòng 3 tháng qua.\n\n#### 8.2.4. Công cụ phân tích dữ liệu (PLS-SEM)\nNghiên cứu sử dụng mô hình PLS-SEM (SmartPLS 4) vì phương pháp này đặc biệt phù hợp với các mô hình nghiên cứu chứa biến tiềm ẩn (latent variables) và có định hướng mạnh về năng lực dự báo hành vi (predictive capability), đáp ứng tốt yêu cầu phân tích dữ liệu từ thiết kế thực nghiệm.\n\n### 8.3. Thang đo & Bảng câu hỏi (Measurement Model)\n#### 8.3.1. Cấu trúc bảng hỏi (Rút gọn và Siết chặt)\n**1. Perceived Traceability (PT)**\n*   PT1: Tôi có thể dễ dàng truy xuất nguồn gốc của sản phẩm này.\n*   PT2: Thông tin về vòng đời sản phẩm được trình bày rõ ràng.\n*   PT3: Tôi có thể kiểm tra được quy trình sản xuất của sản phẩm.\n\n**2. Perceived Information Quality (PIQ)**\n*   PIQ1: Thông tin cung cấp là chính xác.\n*   PIQ2: Thông tin cung cấp là đáng tin cậy.\n*   PIQ3: Thông tin đầy đủ và dễ hiểu.\n\n**3. Brand Authenticity (BA)**\n*   BA1: Thương hiệu này mang lại cảm giác \"thật\".\n*   BA2: Thương hiệu này rất chân thành.\n*   BA3: Thương hiệu này không giả tạo.\n\n**4. Purchase Intention (PI)**\n*   PI1: Tôi có khả năng sẽ mua sản phẩm này.\n*   PI2: Tôi sẽ cân nhắc mua sản phẩm này.\n*   PI3: Tôi sẵn sàng chọn sản phẩm này khi mua.\n\n**5. Willingness to Pay Premium (WTP - Biến phụ trợ)**\n*   Đo lường bằng câu hỏi định giá trực tiếp: *\"Giả sử một lốc nước yến thông thường có giá 40.000 VNĐ. Bạn sẵn sàng trả tối đa bao nhiêu tiền cho lốc nước yến có hệ thống truy xuất này?\"* (Người tham gia tự điền số tiền cụ thể).\n\n## 9. KẾT QUẢ MONG ĐỢI\nNghiên cứu kỳ vọng đạt được:\n1.  Xác nhận vai trò trung gian cốt lõi của Tính xác thực thương hiệu (BA) trong việc kết nối tín hiệu truy xuất số với ý định mua hàng. Nếu mức độ tác động không đủ mạnh, nghiên cứu sẽ phân tích các rào cản nhận thức khiến tín hiệu kỹ thuật chưa phát huy tối đa hiệu quả.\n2.  Chứng minh định lượng việc minh bạch thông tin ảnh hưởng trực tiếp đến giá trị kinh tế của sản phẩm yến sào thông qua mức sẵn lòng chi trả thêm (WTP được đo bằng định giá trực tiếp).\n\n## 10. NGUỒN KINH PHÍ\nNghiên cứu sinh tự túc nguồn kinh phí (chi phí khảo sát, thiết kế mockup, xuất bản).\n\n## 11. DỰ KIẾN KẾ HOẠCH HỌC TẬP, NGHIÊN CỨU TOÀN KHÓA\n*   **Tháng 1-12:** Hoàn thành học phần Tiến sĩ và Tổng quan tài liệu.\n*   **Tháng 13-18:** Xin duyệt khảo sát, thiết kế mockup, thực hiện pilot test.\n*   **Tháng 19-24:** Thu thập dữ liệu chính thức, xử lý dữ liệu với PLS-SEM.\n*   **Tháng 25-30:** Viết bài và nộp tạp chí chuyên ngành.\n*   **Tháng 31-36:** Hoàn thiện toàn văn luận án và bảo vệ.\n\n## 12. TÀI LIỆU THAM KHẢO\n\n**Nhóm 1: Nền tảng Lý thuyết & Hàng hóa khó kiểm chứng**\n1. Akerlof, G. A. (1970). The market for \"lemons\": Quality uncertainty and the market mechanism. *The Quarterly Journal of Economics, 84*(3), 488–500.\n2. Connelly, B. L., Certo, S. T., Ireland, R. D., & Reutzel, C. R. (2011). Signaling theory: A review and assessment. *Journal of Management, 37*(1), 39–67.\n\n**Nhóm 2: Truy xuất nguồn gốc số & Niềm tin người tiêu dùng**\n3. Lu, L., et al. (2023). The effect of blockchain traceability on consumer purchase intention for food products. *Journal of Retailing and Consumer Services, 71*, 103233.\n4. Kshetri, N. (2024). The role of blockchain in enhancing consumer trust in supply chains. *Journal of Business Research, 164*, 113946.\n5. Wang, Y., & Li, X. (2023). Trusting the chain: The impact of blockchain traceability on brand authenticity and consumer behavior. *Psychology & Marketing, 40*(8), 1540-1555.\n\n**Nhóm 3: Tính xác thực thương hiệu & Food Authenticity**\n6. Morhart, F., Malär, L., Guèvremont, A., Girardin, F., & Grohmann, B. (2015). Brand authenticity: An integrative framework and measurement scale. *Journal of Consumer Psychology, 25*(2), 200–218.\n7. Newman, G. E., & Dhar, R. (2014). Authenticity is contagious: Brand essence and the original source of production. *Journal of Marketing Research, 51*(3), 371-386.\n8. Spielmann, N., & Maguire, M. (2024). Food authenticity and its impact on consumer valuation in credence goods markets. *Food Policy, 120*, 102550.\n\n**Nhóm 4: Báo cáo thị trường (Nước yến & FMCG)**\n9. Kantar. (2023). *Vietnam FMCG Monitor: Consumer trends and behavior shifting*.\n10. NielsenIQ. (2024). *Trust and Authenticity in the Nutritional Beverage Industry*.\n"

      "content": "# HƯỚNG DẪN VĂN PHONG VÀ QUY ĐỊNH HÌNH THỨC (Academic Writing Style & Formatting Guide)\n\nTài liệu này quy định các tiêu chuẩn cốt lõi về văn phong, thuật ngữ, phương pháp luận và hình thức trình bày để đảm bảo tính chuẩn xác, khách quan và chuyên nghiệp cho Đề cương Tiến sĩ.\n\n## 1. QUY TẮC VĂN PHONG CỐT LÕI (Golden Rules for Academic Tone)\n\n- **Tính khách quan (Objective):** Loại bỏ toàn bộ yếu tố cảm xúc, từ ngữ phóng đại. Sử dụng ngôi thứ ba (ví dụ: \"Nghiên cứu chỉ ra rằng...\", \"Tác giả đề xuất...\") thay vì ngôi thứ nhất (\"Mình thấy là...\").\n- **Tính khiêm tốn (Humble):** Để Hội đồng đánh giá giá trị nghiên cứu. Tác giả chỉ nêu \"Kỳ vọng\", \"Dự kiến đóng góp\", \"Nhằm giải quyết\". Tránh tuyệt đối tự đánh giá công trình của mình là \"đột phá\", \"quan trọng nhất\".\n- **Tính Nguyên bản (Originality):** Luôn làm nổi bật đóng góp độc đáo của nghiên cứu. Tiến sĩ là \"mở rộng tri thức\" (expanding knowledge), không chỉ đơn thuần là \"lấp khoảng trống\".\n- **Tính trực diện & chính xác:** Sử dụng thuật ngữ chuyên ngành nhất quán. Không dùng phép ẩn dụ (metaphor) dài dòng hay thuật ngữ lóng. Lập luận phải có bằng chứng từ tài liệu tham khảo và nối nhau bằng các từ logic.\n\n## 2. KIỂM SOÁT VĂN PHONG \"AI-LIKE\" (Cảnh báo sinh ngữ tự động)\n\nCác trình sinh ngôn ngữ (LLM) thường dùng ngôn từ báo chí, quảng cáo. Khi soát xét văn bản, CẦN XÓA bỏ các cụm từ sau:\n\n**🚫 Không dùng:**\n\n- *Điểm nhấn đột phá*, *Chìa khóa vàng*, *Cuốn cẩm nang quan trọng*, *Lỗ hổng đáng kể*\n- *Phần hồn - phần xác* (chỉ dùng ẩn dụ khi giải thích ví dụ định tính, tuyệt đối không dùng khi lập luận kỹ thuật số).\n- *Bản địa số đầy hoài nghi*, *Hộ chiếu số*, *Cuộc chiến chống...* (Đây là văn phong báo chí/marketing, cần thay thế bằng: *nhóm khách hàng tiếp nhận công nghệ*, *công cụ truy xuất dữ liệu tiêu chuẩn*).\n- \"Đây là đóng góp lý thuyết trọng tâm của luận án.\" / \"Mô hình này vô cùng ưu việt...\"\n- *Chưa có ai nghiên cứu*, *Hoàn toàn mới* (Lỗi ngạo mạn học thuật, phải dùng \"còn hạn chế\" hoặc \"chưa được kiểm chứng đầy đủ\").\n- *Lỗi định danh danh sách:* Khi định danh các mục trong bảng hoặc danh sách, hãy dùng số/chữ cái thuần túy (a, b, c hoặc 1, 2, 3) thay vì có dấu chấm theo sau (a., 1.) để tránh xung đột với Auto-numbering của Word.\n- *Lỗi dấu câu:* Cần dùng dấu ngoặc kép cong/typographic (“ ”) thay vì ngoặc kép thẳng (\" \").\n\n**✅ Nên dùng:**\n\n- *Nghiên cứu kỳ vọng mang lại đóng góp mới...*\n- *Đề xuất này có thể đóng vai trò giải pháp tham khảo...*\n- *Khoảng trống nghiên cứu (Research gap)...*\n- *Hỗ trợ các doanh nghiệp trong việc...*\n\n## 3. QUẢN LÝ THUẬT NGỮ VÀ KHÁI NIỆM (Key Terminology)\n\n1. **Giải thích một lần:** Giải thích khái niệm MỘT LẦN DUY NHẤT ở phần Cơ sở lý thuyết. Ở các chương sau, chỉ dùng danh từ ghép/thuật ngữ kỹ thuật (như \"hiệu ứng cộng hưởng\", \"tính bất biến\") mà không lặp lại định nghĩa.\n2. **Quản trị Marketing:** Marketing xanh (Green Marketing), Hoài nghi xanh (Green Skepticism), Niềm tin xanh (Green Trust), Ý định mua hàng (Purchase Intention).\n3. **Công nghệ & Lý thuyết:** Blockchain (Sổ cái phân tán/Distributed Ledger), Tính minh bạch (Transparency), Tính bất biến (Immutability), Hiệu ứng cộng hưởng (Synergy Effect), Lý thuyết Tín hiệu (Signaling Theory), Lý thuyết Hành vi dự định (TPB).\n4. **Ranh giới Khái niệm (Conceptual Boundaries):** Cấm gom các biến số có tính chất đồng nghĩa/gần gũi (ví dụ: *Trust* và *Authenticity*) vào cùng một chuỗi nhân quả nếu chưa có định nghĩa phân biệt rạch ròi. Điều này giúp loại trừ nguy cơ đa cộng tuyến (multicollinearity) và rủi ro không đạt giá trị phân biệt (Discriminant Validity).\n\n## 4. HÀNH VĂN KHẲNG ĐỊNH PHƯƠNG PHÁP LUẬN\n\n1. **Chuẩn hóa Phân tích số liệu:** Không sử dụng đan xen các trường phái thống kê. Đề cương định hướng PLS-SEM trên R (seminr) thì không được nhắc tới các thuật ngữ của CB-SEM (như ma trận LISREL, AMOS, lavaan).\n2. **Nhất quán Mô hình S-O-R (Demand-Side):** Luận án thuộc lĩnh vực Marketing/Behavior, mọi biến số phải phản ánh *Nhận thức/Tâm lý của người tiêu dùng*. Hạn chế tối đa các biến số thuộc năng lực nguồn cung. Nếu bắt buộc phải đề cập đến khía cạnh khách quan (như *Chất lượng sản phẩm thực chứng*), cần biện minh rõ ràng và tách biệt khỏi nhận thức chủ quan.\n3. **Cập nhật Citation phương pháp luận mới nhất:**\n   - **Cỡ mẫu (Sample size):** Ưu tiên áp dụng `G*Power estimation` (Hair et al., 2019/2022). Chỉ sử dụng các quy tắc nền cũ như `10-times rule` như một phương án đối chiếu bổ trợ (khi có biện minh hợp lý), không dùng làm phương pháp chính.\n   - **Trích dẫn chuẩn:** PLS-SEM phải bám sát `Hair, Hult, Ringle & Sarstedt` (phiên bản cập nhật \u003e2017).\n   - **Ngưỡng HTMT:** Không ghi chung chung mà ghi rõ `HTMT \u003c 0.85` (khái niệm khác biệt) và `HTMT \u003c 0.90` (khái niệm tương đồng).\n\n## 5. QUY ĐỊNH HÌNH THỨC VÀ CẤU TRÚC (Formatting Rules - ĐH Đà Lạt)\n\n- **Font chữ:** Times New Roman (Cỡ 13 hoặc 14). Giãn dòng: 1.5 lines.\n- **Lề (Margins):** Trên (2.0-2.5cm), Dưới (2.0-2.5cm), Trái (3.0-3.5cm), Phải (1.5-2.0cm).\n- **Tài liệu tham khảo (APA 7th):** BẮT BUỘC sử dụng phần mềm quản trị trích dẫn (Mendeley, Zotero, Endnote) để chống sai sót định dạng. Phải tổng hợp ít nhất 3-5 nguồn khác nhau cho mỗi khái niệm cốt lõi (Triangulation).\n- **Quy chuẩn Bảng/Hình:** Bất di bất dịch: **\"Tên Bảng nằm TRÊN, Tên Hình nằm DƯỚI\"**. Mọi Bảng/Hình đều phải được tham chiếu trực tiếp trong văn bản (ví dụ: *\"như trình bày tại Bảng 1\"*) và ghi rõ Nguồn. Khuyến khích dùng \"Insert Caption\" trong Word.\n- **Danh mục Viết tắt:** Bắt buộc lập Danh mục Viết tắt. Phải giải nghĩa đầy đủ ở lần xuất hiện đầu tiên (ví dụ: Trí tuệ nhân tạo - AI), sau đó chỉ dùng từ viết tắt một cách nhất quán.\n- **Cấu trúc Đề cương Tiêu chuẩn:**\n  1. Đặt vấn đề\n  2. Tổng quan vấn đề nghiên cứu\n  3. Mục tiêu và Nội dung (Phương pháp nghiên cứu)\n  4. Tiến độ thực hiện\n  5. Dự kiến kết quả đạt được\n     (Kèm theo danh mục Tài liệu tham khảo và Cán bộ hướng dẫn)\n\n## 6. KỸ THUẬT XỬ LÝ VĂN BẢN VÀ CHECKLIST TRƯỚC KHI NỘP (Last-mile Checklist)\n\n### 6.1. Dọn dẹp tàn dư Markdown & Lỗi Ký tự\n- **Copy/Paste:** LUÔN SỬ DỤNG Paste as Plain Text (Ctrl+Shift+V) khi dán sang Word để không mang theo định dạng rác.\n- **Ký tự thừa:** Dùng Find & Replace (Ctrl+H) để xóa sạch các tàn dư Markdown như `###`, `---`, `**`.\n- **Dấu ngoặc kép & Dấu gạch:** Bật AutoCorrect của Word để tự động chuyển dấu ngoặc kép thẳng (`\"`) thành ngoặc kép cong (`“ ”`) và đồng bộ lỗi dấu gạch nối ngắn/dài (-).\n\n### 6.2. Danh sách kiểm tra nội dung (Checklist)\n\n- [ ] Ctrl + F quét các cụm từ \"đột phá\", \"vô cùng\", \"chìa khóa\", \"cẩm nang\", \"chưa có ai nghiên cứu\", \"hoàn toàn mới\".\n- [ ] Ctrl + F quét các thuật ngữ CB-SEM/lavaan (đảm bảo đã xóa triệt để).\n- [ ] Đảm bảo phần Kết quả mong đợi dùng các từ \"Kỳ vọng/Dự kiến/Cung cấp cơ sở...\".\n- [ ] Mọi trích dẫn khoa học thuộc giai đoạn 5 năm gần nhất phải có dẫn nguồn đầy đủ.\n- [ ] Kiểm tra dung lượng đảm bảo tiến độ đạt 30 trang (khoảng ~55,000 - 60,000 ký tự). Tất cả các phần nội dung viết bổ sung cần được đối chiếu chéo (cross-check) với danh mục tham khảo.\n- [ ] Thực hiện kiểm tra đạo văn (ví dụ: qua phần mềm Turnitin) và đảm bảo tỷ lệ tương đồng nằm trong giới hạn cho phép của Hội đồng.\n\n## 7. RÀNG BUỘC HỌC THUẬT NÂNG CAO (Advanced Academic Rigor)\n\nĐể đảm bảo đề cương đạt chuẩn mực của một công trình nghiên cứu khoa học cấp Tiến sĩ và có tiềm năng công bố quốc tế (SSCI/Q1), cần tuân thủ các ràng buộc sau:\n\n### 7.1. Tính trung lập và Mô tả hệ thống (Neutrality)\n\n- **Hạn chế định danh công nghệ cụ thể khi chưa cần thiết:** Thay vì dùng \"Blockchain\", hãy ưu tiên dùng \"Hệ thống truy xuất nguồn gốc kỹ thuật số\" (Digital traceability systems). Thay vì dùng \"Chatbot\", hãy dùng \"Hệ thống gợi ý dựa trên AI\" (AI-driven recommendation systems).\n- **Mục đích:** Giảm định kiến (bias) và tăng tính khái quát hóa cho mô hình lý thuyết.\n\n### 7.2. Kỷ luật Đoạn văn và Cấu trúc logic \"Chiếc cầu\"\n\n- **Kỷ luật 1 Đoạn = 1 Ý chính:** Mỗi đoạn văn phải bắt đầu bằng một **Câu Chủ đề (Topic Sentence)** rõ ràng. Các câu tiếp theo chỉ làm nhiệm vụ diễn giải, chứng minh cho câu chủ đề đó, kết nối với nhau bằng các từ nối (transition words).\n- **Mối liên hệ Problem -\u003e Gap -\u003e Model:** Tuyệt đối không để các phần rời rạc. Cuối mỗi phần đặt vấn đề (Problem) phải có câu chốt dẫn dắt sang Khoảng trống nghiên cứu (Gap). Cuối phần Gap phải dẫn dắt trực tiếp đến Mô hình khái niệm (Model).\n- **Mẫu hành văn & Gap Spotting:** \"Mặc dù... đã được nghiên cứu, nhưng cơ chế nhận thức về... vẫn chưa được làm rõ...\". Cần phân biệt rõ bản chất khoảng trống: dùng *inconsistent* khi có nhiều kết quả mâu thuẫn (cần làm trọng tài); dùng *unclear* khi hướng nghiên cứu còn sơ khai (cần khai phá).\n\n### 7.3. Chiều sâu phương pháp luận (Methodological Depth)\n\n- **Cặp bài trùng Thực nghiệm:** Bắt buộc phải gắn kèm khái niệm **\"Phân nhóm ngẫu nhiên\" (Random Assignment)** đi liền với **\"Kiểm định thao túng\" (Manipulation checks)** khi nhắc đến Thực nghiệm 2x2. Đây là phao cứu sinh để bảo vệ tính giá trị nội tại (Internal validity) khi tác giả buộc phải sử dụng lấy mẫu thuận tiện (Convenience Sampling).\n- **Sai lệch phương pháp phổ biến (Common Method Bias - CMB):** Cần nêu rõ phương án kiểm soát (ví dụ: quy trình thu thập dữ liệu ẩn danh, tách biệt thời điểm đo lường hoặc sử dụng kiểm định Harman/Full Collinearity).\n- **Điều kiện biên (Boundary Conditions):** Luôn tìm kiếm các biến điều tiết (Moderators) để giải thích *tại sao* và *khi nào* một mối quan hệ lý thuyết không phát huy tác dụng.\n\n### 7.4. Phê bình văn liệu (Critical Review)\n\n- **Tránh liệt kê (Description):** Không viết theo kiểu \"Tác giả A nói..., Tác giả B nói...\".\n- **Ưu tiên tổng hợp (Synthesis):** Phải chỉ ra được sự \"chưa nhất quán\" (inconsistency) hoặc các kết quả đối lập trong y văn hiện tại để khẳng định sự cần thiết của nghiên cứu.\n\n### 7.5. Ngôn ngữ \"Chứng cứ\" (Evidence-based Framing)\n\n- **Tránh nhận định chủ quan:** Không viết \"Vấn đề này rất nghiêm trọng\".\n- **Viết theo bằng chứng:** \"Các báo cáo ngành (Industry reports) cho thấy...\" hoặc \"Các nghiên cứu thực chứng trước đây chỉ ra rằng...\"\n- **Cập nhật:** Ưu tiên trích dẫn từ các tạp chí thuộc nhóm Q1/Q2 trong vòng 3-5 năm gần nhất để đảm bảo tính thời sự của đề tài.\n\n### 7.6. Trực giác Nhân quả trong Hành vi (Causal Logic in Behavior)\n\n- **Trật tự logic:** Trật tự các biến số trong mô hình phải tuân theo tâm lý học tiêu dùng tiêu chuẩn. Tuyệt đối không thiết lập mô hình đi ngược trực giác (Ví dụ: Tính minh bạch/Xác thực phải sinh ra Niềm tin, KHÔNG ĐƯỢC để Niềm tin sinh ra Tính xác thực).\n- **Biện minh ngoại lệ:** Nếu bắt buộc phải xây dựng mô hình ngược (do đặc thù bối cảnh), tác giả BẮT BUỘC phải có một tiểu mục riêng biệt để biện minh cực kỳ sắc sảo bằng hệ thống lý thuyết nền tảng (Base theory).\n\n### 7.7. Đạo đức Nghiên cứu (Research Ethics)\n\n- **Nguyên tắc cốt lõi:** Đảm bảo đề cương trình bày rõ quy trình tuân thủ đạo đức học thuật, đặc biệt trong nghiên cứu hành vi (ví dụ: bảo mật dữ liệu ẩn danh, lấy ý kiến đồng thuận từ đáp viên, và rào đón việc xin phê duyệt từ Hội đồng Đạo đức/IRB khi cần thiết).\n"

      "content": "# PHỤ LỤC: MÔ PHỎNG LUỒNG VẬN HÀNH AGRICHAIN (BLOCKCHAIN SIMULATION FLOW)\r\n\r\n## 1. Mục tiêu mô phỏng\r\n\r\nPhần phụ lục này trình bày chi tiết luồng vận hành của hệ thống AgriChain, mô phỏng lại cách thức hoạt động của một mạng lưới Blockchain thực thụ (như Ethereum). Mục tiêu là giúp người tiêu dùng và nhà quản lý hiểu được con đường đi của dữ liệu từ nông trại đến tay người dùng cuối một cách minh bạch nhất.\r\n\r\n* **Địa chỉ truy cập hệ thống:** [https://agrichain.lephuchai.com/](https://agrichain.lephuchai.com/)\r\n\r\n## 2. Luồng dữ liệu sản phẩm (The Digital Journey)\r\n\r\nHệ thống mô phỏng trọn vẹn 4 giai đoạn cốt lõi của một sản phẩm nông sản sạch:\r\n\r\n* **Giai đoạn 1: Ghi nhận tại Nông trại (Farm Registration)**\r\n  * Mọi thông tin về giống, ngày thu hoạch, tọa độ GPS được \"ký số\" xác thực.\r\n  * Dữ liệu được đóng gói và gửi lên chuỗi khối dưới dạng một giao dịch không thể sửa đổi.\r\n  * *Công cụ hỗ trợ:* [Trình tạo mã QR &amp; Ghi nhận dữ liệu](https://agrichain.lephuchai.com/tools/qr) (Link: https://agrichain.lephuchai.com/tools/qr)\r\n* **Giai đoạn 2: Kiểm định Chất lượng (Lab Validation)**\r\n  * Phòng thí nghiệm thực hiện phân tích các chỉ số hóa lý (độ đạm, độ sạch, vi sinh).\r\n  * Kết quả kiểm định kèm hồ sơ gốc được gắn chặt vào mã định danh của sản phẩm trên Blockchain.\r\n* **Giai đoạn 3: Vận chuyển & Phân phối (Logistics & Distribution)**\r\n  * Các thông số về nhiệt độ bảo quản, độ ẩm trong quá trình di chuyển được ghi nhận liên tục qua hệ thống cảm biến (IoT).\r\n  * Mỗi điểm dừng của sản phẩm đều được ghi lại dấu vết (Digital Footprint).\r\n* **Giai đoạn 4: Xác thực tại Showroom (Retail Verification)**\r\n  * Sản phẩm có mặt tại điểm bán với mã QR định danh duy nhất.\r\n  * Người tiêu dùng quét mã để thực hiện quy trình \"đối soát ngược\" về nguồn gốc.\r\n\r\n## 3. Trải nghiệm \"Niềm tin số\" cho Người tiêu dùng\r\n\r\nĐiểm nhấn của mô hình là biến các khái niệm kỹ thuật phức tạp thành trải nghiệm an tâm:\r\n\r\n1. **Hành trình xuyên suốt (Node History):** Hiển thị trực quan toàn bộ lịch sử sản phẩm qua các \"Nút\" (Nodes). Người dùng có thể thấy ai đã làm gì, ở đâu và vào lúc nào.\r\n2. **Đối soát tự động (Audit Pulse):** Khi quét mã, hệ thống mô phỏng việc kiểm tra chéo dữ liệu trên hàng trăm máy chủ (Nodes) để đảm bảo thông tin chưa từng bị can thiệp.\r\n   * *Xem mạng lưới xác thực:* [Global Node Network](https://agrichain.lephuchai.com/explorer/nodes) (Link: https://agrichain.lephuchai.com/explorer/nodes)\r\n3. **Hộ chiếu số (Digital Passport):** Sản phẩm được cấp một \"chứng minh thư\" điện tử bao gồm điểm minh bạch, lời khuyên từ AI và các bằng chứng thực tế (ảnh chụp, chứng từ).\r\n4. **Kiểm chứng sổ cái (View on Chain):** Mô phỏng lại trình khám phá Blockchain (Ethereum Explorer), cho phép những người am hiểu kiểm tra các mã giao dịch thô để đảm bảo tính khách quan.\r\n   * *Trình khám phá chuỗi khối:* [AgriChain Explorer](https://agrichain.lephuchai.com/explorer) (Link: https://agrichain.lephuchai.com/explorer)\r\n\r\n## 4. Các liên kết trải nghiệm thực tế (Demo)\r\n\r\nBạn có thể trực tiếp trải nghiệm luồng xác thực này qua 2 dòng sản phẩm tiêu biểu:\r\n\r\n* 💎 **Sản phẩm Yến Sào:** https://agrichain.lephuchai.com/verify/YEN-001\r\n* 🍃 **Sản phẩm Trà Atisô:** https://agrichain.lephuchai.com/verify/TRA-003\r\n\r\n---\r\n\r\n*Mô hình AgriChain là minh chứng cho việc ứng dụng Blockchain để bảo vệ quyền lợi người tiêu dùng và nâng tầm giá trị cho nông sản Việt.*\r\n"

        async function processExportContainer(container) {
            try {
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(container, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false, output: 'mathml' });
                }
            } catch (e) { console.warn(e); }
            
            try {
                await mermaid.run({ querySelector: '#' + container.id + ' .mermaid' });
            } catch (e) {
                console.error("Mermaid run in export container failed:", e);
            }
            
            await new Promise(r => setTimeout(r, 1200));

            // Convert SVG to high-quality Base64 PNG using Blob URL to prevent tainted canvas and corruption
            const svgs = container.querySelectorAll('svg');
            for (let svg of svgs) {
                try {
                    let w = svg.viewBox && svg.viewBox.baseVal ? svg.viewBox.baseVal.width : svg.getBoundingClientRect().width || 800;
                    let h = svg.viewBox && svg.viewBox.baseVal ? svg.viewBox.baseVal.height : svg.getBoundingClientRect().height || 400;
                    if(w===0) w=800; if(h===0) h=400;
                    
                    let targetWidth = Math.min(w, 600);
                    let targetHeight = h * (targetWidth / w);
                    
                    // Clean the SVG styles of external imports to prevent browser blocking
                    let svgClone = svg.cloneNode(true);
                    svgClone.setAttribute('width', w);
                    svgClone.setAttribute('height', h);
                    svgClone.querySelectorAll('style').forEach(styleTag => {
                        let css = styleTag.innerHTML;
                        css = css.replace(/@import\s+url\([^)]+\);/g, ''); // Strip imports
                        styleTag.innerHTML = css;
                    });
                    
                    const svgString = new XMLSerializer().serializeToString(svgClone);
                    const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
                    const blobURL = URL.createObjectURL(svgBlob);
                    
                    const canvas = document.createElement('canvas');
                    // 2x resolution for retina-like sharp output in Word/PDF
                    canvas.width = w * 2; 
                    canvas.height = h * 2;
                    const ctx = canvas.getContext('2d');
                    
                    const img = new Image();
                    await new Promise((resolve) => {
                        img.onload = () => {
                            try {
                                ctx.fillStyle = "white"; 
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                
                                const newImg = document.createElement('img');
                                newImg.setAttribute('src', canvas.toDataURL("image/png"));
                                newImg.setAttribute('width', targetWidth);
                                newImg.setAttribute('height', targetHeight);
                                newImg.style.width = targetWidth + "px";
                                newImg.style.height = targetHeight + "px";
                                newImg.style.display = "block";
                                newImg.style.margin = "0 auto";
                                
                                svg.parentNode.replaceChild(newImg, svg);
                            } catch (err) {
                                console.error("Canvas draw/dataURL failed:", err);
                            }
                            URL.revokeObjectURL(blobURL);
                            resolve();
                        };
                        img.onerror = (err) => {
                            console.error("Blob image load failed:", err);
                            URL.revokeObjectURL(blobURL);
                            resolve();
                        };
                        img.src = blobURL;
                    });
                } catch (err) { console.warn("SVG error", err); }
            }

            container.querySelectorAll('table').forEach(tbl => {
                tbl.setAttribute('border', '1');
                tbl.setAttribute('cellspacing', '0');
                tbl.setAttribute('cellpadding', '8');
                tbl.style.borderCollapse = 'collapse';
                tbl.style.width = '100%';
                tbl.style.marginBottom = '20px';
                tbl.querySelectorAll('th, td').forEach(c => { c.style.border = '1px solid black'; c.style.padding = '8px'; });
            });
        }

            btn.innerText = "Đang xử lý...";

            const tempDiv = document.createElement('div');
            tempDiv.id = "word-export-container";
            tempDiv.innerHTML = getExportHTML(isFull);
            document.body.appendChild(tempDiv);
            
            tempDiv.style.position = 'fixed';
            tempDiv.style.left = '0';
            tempDiv.style.top = '0';
            tempDiv.style.width = '800px';
            tempDiv.style.height = '800px';
            tempDiv.style.zIndex = '-9999';
            tempDiv.style.opacity = '0.01';

            try {
                await processExportContainer(tempDiv);

                const wordStyles = `
                    <style>
                        @page WordSection1 { size: A4; margin: 2.5cm 2.0cm 2.5cm 3.5cm; mso-header-margin: 1.25cm; mso-footer-margin: 1.25cm; mso-paper-source: 0; }
                        div.WordSection1 { page: WordSection1; }
                        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
                        th, td { border: 1px solid black; padding: 8px; text-align: left; }
                        th { background-color: #f2f2f2; }
                         h1, h2, h3, h4 { font-family: 'Times New Roman', serif; color: black; margin-top: 12pt; margin-bottom: 6pt; text-align: left; }
                         p { font-family: 'Times New Roman', serif; font-size: 14pt; line-height: 1.5; text-align: justify; margin-top: 0pt; margin-bottom: 6pt; text-indent: 1.25cm; }
                         li { font-family: 'Times New Roman', serif; font-size: 14pt; line-height: 1.5; text-align: justify; margin-top: 0pt; margin-bottom: 4pt; }
                         img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
                        .export-title { text-align: center; font-size: 16pt; font-weight: bold; margin-bottom: 30px; text-transform: uppercase; }
                    </style>
                `;

                const htmlContent = `\ufeff<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Export Word</title>${wordStyles}</head>
                <body style="font-family:'Times New Roman'"><div class="WordSection1">${tempDiv.innerHTML}</div></body></html>`;

                const blob = new Blob([htmlContent], { type: 'application/msword;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                
                let exportTitle = isFull ? "ToanVan" : (currentSelected ? currentSelected.item.title : "Doc");
                let safeTitle = exportTitle.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 30);
                link.download = `DeCuong_${safeTitle}.doc`;
                link.click();
            } catch (e) { 
                alert("Lỗi xuất Word: " + e.message); 
            } finally {
                document.body.removeChild(tempDiv);
                btn.innerText = originalText;
            }
        }

        async function exportPDF() {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Chuẩn bị PDF...";

            const tempDiv = document.createElement('div');
            tempDiv.id = "print-container";
            // Luôn in toàn văn khi xuất PDF cho an toàn, hoặc có thể làm Selective PDF sau.
            tempDiv.innerHTML = getExportHTML(true); 
            document.body.appendChild(tempDiv);
            
            tempDiv.style.width = '210mm'; 
            tempDiv.style.position = 'fixed';
            tempDiv.style.left = '0';
            tempDiv.style.top = '0';
            tempDiv.style.zIndex = '-9999';
            tempDiv.style.opacity = '0.01';

            try {
                // Xử lý tất cả Mermaid thành ảnh Base64 chống lỗi mất khúc/tràn viền khi in
                await processExportContainer(tempDiv);
                
                tempDiv.style.position = 'absolute';
                tempDiv.style.left = '0';
                tempDiv.style.top = '0';
                tempDiv.style.zIndex = '9999';
                tempDiv.style.opacity = '1';
                window.print();
                
            } catch (e) {
                console.error(e);
                alert("Lỗi xuất PDF: " + e.message);
            } finally {
                document.body.removeChild(tempDiv);
                btn.innerText = originalText;
            }
        }
    </script>
</body>
</html>

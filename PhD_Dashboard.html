---\r\n\r\n## 10. NGUỒN KINH PHÍ VÀ CÁC GIẢI THÍCH BỔ SUNG\r\n\r\n### 10.1. Nguồn kinh phí\r\nNghiên cứu sinh tự túc nguồn kinh phí, bao gồm:\r\n- Chi phí khảo sát thị trường và thu thập dữ liệu (n = 400 - 500).\r\n- Chi phí xây dựng hệ thống Mockup thực nghiệm (AgriChain simulation).\r\n- Lệ phí công bố bài báo khoa học quốc tế (nếu có) và hội thảo trong nước.\r\n\r\n### 10.2. Các giải thích bổ sung (Nếu cần)\r\n- *Về việc lựa chọn G*Power:* Đề cương chủ động áp dụng phương pháp ước lượng G*Power (Hair et al., 2022) thay cho quy tắc cũ (như quy tắc 10 lần) nhằm đáp ứng yêu cầu khắt khe của các tạp chí chuẩn Q1/Q2 hiện hành, đảm bảo độ mạnh thống kê (Statistical Power) trong phân tích SEM.\r\n- *Về kiểm định thao túng (Manipulation Check):* Đề cương ưu tiên sử dụng phân nhóm ngẫu nhiên (Random Assignment) kết hợp kiểm định thao túng trên Qualtrics/Google Forms nhằm tối đa hóa giá trị nội tại (Internal validity) của thiết kế thực nghiệm 2x2.\r\n\r\n---\r\n\r\n### 8.3. Thang đo & Bảng câu hỏi (Measurement Model & Questionnaire)\r\n#### 8.3.1. Nguyên tắc xây dựng thang đo\r\n*   Sử dụng thang đo Likert 7 điểm.\r\n*   Kế thừa từ các nghiên cứu đã kiểm định (validated scales).\r\n*   Dịch thuật ngược (Back-translation: Anh ↔ Việt).\r\n*   Pilot test (n ≈ 30).\r\n\r\n#### 8.3.2. Cấu trúc bảng hỏi\r\n**PHẦN A – KỊCH BẢN (Stimulus Exposure)**\r\nNgười tham gia xem 1 trong 4 mockup sản phẩm (phân bổ ngẫu nhiên).\r\n\r\n**PHẦN B – THANG ĐO CÁC BIẾN NGHIÊN CỨU**\r\n\r\n**1. Nhận thức về truy xuất nguồn gốc (TR)** *(Adapted from traceability literature)*\r\n*   TR1: Tôi có thể dễ dàng truy xuất nguồn gốc của sản phẩm này.\r\n*   TR2: Thông tin về nguồn gốc sản phẩm được trình bày rõ ràng.\r\n*   TR3: Tôi tin rằng thông tin truy xuất là minh bạch.\r\n*   TR4: Tôi có thể kiểm tra được quy trình sản xuất của sản phẩm.\r\n*   TR5: Hệ thống truy xuất giúp tôi hiểu rõ sản phẩm hơn.\r\n\r\n**2. Perceived Information Quality (PIQ)** *(Adapted from Nelson et al., 2005)*\r\n*   PIQ1: Thông tin về sản phẩm là chính xác.\r\n*   PIQ2: Thông tin được cung cấp là đáng tin cậy.\r\n*   PIQ3: Thông tin là đầy đủ.\r\n*   PIQ4: Thông tin được trình bày rõ ràng và dễ hiểu.\r\n\r\n**3. Skepticism (SK)** *(Adapted from Skarmeas & Leonidou, 2013)*\r\n*   SK1: Tôi nghi ngờ các tuyên bố \"tự nhiên\" của sản phẩm này.\r\n*   SK2: Tôi cho rằng thông điệp \"nguyên chất\" thường bị phóng đại.\r\n*   SK3: Tôi không hoàn toàn tin các cam kết về thành phần.\r\n*   SK4: Tôi nghĩ rằng nhiều sản phẩm \"tự nhiên\" chỉ là marketing.\r\n*   SK5: Tôi hoài nghi về tính trung thực của các tuyên bố này.\r\n\r\n**4. Trust (TT)** *(Adapted from Chen, 2012)*\r\n*   TT1: Sản phẩm này đáng tin cậy.\r\n*   TT2: Tôi cảm thấy an toàn khi sử dụng sản phẩm này.\r\n*   TT3: Sản phẩm này có thể tin được.\r\n*   TT4: Tôi tin tưởng vào cam kết chất lượng của sản phẩm này.\r\n\r\n**5. Brand Authenticity (BA)** *(Adapted from Morhart et al., 2015)*\r\n*   BA1: Thương hiệu này mang lại cảm giác \"thật\".\r\n*   BA2: Thương hiệu này rất chân thành.\r\n*   BA3: Thương hiệu này không giả tạo.\r\n*   BA4: Thương hiệu này gợi lên những giá trị mà tôi coi trọng. (Symbolism)\r\n\r\n**6. Purchase Intention (PI)** *(Adapted from Spears & Singh, 2004)*\r\n*   PI1: Tôi có khả năng sẽ mua sản phẩm này.\r\n*   PI2: Tôi sẽ cân nhắc mua sản phẩm này.\r\n*   PI3: Tôi có ý định thử sản phẩm này.\r\n*   PI4: Tôi sẵn sàng chọn sản phẩm này khi mua.\r\n\r\n**7. Willingness to Pay Premium (WTP)** *(Gabor-Granger đã đơn giản hóa)*\r\nPhương pháp Gabor-Granger được chọn vì phù hợp với bối cảnh FMCG giá thấp (Homburg et al., 2005), nơi mức WTP tuyệt đối nhỏ và câu hỏi mở (open-ended) có nguy cơ tạo ra phương sai quá lớn hoặc giá trị phi thực tế.\r\n\r\n**Kiểm tra thao tác kích thích (Manipulation Check) & Phân nhóm:**\r\nĐể đảm bảo tính giá trị nội tại của thiết kế thực nghiệm 2x2, một câu hỏi kiểm tra thao tác (manipulation check) được sử dụng nhằm xác nhận đáp viên thực sự nhận thức được sự hiện diện của mã QR và loại thông điệp. Đồng thời, tính năng phân nhóm ngẫu nhiên (Random Assignment) của công cụ khảo sát được kích hoạt để loại trừ thiên kiến chọn mẫu, dù sử dụng phương pháp lấy mẫu thuận tiện.\r\n*   **Câu hỏi:** \"Nếu sản phẩm này có giá cao hơn sản phẩm thông thường, bạn sẵn sàng trả thêm tối đa bao nhiêu?\"\r\n    - [ ] Không trả thêm\r\n    - [ ] +2.000 VNĐ\r\n    - [ ] +5.000 VNĐ\r\n    - [ ] +8.000 VNĐ\r\n    - [ ] +10.000 VNĐ\r\n\r\n#### 8.3.3. Biến kiểm tra thao tác (Manipulation Check)\r\n*   MC_TR1: Sản phẩm này có cung cấp thông tin truy xuất nguồn gốc.\r\n*   MC_TR2: Tôi có thể kiểm tra thông tin sản phẩm.\r\n*   MC_NC1: Sản phẩm này nhấn mạnh yếu tố \"tự nhiên\".\r\n*   MC_NC2: Nội dung marketing tập trung vào sức khỏe.\r\n\r\n#### 8.3.4. Biến kiểm soát (Control Variables)\r\n*   Giới tính, Độ tuổi, Tần suất sử dụng nước giải khát.\r\n*   Mức độ quan tâm đến sức khỏe (1–7 điểm).\r\n*   Mức độ quan tâm đến môi trường (1–7 điểm).\r\n\r\n#### 8.3.5. Kiểm định thang đo (Measurement Validation Plan)\r\n*   Cronbach's Alpha ≥ 0.7; CR ≥ 0.7.\r\n*   AVE ≥ 0.5.\r\n*   HTMT \u003c 0.85."

      "content": "# 📖 README: HƯỚNG DẪN QUẢN LÝ 2 PHIÊN BẢN ĐỀ CƯƠNG TIẾN SĨ\n\nTài liệu này đóng vai trò là \"Cẩm nang gối đầu giường\" để tra cứu nhanh sự khác biệt về **Cấu trúc, Nội dung và Văn phong** giữa 2 phiên bản Đề cương Tiến sĩ (Nha Trang và Đà Lạt). Khi cần nâng cấp hoặc sửa đổi, chỉ cần đọc file này để nắm bắt được \"hồn cốt\" của từng bài.\n\n---\n\n## 1. NHỮNG ĐIỂM CHUNG BẤT BIẾN (KHÔNG ĐƯỢC THAY ĐỔI)\nDù nộp cho trường nào, hệ tư tưởng cốt lõi của đề tài vẫn giữ nguyên:\n*   **Phương pháp luận:** Hỗn hợp (Mixed-methods). Định tính (Phỏng vấn chuyên gia) + Định lượng (Thực nghiệm Scenario-based 2x2).\n*   **Công cụ phân tích:** PLS-SEM (Phần mềm SmartPLS 4).\n*   **Khung lý thuyết lõi:** S-O-R (Stimulus-Organism-Response) kết hợp với Signaling Theory (Lý thuyết tín hiệu).\n*   **Biến trung gian (Mediator):** Brand Authenticity (Tính xác thực thương hiệu) và Green Trust (Niềm tin xanh).\n*   **Mô hình thu thập dữ liệu:** Không khảo sát chuỗi cung ứng thực tế, mà khảo sát phản ứng của người tiêu dùng (Gen Z) thông qua **Mockup / Bản sao số**.\n\n---\n\n## 2. QUY CHUẨN VĂN PHONG (ACADEMIC TONE)\nĐể bài viết đạt chuẩn Tiến sĩ và có thể hướng tới xuất bản Q1/Q2, cần tuyệt đối tuân thủ văn phong sau:\n*   **❌ TỪ NGỮ CẤM DÙNG (Marketing / Cường điệu):** \"Giải pháp vàng\", \"triệt để\", \"đột phá\", \"hoàn hảo\", \"cứu cánh\", \"100%\", \"bùng nổ\", các dấu chấm than (!).\n*   **✅ TỪ NGỮ KHUYÊN DÙNG (Học thuật / Khách quan):** \"Cung cấp bằng chứng thực nghiệm\", \"đánh giá cơ chế tác động\", \"hỗ trợ giải thích\", \"kỳ vọng đóng góp\", \"có ý nghĩa thống kê\".\n*   **Tâm thế người viết:** Không phải là một chuyên gia bán giải pháp phần mềm Blockchain. Mà là một **nhà nghiên cứu hành vi học**, quan sát xem con người phản ứng thế nào khi nhìn thấy công nghệ Blockchain.\n\n---\n\n## 3. PHIÊN BẢN 1: ĐẠI HỌC NHA TRANG (`PhD_NhaTrang_HAILP.md`)\n\n### Đặc điểm nhận diện\n*   **Bối cảnh (Context):** Ngành hàng tiêu dùng nhanh (FMCG).\n*   **Sản phẩm:** **Yến sào Khánh Hòa** (Nước yến chế biến sẵn RTD).\n*   **Vấn đề địa phương:** Bảo vệ ngành yến sào – ngành kinh tế mũi nhọn của tỉnh Khánh Hòa khỏi nạn làm giả nguyên liệu.\n\n### Cấu trúc (12 Mục Bắt Buộc)\nĐặc trưng của ĐH Nha Trang là chẻ nhỏ chi tiết thành 12 mục rõ ràng:\n1. Lý do chọn đề tài.\n2. Tình hình nghiên cứu (Tổng quan).\n3. Mục tiêu (Tổng quát, Cụ thể, Câu hỏi).\n4. Nội dung nghiên cứu (1, 2, 3, 4).\n5. Ý nghĩa khoa học và thực tiễn.\n6. Phạm vi.\n7. Đối tượng.\n8. **Phương pháp nghiên cứu:** (Mục quan trọng nhất, tách biệt hoàn toàn với Tổng quan).\n9. Kết quả mong đợi.\n10. Nguồn kinh phí.\n11. Tiến độ thực hiện (3 năm / 36 tháng).\n12. Tài liệu tham khảo.\n\n---\n\n## 4. PHIÊN BẢN 2: ĐẠI HỌC ĐÀ LẠT (`PhD_DaLat_HAILP.md`)\n\n### Đặc điểm nhận diện\n*   **Bối cảnh (Context):** Nông sản đặc hữu chế biến sâu.\n*   **Sản phẩm:** **Cà phê đặc sản Arabica Cầu Đất & Trà Actiso Đà Lạt**.\n*   **Vấn đề địa phương:** Bảo vệ Chỉ dẫn địa lý (Geographical Indication) và chương trình OCOP của tỉnh Lâm Đồng trước vấn nạn \"Hàng nhái Đà Lạt\", hiện tượng \"Thị trường quả chanh\" (Market for Lemons).\n\n### Cấu trúc (7 Mục Gộp) & Chiến thuật \"Kéo dài số trang\"\nYêu cầu của ĐH Đà Lạt là **Tối thiểu 30 trang**. Do đó, cấu trúc 7 mục này có tính \"nhồi\" học thuật cực kỳ cao vào Chương 2:\n1. Đặt vấn đề (Đã bao gồm Lý do, Phạm vi, Đối tượng).\n2. **Tổng quan vấn đề nghiên cứu (Chương cốt lõi để làm dày bài):**\n   *   *2.1. Tổng quan & Ma trận tài liệu:* Sử dụng bảng biểu lớn để tóm tắt các nghiên cứu trước (Chen, Morhart...).\n   *   *2.2. Cơ sở lý thuyết:* Phân tích sâu lịch sử của Signaling Theory (từ Michael Spence 1973) và mổ xẻ S-O-R.\n   *   *2.3. Phương pháp nghiên cứu:* Toàn bộ mô hình, giả thuyết, thang đo, kịch bản Mockup được nhét chung vào mục Tổng quan này.\n3. Mục tiêu và Nội dung.\n4. Tiến độ thực hiện.\n5. Dự kiến kết quả.\n6. Tài liệu tham khảo.\n7. Cán bộ hướng dẫn dự kiến.\n\n---\n\n## 5. CÁCH NÂNG CẤP BÀI TRONG TƯƠNG LAI\n*   **Nếu muốn sửa Mô hình/Giả thuyết:** Sửa ở cả 2 file (ở Nha Trang là Mục 8.1, ở Đà Lạt là Mục 2.3).\n*   **Nếu muốn sửa Thang đo (Questionnaire):** Khuyến khích tạo thêm Phụ lục (Appendix) cho bản Đà Lạt để bài càng dày càng tốt.\n*   **Khi làm slide thuyết trình bảo vệ:** Tùy thuộc hội đồng nào mà chọn bối cảnh Yến (Nha Trang) hay Cà phê (Đà Lạt), nhưng mô hình cốt lõi (S-O-R) thì nói y hệt nhau.\n"

      "title": "BÀI LUẬN VỀ DỰ ĐỊNH NGHIÊN CỨU: GIẢI MÃ \"NGHỊCH LÝ NIỀM TIN\" TRONG KỶ NGUYÊN AI",

      "content": "# BÀI LUẬN VỀ DỰ ĐỊNH NGHIÊN CỨU: GIẢI MÃ \"NGHỊCH LÝ NIỀM TIN\" TRONG KỶ NGUYÊN AI\n\n**Thí sinh:** Nguyễn Cường Thịnh  \n**Chuyên ngành:** Quản trị Kinh doanh  \n\n---\n\n### 1. Đề tài và Câu hỏi từ thực tiễn (Cơ sở khoa học)\n**Tên đề tài:** Tác động của tương tác AI Chatbot đến hành vi mua sắm thiết bị điện tử của người tiêu dùng thế hệ Z: Phân tích cơ chế tác động kép giữa Niềm tin thuật toán và Sự kháng cự tâm lý.\n\nDự định nghiên cứu của tôi bắt nguồn từ một quan sát thực tiễn: *Tại sao chúng ta đôi khi hài lòng khi được AI gợi ý đúng ý mình, nhưng lại thấy khó chịu khi cảm thấy bị máy móc thúc ép?* **Quan sát này phản ánh một cơ chế tác động kép (dual-path mechanism) mà tôi muốn mô hình hóa và kiểm chứng dựa trên các nền tảng lý thuyết vững chắc.**\n\n### 2. Sự trăn trở: Tại sao lại là AI và Gen Z? (Bối cảnh nghiên cứu)\nTôi chọn hướng đi này vì nhận thấy sự chuyển dịch sâu sắc trong tâm lý của Gen Z, nhất là tại các thị trường mới nổi như Việt Nam. Hiện nay, các hệ thống gợi ý AI đang bùng nổ. Tuy nhiên, nỗi lo về quyền riêng tư và sự thao túng thuật toán cũng tăng theo. **Là những \"công dân số\", Gen Z khao khát quyền tự quyết rất cao. Nghiên cứu của tôi sẽ giải mã ranh giới nơi sự hỗ trợ của AI trở thành sự xâm nhập phiền toái.**\n\n### 3. Khung lý thuyết S-O-R và Mô hình khái niệm\nTôi sử dụng khung lý thuyết **S-O-R (Stimulus-Organism-Response)** làm nền tảng. Trong đó, tương tác với AI Chatbot là kích thích (Stimulus). Niềm tin thuật toán và sự kháng cự tâm lý là các phản hồi nhận thức và cảm xúc (Organism). Cuối cùng, kết quả là hành vi mua sắm của khách hàng (Response).\n\n**Mô hình khái niệm đề xuất:**\n1.  Tương tác AI chatbot —(+)—\u003e Niềm tin thuật toán\n2.  Tương tác AI chatbot —(+)—\u003e Sự kháng cự tâm lý\n3.  Niềm tin thuật toán —(+)—\u003e Ý định mua hàng\n4.  Sự kháng cự tâm lý —(–)—\u003e Ý định mua hàng\n\n### 4. Mục tiêu nghiên cứu (Mục tiêu đo lường)\n**Tôi muốn xác định mức độ cá nhân hóa mà tại đó các tác động tích cực của AI bị lấn át bởi sự kháng cự tâm lý.** Việc tìm ra \"điểm bùng phát\" này sẽ giúp các nhà bán lẻ thiết kế hệ thống AI tinh tế hơn, tối ưu hóa hiệu quả mà không gây ra phản ứng ngược từ người dùng.\n\n### 5. Phương pháp nghiên cứu và Thiết kế thực nghiệm\nTôi sử dụng thiết kế thực nghiệm dựa trên kịch bản với hai nhân tố thao túng: cá nhân hóa (Thấp vs Cao) và tính minh bạch (AI giải thích được vs AI \"hộp đen\"). **Các kiểm định thao túng sẽ được thực hiện để đảm bảo hiệu quả thực nghiệm. Tôi cũng kế thừa các thang đo từ các nghiên cứu uy tín đã được kiểm chứng.** Dữ liệu từ 500 người tiêu dùng Gen Z sẽ được tôi phân tích bằng công cụ **PLS-SEM**.\n\n### 6. Biến điều tiết và Đóng góp học thuật\nNghiên cứu này xem xét thêm vai trò điều tiết của **nỗi lo ngại quyền riêng tư**. Về mặt học thuật, tôi kỳ vọng đóng góp vào hệ thống tri thức bằng cách hợp nhất niềm tin thuật toán và sự kháng cự tâm lý vào một khung khổ thống nhất. **Điều này giúp giải thích rõ hơn những tác động mang tính \"nghịch lý\" của AI đối với hành vi con người.**\n\n### 7. Tâm thế và Mục tiêu học thuật\nMục tiêu của tôi là xuất bản ít nhất 02 bài báo quốc tế uy tín. Với sự dẫn dắt của các thầy cô, tôi tin nghiên cứu này sẽ góp phần nâng cao năng lực cạnh tranh cho ngành bán lẻ Việt Nam trong thời đại trí tuệ nhân tạo.\n\n### 8. Tại sao tôi chọn Đại học Nha Trang?\nĐại học Nha Trang là nơi hội tụ các nhà khoa học tâm huyết, có tư duy cởi mở đối với các hướng nghiên cứu hiện đại. Đây chính là môi trường lý tưởng để tôi hiện thực hóa dự định nghiên cứu đầy tham vọng này.\n\n---\n**Khánh Hòa, ngày …. tháng …. năm 20….**\n\n**Người dự tuyển**  \n\n**Nguyễn Cường Thịnh**\n"

      "content": "# BÀI LUẬN VỀ DỰ ĐỊNH NGHIÊN CỨU: HÀNH TRÌNH ĐI TÌM \"NIỀM TIN THỰC CHỨNG\"\n\n**Thí sinh:** Lê Phúc Hải  \n**Chuyên ngành:** Quản trị Kinh doanh  \n\n---\n\n### 1. Đề tài và Tâm thế nghiên cứu\n**Tên đề tài:** Ảnh hưởng của truy xuất nguồn gốc số đến ý định mua sản phẩm nước yến chế biến sẵn: Vai trò trung gian của tính xác thực thương hiệu.\n\nNghiên cứu của tôi tập trung vào ngành hàng đồ uống chức năng (**functional beverages**). Trong đó, sản phẩm yến sào đóng lọ là bối cảnh thực nghiệm chính. Tôi chọn hướng nghiên cứu về sự giao thoa giữa \"Xác thực số\" và \"Tâm lý khách hàng\" với mong muốn giải mã cơ chế đằng sau niềm tin tiêu dùng hiện đại.\n\n### 2. Sự trăn trở và Lý do lựa chọn hướng đi này (Vấn đề nghiên cứu)\nLý do tôi chọn đề tài này xuất phát từ thực trạng thị trường đầy hoài nghi. Nhiều báo cáo ngành chỉ ra rằng nước yến giả mạo chiếm tỷ trọng không nhỏ, gây tổn thất doanh thu và làm suy giảm lòng tin. **Hiện nay, dù các hệ thống truy xuất nguồn gốc số (như blockchain) đang dần phổ biến, chúng ta vẫn chưa rõ cách người tiêu dùng tiếp nhận các tín hiệu này. Liệu dữ liệu kỹ thuật có thực sự biến thành quyết định mua hàng hay không?** Đây là bài toán tôi muốn tìm lời giải.\n\n### 3. Tổng quan tài liệu và Khoảng trống nghiên cứu (Đánh giá phản biện)\nNghiên cứu dựa trên Lý thuyết Tín hiệu (Signaling Theory) và Mô hình S-O-R. Qua lược khảo tài liệu, tôi nhận thấy một mâu thuẫn: **Mặc dù truy xuất nguồn gốc được cho là giúp tăng niềm tin, nhưng việc chuyển hóa niềm tin này thành hành vi mua thực tế vẫn còn \"chưa nhất quán\" (inconsistent).** Điều này gợi mở về các cơ chế tâm lý tiềm ẩn. Luận án của tôi hướng tới việc lấp đầy khoảng trống này bằng cách đưa khái niệm **Tính xác thực thương hiệu (Brand Authenticity)** vào như một biến trung gian.\n\n### 4. Mục tiêu nghiên cứu (Độ sâu phân tích)\nMục tiêu chính của tôi là kiểm tra cách các tín hiệu số chuyển hóa thành tính xác thực thương hiệu cảm nhận. **Nghiên cứu đặc biệt có ý nghĩa với mô hình kinh tế yến sào Khánh Hòa. Tôi hy vọng cung cấp những bằng chứng thực chứng để góp phần bảo vệ \"Chỉ dẫn địa lý\" (Geographical Indication) trước hàng giả.** Ngoài ra, tôi cũng muốn tìm hiểu các điều kiện biên nơi tín hiệu kỹ thuật có thể thất bại, từ đó gợi ý lộ trình thực tiễn cho doanh nghiệp Việt.\n\n### 5. Phương pháp nghiên cứu và Tính chuẩn xác\nTôi áp dụng phương pháp hỗn hợp (Mixed-methods). Đầu tiên là phỏng vấn sâu 15 chuyên gia để hiệu chỉnh thang đo. Tiếp đó là thực nghiệm kịch bản trên 500 người tiêu dùng Gen Z. **Các kiểm định thao túng sẽ được thực hiện nghiêm ngặt để đảm bảo giá trị khoa học. Tôi cũng kế thừa các thang đo uy tín và đánh giá sai lệch phương pháp phổ biến (Common method bias) để đảm bảo độ tin cậy cao nhất.**\n\n### 6. Biến điều tiết và Đóng góp lý luận\nSự hoài nghi của người tiêu dùng được dự báo sẽ điều tiết hiệu quả của các tín hiệu số. Về lý luận, nghiên cứu mở rộng ứng dụng của Lý thuyết Tín hiệu vào hệ thống xác thực kỹ thuật số. **Việc xác định các điều kiện biên mà tại đó tín hiệu truy xuất không phát huy hiệu quả cũng là một phát hiện quan trọng mà tôi hướng tới.**\n\n### 7. Tâm nguyện và Lộ trình hành động\nTôi muốn trở thành một nhà nghiên cứu độc lập. Lộ trình 3 năm tới của tôi đã sẵn sàng: từ hoàn thiện lý thuyết, thu thập dữ liệu thực chứng, đến kết tinh kết quả thành luận án và các công công bố quốc tế.\n\n### 8. Tại sao tôi chọn Đại học Nha Trang?\nNghiên cứu về yến sào Khánh Hòa ngay tại ngôi trường trên vùng đất yến không chỉ mang tính biểu tượng mà còn cho phép tôi tiếp cận sát sao với thực tiễn. Tôi tin rằng sự đồng hành từ đội ngũ chuyên gia tại ĐH Nha Trang sẽ là bệ phóng vững chắc để tôi thực hiện thành công nghiên cứu này.\n\n---\n**Khánh Hòa, ngày …. tháng …. năm 20….**\n\n**Người dự tuyển**  \n\n**Lê Phúc Hải**\n"

      "content": "# ĐỀ CƯƠNG NGHIÊN CỨU ĐỀ TÀI LUẬN ÁN TIẾN SĨ\n\n**Tên đề tài:** \"Tác động cộng hưởng giữa Marketing xanh và Minh bạch dựa trên nền tảng Blockchain trong việc xóa bỏ hoài nghi, thúc đẩy ý định mua hàng: Nghiên cứu dòng đồ uống Yến sào đóng lon (RTD Bird's Nest) tại thị trường Thành phố Hồ Chí Minh\"\n\n**Chuyên ngành đăng ký:** Quản trị Kinh doanh\n**Mã ngành:** [Điền mã ngành]\n\n---\n\n### 1. Lý do chọn đề tài của luận án\nTrong bối cảnh kinh tế số và tiêu dùng bền vững, các đặc sản giá trị cao của Khánh Hòa, tiêu biểu là **Yến sào**, đang đứng trước thách thức nghiêm trọng về niềm tin. Yến sào thuộc nhóm **Hàng hóa tin tưởng (Credence goods)** (Darby & Karni, 1973), nơi người tiêu dùng không thể tự kiểm chứng hàm lượng nguyên chất hay nguồn gốc thực tế. Hiện tượng **\"Tẩy xanh\" (Greenwashing)** — quảng bá yến đảo thiên nhiên nhưng thực chất là yến nhà hoặc yến độn — đã tạo ra sự **Hoài nghi xanh (Green Skepticism)** (Skarmeas & Leonidou, 2013), làm suy giảm hiệu quả của các nỗ lực Marketing chân chính.\n\nViệc ứng dụng công nghệ **Blockchain** với tính bất biến cung cấp một \"Cơ chế xác thực số\" giúp hóa giải sự hoài nghi. Nghiên cứu tập trung vào dòng **Nước yến đóng lon (RTD)** — một mặt hàng FMCG phổ biến với Gen Z — để chứng minh rằng việc kết hợp Marketing xanh với bằng chứng Blockchain sẽ tạo ra **Tác động cộng hưởng (Synergy Effect)** mạnh mẽ. Đây là hướng đi cấp thiết để bảo vệ thương hiệu quốc gia \"Yến sào Khánh Hòa\" và đóng góp vào mục tiêu chuyển đổi số của địa phương.\n\n### 2. Tình hình nghiên cứu trong và ngoài nước\nLược khảo tài liệu có hệ thống (SLR) theo chuẩn PRISMA từ các cơ sở dữ liệu Scopus/WoS cho thấy:\n- **Quốc tế:** Các nghiên cứu đã xác lập vai trò của Marketing xanh (Papadas et al., 2017) và minh bạch Blockchain (Garaus & Treiblmaier, 2021). Tuy nhiên, hầu hết tiếp cận chúng như hai công cụ độc lập.\n- **Trong nước:** Đã có các nghiên cứu về ý định mua xanh của Gen Z (Do et al., 2025) nhưng chưa tích hợp tham số công nghệ minh bạch vào mô hình cấu trúc tâm lý.\n- **Khoảng trống khoa học (Research Gaps):** \n    1. Thiếu khung lý thuyết **Marketing thực chứng (VBM)** tích hợp xác thực số vào điểm tiếp xúc khách hàng.\n    2. Vắng bóng các mô hình kiểm định kịch bản mô phỏng (Scenario-based) để đo lường phản ứng của Gen Z đối với Blockchain tại Việt Nam.\n    3. Chưa có nghiên cứu nào đánh giá hiệu ứng tương tác (Moderation effect) giữa nỗ lực Marketing và minh bạch Blockchain trong việc khuếch đại niềm tin.\n\n### 3. Mục tiêu nghiên cứu của luận án\n- **Mục tiêu tổng quát:** Xây dựng và kiểm định mô hình lý thuyết về sự cộng hưởng giữa Marketing xanh và Minh bạch Blockchain nhằm hóa giải hoài nghi và thúc đẩy ý định mua hàng đối với nước yến RTD.\n- **Mục tiêu cụ thể:**\n    1. Hiệu chỉnh thang đo Green Marketing và Blockchain Transparency phù hợp với đặc sản Khánh Hòa.\n    2. Kiểm định tác động trực tiếp của Marketing xanh và Blockchain Transparency đến Niềm tin xanh.\n    3. **Trọng tâm:** Chứng minh vai trò điều tiết (Synergy Effect) của Blockchain trong việc khuếch đại niềm tin và hóa giải sự hoài nghi.\n    4. Đề xuất lộ trình ứng dụng Marketing thực chứng (VBM) cho doanh nghiệp Yến sào.\n\n### 4. Nội dung nghiên cứu\nNội dung luận án bám sát 6 học kỳ đào tạo (3 năm):\n- **Giai đoạn 1:** Tổng hợp lý luận và xây dựng khung khái niệm Marketing thực chứng (VBM).\n- **Giai đoạn 2:** Thực hiện Tiểu luận tổng quan và xác lập mô hình nghiên cứu S-O-R.\n- **Giai đoạn 3:** Nghiên cứu định tính và thực hiện 02 Chuyên đề tiến sỹ.\n- **Giai đoạn 4:** Khảo sát thực nghiệm kịch bản (Scenario-based simulation) tại thị trường TP.HCM.\n- **Giai đoạn 5:** Phân tích PLS-SEM bằng ngôn ngữ R và viết bài báo quốc tế Scopus.\n- **Giai đoạn 6:** Hoàn thiện bản thảo và bảo vệ luận án các cấp.\n\n### 5. Ý nghĩa khoa học và thực tiễn của đề tài\n- **Khoa học:** Đóng góp khung lý thuyết mới tích hợp giữa lý thuyết Tín hiệu (Signaling Theory) và nền tảng công nghệ số.\n- **Thực tiễn:** Giúp doanh nghiệp Yến sào Khánh Hòa bảo vệ uy tín thương hiệu, gia tăng giá trị thặng dư (Premium pricing) và hỗ trợ lộ trình số hóa nông sản OCOP của tỉnh.\n\n### 6. Phạm vi nghiên cứu của đề tài\n- **Không gian:** Chuỗi giá trị tại Khánh Hòa; thị trường tiêu thụ tại Thành phố Hồ Chí Minh.\n- **Thời gian:** Giai đoạn nghiên cứu từ 2025 – 2028.\n- **Đối tượng (Mẫu):** Thế hệ Z (1997-2012) tại TP.HCM.\n- **Nội dung:** Tương tác giữa Marketing xanh và tính minh bạch bất biến của Blockchain.\n\n### 7. Đối tượng nghiên cứu của đề tài\nĐối tượng nghiên cứu là: **Tính cộng hưởng và cơ chế điều tiết** của Minh bạch Blockchain đối với mối quan hệ giữa Marketing xanh và hành vi khách hàng.\n\n### 8. Phương pháp nghiên cứu\n- **Định tính:** Phỏng vấn sâu 15 chuyên gia để hiệu chỉnh kịch bản và thang đo.\n- **Định lượng:** Khảo sát kịch bản (Scenario-based Survey) với mẫu n=500 người tiêu dùng Gen Z.\n- **Xử lý số liệu:** Mô hình cấu trúc tuyến tính **PLS-SEM** bằng **ngôn ngữ R** (Bootstrap 5.000 mẫu, thuật toán Two-stage).\n\n### 9. Kết quả mong đợi\n- 01 Bài báo Scopus (Q1/Q2).\n- 02 Bài báo đăng trên các tạp chí uy tín trong nước thuộc danh mục HĐGS.\n- Mô hình giải pháp Marketing thực chứng cho đặc sản Khánh Hòa.\n\n### 10. Nguồn kinh phí\nKinh phí thực hiện luận án dự kiến từ nguồn tự túc của NCS và các học bổng nghiên cứu.\n\n### 11. Dự kiến kế hoạch học tập, nghiên cứu toàn khóa (Theo ĐHNT)\n\n| STT | Nội dung nhiệm vụ | Thời gian | Kết quả dự kiến | Nơi thực hiện |\n|---|---|---|---|---|\n| **1** | **Học kỳ 1: Học phần trình độ TS (8 TC)** | **Tháng 1-6** | **Chứng chỉ học tập** | **ĐH Nha Trang** |\n| | - Tổng quan về NCKH & Công cụ trong NCKH | | | |\n| **2** | **Học kỳ 2: Tiểu luận tổng quan (4 TC)** | **Tháng 7-12** | **TL tổng quan TS** | **ĐH Nha Trang** |\n| | - Lược khảo SLR & Hội đồng thông qua hướng đi | | | |\n| **3** | **Học kỳ 3: Chuyên đề TS & Luận án (68 TC)** | **Tháng 13-18** | **02 Chuyên đề TS** | **ĐH Nha Trang** |\n| | - Thực hiện Chuyên đề 1 & 2; Nghiên cứu định tính | | | |\n| **4** | **Học kỳ 4: Thu thập dữ liệu thực địa** | **Tháng 19-24** | **Data sạch / Scopus** | **HCM / Nha Trang** |\n| | - Khảo sát kịch bản n=500; Viết bài báo Scopus | | | |\n| **5** | **Học kỳ 5: Seminar & Hoàn thiện luận án** | **Tháng 25-30** | **Seminar 1, 2, 3** | **ĐH Nha Trang** |\n| | - Phân tích R; Viết báo trong nước; Viết luận án | | | |\n| **6** | **Học kỳ 6: Bảo vệ các cấp** | **Tháng 31-36** | **Bằng Tiến sĩ** | **ĐH Nha Trang** |\n| | - Nộp luận án Đơn vị cơ sở & Cấp trường | | | |\n\n### 12. Tài liệu tham khảo (Numbered style)\n1. Ajzen, I. (1991). The theory of planned behavior. *OBHDP*, 50(2), 179-211.\n2. Chen, Y. S. (2010). The drivers of green brand equity. *Journal of Business Ethics*, 93(2), 307-319.\n3. Garaus, M., & Treiblmaier, H. (2021). Blockchain-based food traceability. *Food Control*, 124, 107871.\n4. Hair, J. F., et al. (2022). *A primer on PLS-SEM*. Sage publications.\n5. Papadas, K., et al. (2017). Green marketing orientation. *JBR*, 80, 236-246.\n6. Skarmeas, D., & Leonidou, C. N. (2013). Eco-skepticism in sustainability. *JBR*, 66(10), 1731-1738.\n\n---\n**Khánh Hòa, năm 2025**\n**Người lập kế hoạch**\n*(Ký và ghi rõ họ tên)*\n"

      "content": "# ĐỀ CƯƠNG NGHIÊN CỨU LUẬN ÁN TIẾN SĨ\n\n**Tên đề tài:** Ảnh hưởng của truy xuất nguồn gốc số đến ý định mua sản phẩm nước yến chế biến sẵn: Vai trò trung gian của tính xác thực thương hiệu.\n**Chuyên ngành đào tạo:** Quản trị Kinh doanh  \n**Mã chuyên ngành:** 9340101  \n**Nghiên cứu sinh:** Lê Phúc Hải  \n**Cơ sở đào tạo:** Trường Đại học Nha Trang\n\n---\n\n**DANH MỤC CÁC CHỮ VIẾT TẮT**\n* **BA (Brand Authenticity):** Tính xác thực thương hiệu\n* **FMCG (Fast-Moving Consumer Goods):** Ngành hàng tiêu dùng nhanh\n* **NC (Naturalness Claim):** Tuyên bố/Thông điệp tự nhiên\n* **PI (Purchase Intention):** Ý định mua hàng\n* **PIQ (Perceived Information Quality):** Chất lượng thông tin cảm nhận\n* **PLS-SEM (Partial Least Squares Structural Equation Modeling):** Mô hình phương trình cấu trúc bình phương tối thiểu riêng phần\n* **RTD (Ready-To-Drink):** Sản phẩm chế biến sẵn/uống liền\n* **SK (Skepticism):** Hoài nghi\n* **TR (Perceived Traceability):** Nhận thức về truy xuất nguồn gốc\n* **TT (Trust):** Niềm tin\n* **WTP (Willingness to Pay Premium):** Mức sẵn lòng chi trả thêm\n\n---\n\n## 1. LÝ DO CHỌN ĐỀ TÀI CỦA LUẬN ÁN\n### 1.1. Bất cân xứng thông tin và Khủng hoảng niềm tin trong ngành hàng thực phẩm chức năng\n1.  **Đặc tính hàng hóa và Bất cân xứng thông tin:** Các sản phẩm thực phẩm chức năng, đặc biệt là nhóm nước yến chế biến sẵn (RTD), được phân loại vào nhóm hàng hóa dựa trên niềm tin (credence goods). Theo Akerlof (1970), đây là nhóm sản phẩm mà người tiêu dùng không thể đánh giá chính xác chất lượng thực tế ngay cả sau khi đã sử dụng. Điều này dẫn đến sự bất cân xứng thông tin sâu sắc giữa nhà sản xuất và người mua.\n2.  **Rủi ro cảm nhận và Khủng hoảng niềm tin:** Ngành hàng sản phẩm RTD đang đối mặt với thử thách nghiêm trọng về niềm tin (Nielsen, 2022). Theo Euromonitor (2023), thị trường nước yến và thức uống dinh dưỡng Việt Nam đạt quy mô khoảng 8.500 tỷ VNĐ, tăng trưởng trung bình 12%/năm. Tuy nhiên, báo cáo của Cục Quản lý Thị trường (2022) ghi nhận hơn 1.200 vụ vi phạm liên quan đến hàng giả, hàng nhái trong ngành thực phẩm chức năng chỉ riêng trong năm 2021, trong đó sản phẩm yến sào chiếm tỷ trọng đáng kể. Người tiêu dùng hiện đại, đặc biệt là thế hệ Gen Z, có sự quan tâm lớn đến sức khỏe (Kantar, 2023). Theo các báo cáo xu hướng tiêu dùng FMCG gần đây, nhóm nhân khẩu học này đang có sự dịch chuyển mạnh mẽ sang các thức uống dinh dưỡng tiện lợi (như nước yến chế biến sẵn - RTD) (McKinsey, 2022). Tuy nhiên, họ lại đối mặt với rủi ro cảm nhận (perceived risk) cao đối với các sản phẩm công nghiệp này do tình trạng bất cân xứng thông tin. Sự mập mờ trong các thông điệp truyền thống khiến niềm tin đối với các cam kết \"tự nhiên\" có xu hướng giảm sút (Skarmeas & Leonidou, 2013).\n3.  **Sự cấp thiết của một cơ chế xác thực minh bạch:** Việc giải quyết khủng hoảng ni�4.  **Tính cấp thiết đối với nền kinh tế địa phương (Đặc thù Yến sào Khánh Hòa):** Ngành yến sào Khánh Hòa đóng vai trò trụ cột kinh tế biển của tỉnh. Các doanh nghiệp đầu ngành tại địa phương ghi nhận tổng doanh thu hệ thống giai đoạn 2020–2025 đạt gần 13.000 tỷ VNĐ (Thanh Niên, 2025), với mạng lưới phân phối rộng khắp hơn 1.000 đại lý trên toàn quốc (Lao Động, 2024). Đặc biệt, \"Yến sào Khánh Hòa\" đã được công nhận là Chỉ dẫn địa lý (Geographical Indication) quốc gia theo quyết định của Cục Sở hữu trí tuệ Việt Nam. Cuối năm 2023, Việt Nam đã chính thức xuất khẩu lô tổ yến chính ngạch đầu tiên sang thị trường Trung Quốc (Dân Việt, 2024). Tuy nhiên, chính giá trị kinh tế khổng lồ này đã biến các sản phẩm yến (nhất là dòng yến chế biến sẵn) thành mục tiêu bị làm giả, làm nhái nghiêm trọng. Các báo cáo tài chính từ thị trường cho thấy vấn nạn hàng giả đã trực tiếp gây sụt giảm doanh thu hàng trăm tỷ đồng tại các đơn vị sản xuất yến đóng lọ trong năm 2024 (DNSE, 2025). Do đó, việc nghiên cứu truy xuất nguồn gốc số nhằm giải quyết bài toán \"niềm tin\" không chỉ có giá trị học thuật mà còn mang ý nghĩa chiến lược trong việc bảo vệ Chỉ dẫn địa lý và duy trì sức cạnh tranh bền vững cho toàn ngành yến sào Khánh Hòa.\nđại lý trên cả nước (Lao Động, 2024). Đặc biệt, \"Yến sào Khánh Hòa\" đã được công nhận là Chỉ dẫn địa lý (Geographical Indication) quốc gia theo quyết định của Cục Sở hữu trí tuệ Việt Nam. Cuối năm 2023, đây là đơn vị đầu tiên của Việt Nam xuất khẩu chính ngạch tổ yến sang thị trường Trung Quốc (Dân Việt, 2024). Tuy nhiên, chính giá trị kinh tế khổng lồ này đã biến các sản phẩm yến (nhất là dòng yến chế biến sẵn) thành mục tiêu bị làm giả nghiêm trọng. Báo cáo tài chính cho thấy vấn nạn hàng giả, hàng nhái đã trực tiếp gây sụt giảm doanh thu hơn 600 tỷ VNĐ chỉ riêng tại đơn vị thành viên SKV trong năm 2024 so với năm 2023 (DNSE, 2025). Do đó, việc nghiên cứu truy xuất nguồn gốc số nhằm giải quyết bài toán \"niềm tin\" không chỉ có giá trị học thuật mà còn mang ý nghĩa chiến lược trong việc bảo vệ Chỉ dẫn địa lý và duy trì sức cạnh tranh của ngành yến sào Khánh Hòa.\n\n### 1.2. Giới hạn của marketing truyền thống và nhu cầu minh bạch số\nVấn đề nghiên cứu trọng tâm xuất phát từ sự thất bại của các phương thức truyền thông truyền thống trong việc thuyết phục người tiêu dùng về tính xác thực của sản phẩm:\n1.  **Bất cân xứng thông tin (Information Asymmetry):** Áp dụng lý thuyết của Akerlof (1970), dòng sản phẩm nước yến chế biến sẵn (RTD) được xếp vào nhóm hàng hóa dựa trên niềm tin (credence goods). Người tiêu dùng gần như không thể phân biệt được tỷ lệ yến thật, nguồn gốc nguyên liệu hay chất lượng quy trình tiệt trùng chỉ bằng quan sát thông thường hay nếm thử.\n2.  **Hoài nghi đối với cam kết \"tự nhiên\":** Khi mọi doanh nghiệp đều tuyên bố sản phẩm của mình là \"tự nhiên 100%\" mà không có bằng chứng kiểm chứng độc lập, người tiêu dùng rơi vào trạng thái hoài nghi. Các nghiên cứu của Skarmeas & Leonidou (2013) chỉ ra rằng khi các thông điệp bị lạm dụng, mức độ hoài nghi tăng đáng kể, dẫn đến sự phản kháng của người tiêu dùng đối với cả những thương hiệu làm thật.\n3.  **Sự vô hiệu của các chứng nhận tĩnh:** Các tem nhãn hay giấy chứng nhận bằng giấy truyền thống dễ dàng bị làm giả hoặc sao chép, không còn đủ sức nặng để đóng vai trò là \"tín hiệu tin cậy\" trong kỷ nguyên số (Kshetri, 2024).\n\n### 1.3. Truy xuất nguồn gốc số như một tín hiệu niềm tin\nĐể giải quyết căn bản vấn đề niềm tin, nghiên cứu đề xuất cách tiếp cận: Chuyển dịch từ Marketing dựa trên lời hứa sang Marketing dựa trên tín hiệu minh bạch số:\n1.  **Truy xuất nguồn gốc số như hạ tầng tin cậy:** Hệ thống truy xuất nguồn gốc số cung cấp các đặc tính: *Bất biến (Immutability), Minh bạch (Transparency) và Truy xuất thời gian thực (Real-time Traceability)*.\n2.  **Lý thuyết Tín hiệu (Signaling Theory):** Theo Spence (1973), một tín hiệu hiệu quả phải có chi phí cao hoặc khó giả mạo. Hệ thống truy xuất nguồn gốc đóng vai trò là một \"dấu hiệu nhận biết (signals)\" (Costly Signal). Chỉ những doanh nghiệp có quy trình minh bạch thật sự mới dám công khai dữ liệu, từ đó giúp người tiêu dùng tách biệt sản phẩm chất lượng và sản phẩm gian lận trên thị trường.\n3.  **Tính xác thực thương hiệu (Brand Authenticity):** Trong tâm lý học hành vi, tính xác thực là nhân tố cốt lõi dẫn đến lòng trung thành và mức sẵn lòng chi trả cao (WTP). Tuy nhiên, làm thế nào để chuyển hóa một công cụ kỹ thuật thành một trải nghiệm xác thực (Brand Authenticity) trong tâm trí khách hàng vẫn là một câu hỏi cần được làm rõ bằng thực chứng.\n\n### 1.4. Vấn đề nghiên cứu (Problem Statement)\nMặc dù công nghệ truy xuất nguồn gốc số được kỳ vọng nâng cao tính minh bạch, mức độ ứng dụng thực tế tại Việt Nam, đặc biệt trong ngành yến sào, vẫn còn rất hạn chế và chưa hình thành các bằng chứng thực nghiệm rõ ràng. Vấn đề cốt lõi mà nghiên cứu này cần giải quyết là sự thiếu vắng nền tảng học thuật về cách thức người tiêu dùng diễn giải và phản ứng với các tín hiệu công nghệ này.\n\nĐiều này đặt ra một khoảng trống lớn về tri thức và thực tiễn, được cụ thể hóa qua các câu hỏi nghiên cứu sau:\n1.  Làm thế nào tín hiệu truy xuất nguồn gốc số có thể tác động đến các biến tâm lý như hoài nghi và niềm tin của người tiêu dùng?\n2.  Liệu việc người tiêu dùng nhận thức được tín hiệu này có thực sự giúp nâng cao Tính xác thực thương hiệu (Brand Authenticity) và từ đó thúc đẩy Ý định mua hàng (PI) cũng như Mức sẵn lòng chi trả thêm (WTP) hay không?\n3.  Cơ chế tác động tương tác giữa nội dung thông điệp tiếp thị (thông điệp cảm xúc) và xác thực số (bằng chứng kỹ thuật) diễn ra như thế nào?\n\nNghiên cứu này được thực hiện nhằm giải quyết các câu hỏi trên, góp phần cung cấp các bằng chứng thực nghiệm giúp các doanh nghiệp (đặc biệt là ngành yến sào Khánh Hòa) có thêm cơ sở tham chiếu khi đầu tư vào hệ thống truy xuất số dựa trên bằng chứng về hành vi người tiêu dùng.\n\n## 2. TÌNH HÌNH NGHIÊN CỨU TRONG VÀ NGOÀI NƯỚC\n### 2.1. Bất cân xứng thông tin và hàng hóa dựa trên niềm tin (Credence Goods)\nTrong các thị trường nơi người tiêu dùng khó có thể đánh giá chất lượng sản phẩm ngay cả sau khi tiêu dùng, hiện tượng bất cân xứng thông tin (information asymmetry) trở nên đặc biệt nghiêm trọng. Theo George Akerlof (1970), trong bối cảnh này, người bán nắm giữ thông tin vượt trội so với người mua, dẫn đến rủi ro lựa chọn bất lợi (adverse selection).\n\nCác sản phẩm thực phẩm chức năng, đặc biệt là nhóm FMCG có thành phần khó kiểm chứng (ví dụ: nước yến chế biến sẵn), thường được xếp vào nhóm hàng hóa dựa trên niềm tin (credence goods), nơi người tiêu dùng:\n* Không thể xác minh tỷ lệ thành phần thật.\n* Không thể đánh giá quy trình sản xuất.\n* Và phải phụ thuộc vào tín hiệu từ nhà sản xuất.\n\nTrong bối cảnh này, niềm tin trở thành yếu tố trung tâm quyết định hành vi tiêu dùng, nhưng đồng thời cũng dễ bị thao túng thông qua các thông điệp marketing thiếu kiểm chứng.\n\n### 2.2. Hoài nghi đối với cam kết “tự nhiên” và giới hạn của marketing truyền thống\nSự gia tăng của các thông điệp “tự nhiên”, “nguyên chất” và “sạch” trong marketing (Ottman, 2011; Olsen et al., 2014) đã dẫn đến hiện tượng lạm dụng cam kết (claim washing), làm suy giảm niềm tin của người tiêu dùng. Các nghiên cứu trước đây (Chen, 2012; Skarmeas & Leonidou, 2013) đã cho thấy sự đồng thuận rằng:\n* Sự không nhất quán giữa thông điệp và bằng chứng thực tế là tác nhân chính làm gia tăng sự hoài nghi.\n* Mặc dù niềm tin đóng vai trò trung gian sống còn kết nối nhận thức “tự nhiên” với hành vi mua, trạng thái tâm lý này rất dễ bị đứt gãy nếu chỉ dựa vào các nỗ lực marketing truyền thống mà thiếu đi các cơ chế xác thực khách quan.\n\nTrong các diễn đàn học thuật gần đây, có sự tranh luận sâu sắc về hiệu quả của các nỗ lực marketing truyền thống. Mặc dù Chen (2012) cho rằng niềm tin có thể hình thành qua truyền thông, lập luận này bộc lộ điểm yếu khi áp dụng vào bối cảnh sự suy giảm niềm tin hiện tại. Khi rủi ro cảm nhận quá cao, các nỗ lực marketing truyền thống mất đi hiệu lực. Do đó, nghiên cứu này lập luận rằng cần có sự can thiệp của các cơ chế xác thực kỹ thuật (evidence-based trust) để vượt qua rào cản hoài nghi này.\n\n### 2.3. Truy xuất nguồn gốc và vai trò của công nghệ số\nTrong những năm gần đây, các công nghệ truy xuất nguồn gốc (traceability systems) được đề xuất như một giải pháp nhằm giảm bất cân xứng thông tin trong chuỗi cung ứng thực phẩm (Francisco & Swanson, 2018; Saberi et al., 2019; Tian, 2017). Napolitano et al. (2010) đã chứng minh rằng việc cung cấp thông tin minh bạch về quy trình sản xuất có tác động tích cực đến sự sẵn lòng chi trả của người tiêu dùng.\n\nMặc dù các nghiên cứu ban đầu chủ yếu tập trung vào tính hiệu quả của chuỗi cung ứng (supply chain level), các nghiên cứu cập nhật hơn đã bắt đầu xem xét góc độ hành vi người tiêu dùng. Nghiên cứu của Francisco & Swanson (2018) và Saberi et al. (2019) đã chỉ ra rằng:\n* Tín hiệu truy xuất nguồn gốc có thể nâng cao tính minh bạch và độ tin cậy của chuỗi cung ứng.\n* Từ đó góp phần cải thiện niềm tin của người tiêu dùng đối với các hàng hóa dựa trên niềm tin (credence goods).\n\nTuy nhiên, trong ngành FMCG – nơi quyết định mua diễn ra nhanh, ít suy nghĩ (low-involvement) – cơ chế chuyển hóa chi tiết từ nhận thức truy xuất (Traceability perception) sang niềm tin vẫn còn chưa được kiểm định đầy đủ, được tóm tắt tại Bảng 1.\n\n**Bảng 1: Tổng hợp các nghiên cứu tiêu biểu về Truy xuất nguồn gốc và Khoảng trống nghiên cứu**\n| Tác giả | Bối cảnh | Biến chính | Kết quả | Khoảng trống |\n|---|---|---|---|---|\n| Kendall et al. (2019) | Thực phẩm nhập khẩu, TQ | Food fraud → Integrity | Gian lận làm giảm niềm tin | Chưa có truy xuất số |\n| Kamble et al. (2020) | Nông sản, Ấn Độ | Blockchain → Supply chain | Mô hình hóa chuỗi cung ứng | Thiếu góc người tiêu dùng |\n| Luận án này | Nước yến RTD, VN | TR → PIQ → BA → TT → PI/WTP | Đang kiểm định | Giải quyết các khoảng trống đã nêu |\n\nNgoài ra, trong bối cảnh thực phẩm hữu cơ tại châu Âu, Naspetti và Zanoli (2009) đã chứng minh rằng nhận thức về chất lượng và nguồn gốc có tác động trực tiếp đến sự sẵn lòng trả giá cao hơn. Newman và Dhar (2014) cũng bổ sung rằng tính xác thực có tính \"lây lan\" – khi một yếu tố được xác thực, người tiêu dùng có xu hướng gán tính xác thực cho toàn bộ thương hiệu. Cả hai phát hiện này đều ủng hộ mạnh mẽ cho vai trò trung gian của Brand Authenticity trong mô hình đề xuất.\n\n### 2.4. Lý thuyết tín hiệu và khoảng cách giữa tín hiệu kỹ thuật – nhận thức người tiêu dùng\nTheo Michael Spence (1973), trong điều kiện bất cân xứng thông tin, các bên cung cấp sẽ gửi đi tín hiệu (signals) để truyền tải thông tin về chất lượng. Các nghiên cứu sau này (Connelly et al., 2011) phân biệt:\n* Cheap signals: dễ phát đi, dễ giả mạo (ví dụ: slogan marketing).\n* Costly signals: tốn kém, khó giả mạo (ví dụ: hệ thống truy xuất minh bạch).\n\nTruy xuất nguồn gốc số được xem là một dạng dấu hiệu nhận biết (signals) (costly signals). Khoảng cách quan trọng chưa được giải quyết là: Làm thế nào một tín hiệu kỹ thuật (technical signal) được chuyển hóa thành nhận thức tâm lý của người tiêu dùng? Phần lớn nghiên cứu hiện tại giả định người tiêu dùng tự động tin vào công nghệ, bỏ qua việc kiểm định quá trình chuyển hóa phức tạp từ một \"Technical Signal\" khô khan thành \"Psychological Trust\".\n\n### 2.5. Tính xác thực thương hiệu (Brand Authenticity) như một cơ chế trung gian\nKhái niệm Brand Authenticity được phát triển mạnh trong nghiên cứu hành vi tiêu dùng gần đây. Trong thị trường hàng hóa dựa trên niềm tin (credence goods), người tiêu dùng không còn tin vào các hình ảnh thương hiệu (Brand Image) được xây dựng đơn thuần bằng quảng cáo. Thay vào đó, họ tìm kiếm sự chân thật. Tính xác thực (Authenticity) là cấp độ cao hơn của niềm tin, nó gắn kết cả lý trí và cảm xúc, đóng vai trò là cơ chế trung gian then chốt (Morhart et al., 2015). Theo Morhart et al. (2015), tính xác thực bao gồm: Credibility (đáng tin cậy), Integrity (liêm chính), Continuity (nhất quán), Symbolism (ý nghĩa biểu tượng).\n\nCác nghiên cứu cho thấy Brand Authenticity có liên hệ mạnh với lòng trung thành và mức sẵn lòng chi trả (WTP) (Newman & Dhar, 2014), nhưng thường được nghiên cứu trong bối cảnh thương hiệu cao cấp hoặc storytelling thương hiệu. Trong khi đó, vai trò của Brand Authenticity như một biến trung gian giữa tín hiệu kỹ thuật (traceability) và hành vi tiêu dùng vẫn còn là một khoảng trống cần được làm rõ trong bối cảnh FMCG.\n\n#### Sơ đồ Mô hình Nghiên cứu\n```mermaid\ngraph LR\n    subgraph S [\"Stimulus (S)\"]\n        TR[\"Perceived Traceability\u003cbr/\u003e(TR)\"]\n        NC[\"Naturalness Claim\u003cbr/\u003e(NC)\"]\n    end\n    subgraph O [\"Organism (O)\"]\n        PIQ[\"Perceived Info Quality\u003cbr/\u003e(PIQ)\"]\n        SK[\"Skepticism\u003cbr/\u003e(SK)\"]\n        TT[\"Trust\u003cbr/\u003e(TT)\"]\n        BA[\"Brand Authenticity\u003cbr/\u003e(BA)\"]\n    end\n    subgraph R [\"Response (R)\"]\n        PI[\"Purchase Intention\u003cbr/\u003e(PI)\"]\n        WTP[\"Willingness to Pay\u003cbr/\u003e(WTP)\"]\n    end\n\n    TR -- \"H1 (+)\" --\u003e PIQ\n    TR -- \"H2 (-)\" --\u003e SK\n    NC -- \"H3 (+)\" --\u003e TT\n    TR -. \"H6 (+)\" .-\u003e TT\n    \n    PIQ -- \"H4 (+)\" --\u003e TT\n    SK -- \"H5 (-)\" --\u003e TT\n    TT -- \"H7 (+)\" --\u003e BA\n    \n    BA -- \"H8 (+)\" --\u003e PI\n    BA -- \"H9 (+)\" --\u003e WTP\n\n    style TR fill:#e0f2fe,stroke:#0284c7\n    style NC fill:#e0f2fe,stroke:#0284c7\n    style PIQ fill:#dcfce7,stroke:#16a34a\n    style SK fill:#dcfce7,stroke:#16a34a\n    style TT fill:#dcfce7,stroke:#16a34a\n    style BA fill:#dcfce7,stroke:#16a34a\n    style PI fill:#ffedd5,stroke:#ea580c\n    style WTP fill:#ffedd5,stroke:#ea580c\n```\n*Hình 1. Mô hình nghiên cứu tích hợp S-O-R và Lý thuyết Tín hiệu (Signaling Theory).*\n\n### 2.6. Khoảng trống nghiên cứu (Research Gaps)\nTừ tổng quan trên, nghiên cứu xác định ba khoảng trống chính:\n\n* **Gap 1 – Khoảng trống sơ khai (Unclear) về cơ chế trung gian:** Mặc dù Niềm tin đã được chứng minh là biến trung gian phổ biến (Chen, 2012), cơ chế nhận thức về vai trò của *Tính xác thực thương hiệu* (Brand Authenticity) như một biến trung gian cấp cao hơn kết nối tín hiệu kỹ thuật với hành vi tiêu dùng nhanh (FMCG) vẫn chưa được làm rõ (unclear).\n\n* **Gap 2 – Khoảng trống thiếu nhất quán (Inconsistent) về tích hợp lý thuyết:** Các dòng nghiên cứu hiện tại tồn tại sự đứt gãy giữa góc độ quản trị chuỗi cung ứng (hệ thống truy xuất) và tâm lý hành vi (niềm tin, hoài nghi). Thiếu các mô hình tích hợp giải quyết sự mâu thuẫn (inconsistent) trong việc đánh giá liệu một \"tín hiệu kỹ thuật\" thuần túy có đủ sức thay thế hoàn toàn các \"tín hiệu marketing\" truyền thống hay không.\n\n* **Gap 3 – Khoảng trống bối cảnh:** Các nghiên cứu thực chứng chủ yếu ở các thị trường phát triển hoặc áp dụng cho nông sản thô. Việc áp dụng lý thuyết tín hiệu vào thị trường mới nổi (Việt Nam) đối với ngành FMCG chế biến công nghiệp có mức bất cân xứng thông tin cực cao (như nước yến RTD) vẫn là một mảnh đất trống cần được khai phá.\n\n**Kết luận định vị nghiên cứu:** Trên cơ sở các khoảng trống trên, nghiên cứu này được thực hiện nhằm kiểm định cơ chế tác động của truy xuất nguồn gốc số đến hành vi tiêu dùng, thông qua các biến tâm lý trung gian (PIQ, Trust, Brand Authenticity), trong bối cảnh cụ thể của thị trường nước yến RTD tại Việt Nam.\n\n---\n\n## 3. MỤC TIÊU NGHIÊN CỨU CỦA LUẬN ÁN\n### 3.1. Mục tiêu tổng quát\nKiểm định cơ chế tác động của tín hiệu truy xuất nguồn gốc số đối với nhận thức, tính xác thực thương hiệu và hành vi tiêu dùng của khách hàng đối với sản phẩm nước yến chế biến sẵn.\n\n### 3.2. Mục tiêu cụ thể\n1.  **Mục tiêu 1:** Hệ thống hóa cơ sở lý luận về bất cân xứng thông tin, lý thuyết tín hiệu và niềm tin trong bối cảnh truy xuất nguồn gốc số.\n2.  **Mục tiêu 2:** Xây dựng và kiểm định mô hình đánh giá tác động của nhận thức về truy xuất nguồn gốc đến hoài nghi, niềm tin và tính xác thực thương hiệu.\n3.  **Mục tiêu 3:** Đo lường tác động của Tính xác thực thương hiệu lên Ý định mua hàng và Mức sẵn lòng chi trả thêm (WTP).\n4.  **Mục tiêu 4:** Đề xuất các hàm ý quản trị giúp doanh nghiệp nước yến RTD tối ưu hóa chiến lược minh bạch nguồn gốc.\n\n### 3.3. Câu hỏi nghiên cứu\n1.  Tín hiệu truy xuất nguồn gốc số tác động như thế nào đến các biến tâm lý (hoài nghi, niềm tin)?\n2.  Tính xác thực thương hiệu đóng vai trò trung gian như thế nào trong cơ chế hình thành ý định tiêu dùng?\n3.  Cơ chế tác động tương tác giữa nội dung thông điệp tiếp thị và xác thực số diễn ra như thế nào?\n\n## 4. NỘI DUNG NGHIÊN CỨU\nĐể giải quyết các mục tiêu trên, luận án sẽ triển khai 4 nội dung nghiên cứu chính:\n1.  **Nội dung 1: Khung lý thuyết và mô hình.** Xây dựng mô hình nghiên cứu tích hợp dựa trên khung S-O-R và Lý thuyết Tín hiệu (Signaling Theory). Thiết lập hệ thống giả thuyết nghiên cứu.\n2.  **Nội dung 2: Nghiên cứu định tính.** Phỏng vấn chuyên gia để hiệu chỉnh thang đo và xác nhận tính hợp lý của kịch bản thực nghiệm (mockup sản phẩm).\n3.  **Nội dung 3: Nghiên cứu định lượng.** Thiết kế thực nghiệm 2x2, thu thập dữ liệu bằng bảng hỏi phân bổ ngẫu nhiên theo kịch bản, và phân tích dữ liệu bằng mô hình phương trình cấu trúc (PLS-SEM).\n4.  **Nội dung 4: Thảo luận và đề xuất.** Thảo luận kết quả phân tích, so sánh với các nghiên cứu trước đây và đề xuất hàm ý quản trị.\n\n*(Ghi chú: Mô hình nghiên cứu chi tiết và các giả thuyết được trình bày cụ thể ở phần Phương pháp nghiên cứu bên dưới)*\n\n## 5. Ý NGHĨA KHOA HỌC VÀ THỰC TIỄN CỦA ĐỀ TÀI\n### 5.1. Đóng góp học thuật\n*   **Cung cấp bằng chứng thực nghiệm cho Lý thuyết Tín hiệu:** Nghiên cứu cung cấp dữ liệu thực chứng để giải thích cách thức các đặc tính bất biến của dữ liệu được giải mã thành giá trị tự thân của thương hiệu trong bối cảnh sản phẩm credence goods.\n*   **Kiểm định điều kiện biên:** Luận án xác định các điều kiện giới hạn của lý thuyết truyền thông truyền thống, gợi mở rằng khi rủi ro cảm nhận cao, hiệu quả của các tín hiệu marketing truyền thống có thể bị suy giảm nếu thiếu sự hỗ trợ từ các tín hiệu xác thực kỹ thuật.\n*   **Xác lập vai trò trung gian quan trọng của Brand Authenticity:** Nghiên cứu kỳ vọng cung cấp bằng chứng thực nghiệm cho thấy tính xác thực thương hiệu (Brand Authenticity) đóng vai trò quan trọng trong việc kết nối lý trí và cảm xúc, từ đó thúc đẩy hành vi mua trong bối cảnh hàng hóa dựa trên niềm tin.\n*   **Bổ sung bằng chứng thực nghiệm tại thị trường mới nổi:** Cung cấp dữ liệu thực chứng từ Việt Nam, đặc biệt là nhóm Gen Z đối với ngành hàng nước yến RTD.\n\n### 5.2. Đóng góp thực tiễn\n*   Gợi ý cho doanh nghiệp nước yến RTD về vai trò của thông tin truy xuất nguồn gốc trong việc nâng cao nhận thức và niềm tin của người tiêu dùng.\n*   Cung cấp cơ sở tham khảo cho việc thiết kế giao diện truy xuất phù hợp với hành vi người tiêu dùng trẻ.\n\n---\n\n## 6. PHẠM VI NGHIÊN CỨU CỦA ĐỀ TÀI\n1.  Phạm vi không gian: Nghiên cứu và thu thập dữ liệu được thực hiện tại TP.HCM, thị trường đô thị lớn với độ tiếp cận công nghệ cao.\n2.  Phạm vi thời gian: Dữ liệu dự kiến được thu thập từ quý 3/2026 đến quý 1/2027.\n3.  Phạm vi bối cảnh/Nội dung: Đề tài giới hạn trong sản phẩm nước yến chế biến sẵn (RTD). Nghiên cứu chỉ tập trung vào phía cầu (hành vi người tiêu dùng), không đánh giá năng lực công nghệ phía cung.\n4.  Phạm vi lý thuyết và biến số: Mô hình nghiên cứu giới hạn trong khung S-O-R tích hợp Lý thuyết Tín hiệu với 8 biến (TR, NC, PIQ, SK, TT, BA, PI, WTP). Nghiên cứu không đo lường các biến: Rủi ro cảm nhận (Perceived Risk) như biến riêng biệt, Lòng trung thành thương hiệu (Brand Loyalty), hay Giá trị cảm nhận (Perceived Value).\n\n## 7. ĐỐI TƯỢNG NGHIÊN CỨU CỦA ĐỀ TÀI\n*   *Đối tượng nghiên cứu (Object of study):* Cơ chế tác động tâm lý và hành vi của người tiêu dùng trong việc phản ứng với các tín hiệu nhận thức về truy xuất nguồn gốc thông qua công nghệ số.\n*   *Khách thể nghiên cứu (Subject of study):* Người tiêu dùng thế hệ Gen Z (18-27 tuổi) đang sinh sống tại khu vực đô thị (TP.HCM).\n*   *Đối tượng khảo sát (Survey respondent):* Người tiêu dùng Gen Z (18-27 tuổi) tại TP.HCM, có hành vi tiêu thụ nước giải khát dinh dưỡng (FMCG), quan tâm đến sức khỏe, và được phân bổ ngẫu nhiên vào 1 trong 4 nhóm kịch bản thực nghiệm.\n\n## 8. PHƯƠNG PHÁP NGHIÊN CỨU\n### 8.1. Mô hình nghiên cứu và Giả thuyết\n#### 8.1.1. Logic xây dựng mô hình (Model Logic)\nMô hình nghiên cứu được xây dựng dựa trên sự tích hợp giữa:\n* **Stimulus – Organism – Response (S-O-R) framework**\n* **Signaling Theory**\n\nTrong đó:\n* **Stimulus (S):** Nhận thức về truy xuất nguồn gốc (TR), Thông điệp tiếp thị (NC)\n* **Organism (O):** Perceived Information Quality (PIQ), Skepticism (SK), Trust (TT), Brand Authenticity (BA)\n* **Response (R):** Purchase Intention (PI), Willingness to Pay Premium (WTP)\n\n**Tính tinh gọn của mô hình (Model Parsimony):** Mặc dù \"Rủi ro cảm nhận\" (Perceived Risk) là tiền đề nội tại, nghiên cứu không vẽ nó thành một biến riêng biệt. Thay vào đó, sự suy giảm rủi ro cảm nhận được bao hàm (proxy) thông qua sự suy giảm của Hoài nghi (SK) và sự gia tăng của Niềm tin (TT).\n\n#### 8.1.2. Mô hình nghiên cứu đề xuất (Proposed Model)\n**Cấu trúc tuyến chính (Core Path):**\n* TR → PIQ → BA → TT → PI / WTP\n* TR → SK → TT\n* NC → TT\n\n**Tương tác (Moderation):**\n* TR × NC → TT\n\n#### 8.1.3. Giả thuyết nghiên cứu (Hypotheses Development)\nNghiên cứu đề xuất 9 giả thuyết (xem Hình 1):\n\n*   **Tuyến hình thành Nhận thức:**\n    *   **H1 (+):** Nhận thức về truy xuất nguồn gốc (TR) tác động tích cực đến Chất lượng thông tin cảm nhận (PIQ).\n    *   **H2 (-):** Nhận thức về truy xuất nguồn gốc (TR) tác động tiêu cực (làm giảm) Hoài nghi (SK).\n*   **Tuyến hình thành Niềm tin:**\n    *   **H3 (+):** Thông điệp tiếp thị (NC) tác động tích cực đến Niềm tin (TT).\n    *   **H4 (+):** Chất lượng thông tin cảm nhận (PIQ) tác động tích cực đến Niềm tin (TT).\n    *   **H5 (-):** Hoài nghi (SK) tác động tiêu cực đến Niềm tin (TT).\n    *   **H6 (+):** Tín hiệu truy xuất (TR) đóng vai trò điều tiết (Moderation), làm khuếch đại tác động tích cực của thông điệp tiếp thị (NC) lên Niềm tin (TT).\n*   **Tuyến chuyển hóa Giá trị và Hành vi:**\n    *   **H7 (+):** Tính xác thực thương hiệu (BA) tác động tích cực đến Niềm tin (TT).\n    *   **H8 (+):** Tính xác thực thương hiệu (BA) tác động tích cực đến Ý định mua hàng (PI).\n    *   **H9 (+):** Tính xác thực thương hiệu (BA) tác động tích cực đến Mức sẵn lòng chi trả thêm (WTP).\n\n#### 8.1.4. Định vị khoa học (Positioning)\nĐịnh vị cốt lõi: *\"Nghiên cứu này không đánh giá công nghệ dưới góc độ kỹ thuật lõi, mà xem xét cách thức nhận thức về truy xuất nguồn gốc đóng vai trò như một tín hiệu niềm tin giúp định hình nhận thức, tính xác thực và ý định hành vi của người tiêu dùng.\"*\n\n---\n\n### 8.2. Thiết kế và quy trình nghiên cứu\n#### 8.2.1. Cách tiếp cận nghiên cứu (Research Approach)\nNghiên cứu được thiết kế theo phương pháp hỗn hợp (Mixed-methods), thực hiện qua hai giai đoạn:\n\n* **Giai đoạn 1: Nghiên cứu định tính (Qualitative Phase)**\n    *   **Phương pháp:** Phỏng vấn sâu (In-depth interview) với hội đồng chuyên gia.\n    *   **Mẫu chuyên gia (n = 15):** Nhóm 1 (08 người) quản lý phân phối ngành FMCG; Nhóm 2 (07 người) chuyên gia CNTT về truy xuất nguồn gốc.\n    *   **Kết quả đầu ra:** Hiệu chỉnh thang đo và thẩm định tính thực tế của kịch bản thực nghiệm.\n\n* **Giai đoạn 2: Nghiên cứu thực nghiệm định lượng (Quantitative Phase)**\n    *   **Thực nghiệm:** Sử dụng thiết kế kịch bản (scenario-based) để kiểm soát tác động của các tín hiệu.\n    *   **Khảo sát:** Đo lường các biến tâm lý và hành vi thông qua mô hình cấu trúc (SEM).\n\n```mermaid\ngraph TD\n    A[\"1. Tổng quan Tài liệu & Đề xuất Mô hình\"] --\u003e B[\"2. Nghiên cứu Định tính (Phỏng vấn n=15)\"]\n    B --\u003e C[\"3. Hiệu chỉnh Thang đo & Kịch bản\"]\n    C --\u003e D[\"4. Khảo sát Sơ bộ (Pilot Test)\"]\n    D --\u003e E[\"5. Nghiên cứu Định lượng (Thực nghiệm 2x2, n=400-500)\"]\n    E --\u003e F[\"6. Phân tích Dữ liệu (PLS-SEM)\"]\n    F --\u003e G[\"7. Kết luận & Hàm ý Quản trị\"]\n    style A fill:#f8fafc,stroke:#334155\n    style B fill:#e0f2fe,stroke:#0284c7\n    style C fill:#e0f2fe,stroke:#0284c7\n    style D fill:#fef08a,stroke:#ca8a04\n    style E fill:#dcfce7,stroke:#16a34a\n    style F fill:#dcfce7,stroke:#16a34a\n    style G fill:#f8fafc,stroke:#334155\n```\n*Hình 2. Sơ đồ Quy trình Nghiên cứu (Research Methodology Flowchart).*\n\n#### 8.2.2. Thiết kế nghiên cứu (Research Design)\nNghiên cứu áp dụng thiết kế thực nghiệm 2 × 2 factorial design (như trình bày tại Bảng 2).\n\n**Bảng 2: Ma trận thiết kế thực nghiệm 2x2**\n| Yếu tố | Mức 1 | Mức 2 |\n|---|---|---|\n| **Traceability (TR)** | Có truy xuất | Không truy xuất |\n| **Thông điệp (NC)** | Thông điệp tự nhiên | Thông điệp chức năng |\n\nTổng cộng có 4 nhóm kịch bản thực nghiệm. Người tham gia sẽ được phân bổ ngẫu nhiên vào 1 trong 4 nhóm.\n\n```mermaid\ngraph TD\n    A[\"Tổng mẫu Khảo sát (n = 400 - 500)\"] -- \"Phân bổ Ngẫu nhiên\" --\u003e B{\"Thiết kế Thực nghiệm 2x2\"}\n    B --\u003e C[\"Nhóm 1: Có Truy xuất + T.điệp Tự nhiên\"]\n    B --\u003e D[\"Nhóm 2: Có Truy xuất + T.điệp Chức năng\"]\n    B --\u003e E[\"Nhóm 3: Không Truy xuất + T.điệp Tự nhiên\"]\n    B --\u003e F[\"Nhóm 4: Không Truy xuất + T.điệp Chức năng\"]\n    C --\u003e G[\"Khảo sát Đo lường (PIQ, Trust, BA, PI, WTP)\"]\n    D --\u003e G\n    E --\u003e G\n    F --\u003e G\n    style A fill:#f8fafc,stroke:#334155,stroke-width:2px\n    style B fill:#e0f2fe,stroke:#0284c7,stroke-width:2px\n    style C fill:#dcfce7,stroke:#16a34a\n    style D fill:#fef08a,stroke:#ca8a04\n    style E fill:#ffedd5,stroke:#ea580c\n    style F fill:#f1f5f9,stroke:#475569\n    style G fill:#f8fafc,stroke:#334155,stroke-width:2px,stroke-dasharray: 5 5\n```\n*Hình 3. Sơ đồ Thiết kế Thực nghiệm (Experimental Design Flowchart).*\n\n**Lưu ý về ranh giới nghiên cứu:** Nghiên cứu này không đánh giá hiệu năng của hệ thống công nghệ thực tế, mà tập trung đo lường \"nhận thức về truy xuất nguồn gốc\" (perceived traceability) của người tiêu dùng.\n\n#### 8.2.3. Vật liệu thực nghiệm (Stimulus Development)\nVật liệu thực nghiệm được phát triển dưới dạng Mockup sản phẩm:\n*   Bao bì sản phẩm với một thương hiệu giả định (fictitious brand) nhằm loại bỏ nhiễu ngoại lai từ Lòng trung thành thương hiệu.\n*   QR code giả lập có khả năng tương tác.\n*   Giao diện truy xuất nguồn gốc hiển thị chi tiết vòng đời sản phẩm.\n\n#### 8.2.4. Đối tượng và Phương pháp thu thập dữ liệu\n*   *Đối tượng:* Người tiêu dùng Gen Z (18–27 tuổi) tại TP.HCM.\n*   *Phương pháp lấy mẫu:* Lấy mẫu phi xác suất có mục đích (Purposive Sampling) kết hợp Snowball sampling. Bộ lọc sàng lọc gắt gao: có hành vi tiêu thụ nước yến/FMCG dinh dưỡng và quan tâm đến sức khỏe.\n*   *Kích thước mẫu dự kiến:* n = 400 – 500. Kích thước mẫu tối thiểu được ước lượng thông qua phần mềm G*Power 3.1 (mức ý nghĩa 5%, power 80%, effect size trung bình) đảm bảo thỏa mãn và vượt yêu cầu thống kê của Hair et al. (2022).\n\n#### 8.2.5. Thang đo và Xây dựng bảng hỏi\nToàn bộ biến tiềm ẩn được đo lường bằng thang đo Likert 7 điểm. Thang đo 7 điểm cung cấp độ nhạy cao hơn cho mô hình PLS-SEM (Hair et al., 2022).\n*   *Quy trình chuẩn hóa:* Dịch xuôi - dịch ngược (translation - back-translation).\n*   *Pilot test:* n ≈ 30 trước khi khảo sát diện rộng.\n\n#### 8.2.6. Phân tích dữ liệu (Data Analysis)\nPhương pháp phân tích cốt lõi là PLS-SEM (SmartPLS 4). Quy trình 4 bước:\n1.  **Mô hình đo lường:** Cronbach's Alpha, ρ_A, Composite Reliability (CR), AVE ≥ 0.5.\n2.  **Giá trị phân biệt:** Fornell-Larcker criterion và HTMT.\n3.  **Mô hình cấu trúc:** Path coefficients β, R², f², PLSpredict (Q² predict).\n4.  **Kiểm định trung gian nối tiếp (Serial Mediation) và Phân tích đa nhóm (MGA):** Bootstrapping 5.000 mẫu lặp. Phân tích đa nhóm theo giới tính / kinh nghiệm mua yến.\n\n#### 8.2.7. Kiểm soát sai lệch (Bias Control)\n1.  **Common Method Bias (CMB):** Hoán đổi thứ tự câu hỏi, biến đánh dấu (Marker variable), Full collinearity VIF \u003c 3.3.\n2.  **Manipulation Check:** Câu hỏi kiểm tra thao tác thực nghiệm.\n3.  **Data Cleaning:** Loại bỏ \"Speeders\" và \"Straight-liners\".\n\n#### 8.2.8. Đạo đức nghiên cứu (Research Ethics)\n*   Sự tham gia hoàn toàn tự nguyện.\n*   Dữ liệu ẩn danh hoàn toàn.\n*   Tuân thủ quy định của Hội đồng Đạo đức (IRB) Đại học Nha Trang.\n\n---\n\n### 8.3. Thang đo & Bảng câu hỏi (Measurement Model & Questionnaire)\n#### 8.3.1. Nguyên tắc xây dựng thang đo\n*   Sử dụng thang đo Likert 7 điểm.\n*   Kế thừa từ các nghiên cứu đã kiểm định (validated scales).\n*   Dịch thuật ngược (Back-translation: Anh ↔ Việt).\n*   Pilot test (n ≈ 30).\n\n#### 8.3.2. Cấu trúc bảng hỏi\n**PHẦN A – KỊCH BẢN (Stimulus Exposure)**\nNgười tham gia xem 1 trong 4 mockup sản phẩm (phân bổ ngẫu nhiên).\n\n**PHẦN B – THANG ĐO CÁC BIẾN NGHIÊN CỨU**\n\n**1. Nhận thức về truy xuất nguồn gốc (TR)** *(Adapted from traceability literature)*\n*   TR1: Tôi có thể dễ dàng truy xuất nguồn gốc của sản phẩm này.\n*   TR2: Thông tin về nguồn gốc sản phẩm được trình bày rõ ràng.\n*   TR3: Tôi tin rằng thông tin truy xuất là minh bạch.\n*   TR4: Tôi có thể kiểm tra được quy trình sản xuất của sản phẩm.\n*   TR5: Hệ thống truy xuất giúp tôi hiểu rõ sản phẩm hơn.\n\n**2. Perceived Information Quality (PIQ)** *(Adapted from Nelson et al., 2005)*\n*   PIQ1: Thông tin về sản phẩm là chính xác.\n*   PIQ2: Thông tin được cung cấp là đáng tin cậy.\n*   PIQ3: Thông tin là đầy đủ.\n*   PIQ4: Thông tin được trình bày rõ ràng và dễ hiểu.\n\n**3. Skepticism (SK)** *(Adapted from Skarmeas & Leonidou, 2013)*\n*   SK1: Tôi nghi ngờ các tuyên bố \"tự nhiên\" của sản phẩm này.\n*   SK2: Tôi cho rằng thông điệp \"nguyên chất\" thường bị phóng đại.\n*   SK3: Tôi không hoàn toàn tin các cam kết về thành phần.\n*   SK4: Tôi nghĩ rằng nhiều sản phẩm \"tự nhiên\" chỉ là marketing.\n*   SK5: Tôi hoài nghi về tính trung thực của các tuyên bố này.\n\n**4. Trust (TT)** *(Adapted from Chen, 2012)*\n*   TT1: Sản phẩm này đáng tin cậy.\n*   TT2: Tôi cảm thấy an toàn khi sử dụng sản phẩm này.\n*   TT3: Sản phẩm này có thể tin được.\n*   TT4: Tôi tin tưởng vào cam kết chất lượng của sản phẩm này.\n\n**5. Brand Authenticity (BA)** *(Adapted from Morhart et al., 2015)*\n*   BA1: Thương hiệu này mang lại cảm giác \"thật\".\n*   BA2: Thương hiệu này rất chân thành.\n*   BA3: Thương hiệu này không giả tạo.\n*   BA4: Thương hiệu này gợi lên những giá trị mà tôi coi trọng. (Symbolism)\n\n**6. Purchase Intention (PI)** *(Adapted from Spears & Singh, 2004)*\n*   PI1: Tôi có khả năng sẽ mua sản phẩm này.\n*   PI2: Tôi sẽ cân nhắc mua sản phẩm này.\n*   PI3: Tôi có ý định thử sản phẩm này.\n*   PI4: Tôi sẵn sàng chọn sản phẩm này khi mua.\n\n**7. Willingness to Pay Premium (WTP)** *(Gabor-Granger đã đơn giản hóa)*\nPhương pháp Gabor-Granger được chọn vì phù hợp với bối cảnh FMCG giá thấp (Homburg et al., 2005), nơi mức WTP tuyệt đối nhỏ và câu hỏi mở (open-ended) có nguy cơ tạo ra phương sai quá lớn hoặc giá trị phi thực tế.\n\n**Kiểm tra thao tác kích thích (Manipulation Check) & Phân nhóm:**\nĐể đảm bảo tính giá trị nội tại của thiết kế thực nghiệm 2x2, một câu hỏi kiểm tra thao tác (manipulation check) được sử dụng nhằm xác nhận đáp viên thực sự nhận thức được sự hiện diện của mã QR và loại thông điệp. Đồng thời, tính năng phân nhóm ngẫu nhiên (Random Assignment) của công cụ khảo sát được kích hoạt để loại trừ thiên kiến chọn mẫu, dù sử dụng phương pháp lấy mẫu thuận tiện.\n*   **Câu hỏi:** \"Nếu sản phẩm này có giá cao hơn sản phẩm thông thường, bạn sẵn sàng trả thêm tối đa bao nhiêu?\"\n    - [ ] Không trả thêm\n    - [ ] +2.000 VNĐ\n    - [ ] +5.000 VNĐ\n    - [ ] +8.000 VNĐ\n    - [ ] +10.000 VNĐ\n\n#### 8.3.3. Biến kiểm tra thao tác (Manipulation Check)\n*   MC_TR1: Sản phẩm này có cung cấp thông tin truy xuất nguồn gốc.\n*   MC_TR2: Tôi có thể kiểm tra thông tin sản phẩm.\n*   MC_NC1: Sản phẩm này nhấn mạnh yếu tố \"tự nhiên\".\n*   MC_NC2: Nội dung marketing tập trung vào sức khỏe.\n\n#### 8.3.4. Biến kiểm soát (Control Variables)\n*   Giới tính, Độ tuổi, Tần suất sử dụng nước giải khát.\n*   Mức độ quan tâm đến sức khỏe (1–7 điểm).\n*   Mức độ quan tâm đến môi trường (1–7 điểm).\n\n#### 8.3.5. Kiểm định thang đo (Measurement Validation Plan)\n*   Cronbach's Alpha ≥ 0.7; CR ≥ 0.7.\n*   AVE ≥ 0.5.\n*   HTMT \u003c 0.85.\n\n---\n\n### 8.4. Cấu trúc dự kiến của Luận án (Thesis Structure)\nCấu trúc dự kiến của luận án bao gồm 5 chương, được phân bổ như trình bày tại Bảng 3.\n\n**Bảng 3: Cấu trúc dự kiến của luận án**\n| Chương | Nội dung | Ước lượng |\n|---|---|---|\n| Chương 1 | Giới thiệu: Bối cảnh, Mục tiêu, Câu hỏi nghiên cứu, Phạm vi | 15-20 trang |\n| Chương 2 | Tổng quan Lý thuyết và Mô hình nghiên cứu | 40-50 trang |\n| Chương 3 | Phương pháp Nghiên cứu (Thiết kế thực nghiệm, Thang đo, PLS-SEM) | 25-30 trang |\n| Chương 4 | Kết quả Nghiên cứu (Thống kê mô tả, Mô hình đo lường, Mô hình cấu trúc) | 30-40 trang |\n| Chương 5 | Thảo luận, Kết luận, Hàm ý quản trị và Hạn chế | 20-25 trang |\n\n---\n\n## 9. KẾT QUẢ MONG ĐỢI\n### 9.1. Kết quả khoa học kỳ vọng\n*   **Sức mạnh của tín hiệu kỹ thuật:** Dự đoán tín hiệu truy xuất có sức mạnh làm giảm hoài nghi. Nếu tác động yếu, nghiên cứu sẽ phân tích các rào cản nhận thức.\n*   **Vai trò trung gian của tính xác thực:** Kỳ vọng làm rõ vai trò của Tính xác thực thương hiệu (BA) như một cơ chế trung gian quan trọng chuyển hóa niềm tin thành mức sẵn lòng chi trả thêm (WTP).\n\n### 9.2. Lộ trình công bố\nLộ trình công bố khoa học dự kiến được trình bày tại Bảng 4.\n\n**Bảng 4: Lộ trình công bố khoa học dự kiến**\n| Giai đoạn | Hoạt động | Đầu ra |\n|---|---|---|\n| Tháng 6-7/2027 | Hội thảo khoa học quốc gia/quốc tế | Kỷ yếu hội thảo ISBN |\n| Tháng 10/2027 | Báo cáo trung gian ĐHQG Nha Trang | Báo cáo tiến độ |\n| Tháng 3/2028 | Nộp bài tạp chí HĐGS | 02-03 bài báo |\n| Tháng 12/2028 | Bảo vệ luận án Tiến sĩ | Luận án hoàn chỉnh |\n\n## 10. NGUỒN KINH PHÍ\nNghiên cứu sinh tự túc nguồn kinh phí (bao gồm chi phí khảo sát, xây dựng mockup, và công bố bài báo).\n\n## 11. DỰ KIẾN KẾ HOẠCH HỌC TẬP, NGHIÊN CỨU TOÀN KHÓA\nKế hoạch học tập và nghiên cứu toàn khóa được thiết kế trong thời gian chuẩn 3 năm (36 tháng) như trình bày tại Bảng 5:\n\n**Bảng 5: Dự kiến kế hoạch học tập và nghiên cứu toàn khóa**\n| STT | Nội dung / Nhiệm vụ | Thời gian | Kết quả dự kiến | Nơi thực hiện |\n|---|---|---|---|---|\n| 1 | Học các học phần trình độ Tiến sĩ | Tháng 1 - Tháng 6 | Hoàn thành 8 Tín chỉ | ĐH Nha Trang |\n| 2 | Viết và bảo vệ Tiểu luận tổng quan | Tháng 7 - Tháng 12 | Hoàn thành 4 Tín chỉ | ĐH Nha Trang |\n| 3 | Chuyên đề Tiến sĩ 1 & 2 | Tháng 13 - Tháng 18 | Hoàn thành 8 Tín chỉ | ĐH Nha Trang / TP.HCM |\n| 4 | Nghiên cứu định tính + Pilot test | Tháng 16 - Tháng 18 | Thang đo hoàn chỉnh, Mockup | TP.HCM |\n| 5 | Nghiên cứu thực nghiệm định lượng (2x2) | Tháng 19 - Tháng 24 | Bộ dữ liệu n=400-500 | TP.HCM |\n| 6 | Phân tích PLS-SEM & Viết kết quả | Tháng 22 - Tháng 24 | Báo cáo kết quả phân tích | TP.HCM |\n| 7 | Seminar chuyên đề | Tháng 25 | Trình bày kết quả trước khoa | ĐH Nha Trang |\n| 8 | Viết là giúp người tiêu dùng và nhà quản lý hiểu được con đường đi của dữ liệu từ nông trại đến tay người dùng cuối một cách minh bạch nhất.\n\n* **Địa chỉ truy cập hệ thống:** [https://agrichain.lephuchai.com/](https://agrichain.lephuchai.com/)\n\n### 13.2. Luồng dữ liệu sản phẩm (The Digital Journey)\n\nHệ thống mô phỏng trọn vẹn 4 giai đoạn cốt lõi của một sản phẩm nông sản sạch:\n\n* **Giai đoạn 1: Ghi nhận tại Nông trại (Farm Registration)**\n  * Mọi thông tin về giống, ngày thu hoạch, tọa độ GPS được \"ký số\" xác thực.\n  * Dữ liệu được đóng gói và gửi lên chuỗi khối dưới dạng một giao dịch không thể sửa đổi.\n  * *Công cụ hỗ trợ:* [Trình tạo mã QR & Ghi nhận dữ liệu](https://agrichain.lephuchai.com/tools/qr) (Link: https://agrichain.lephuchai.com/tools/qr)\n* **Giai đoạn 2: Kiểm định Chất lượng (Lab Validation)**\n  * Phòng thí nghiệm thực hiện phân tích các chỉ số hóa lý (độ đạm, độ sạch, vi sinh).\n  * Kết quả kiểm định kèm hồ sơ gốc được gắn chặt vào mã định danh của sản phẩm trên Blockchain.\n* **Giai đoạn 3: Vận chuyển & Phân phối (Logistics & Distribution)**\n  * Các thông số về nhiệt độ bảo quản, độ ẩm trong quá trình di chuyển được ghi nhận liên tục qua hệ thống cảm biến (IoT).\n  * Mỗi điểm dừng của sản phẩm đều được ghi lại dấu vết (Digital Footprint).\n* **Giai đoạn 4: Xác thực tại Showroom (Retail Verification)**\n  * Sản phẩm có mặt tại điểm bán với mã QR định danh duy nhất.\n  * Người tiêu dùng quét mã để thực hiện quy trình \"đối soát ngược\" về nguồn gốc.\n\n### 13.3. Trải nghiệm \"Niềm tin số\" cho Người tiêu dùng\n\nĐiểm nhấn của mô hình là biến các khái niệm kỹ thuật phức tạp thành trải nghiệm an tâm:\n\n1. **Hành trình xuyên suốt (Node History):** Hiển thị trực quan toàn bộ lịch sử sản phẩm qua các \"Nút\" (Nodes). Người dùng có thể thấy ai đã làm gì, ở đâu và vào lúc nào.\n2. **Đối soát tự động (Audit Pulse):** Khi quét mã, hệ thống mô phỏng việc kiểm tra chéo dữ liệu trên hàng trăm máy chủ (Nodes) để đảm bảo thông tin chưa từng bị can thiệp.
